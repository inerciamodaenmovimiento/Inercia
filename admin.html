<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myGESTIÓN PRO | INERCIA MODA</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --black: #000; --white: #fff; --gray: #f4f4f4; --border: #e0e0e0; --safe: #2e7d32; --red: #c62828; --gold: #b8860b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); display: flex; min-height: 100vh; }

        /* LOGIN */
        #lock-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #lock-screen input { border: none; border-bottom: 2px solid var(--black); font-size: 2.5rem; text-align: center; outline: none; width: 220px; padding: 10px; }

        /* SIDEBAR */
        sidebar { width: 260px; background: var(--black); color: #fff; padding: 40px 20px; position: fixed; height: 100vh; z-index: 1000; }
        .brand-admin { font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-item { color: #888; text-decoration: none; font-size: 11px; margin-bottom: 20px; letter-spacing: 1.5px; cursor: pointer; display: block; text-transform: uppercase; }
        .nav-item:hover, .nav-item.active { color: #fff; }

        /* MAIN CONTENT */
        main { flex: 1; margin-left: 260px; padding: 50px; display: none; }
        .card { background: #fff; padding: 30px; border: 1px solid var(--border); margin-bottom: 25px; }
        h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid var(--gray); padding-bottom: 10px; }

        /* FORMULARIOS */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #999; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); font-size: 13px; outline: none; background: #fff; }
        
        .variant-row { display: grid; grid-template-columns: 1fr 1fr 80px 1fr; gap: 10px; margin-bottom: 10px; }
        .preview-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 15px; }
        .preview-box { aspect-ratio: 2/3; background: #eee; object-fit: cover; width: 100%; border: 1px solid var(--border); }

        .btn-black { background: var(--black); color: #fff; border: none; padding: 18px; width: 100%; font-weight: 600; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; }
        .btn-black:disabled { background: #666; cursor: wait; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <input type="password" id="secret-key" placeholder="••••">
    </div>

    <sidebar>
        <div class="brand-admin">myGESTIÓN</div>
        <div class="nav-item active" onclick="showSection('nuevo')">Carga & Variantes</div>
        <div class="nav-item" onclick="showSection('pedidos')">Pedidos & Clientes</div>
    </sidebar>

    <main id="admin-content">
        <section id="section-nuevo" class="admin-section">
            <div class="card">
                <h2>Carga de Producto</h2>
                <div class="grid-form">
                    <div class="input-group"><label>Categoría</label><select id="p-cat"><option>General</option></select></div>
                    <div class="input-group"><label>Nombre</label><input type="text" id="p-nombre"></div>
                </div>
                <div class="input-group"><label>Descripción Editorial</label><textarea id="p-desc" rows="3"></textarea></div>
            </div>

            <div class="card">
                <h2>Variantes (Talla/Color/Stock)</h2>
                <div id="v-container">
                    <div class="variant-row">
                        <input type="text" placeholder="Talla" class="v-talla">
                        <input type="text" placeholder="Color" class="v-color">
                        <input type="number" placeholder="Stock" class="v-stock">
                        <input type="text" placeholder="Material" class="v-material">
                    </div>
                </div>
                <button onclick="addVariantRow()" style="margin-bottom:20px; cursor:pointer;">+ Añadir Fila</button>
            </div>

            <div class="card">
                <h2>Multimedia (Fotos de Campaña)</h2>
                <input type="file" id="f-input" multiple onchange="previewImages(event)">
                <div id="p-grid" class="preview-grid"></div>
            </div>

            <button class="btn-black" id="btn-save">PUBLICAR EN INERCIA MODA</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc } from "https://gstatic.com";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://gstatic.com";

        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let selectedFiles = [];

        // ACCESO 0110
        document.getElementById('secret-key').addEventListener('input', (e) => {
            if(e.target.value === '0110') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            }
        });

        // PREVIEW DE IMÁGENES
        window.previewImages = (e) => {
            selectedFiles = Array.from(e.target.files);
            const grid = document.getElementById('p-grid');
            grid.innerHTML = '';
            selectedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'preview-box';
                    grid.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        };

        // AÑADIR VARIANTE
        window.addVariantRow = () => {
            const container = document.getElementById('v-container');
            const row = document.querySelector('.variant-row').cloneNode(true);
            row.querySelectorAll('input').forEach(i => i.value = '');
            container.appendChild(row);
        };

        // NAVEGACIÓN
        window.showSection = (id) => {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.getElementById('section-' + id).style.display = 'block';
        };

        // --- ACCIÓN DE GUARDADO REAL ---
        document.getElementById('btn-save').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save');
            if (selectedFiles.length === 0) return alert("Por favor, selecciona al menos una foto.");
            
            btn.disabled = true;
            btn.innerText = "SUBIENDO... POR FAVOR NO CIERRES";

            try {
                // 1. Subir a Storage
                const imageUrls = await Promise.all(selectedFiles.map(async (file) => {
                    const sRef = ref(storage, `productos/${Date.now()}-${file.name}`);
                    await uploadBytes(sRef, file);
                    return getDownloadURL(sRef);
                }));

                // 2. Recoger Variantes
                const variantes = Array.from(document.querySelectorAll('.variant-row')).map(row => ({
                    talla: row.querySelector('.v-talla').value,
                    color: row.querySelector('.v-color').value,
                    stock: parseInt(row.querySelector('.v-stock').value) || 0,
                    material: row.querySelector('.v-material').value
                }));

                // 3. Guardar en Firestore
                await addDoc(collection(db, "productos"), {
                    nombre: document.getElementById('p-nombre').value,
                    categoria: document.getElementById('p-cat').value,
                    descripcion: document.getElementById('p-desc').value,
                    imagenes: imageUrls,
                    variantes: variantes,
                    timestamp: new Date()
                });

                alert("¡EXITO! Producto publicado en INERCIA MODA.");
                location.reload();

            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "PUBLICAR EN INERCIA MODA";
            }
        });
    </script>
</body>
</html>
