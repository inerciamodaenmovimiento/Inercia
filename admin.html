<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myGESTIÓN | INERCIA</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --black: #000; --gray: #f4f4f4; --border: #e0e0e0; --accent: #555; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); display: flex; min-height: 100vh; }

        /* Pantalla de Bloqueo */
        #lock-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        #lock-screen input { border: none; border-bottom: 2px solid var(--black); font-size: 2rem; text-align: center; outline: none; width: 200px; font-family: serif; }

        /* Sidebar myGESTIÓN */
        sidebar { width: 260px; background: var(--black); color: #fff; padding: 40px 20px; display: flex; flex-direction: column; }
        .brand-admin { font-size: 1.2rem; font-weight: 600; letter-spacing: 3px; margin-bottom: 50px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; margin-bottom: 20px; letter-spacing: 1px; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: #fff; }

        /* Área de Trabajo */
        main { flex: 1; padding: 60px; overflow-y: auto; display: none; }
        .card { background: #fff; padding: 40px; border: 1px solid var(--border); margin-bottom: 30px; }
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; color: var(--accent); }

        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 600; text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); font-size: 13px; outline: none; }

        /* Variantes */
        .variant-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .btn-add { background: none; border: 1px dashed var(--black); padding: 10px; cursor: pointer; font-size: 11px; width: 100%; margin-top: 10px; }

        /* Carga de Imágenes */
        .dropzone { border: 2px dashed var(--border); padding: 40px; text-align: center; color: #aaa; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .dropzone:hover { border-color: var(--black); color: var(--black); }
        .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .preview-box { aspect-ratio: 1; background: #eee; border: 1px solid var(--border); object-fit: cover; width: 100%; }

        .btn-save { background: var(--black); color: #fff; border: none; padding: 20px; width: 100%; font-weight: 600; letter-spacing: 2px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <input type="password" id="secret-key" placeholder="••••">
    </div>

    <sidebar>
        <div class="brand-admin">myGESTIÓN</div>
        <div class="nav-item active">NUEVO PRODUCTO</div>
        <div class="nav-item">INVENTARIO</div>
        <div class="nav-item">COLECCIONES</div>
        <div class="nav-item">PEDIDOS</div>
    </sidebar>

    <main id="admin-content">
        <div class="card">
            <h2>Información Básica</h2>
            <div class="grid-form">
                <div class="input-group">
                    <label>Nombre de Referencia</label>
                    <input type="text" placeholder="Ej: Blazer Inercia 01">
                </div>
                <div class="input-group">
                    <label>Colección / Temporada</label>
                    <select>
                        <option>Temporada 2026 - Movimiento</option>
                        <option>Edición Limitada</option>
                        <option>Básicos Esenciales</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Descripción Editorial</label>
                <textarea rows="3" placeholder="Escribe la historia de la prenda..."></textarea>
            </div>
        </div>

        <div class="card">
            <h2>Gestión de Variantes</h2>
            <div id="variants-container">
                <div class="variant-row">
                    <input type="text" placeholder="Talla (S, M, L...)" style="flex: 1;">
                    <input type="text" placeholder="Color" style="flex: 1;">
                    <input type="number" placeholder="Stock" style="width: 80px;">
                    <input type="text" placeholder="Material" style="flex: 1;">
                </div>
            </div>
            <button class="btn-add" onclick="addVariant()">+ AÑADIR VARIANTE</button>
        </div>

        <div class="card">
            <h2>Carga Masiva de Imágenes</h2>
            <div class="dropzone" onclick="document.getElementById('file-input').click()">
                Arrastra las imágenes o haz clic para subir alta resolución
            </div>
            <input type="file" id="file-input" multiple style="display: none;" onchange="previewImages(event)">
            <div class="preview-grid" id="image-preview">
                <!-- Las vistas previas aparecerán aquí -->
            </div>
        </div>

        <button class="btn-save">PUBLICAR EN INERCIA MODA</button>
    </main>

    <script>
        const lock = document.getElementById('lock-screen');
        const key = document.getElementById('secret-key');
        const content = document.getElementById('admin-content');

        // Lógica de acceso 0110
        key.addEventListener('input', (e) => {
            if(e.target.value === '0110') {
                lock.style.display = 'none';
                content.style.display = 'block';
            }
        });

        // Añadir variantes dinámicamente
        function addVariant() {
            const container = document.getElementById('variants-container');
            const row = document.querySelector('.variant-row').cloneNode(true);
            row.querySelectorAll('input').forEach(input => input.value = '');
            container.appendChild(row);
        }

        // Vista previa de imágenes
        function previewImages(event) {
            const preview = document.getElementById('image-preview');
            const files = event.target.files;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.classList.add('preview-box');
                    preview.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
        }
    </script>
</body>
</html>
