<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INERCIA | Panel de Control</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Raleway'; background: #f4f4f4; display: flex; margin: 0; }
        .sidebar { width: 280px; background: #000; color: #fff; height: 100vh; padding: 40px 20px; position: fixed; }
        .main { margin-left: 280px; padding: 60px; width: 100%; }
        .card { background: #fff; padding: 30px; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ddd; }
        .btn-black { background: #000; color: #fff; border: none; padding: 15px 30px; cursor: pointer; width: 100%; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>INERCIA ADMIN</h2>
        <p style="color:#c5a059">Gestión Profesional</p>
        <hr style="opacity:0.1; margin:20px 0">
        <a href="index.html" style="color:#fff; text-decoration:none">→ VOLVER A TIENDA</a>
    </div>

    <div class="main">
        <h1>Gestión de Productos & Stock</h1>
        <div class="card">
            <h3>Carga Masiva de Producto</h3>
            <form id="prodForm">
                <label>Referencia del Producto</label>
                <input type="text" id="n" placeholder="Ej: Tapado Grey Edition" required>
                <label>Variantes (Talles y Colores)</label>
                <input type="text" id="v" placeholder="S, M, L / Gris, Negro" required>
                <label>Precio de Venta</label>
                <input type="number" id="p" placeholder="0.00" required>
                <label>URL de Imagen (Proporción Vertical)</label>
                <input type="text" id="i" placeholder="Pega el link de la foto aquí" required>
                <button class="btn-black">PUBLICAR EN TIENDA</button>
            </form>
        </div>

        <div class="card">
            <h3>Inventario Activo</h3>
            <table id="invTable">
                <thead><tr><th>Foto</th><th>Nombre</th><th>Variantes</th><th>Precio</th><th>Acción</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const form = document.getElementById('prodForm');
        let db = JSON.parse(localStorage.getItem('inercia_db')) || [];

        form.onsubmit = (e) => {
            e.preventDefault();
            db.push({ 
                id: Date.now(), 
                name: document.getElementById('n').value, 
                variants: document.getElementById('v').value, 
                price: document.getElementById('p').value, 
                img: document.getElementById('i').value 
            });
            localStorage.setItem('inercia_db', JSON.stringify(db));
            form.reset();
            render();
        };

        function del(id) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('inercia_db', JSON.stringify(db));
            render();
        }

        function render() {
            const t = document.querySelector('#invTable tbody');
            t.innerHTML = db.map(p => `
                <tr>
                    <td><img src="${p.img}" width="40"></td>
                    <td>${p.name}</td>
                    <td>${p.variants}</td>
                    <td>$${p.price}</td>
                    <td><button onclick="del(${p.id})" style="background:red; color:white; border:none; padding:5px">Borrar</button></td>
                </tr>
            `).join('');
        }
        render();
    </script>
</body>
</html>
