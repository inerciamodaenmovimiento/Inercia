<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Inercia | Gestión</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9f9f9; padding: 40px; }
        .panel { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin: 0 auto; }
        h2 { margin-bottom: 25px; font-weight: 600; letter-spacing: -0.5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; }
        .checkbox-group { margin-bottom: 20px; display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Cargar Nueva Referencia</h2>
        <input type="text" id="pNombre" placeholder="Nombre del Producto">
        <input type="number" id="pPrecio" placeholder="Precio (AED)">
        
        <div class="checkbox-group">
            <label><input type="checkbox" name="talla" value="S"> S</label>
            <label><input type="checkbox" name="talla" value="M"> M</label>
            <label><input type="checkbox" name="talla" value="L"> L</label>
            <label><input type="checkbox" name="talla" value="XL"> XL</label>
        </div>

        <input type="file" id="pImagen" accept="image/*">
        <button id="btnSubir">Publicar Producto</button>
        <p id="status"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc } from "https://gstatic.com";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        document.getElementById('btnSubir').onclick = async () => {
            const btn = document.getElementById('btnSubir');
            const file = document.getElementById('pImagen').files[0];
            const tallas = Array.from(document.querySelectorAll('input[name="talla"]:checked')).map(cb => cb.value);
            
            if(!file || tallas.length === 0) return alert("Faltan datos o imagen");

            btn.disabled = true;
            document.getElementById('status').innerText = "Subiendo a Inercia...";

            try {
                // 1. Subir Imagen
                const imgRef = ref(storage, `productos/${Date.now()}_${file.name}`);
                await uploadBytes(imgRef, file);
                const url = await getDownloadURL(imgRef);

                // 2. Guardar en Firestore
                await addDoc(collection(db, "productos"), {
                    nombre: document.getElementById('pNombre').value,
                    precio: document.getElementById('pPrecio').value,
                    tallas: tallas,
                    imagen: url,
                    createdAt: new Date()
                });

                document.getElementById('status').innerText = "¡Publicado con éxito!";
                btn.disabled = false;
            } catch (error) {
                console.error(error);
                alert("Error al subir");
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
