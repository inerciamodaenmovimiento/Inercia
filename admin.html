<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myGESTIÓN | Inercia Moda</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; color: white; }
        .admin-main { display: none; background: #0a0a0a; min-h-screen; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="lock-screen"><p class="animate-pulse tracking-[1em] text-xs">ACCESO RESTRINGIDO</p></div>

    <div id="admin-panel" class="admin-main p-10">
        <header class="flex justify-between items-center border-b border-zinc-800 pb-8 mb-12">
            <h1 class="text-3xl font-black italic">myGESTIÓN <span class="text-red-600 text-xs font-bold tracking-widest ml-4 uppercase">Inercia</span></h1>
            <div class="bg-zinc-900 px-4 py-2 rounded-full border border-zinc-800 text-[10px] font-bold text-green-500 uppercase tracking-widest">
                Firebase Active
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Gestión de Productos & Variantes -->
            <section class="bg-zinc-900/40 p-8 rounded-3xl border border-zinc-800">
                <h2 class="text-sm font-bold uppercase tracking-widest mb-8 border-l-4 border-red-600 pl-4">Nueva Referencia & Variantes</h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Nombre del Producto</label>
                        <input type="text" placeholder="Ej: Abrigo Inercia Camel" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm focus:border-red-600 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Precio Base</label>
                            <input type="number" placeholder="1299" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Temporada</label>
                            <select class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm text-gray-400">
                                <option>Winter 2026</option>
                                <option>Summer 2026</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Variantes -->
                    <div class="bg-black/50 p-6 rounded-2xl border border-zinc-800">
                        <p class="text-[10px] font-bold uppercase mb-4 text-gray-400 italic">Variantes (Talle / Color / Stock)</p>
                        <div class="flex gap-2 mb-4">
                            <input type="text" placeholder="Talle" class="w-1/3 bg-zinc-900 p-3 rounded-lg text-xs">
                            <input type="text" placeholder="Color" class="w-1/3 bg-zinc-900 p-3 rounded-lg text-xs">
                            <input type="number" placeholder="Stock" class="w-1/3 bg-zinc-900 p-3 rounded-lg text-xs">
                        </div>
                        <button class="text-[9px] font-bold text-red-500 uppercase tracking-widest">+ Añadir Variante</button>
                    </div>

                    <!-- Carga Masiva -->
                    <div class="border-2 border-dashed border-zinc-800 h-40 rounded-2xl flex flex-col items-center justify-center text-zinc-600 hover:border-red-600 cursor-pointer transition">
                        <i class="fas fa-images text-2xl mb-2"></i>
                        <p class="text-[10px] font-bold uppercase">Carga Masiva de Imágenes</p>
                        <p class="text-[9px] mt-1">(Front, Side, Detail)</p>
                    </div>
                    
                    <button class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold uppercase tracking-[0.2em] transition">Sincronizar Stock Real-Time</button>
                </div>
            </section>

            <!-- Dashboard de Control -->
            <div class="space-y-8">
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
                        <p class="text-gray-500 text-[10px] uppercase mb-2">Ventas Netas</p>
                        <p class="text-3xl font-bold">$0.00</p>
                    </div>
                    <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
                        <p class="text-red-500 text-[10px] uppercase mb-2">Alertas Stock</p>
                        <p class="text-3xl font-bold">0</p>
                    </div>
                </div>

                <div class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 h-full">
                    <h3 class="text-xs font-bold uppercase tracking-widest mb-6">Estado de Pedidos & Logística</h3>
                    <div class="text-zinc-600 text-[11px] italic">No hay pedidos pendientes de envío.</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            appId: "1:335158123341:web:2722e74538e808321a7504"
        };
        initializeApp(firebaseConfig);

        let keys = "";
        window.addEventListener("keydown", (e) => {
            keys += e.key;
            if (keys.includes("0110")) {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("admin-panel").style.display = "block";
            }
            if (keys.length > 5) keys = keys.slice(-4);
        });
    </script>
</body>
</html>
