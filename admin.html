<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Editorial</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-mono text-xs">
    <div id="admin-panel" class="max-w-xl mx-auto mt-20 bg-white p-10 shadow-2xl border border-black">
        <h2 class="text-xl font-bold mb-10 border-b-2 border-black pb-2 uppercase tracking-widest">Panel de Control</h2>
        
        <div class="space-y-6">
            <input type="text" id="p-nombre" placeholder="NOMBRE DEL PRODUCTO" class="w-full p-3 border border-gray-200">
            <input type="text" id="p-sub" placeholder="SUBTÍTULO (EJ: DRAPED DETAIL)" class="w-full p-3 border border-gray-200">
            <input type="number" id="p-precio" placeholder="PRECIO" class="w-full p-3 border border-gray-200">
            <input type="text" id="p-img" placeholder="URL DE IMAGEN (JPG/PNG)" class="w-full p-3 border border-gray-200">
            
            <button onclick="addProducto()" class="w-full bg-black text-white p-4 hover:bg-gray-800 transition">
                PUBLICAR PRODUCTO
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc } from "https://gstatic.com";

        const firebaseConfig = { /* MISMA CONFIG QUE EL HOME */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.addProducto = async () => {
            try {
                await addDoc(collection(db, "productos"), {
                    nombre: document.getElementById('p-nombre').value,
                    subtitulo: document.getElementById('p-sub').value,
                    precio: document.getElementById('p-precio').value,
                    imagen: document.getElementById('p-img').value,
                    timestamp: Date.now()
                });
                alert("¡Producto añadido!");
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
