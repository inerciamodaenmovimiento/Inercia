<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myGESTIÓN | INERCIA</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --black: #000; --gray: #f4f4f4; --border: #e0e0e0; --accent: #555; --red: #c62828; --green: #2e7d32; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--gray); display: flex; min-height: 100vh; }

        /* BLOQUEO / LOGIN */
        #lock-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #lock-screen input { border: none; border-bottom: 2px solid var(--black); font-size: 2rem; text-align: center; outline: none; width: 200px; }

        /* NOTIFICACIONES */
        .notification-banner { position: fixed; top: 0; left: 260px; right: 0; background: var(--black); color: #fff; padding: 12px; font-size: 11px; text-align: center; display: none; z-index: 999; letter-spacing: 2px; }

        /* SIDEBAR */
        sidebar { width: 260px; background: var(--black); color: #fff; padding: 40px 20px; position: fixed; height: 100vh; }
        .brand-admin { font-size: 1.2rem; font-weight: 600; letter-spacing: 3px; margin-bottom: 50px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; margin-bottom: 25px; letter-spacing: 1px; cursor: pointer; display: block; }
        .nav-item:hover, .nav-item.active { color: #fff; }

        /* MAIN CONTENT */
        main { flex: 1; margin-left: 260px; padding: 80px 60px; display: none; }
        .card { background: #fff; padding: 35px; border: 1px solid var(--border); margin-bottom: 30px; }
        h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; color: var(--accent); border-bottom: 1px solid var(--gray); padding-bottom: 10px; }

        /* FORMULARIOS */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #999; }
        input, select, textarea { padding: 12px; border: 1px solid var(--border); font-size: 13px; outline: none; width: 100%; }
        
        /* VARIANTE ROW */
        .variant-row { display: grid; grid-template-columns: 1fr 1fr 80px 1fr auto; gap: 10px; margin-bottom: 10px; align-items: center; }

        /* STOCK BADGES */
        .stock-badge { padding: 4px 8px; border-radius: 3px; font-size: 9px; font-weight: 700; }
        .stock-low { background: #ffebee; color: var(--red); border: 1px solid var(--red); }
        .stock-ok { background: #e8f5e9; color: var(--green); border: 1px solid var(--green); }

        /* IMÁGENES */
        .dropzone { border: 2px dashed var(--border); padding: 40px; text-align: center; color: #aaa; cursor: pointer; font-size: 12px; }
        .preview-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .preview-box { aspect-ratio: 2/3; background: #eee; object-fit: cover; width: 100%; border: 1px solid var(--border); }

        .btn-save { background: var(--black); color: #fff; border: none; padding: 20px; width: 100%; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-save:disabled { background: #ccc; }
        .btn-add { background: none; border: 1px dashed var(--black); padding: 12px; cursor: pointer; font-size: 10px; width: 100%; margin-top: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <p style="font-size: 10px; letter-spacing: 5px; margin-bottom: 20px;">SISTEMA DE GESTIÓN INERCIA</p>
        <input type="password" id="secret-key" placeholder="••••">
    </div>

    <div id="alert-banner" class="notification-banner">
        ⚠️ ALERTA DE STOCK: REVISAR VARIANTES EN ROJO
    </div>

    <sidebar>
        <div class="brand-admin">myGESTIÓN</div>
        <div class="nav-item" onclick="showSection('nuevo')">NUEVO PRODUCTO</div>
        <div class="nav-item" onclick="showSection('inventario')">INVENTARIO LIVE</div>
        <div class="nav-item">PEDIDOS</div>
        <div class="nav-item" style="margin-top: auto; color: #444;">LOGOUT</div>
    </sidebar>

    <main id="admin-content">
        <!-- SECCIÓN: NUEVO PRODUCTO -->
        <div id="section-nuevo">
            <div class="card">
                <h2>1. Información Editorial</h2>
                <div class="grid-form">
                    <div class="input-group">
                        <label>Nombre de Referencia</label>
                        <input type="text" id="p-nombre" placeholder="Ej: Vestido Estructural v1">
                    </div>
                    <div class="input-group">
                        <label>Colección / Temporada</label>
                        <select id="p-coleccion">
                            <option>Temporada 2026 - Movimiento</option>
                            <option>Esenciales</option>
                            <option>Limited Edition</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Descripción de Marca</label>
                    <textarea id="p-desc" rows="3" placeholder="Historia de la prenda..."></textarea>
                </div>
            </div>

            <div class="card">
                <h2>2. Gestión de Variantes & Stock</h2>
                <div id="variants-container">
                    <div class="variant-row">
                        <input type="text" placeholder="Talla" class="v-talla">
                        <input type="text" placeholder="Color" class="v-color">
                        <input type="number" placeholder="Cant." class="v-stock">
                        <input type="text" placeholder="Material" class="v-material">
                    </div>
                </div>
                <button class="btn-add" onclick="addVariantRow()">+ AGREGAR VARIANTE</button>
            </div>

            <div class="card">
                <h2>3. Multimedia Alta Resolución</h2>
                <div class="dropzone" onclick="document.getElementById('file-input').click()">
                    ARRASTRAR O HACER CLIC PARA CARGA MASIVA
                </div>
                <input type="file" id="file-input" multiple style="display: none;" onchange="previewImages(event)">
                <div class="preview-grid" id="image-preview"></div>
            </div>

            <button class="btn-save" id="btn-publish">PUBLICAR EN INERCIA MODA</button>
        </div>

        <!-- SECCIÓN: INVENTARIO LIVE -->
        <div id="section-inventario" style="display: none;">
            <div id="live-inventory-container">
                <!-- Se llena con Firebase -->
            </div>
        </div>
    </main>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc } from "https://gstatic.com";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_://firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_://appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let selectedFiles = [];

        // ACCESO
        document.getElementById('secret-key').addEventListener('input', (e) => {
            if(e.target.value === '0110') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                initLiveStock();
            }
        });

        // NAVEGACIÓN
        window.showSection = function(section) {
            document.getElementById('section-nuevo').style.display = section === 'nuevo' ? 'block' : 'none';
            document.getElementById('section-inventario').style.display = section === 'inventario' ? 'block' : 'none';
        }

        // VARIANTES
        window.addVariantRow = function() {
            const row = document.querySelector('.variant-row').cloneNode(true);
            row.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('variants-container').appendChild(row);
        }

        // IMÁGENES PREVIEW
        window.previewImages = function(e) {
            const container = document.getElementById('image-preview');
            selectedFiles = Array.from(e.target.files);
            container.innerHTML = '';
            selectedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'preview-box';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        // PUBLICAR
        document.getElementById('btn-publish').addEventListener('click', async () => {
            const btn = document.getElementById('btn-publish');
            btn.disabled = true;
            btn.innerText = "SINCRONIZANDO CON LA NUBE...";

            try {
                // 1. Subir fotos
                const urls = await Promise.all(selectedFiles.map(async (file) => {
                    const sRef = ref(storage, `inercia/${Date.now()}-${file.name}`);
                    await uploadBytes(sRef, file);
                    return getDownloadURL(sRef);
                }));

                // 2. Recoger variantes
                const variantes = Array.from(document.querySelectorAll('.variant-row')).map(row => ({
                    talla: row.querySelector('.v-talla').value,
                    color: row.querySelector('.v-color').value,
                    stock: parseInt(row.querySelector('.v-stock').value),
                    material: row.querySelector('.v-material').value
                }));

                // 3. Guardar en DB
                await addDoc(collection(db, "productos"), {
                    nombre: document.getElementById('p-nombre').value,
                    coleccion: document.getElementById('p-coleccion').value,
                    descripcion: document.getElementById('p-desc').value,
                    imagenes: urls,
                    variantes: variantes,
                    createdAt: new Date()
                });

                alert("PRODUCTO EN LÍNEA.");
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
            }
        });

        // STOCK EN TIEMPO REAL
        function initLiveStock() {
            const q = query(collection(db, "productos"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('live-inventory-container');
                const alertBanner = document.getElementById('alert-banner');
                let lowStockGlobal = false;
                container.innerHTML = '<h1>Control de Stock Live</h1>';

                snapshot.forEach(doc => {
                    const p = doc.data();
                    let vHtml = '';
                    p.variantes.forEach(v => {
                        const isLow = v.stock <= 3;
                        if(isLow) lowStockGlobal = true;
                        vHtml += `
                            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:12px;">
                                <span>${v.talla} / ${v.color}</span>
                                <span class="stock-badge ${isLow ? 'stock-low' : 'stock-ok'}">${v.stock} UNIDADES</span>
                            </div>`;
                    });

                    container.innerHTML += `
                        <div class="card" style="display:grid; grid-template-columns: 80px 1fr; gap:20px;">
                            <img src="${p.imagenes[0]}" style="width:100%; aspect-ratio:1; object-fit:cover;">
                            <div>
                                <h3 style="font-size:14px; margin-bottom:10px;">${p.nombre}</h3>
                                ${vHtml}
                            </div>
                        </div>`;
                });
                alertBanner.style.display = lowStockGlobal ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
