<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA — Movement Editorial</title>
    <!-- Fuentes Reales para Estilo Revista -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #f8f8f8; --text: #1a1a1a; --accent: #000; --transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.4; }

        /* Grano de fondo estilo DAZE */
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://vercel.app'); opacity: 0.05; pointer-events: none; z-index: 1000; }

        header { padding: 40px; display: flex; justify-content: space-between; position: absolute; width: 100%; z-index: 10; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-style: italic; letter-spacing: -2px; text-decoration: none; color: inherit; }

        /* Hero */
        .hero { height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 5%; gap: 50px; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 14vw; line-height: 0.75; letter-spacing: -0.05em; }
        .hero-img { height: 80vh; background: #e0e0e0; overflow: hidden; }
        .hero-img img { width: 100%; height: 100%; object-fit: cover; }

        /* Catálogo */
        #catalog { padding-bottom: 100px; }
        .editorial-section { padding: 80px 5%; display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px; border-top: 1px solid #eee; position: relative; }
        .item-content { grid-column: 3 / span 8; }
        .image-wrapper { position: relative; overflow: hidden; background: #eee; margin-bottom: 25px; height: 70vh; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .image-wrapper:hover img { transform: scale(1.05); }
        .item-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 10px 0; font-style: italic; }
        .meta { text-transform: uppercase; font-size: 10px; letter-spacing: 3px; color: #666; }
        
        /* Botón borrar (solo visible en modo admin) */
        .delete-btn { display: none; color: red; cursor: pointer; font-size: 10px; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        body.admin-mode .delete-btn { display: block; }

        /* --- ADMIN SYSTEM --- */
        .admin-trigger { position: fixed; bottom: 20px; right: 20px; border: none; background: none; cursor: help; opacity: 0.03; font-size: 10px; z-index: 9999; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 10000; }
        
        #login-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; width: 320px; z-index: 10001; text-align: center; border: 1px solid #eee; }
        #login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; outline: none; text-align: center; }
        
        #admin-panel { position: fixed; top: 0; right: -100%; width: 400px; height: 100%; background: white; z-index: 10002; padding: 60px 40px; transition: var(--transition); box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        #admin-panel.active { right: 0; }
        #admin-panel h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 30px; }
        #admin-panel input { width: 100%; padding: 15px 0; border: none; border-bottom: 1px solid #ddd; margin-bottom: 20px; outline: none; font-family: inherit; }
        
        .primary-btn { background: black; color: white; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 11px; }

        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; }
            .item-content { grid-column: 1 / span 12; }
            #admin-panel { width: 100%; }
        }
    </style>
</head>
<body id="main-body">

<header>
    <a href="#" class="logo">INERCIA.</a>
    <nav style="font-size: 10px; text-transform: uppercase; letter-spacing: 3px;">Issues / Vol. 01</nav>
</header>

<section class="hero">
    <div class="hero-text">
        <p style="text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px;">Moving Architecture</p>
        <h1>Iner<br>cia.</h1>
    </div>
    <div class="hero-img">
        <img src="https://unsplash.com" alt="Hero">
    </div>
</section>

<main id="catalog">
    <!-- Aquí se cargan los productos -->
</main>

<button class="admin-trigger" onclick="showLogin()">ADMIN</button>

<div id="overlay" onclick="closeAll()"></div>

<div id="login-box">
    <p style="font-size: 10px; letter-spacing: 2px; margin-bottom: 20px;">RESTRICTED ACCESS</p>
    <input type="password" id="pass-input" placeholder="CÓDIGO">
    <button class="primary-btn" onclick="verify()">ENTRAR</button>
</div>

<div id="admin-panel">
    <h2>Editor.</h2>
    <input type="text" id="p-name" placeholder="Nombre de la prenda">
    <input type="text" id="p-price" placeholder="Precio (Ej: 120.00)">
    <input type="text" id="p-img" placeholder="URL de imagen (Unsplash)">
    <button class="primary-btn" onclick="publish()">Publicar</button>
    <button onclick="logout()" style="margin-top: 20px; background: none; border: none; color: #999; cursor: pointer; font-size: 10px; letter-spacing: 1px;">CERRAR SESIÓN</button>
</div>

<script>
    // --- LÓGICA DE PERSISTENCIA ---
    let items = JSON.parse(localStorage.getItem('inercia_db')) || [
        { id: Date.now(), name: "Sculpted Mono-Coat", price: "890.00", img: "https://unsplash.com" }
    ];

    function renderCatalog() {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = items.map(item => `
            <section class="editorial-section" id="item-${item.id}">
                <div class="item-content">
                    <div class="image-wrapper"><img src="${item.img}" alt="${item.name}"></div>
                    <div class="meta">Curated Piece / Archive</div>
                    <h2 class="item-title">${item.name}</h2>
                    <p>$${item.price}</p>
                    <span class="delete-btn" onclick="removeItem(${item.id})">[ Eliminar de la colección ]</span>
                </div>
            </section>
        `).join('');
    }

    // --- FUNCIONES ADMIN ---
    function showLogin() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('login-box').style.display = 'block';
        document.getElementById('pass-input').focus();
    }

    function verify() {
        if(document.getElementById('pass-input').value === "0110") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-panel').classList.add('active');
            document.getElementById('main-body').classList.add('admin-mode');
        } else {
            alert("Código Incorrecto");
            closeAll();
        }
    }

    function publish() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;

        if(name && price && img) {
            const newItem = { id: Date.now(), name, price, img };
            items.unshift(newItem);
            localStorage.setItem('inercia_db', JSON.stringify(items));
            renderCatalog();
            
            // Limpiar
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            alert("Prenda añadida con éxito");
        }
    }

    function removeItem(id) {
        if(confirm("¿Seguro que quieres eliminar esta pieza única?")) {
            items = items.filter(item => item.id !== id);
            localStorage.setItem('inercia_db', JSON.stringify(items));
            renderCatalog();
        }
    }

    function logout() {
        document.getElementById('main-body').classList.remove('admin-mode');
        closeAll();
    }

    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('admin-panel').classList.remove('active');
        document.getElementById('pass-input').value = "";
    }

    // Inicializar
    renderCatalog();
</script>

</body>
</html>
