
<button onclick="showLogin()" style="position:fixed; bottom:10px; right:10px; border:none; background:none; cursor:help; opacity:0.1; font-size:10px;">ADMIN</button>

<!-- NUEVO PANEL DE LOGIN (Para no usar 'prompt') -->
<div id="login-box" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border:1px solid black; z-index:10001; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
    <p>Acceso Restringido</p>
    <input type="password" id="pass-input" placeholder="Código">
    <button onclick="verify()" style="background:black; color:white; width:100%; padding:5px;">Entrar</button>
</div>

<script>
    function showLogin() {
        document.getElementById('login-box').style.display = 'block';
    }

    function verify() {
        const pass = document.getElementById('pass-input').value;
        if(pass === "0110") {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("Error");
            document.getElementById('login-box').style.display = 'none';
        }
    }
</script>
