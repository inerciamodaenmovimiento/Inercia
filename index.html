<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #0057FF; /* Azul cinético */
            --gray: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Navegación Minimalista */
        nav {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* Hero - Gran Impacto Visual */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
        }

        .hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 14vw;
            line-height: 0.8;
            text-transform: uppercase;
            margin-left: -1vw;
        }

        .hero .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* Marquee (Texto en movimiento constante) */
        .marquee {
            border-top: 1px solid var(--gray);
            border-bottom: 1px solid var(--gray);
            padding: 1.5rem 0;
            overflow: hidden;
            white-space: nowrap;
        }

        .marquee span {
            display: inline-block;
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            animation: scroll 20s linear infinite;
            -webkit-text-stroke: 1px white;
            color: transparent;
            padding-right: 2rem;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Grilla Editorial (Estilo Coral) */
        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
            padding: 10rem 2rem;
        }

        .img-container {
            background: var(--gray);
            overflow: hidden;
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .img-container:hover img {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        .item-1 { grid-column: 1 / 8; height: 80vh; }
        .item-2 { grid-column: 9 / 13; height: 50vh; align-self: end; }
        .item-3 { grid-column: 4 / 10; height: 70vh; margin-top: -5rem; z-index: 2; }

        .label {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 20vw; }
            .editorial-grid div { grid-column: 1 / 13 !important; height: 60vh; margin: 0 !important; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Inercia</div>
        <div style="font-size: 0.8rem;">SHOP [0]</div>
    </nav>

    <section class="hero">
        <p class="subtitle">Moda en Movimiento</p>
        <h1>INE<br>RCIA</h1>
    </section>

    <div class="marquee">
        <span>KINETIC • INERCIA • MOTION • KINETIC • INERCIA • MOTION • </span>
        <span>KINETIC • INERCIA • MOTION • KINETIC • INERCIA • MOTION • </span>
    </div>

    <main class="editorial-grid">
        <div class="img-container item-1">
            <img src="https://unsplash.com" alt="Fashion 1">
            <div class="label">EDICIÓN 001 / VOLUMEN</div>
        </div>
        <div class="img-container item-2">
            <img src="https://unsplash.com" alt="Fashion 2">
            <div class="label">ESTÉTICA / LINEAL</div>
        </div>
        <div class="img-container item-3">
            <img src="https://unsplash.com" alt="Fashion 3">
            <div class="label">ESTRUCTURA / CINÉTICA</div>
        </div>
    </main>

</body>
</html>
