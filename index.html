<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .italic { font-style: italic; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 60px; border-bottom: 1px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .brand-box h1 { font-size: 32px; font-weight: 900; letter-spacing: -2px; line-height: 0.8; text-transform: uppercase; }
        .brand-box span { font-size: 10px; letter-spacing: 5px; opacity: 0.5; text-transform: uppercase; }
        .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; min-height: 90vh; border-bottom: 1px solid #eee; }
        .hero-text { padding: 80px 60px; display: flex; flex-direction: column; justify-content: center; }
        .hero-text h2 { font-size: 8vw; line-height: 0.85; margin-bottom: 40px; text-transform: uppercase; }
        .hero-image { background: #f9f9f9; display: flex; align-items: center; justify-content: center; padding: 60px; }
        .img-frame { width: 100%; aspect-ratio: 3/4; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 1.5s ease; }
        .btn-black { background: #000; color: #fff; padding: 20px 40px; text-transform: uppercase; font-size: 10px; letter-spacing: 3px; border: none; cursor: pointer; transition: 0.3s; width: fit-content; margin-top: 20px; }
        
        /* --- ESTILOS myGESTIÓN ACTUALIZADOS --- */
        #myGestion-Inercia { position: fixed; top: 0; left: -100%; width: 100%; height: 100vh; background: #fff; z-index: 10000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; padding: 60px; }
        .admin-grid { display: grid; grid-template-columns: 350px 1fr; gap: 60px; max-width: 1200px; margin: 0 auto; }
        .form-card { background: #f4f4f4; padding: 40px; border-radius: 2px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 12px 0; background: transparent; outline: none; font-size: 14px; }
        .file-upload { border: 2px dashed #ccc; padding: 20px; text-align: center; font-size: 11px; cursor: pointer; background: white; transition: 0.3s; }
        .file-upload:hover { border-color: black; }
        .preview-img { width: 100%; height: 100px; object-fit: cover; margin-top: 10px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th { text-align: left; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #000; font-size: 10px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <nav>
        <div class="brand-box">
            <span id="display-coll">Colección Primavera 2026</span>
            <h1 id="display-brand">Inercia</h1>
        </div>
        <div style="display: flex; gap: 30px; align-items: center;">
            <span style="font-size: 9px; font-weight: 900; letter-spacing: 2px; cursor: pointer;" onclick="checkAccess()">ACCESO ADMIN</span>
            <div style="font-size: 9px; font-weight: 900; opacity: 0.5;">CESTA (0)</div>
        </div>
    </nav>

    <main class="hero">
        <section class="hero-text">
            <h2 class="serif italic" id="display-hero">Moda en<br>Movimiento</h2>
            <p style="font-size: 14px; opacity: 0.5; margin-bottom: 30px; max-width: 400px;">Visión contemporánea sobre el textil y la anatomía. Estética editorial pura.</p>
            <button class="btn-black">Ver Catálogo</button>
        </section>
        <section class="hero-image">
            <div class="img-frame"><img src="https://unsplash.com" alt="Inercia Editorial"></div>
        </section>
    </main>

    <!-- PANEL myGESTIÓN -->
    <div id="myGestion-Inercia">
        <div style="max-width: 1200px; margin: 0 auto;">
            <div style="display:flex; justify-content:space-between; align-items: baseline; border-bottom: 1px solid #000; padding-bottom: 20px; margin-bottom: 60px;">
                <h2 style="font-weight:900; font-size: 20px;">myGESTIÓN <span style="font-weight:200; opacity:0.4;">| INERCIA CONTROL</span></h2>
                <button onclick="closeMyGestion()" style="font-size: 11px; font-weight: 900; cursor:pointer; background:none; border:none; border-bottom: 2px solid red;">Cerrar Editor</button>
            </div>

            <div class="admin-grid">
                <div class="form-card">
                    <h3 style="font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px;">Carga de Referencias</h3>
                    <div class="input-group">
                        <label>Prenda</label>
                        <input type="text" id="prod-name">
                    </div>
                    <div class="input-group">
                        <label>Precio ($)</label>
                        <input type="number" id="prod-price">
                    </div>
                    <div class="input-group">
                        <label>Variantes (Tallas/Colores)</label>
                        <input type="text" id="prod-vars" placeholder="Ej: S, M, L / Negro">
                    </div>
                    <div class="input-group">
                        <label>Imagen del Producto (Desde PC)</label>
                        <div class="file-upload" onclick="document.getElementById('file-input').click()">
                            Haga clic para subir archivo
                            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(this)">
                        </div>
                        <img id="img-preview" class="preview-img">
                    </div>
                    <button onclick="saveToInventory()" style="width:100%; background:black; color:white; padding:18px; font-size:10px; font-weight:900; border:none; cursor:pointer;">REGISTRAR EN INVENTARIO</button>
                </div>

                <div>
                    <h3 style="font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px;">Stock myGESTIÓN</h3>
                    <table>
                        <thead><tr><th>Referencia</th><th>Precio</th><th>Variantes</th><th>Acción</th></tr></thead>
                        <tbody id="inventory-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentImage = "";
        let inventario = [];

        // Seguridad: Código 0110
        function checkAccess() {
            const code = prompt("Ingrese código de acceso para myGESTIÓN:");
            if (code === "0110") { openMyGestion(); } else { alert("Acceso denegado."); }
        }

        function openMyGestion() { document.getElementById('myGestion-Inercia').style.left = "0"; }
        function closeMyGestion() { document.getElementById('myGestion-Inercia').style.left = "-100%"; }

        // Manejo de imagen local
        function handleImage(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImage = e.target.result;
                const preview = document.getElementById('img-preview');
                preview.src = currentImage;
                preview.style.display = "block";
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveToInventory() {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            if(!name || !price) return alert("Complete los campos.");

            inventario.push({
                id: Date.now(),
                nombre: name,
                precio: price,
                vars: document.getElementById('prod-vars').value || "Estándar",
                img: currentImage
            });

            renderTable();
            // Reset
            document.getElementById('prod-name').value = "";
            document.getElementById('prod-price').value = "";
            document.getElementById('img-preview').style.display = "none";
            alert("Referencia cargada con éxito.");
        }

        function renderTable() {
            const body = document.getElementById('inventory-body');
            body.innerHTML = inventario.map(p => `
                <tr>
                    <td style="font-weight:bold;">${p.nombre}</td>
                    <td class="serif italic">$${p.precio}</td>
                    <td style="font-size:10px;">${p.vars}</td>
                    <td><button onclick="deleteItem(${p.id})" style="color:red; background:none; border:none; font-size:9px; font-weight:900; cursor:pointer;">ELIMINAR</button></td>
                </tr>
            `).join('');
        }

        function deleteItem(id) {
            inventario = inventario.filter(p => p.id !== id);
            renderTable();
        }

        // Atajo 'A' con seguridad
        document.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') checkAccess();
        });
    </script>
</body>
</html>
