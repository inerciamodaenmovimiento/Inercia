<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICKY | Tienda Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">VICKY</div>
            <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
        </nav>
    </header>

    <main>
        <!-- Banner Principal -->
        <section class="hero">
            <div class="hero-content">
                <h1>DRESS HERE AND BE IN STYLE</h1>
                <p>New Collection 20% Off</p>
            </div>
        </section>

        <!-- Cuadrícula de Productos -->
        <section class="products-container">
            <h2 class="section-title">NEW COLLECTION</h2>
            <div class="product-grid" id="product-grid">
                <!-- Producto 1 -->
                <div class="product-card">
                    <img src="https://unsplash.com" alt="Abrigo">
                    <div class="product-info">
                        <h3>Black Puffer Jacket</h3>
                        <p class="price">$12.500</p>
                        <button class="add-to-cart" data-name="Puffer Jacket" data-price="12500">AGREGAR AL CARRITO</button>
                    </div>
                </div>
                <!-- Producto 2 -->
                <div class="product-card">
                    <img src="https://unsplash.com" alt="Vestido">
                    <div class="product-info">
                        <h3>Minimal Dress</h3>
                        <p class="price">$8.900</p>
                        <button class="add-to-cart" data-name="Minimal Dress" data-price="8900">AGREGAR AL CARRITO</button>
                    </div>
                </div>
                <!-- Producto 3 -->
                <div class="product-card">
                    <img src="https://unsplash.com" alt="Camisa">
                    <div class="product-info">
                        <h3>White Shirt</h3>
                        <p class="price">$5.400</p>
                        <button class="add-to-cart" data-name="White Shirt" data-price="5400">AGREGAR AL CARRITO</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Resumen de Compra Flotante -->
    <aside id="cart-summary" class="cart-summary">
        <h3>Tu Carrito</h3>
        <ul id="cart-items"></ul>
        <div class="cart-total">
            Total: <span id="total-price">$0</span>
        </div>
        <button class="checkout-btn">FINALIZAR COMPRA</button>
    </aside>

    <script src="script.js"></script>
</body>
</html>
