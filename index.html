<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <style>
        /* DISEÑO BASE (CSS INTERNO PARA QUE NO FALLE) */
        @import url('https://googleapis.com');
        
        * { margin: 0; padding: 0; box-box: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* NAVBAR */
        header { position: fixed; width: 100%; top: 0; background: rgba(255,255,255,0.95); border-bottom: 1px solid #f0f0f0; z-index: 100; padding: 25px 0; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .logo { font-size: 24px; letter-spacing: 6px; text-transform: uppercase; font-weight: bold; cursor: pointer; }
        
        /* BANNER PRINCIPAL (ESTILO ULTRA) */
        .hero { height: 85vh; background: #f5f5f5; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-top: 70px; }
        .hero img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .hero-text { position: relative; z-index: 10; text-align: center; color: white; }
        .hero-text h1 { font-size: 100px; italic; line-height: 1; margin-bottom: 10px; text-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .hero-text p { letter-spacing: 10px; text-transform: uppercase; font-size: 11px; }

        /* GRILLA DE PRODUCTOS */
        .section-title { text-align: center; padding: 80px 0 50px; }
        .section-title h2 { font-size: 35px; italic; margin-bottom: 15px; }
        .line { width: 50px; height: 1px; background: black; margin: 0 auto; }
        
        .products-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; padding: 0 40px 100px; }
        .product-card { text-align: center; }
        .img-holder { aspect-ratio: 2/3; background: #f9f9f9; margin-bottom: 20px; overflow: hidden; position: relative; }
        .img-holder img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
        
        /* BOTONES */
        .btn-buy { background: black; color: white; padding: 15px 30px; font-size: 10px; font-weight: bold; text-transform: uppercase; border: none; cursor: pointer; width: 100%; margin-top: 10px; }
        
        /* ADMIN Y CARRITO */
        .admin-view { display: none; padding: 150px 40px; max-width: 800px; margin: 0 auto; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #ddd; font-size: 14px; outline: none; }
        .cart-sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 350px; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.05); transform: translateX(100%); transition: 0.4s; z-index: 200; padding: 40px; }
        .cart-open { transform: translateX(0); }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo serif" onclick="navigate('home')">INERCIA</div>
            <div style="display: flex; gap: 25px; align-items: center;">
                <button onclick="promptAdmin()" style="font-size: 9px; color: #ccc; border: none; background: none; cursor: pointer; text-transform: uppercase; font-weight: bold;">Admin</button>
                <button onclick="toggleCart()" style="background: none; border: none; font-size: 20px; cursor: pointer;">🛒 <span id="cart-count" style="font-size: 10px; background: black; color: white; padding: 2px 6px; border-radius: 10px;">0</span></button>
            </div>
        </div>
    </header>

    <!-- VISTA TIENDA -->
    <main id="view-home">
        <section class="hero">
            <img id="main-banner-img" src="https://unsplash.com">
            <div class="hero-text">
                <h1 class="serif italic">Inercia</h1>
                <p>Moda en Movimiento</p>
            </div>
        </section>

        <div class="section-title">
            <h2 class="serif italic">New Arrivals</h2>
            <div class="line"></div>
        </div>

        <section id="grid-productos" class="products-grid">
            <!-- Cargado por JS -->
        </section>
    </main>

    <!-- VISTA ADMIN (PROTEGIDA CÓDIGO 0110) -->
    <main id="view-admin" class="admin-view">
        <h2 class="serif italic" style="font-size: 30px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Panel de Gestión</h2>
        <div class="input-group">
            <input id="adm-nombre" type="text" placeholder="Producto">
            <input id="adm-precio" type="number" placeholder="Precio ($)">
            <input id="adm-stock" type="number" placeholder="Stock">
            <input id="adm-cat" type="text" placeholder="Categoría">
        </div>
        <div style="background: #fdfdfd; border: 2px dashed #eee; padding: 30px; text-align: center; margin-bottom: 20px;">
            <p style="font-size: 10px; font-weight: bold; color: #999; margin-bottom: 10px;">FOTO DESDE TU PC</p>
            <input id="adm-file" type="file">
        </div>
        <button onclick="saveProduct()" class="btn-buy">Publicar Producto</button>
        
        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee;">
            <h3 style="font-size: 12px; text-transform: uppercase; margin-bottom: 15px;">Cambiar Imagen del Banner</h3>
            <input id="adm-banner-url" type="text" placeholder="Pega el link de la imagen aquí" style="width: 100%; margin-bottom: 10px;">
            <button onclick="updateBanner()" style="background: #f5f5f5; border: none; padding: 10px; font-size: 10px; cursor: pointer; text-transform: uppercase;">Actualizar Banner</button>
        </div>
        <button onclick="navigate('home')" style="margin-top: 30px; display: block; font-size: 10px; text-decoration: underline; background: none; border: none;">Volver a la tienda</button>
    </main>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px;">
            <span class="serif italic" style="font-size: 24px;">Bolsa</span>
            <button onclick="toggleCart()" style="font-size: 30px; border: none; background: none; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items" style="flex-grow: 1; overflow-y: auto;"></div>
        <div style="border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; margin-bottom: 20px;">
                <span>Total</span><span id="cart-total">$0</span>
            </div>
            <button onclick="checkout()" class="btn-buy">Pedir por WhatsApp</button>
            <button onclick="alert('Arrepentimiento registrado')" style="width: 100%; margin-top: 15px; font-size: 9px; text-decoration: underline; background: none; border: none; color: #999; cursor: pointer;">Botón de Arrepentimiento</button>
        </div>
    </div>

    <script>
        let prods = JSON.parse(localStorage.getItem('in_db')) || [
            { id: 1, nombre: 'Blusa Brown Ultra', precio: 12500, stock: 5, cat: 'Summer', img: 'https://unsplash.com' }
        ];
        let carrito = [];

        function promptAdmin() {
            if (prompt("Código Acceso:") === "0110") navigate('admin');
        }

        function navigate(view) {
            document.getElementById('view-home').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = view === 'admin' ? 'block' : 'none';
            window.scrollTo(0,0);
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('cart-open'); }

        function saveProduct() {
            const n = document.getElementById('adm-nombre').value, p = document.getElementById('adm-precio').value, 
                  s = document.getElementById('adm-stock').value, c = document.getElementById('adm-cat').value,
                  file = document.getElementById('adm-file').files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    prods.push({ id: Date.now(), nombre: n, precio: parseInt(p), stock: parseInt(s), cat: c, img: e.target.result });
                    localStorage.setItem('in_db', JSON.stringify(prods));
                    render(); navigate('home');
                };
                reader.readAsDataURL(file);
            }
        }

        function updateBanner() {
            const url = document.getElementById('adm-banner-url').value;
            if(url) {
                document.getElementById('main-banner-img').src = url;
                localStorage.setItem('in_banner_main', url);
                alert("Banner actualizado");
            }
        }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = prods.map(p => `
                <div class="product-card">
                    <div class="img-holder"><img src="${p.img}"></div>
                    <p style="font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 2px;">${p.cat}</p>
                    <h3 class="serif" style="font-size: 18px; margin: 5px 0;">${p.nombre}</h3>
                    <p style="font-weight: bold; font-size: 14px;">$${p.precio.toLocaleString()}</p>
                    <p style="font-size: 9px; color: #ccc; margin: 5px 0;">Stock: ${p.stock}</p>
                    <button onclick="addToCart(${p.id})" class="btn-buy" style="padding: 10px; font-size: 9px;">Comprar</button>
                    <button onclick="deleteProd(${p.id})" style="font-size: 9px; color: red; background: none; border: none; margin-top: 10px; cursor: pointer; text-decoration: underline;">Eliminar</button>
                </div>
            `).join('');
        }

        function deleteProd(id) {
            prods = prods.filter(x => x.id !== id);
            localStorage.setItem('in_db', JSON.stringify(prods));
            render();
        }

        function addToCart(id) {
            const p = prods.find(x => x.id === id);
            if(p.stock > 0) { carrito.push(p); updateCartUI(); toggleCart(); }
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = carrito.map((item, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px;">
                    <span>${item.nombre}</span><span>$${item.precio}</span>
                    <button onclick="carrito.splice(${i},1); updateCartUI();" style="border:none; background:none; cursor:pointer; color:red;">&times;</button>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = '$' + carrito.reduce((acc, p) => acc + p.precio, 0).toLocaleString();
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function checkout() {
            const t = carrito.reduce((acc, p) => acc + p.precio, 0);
            const msg = `Pedido Inercia: ${carrito.map(p => p.nombre).join(', ')}. Total: $${t}`;
            window.open(`https://wa.me{encodeURIComponent(msg)}`);
        }

        // Cargar banner guardado
        const savedB = localStorage.getItem('in_banner_main');
        if(savedB) document.getElementById('main-banner-img').src = savedB;

        render();
    </script>
</body>
</html>
