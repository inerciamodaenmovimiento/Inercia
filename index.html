<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-view { display: none; }
        .transition-ultra { transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .banner-zoom:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- NAVBAR (ESTILO ULTRA) -->
    <header class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b border-gray-50 py-6 px-10">
        <nav class="container mx-auto flex justify-between items-center">
            <div id="display-logo" class="text-3xl font-bold tracking-[0.4em] serif uppercase cursor-pointer" onclick="navigate('home')">INERCIA</div>
            <div class="hidden lg:flex space-x-12 text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <a href="javascript:void(0)" onclick="navigate('home')" class="hover:text-black transition">Home</a>
                <button onclick="promptAdmin()" class="text-red-400/50 hover:text-red-500 transition">Admin</button>
            </div>
            <button onclick="toggleCart()" class="relative hover:opacity-50 transition">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full font-bold">0</span>
            </button>
        </nav>
    </header>

    <!-- VISTA CLIENTE -->
    <main id="view-home">
        <!-- BANNER 1: HERO (IGUAL A LA IMAGEN) -->
        <section class="relative h-screen flex items-center justify-center overflow-hidden">
            <img id="banner-hero" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover transition-ultra">
            <div class="absolute inset-0 bg-black/10"></div>
            <div class="relative z-10 text-center text-white">
                <h1 id="hero-title" class="serif text-8xl md:text-[130px] italic drop-shadow-2xl">Inercia</h1>
                <p class="text-[10px] tracking-[0.8em] uppercase font-light mt-4">Moda en Movimiento</p>
            </div>
        </section>

        <!-- SECCIÓN 1: PRODUCTOS -->
        <section class="container mx-auto px-10 py-32">
            <div class="text-center mb-24">
                <h2 class="serif text-5xl italic mb-4">New Arrivals</h2>
                <div class="h-px w-20 bg-black mx-auto"></div>
                <div id="home-categories" class="mt-8 flex justify-center gap-6 text-[10px] uppercase font-bold text-stone-300"></div>
            </div>
            <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12 text-center"></div>
        </section>

        <!-- BANNER 2: COLLECTION (COMO LA IMAGEN) -->
        <section class="relative h-[85vh] flex items-center justify-center overflow-hidden banner-zoom">
            <img id="banner-collection" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover grayscale transition-ultra">
            <div class="absolute inset-0 bg-black/20"></div>
            <div class="relative z-10 text-center text-white">
                <h2 class="text-7xl md:text-[110px] serif uppercase tracking-tighter mb-8">Collection</h2>
                <button class="border border-white px-14 py-4 text-[10px] uppercase tracking-widest font-bold hover:bg-white hover:text-black transition">View</button>
            </div>
        </section>
    </main>

    <!-- PANEL ADMINISTRADOR (PROTEGIDO CÓDIGO 0110) -->
    <main id="view-admin" class="admin-view pt-32 container mx-auto px-10 pb-40">
        <div class="flex justify-between items-center border-b pb-8 mb-12">
            <h2 class="serif text-4xl italic">Editor Maestro de Tienda</h2>
            <button onclick="navigate('home')" class="text-[10px] uppercase font-bold underline text-gray-400">Cerrar</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <!-- 1. PERSONALIZACIÓN VISUAL -->
            <div class="space-y-10">
                <div class="bg-gray-50 p-8 rounded-sm border">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest mb-6 text-gray-400">Editor de Banners (URLs)</h3>
                    <div class="space-y-4">
                        <input id="edit-hero-url" type="text" placeholder="URL Imagen Principal (Hero)" class="w-full p-3 border-b bg-transparent outline-none text-xs">
                        <input id="edit-coll-url" type="text" placeholder="URL Imagen Secundaria (Collection)" class="w-full p-3 border-b bg-transparent outline-none text-xs">
                        <button onclick="updateBanners()" class="w-full bg-stone-200 py-4 text-[10px] font-bold uppercase tracking-widest">Actualizar Fotos</button>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-sm border">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest mb-6 text-gray-400">Historial de Ventas</h3>
                    <div id="admin-history" class="text-[10px] space-y-2 h-60 overflow-y-auto"></div>
                </div>
            </div>

            <!-- 2. GESTIÓN DE PRODUCTOS -->
            <div class="bg-stone-50 p-8 rounded-sm border">
                <h3 class="text-[10px] font-bold uppercase tracking-widest mb-6 text-gray-400">Carga de Mercadería</h3>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input id="prod-n" type="text" placeholder="Producto" class="p-3 border-b bg-transparent outline-none">
                    <input id="prod-p" type="number" placeholder="Precio ($)" class="p-3 border-b bg-transparent outline-none">
                    <input id="prod-s" type="number" placeholder="Stock" class="p-3 border-b bg-transparent outline-none">
                    <input id="prod-c" type="text" placeholder="Categoría" class="p-3 border-b bg-transparent outline-none">
                </div>
                <div class="p-8 border-2 border-dashed border-stone-200 text-center bg-white mb-6">
                    <p class="text-[9px] font-bold uppercase text-gray-400 mb-2">Subir desde PC</p>
                    <input id="prod-f" type="file" class="text-xs">
                </div>
                <button onclick="saveProduct()" class="w-full bg-black text-white py-4 text-[10px] font-bold uppercase tracking-widest">Subir Producto</button>
            </div>
        </div>
    </main>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-white z- shadow-2xl translate-x-full transition-ultra flex flex-col p-10">
        <div class="flex justify-between items-center border-b pb-8">
            <span class="serif text-3xl italic">Tu Bolsa</span>
            <button onclick="toggleCart()" class="text-4xl font-light hover:rotate-90 transition">&times;</button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto py-10 space-y-8"></div>
        <div class="border-t pt-8 space-y-6">
            <div class="flex justify-between font-bold text-3xl tracking-tighter"><span>Total</span><span id="cart-total">$0</span></div>
            <button onclick="checkout()" class="w-full bg-black text-white py-6 text-[11px] font-bold uppercase tracking-[0.4em]">Finalizar por WhatsApp</button>
            <button onclick="alert('Arrepentimiento registrado')" class="w-full text-gray-400 text-[10px] uppercase underline tracking-widest">Botón de Arrepentimiento</button>
        </div>
    </div>

    <!-- CONTACTO -->
    <div class="fixed bottom-10 right-10 flex flex-col space-y-4 z-50">
        <a href="https://wa.me" target="_blank" class="w-14 h-14 bg-white border rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition"><i class="fa-brands fa-whatsapp text-2xl"></i></a>
        <a href="https://instagram.com" target="_blank" class="w-14 h-14 bg-white border rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition"><i class="fa-brands fa-instagram text-2xl"></i></a>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('inercia_db')) || {
            hero: "https://unsplash.com",
            coll: "https://unsplash.com",
            prods: [], sales: []
        };
        let cart = [];

        function navigate(v) {
            document.getElementById('view-home').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').className = v === 'admin' ? 'pt-32 container mx-auto px-10 pb-40' : 'admin-view';
            window.scrollTo(0,0);
        }

        function promptAdmin() { if(prompt("Código Seguridad:") === "0110") navigate('admin'); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        function updateBanners() {
            db.hero = document.getElementById('edit-hero-url').value || db.hero;
            db.coll = document.getElementById('edit-coll-url').value || db.coll;
            save(); refresh();
        }

        function saveProduct() {
            const f = document.getElementById('prod-f').files;
            if(f) {
                const r = new FileReader();
                r.onload = (e) => {
                    db.prods.push({ 
                        id: Date.now(), 
                        n: document.getElementById('prod-n').value, 
                        p: parseInt(document.getElementById('prod-p').value),
                        s: parseInt(document.getElementById('prod-s').value),
                        c: document.getElementById('prod-c').value,
                        img: e.target.result 
                    });
                    save(); refresh(); navigate('home');
                };
                r.readAsDataURL(f);
            }
        }

        function refresh() {
            document.getElementById('banner-hero').src = db.hero;
            document.getElementById('banner-collection').src = db.coll;
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = db.prods.map(p => `
                <div class="group relative">
                    <div class="aspect-[2/3] bg-stone-50 overflow-hidden mb-6 relative">
                        <img src="${p.img}" class="w-full h-full object-cover transition-ultra group-hover:scale-110">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-5 text-[10px] font-bold uppercase opacity-0 group-hover:opacity-100 transition-ultra">Add to Bag</button>
                        <button onclick="deleteProd(${p.id})" class="absolute top-4 right-4 bg-white/80 text-red-500 w-8 h-8 rounded-full shadow-sm opacity-0 group-hover:opacity-100 transition">×</button>
                    </div>
                    <h3 class="serif text-xl italic mb-1 uppercase tracking-tighter">${p.n}</h3>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-2">${p.c}</p>
                    <p class="text-sm font-light">$${p.p.toLocaleString()}</p>
                    <p class="text-[8px] text-stone-200 mt-2">STOCK: ${p.s}</p>
                </div>
            `).join('');

            const uniqueCats = [...new Set(db.prods.map(p => p.c))];
            document.getElementById('home-categories').innerHTML = uniqueCats.join(' | ');
            document.getElementById('admin-history').innerHTML = db.sales.map(s => `<div class="border-b pb-2">${s.d} - Total: $${s.t}</div>`).reverse().join('');
        }

        function deleteProd(id) { db.prods = db.prods.filter(x => x.id !== id); save(); refresh(); }
        function addToCart(id) { const p = db.prods.find(x => x.id === id); if(p.s > 0) { cart.push(p); updateCart(); toggleCart(); } }
        
        function updateCart() {
            const cont = document.getElementById('cart-content');
            cont.innerHTML = cart.map((i, idx) => `<div class="flex justify-between border-b pb-4"><span>${i.n}</span><span>$${i.p}</span></div>`).join('');
            document.getElementById('cart-total').innerText = '$' + cart.reduce((a, b) => a + b.p, 0).toLocaleString();
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            if(cart.length === 0) return;
            const t = cart.reduce((a, b) => a + b.p, 0);
            window.open(`https://wa.me?text=${encodeURIComponent("PEDIDO INERCIA:\n" + cart.map(p => "- " + p.n).join("\n") + "\nTOTAL: $" + t)}`);
            cart.forEach(i => { const p = db.prods.find(x => x.id === i.id); if(p) p.s--; });
            db.sales.push({ d: new Date().toLocaleString(), t });
            cart = []; save(); refresh(); updateCart(); toggleCart();
        }

        function save() { localStorage.setItem('inercia_db', JSON.stringify(db)); }
        refresh();
    </script>
</body>
</html>
