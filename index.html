<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Official Store</title>
    <!-- Fuentes de Lujo: Serif para títulos y Sans para UI -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --muted: #888888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* HEADER */
        header { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; background: white; sticky top: 0; z-index: 100; border-bottom: 1px solid #f0f0f0; }
        .nav-links { display: flex; gap: 30px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        .logo { font-family: 'Bodoni Moda', serif; font-size: 32px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        /* HERO SECTION */
        .hero { position: relative; height: 90vh; background: #f9f9f9; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 0 5%; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.95); }
        .hero-title { position: absolute; font-family: 'Bodoni Moda', serif; font-size: 120px; color: white; text-transform: uppercase; letter-spacing: 15px; font-weight: 400; text-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* SECCIÓN NEW IN */
        .section-label { text-align: center; margin: 80px 0 40px; font-family: 'Bodoni Moda', serif; font-size: 24px; text-transform: uppercase; letter-spacing: 4px; }
        .product-slider { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 5%; margin-bottom: 100px; }
        .product-card { text-align: center; cursor: pointer; }
        .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; margin-bottom: 15px; transition: opacity 0.3s; }
        .product-card:hover img { opacity: 0.8; }
        .product-card p { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

        /* MOSAICO CATEGORÍAS */
        .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 5% 100px; }
        .cat-box { position: relative; overflow: hidden; background: #eee; cursor: pointer; }
        .cat-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s; }
        .cat-box:hover img { transform: scale(1.05); }
        .cat-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Bodoni Moda', serif; font-size: 32px; text-transform: uppercase; letter-spacing: 8px; background: rgba(0,0,0,0.1); }

        /* FOOTER */
        footer { padding: 80px 5%; border-top: 1px solid #f0f0f0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; font-size: 11px; color: var(--muted); }
        footer h4 { color: black; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .newsletter input { width: 100%; padding: 10px 0; border: none; border-bottom: 1px solid #ddd; outline: none; margin-bottom: 15px; }
        .btn-sub { width: 100%; padding: 12px; background: none; border: 1px solid black; text-transform: uppercase; font-size: 10px; cursor: pointer; }

        /* --- ADMIN PANEL (INVISIBLE) --- */
        .admin-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; background: transparent; z-index: 1000; cursor: default; }
        #admin-panel { position: fixed; right: -420px; top: 0; width: 400px; height: 100vh; background: white; z-index: 10000; padding: 60px 40px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.05); overflow-y: auto; }
        #admin-panel.active { right: 0; }
        .admin-field { margin-bottom: 30px; }
        .admin-field label { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; color: var(--muted); }
        .admin-field input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #eee; outline: none; font-size: 14px; }
        .btn-admin { width: 100%; padding: 18px; background: black; color: white; border: none; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; cursor: pointer; font-weight: bold; }
        .stock-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f9f9f9; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-links"><span>Shop</span> <span>Colecciones</span></div>
        <div class="logo">inercia</div>
        <div class="nav-links"><span>Estudio</span> <span>Carrito (0)</span></div>
    </header>

    <main>
        <section class="hero">
            <img src="https://unsplash.com" class="hero-img">
            <h1 class="hero-title" id="display-title">Inercia</h1>
        </section>

        <h2 class="section-label">New In</h2>
        <div class="product-slider" id="product-grid">
            <!-- Los productos se cargan aquí -->
        </div>

        <section class="categories">
            <div class="cat-box" style="grid-row: span 2;">
                <img src="https://unsplash.com">
                <div class="cat-label">Clothing</div>
            </div>
            <div class="cat-box">
                <img src="https://unsplash.com">
                <div class="cat-label">Bags</div>
            </div>
            <div class="cat-box">
                <img src="https://unsplash.com">
                <div class="cat-label">Accessories</div>
            </div>
        </section>
    </main>

    <footer>
        <div><h4>Shop</h4><p>New arrivals</p><p>Collections</p></div>
        <div><h4>Explore</h4><p>About the brand</p><p>Lookbooks</p></div>
        <div><h4>More</h4><p>Size guide</p><p>Contacts</p></div>
        <div class="newsletter">
            <h4>Newsletter</h4>
            <input type="text" placeholder="Enter your email">
            <button class="btn-sub">Subscribe</button>
        </div>
    </footer>

    <!-- ACCESO DUEÑA -->
    <div class="admin-trigger" onclick="toggleAdmin()"></div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:16px;">Configuración</h3>
            <span onclick="toggleAdmin()" style="cursor:pointer; font-size:24px;">&times;</span>
        </div>

        <div class="admin-field">
            <label>Título del Hero</label>
            <input type="text" id="edit-title" oninput="updateHero()" placeholder="Inercia">
        </div>

        <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 30px;">
            <label>Subir Producto</label>
            <div class="admin-field"><input type="text" id="p-name" placeholder="Nombre de prenda"></div>
            <div class="admin-field"><input type="text" id="p-price" placeholder="Precio (ej: $15.000)"></div>
            <div class="admin-field"><input type="text" id="p-img" placeholder="Link de Foto"></div>
            <button class="btn-admin" onclick="addProduct()">Publicar en Inercia</button>
        </div>

        <div id="admin-stock" style="margin-top: 40px;"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('inercia_lime_v1')) || [
            { name: "Black Silk Dress", price: "$28.000", img: "https://unsplash.com" },
            { name: "Suede Accessories", price: "$12.500", img: "https://unsplash.com" },
            { name: "Minimal Lingerie", price: "$8.200", img: "https://unsplash.com" }
        ];

        // Código 0110
        let keys = "";
        window.onkeydown = (e) => {
            keys += e.key;
            if(keys.includes("0110")) toggleAdmin();
            if(keys.length > 5) keys = "";
        }

        function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('active'); }

        function updateHero() {
            const val = document.getElementById('edit-title').value;
            if(val) document.getElementById('display-title').innerText = val;
        }

        function render() {
            const grid = document.getElementById('product-grid');
            const stock = document.getElementById('admin-stock');
            grid.innerHTML = '';
            stock.innerHTML = '<label>Gestión de Stock</label>';

            db.forEach((p, i) => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}">
                        <p>${p.name} — ${p.price}</p>
                    </div>
                `;
                stock.innerHTML += `
                    <div class="stock-item">
                        <span>${p.name}</span>
                        <span onclick="deleteItem(${i})" style="color:red; cursor:pointer">X</span>
                    </div>
                `;
            });
            localStorage.setItem('inercia_lime_v1', JSON.stringify(db));
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if(name && price && img) {
                db.push({name, price, img});
                render();
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img').value = '';
            }
        }

        function deleteItem(i) { db.splice(i, 1); render(); }
        render();
    </script>
</body>
</html>
