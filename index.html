<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #e8e6e1; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Efecto de Grano Vintage */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url(https://vercel.app); opacity: 0.05; pointer-events: none; z-index: 1000; }

        /* Navegación */
        nav { display: flex; justify-content: space-around; align-items: center; padding: 20px; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; letter-spacing: 10px; }

        /* Hero Section - Estilo Imagen */
        .hero { height: 90vh; position: relative; background: #000; display: flex; align-items: flex-end; padding: 80px 10%; box-sizing: border-box; }
        .hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7; filter: sepia(30%) grayscale(20%); }
        .hero-text { position: relative; color: #fff; z-index: 2; }
        .hero-text h2 { font-family: 'Playfair Display', serif; font-size: 3rem; margin: 0; letter-spacing: 5px; }
        .hero-text span { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; opacity: 0.8; }

        /* Sección Numérica 01 02 03 */
        .categories { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; padding: 100px 10%; text-align: center; }
        .cat-item span { font-size: 10px; color: #888; display: block; margin-bottom: 20px; }
        .cat-item img { width: 100%; height: 400px; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .cat-item img:hover { filter: grayscale(0%); }
        .cat-item h3 { font-family: 'Playfair Display', serif; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #000; display: inline-block; padding-bottom: 5px; margin-top: 20px; }

        /* Frase Mágica */
        .quote-section { background: #dcd9d2; padding: 150px 10%; text-align: center; position: relative; }
        .quote-section h2 { font-family: 'Playfair Display', serif; font-size: 3.5rem; line-height: 1.2; font-weight: 400; }
        .quote-section h2 i { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; }

        /* Catálogo de Productos */
        .catalog { padding: 100px 10%; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid var(--border); padding: 15px; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; filter: sepia(20%); }
        .p-info { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; font-size: 11px; }

        /* Panel Admin Secreto (0110) */
        #admin-panel { display: none; position: fixed; right: 0; top: 0; width: 380px; height: 100vh; background: #fff; z-index: 10001; padding: 30px; box-shadow: -10px 0 50px rgba(0,0,0,0.2); overflow-y: auto; font-size: 12px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        .btn-black { background: #000; color: #fff; border: none; width: 100%; padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        #secret-btn { position: fixed; bottom: 10px; right: 10px; width: 20px; height: 20px; opacity: 0; cursor: pointer; z-index: 10000; }
    </style>
</head>
<body>

    <nav>
        <div>Inercia</div>
        <div class="logo">INERCIA</div>
        <div>Contacto</div>
    </nav>

    <section class="hero">
        <img id="h-img" src="https://unsplash.com">
        <div class="hero-text">
            <span id="h-sub">Miracle Collection</span>
            <h2 id="h-title">EXPLORE NOW</h2>
        </div>
    </section>

    <section class="categories">
        <div class="cat-item">
            <span>01</span>
            <img src="https://unsplash.com">
            <h3>Nuestros Bestsellers</h3>
        </div>
        <div class="cat-item">
            <span>02</span>
            <img src="https://unsplash.com">
            <h3>Productos Destacados</h3>
        </div>
        <div class="cat-item">
            <span>03</span>
            <img src="https://unsplash.com">
            <h3>Todas las Colecciones</h3>
        </div>
    </section>

    <section class="quote-section">
        <h2 id="q-text">DONDE HAY <i>Movimiento</i>,<br>HAY MAGIA</h2>
    </section>

    <section class="catalog" id="main-catalog">
        <!-- Productos aquí -->
    </section>

    <section style="padding: 100px 10%; border-top: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; text-align: center;">
        <div id="info-e">Envíos a todo el país</div>
        <div id="info-p" style="margin-top: 10px;">Pagos con tarjetas y transferencias</div>
    </section>

    <!-- ACCESO INVISIBLE -->
    <div id="secret-btn" onclick="openAdmin()"></div>

    <div id="admin-panel">
        <h2 style="font-family:'Playfair Display'">Inercia Admin</h2>
        <hr>
        <label>Banner Hero (Foto):</label><input type="file" id="in-h-img" accept="image/*">
        <label>Título Hero:</label><input type="text" id="in-h-title">
        <label>Frase Mágica:</label><textarea id="in-quote"></textarea>
        
        <hr>
        <h4>SUBIR PRODUCTO</h4>
        <input type="file" id="p-img" accept="image/*">
        <input type="text" id="p-name" placeholder="Nombre">
        <input type="text" id="p-price" placeholder="Precio ($)">
        <input type="number" id="p-stock" placeholder="Stock">
        <button class="btn-black" onclick="addProduct()" style="background:#27ae60">Añadir al Catálogo</button>

        <hr>
        <button class="btn-black" onclick="saveAll()">Guardar Cambios</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; border:none; background:none; color:red; margin-top:20px; cursor:pointer;">Cerrar</button>
    </div>

    <script>
        function openAdmin() {
            if(prompt("Inercia Security:") === "0110") document.getElementById('admin-panel').style.display='block';
        }

        async function toB64(file) {
            return new Promise((res) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });
        }

        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-img').files[0];
            if(!file || !name) return alert("Faltan datos");
            
            const img = await toB64(file);
            const card = `
                <div class="product-card">
                    <img src="${img}">
                    <div class="p-info">
                        <strong>${name}</strong>
                        <span>$${price}</span>
                    </div>
                </div>
            `;
            document.getElementById('main-catalog').insertAdjacentHTML('afterbegin', card);
            alert("Producto añadido.");
        }

        async function saveAll() {
            if(document.getElementById('in-h-title').value) document.getElementById('h-title').innerText = document.getElementById('in-h-title').value;
            if(document.getElementById('in-quote').value) document.getElementById('q-text').innerHTML = document.getElementById('in-quote').value;
            
            const bFile = document.getElementById('in-h-img').files[0];
            if(bFile) document.getElementById('h-img').src = await toB64(bFile);

            alert("Vista actualizada.");
            document.getElementById('admin-panel').style.display = 'none';
        }
    </script>
</body>
</html>
