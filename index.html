<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Google Fonts para ese look editorial -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Minimalista -->
    <header class="main-header">
        <nav class="nav-container">
            <div class="menu-toggle">☰</div>
            <div class="logo">INERCIA</div>
            <div class="nav-icons">
                <span class="icon">🔍</span>
                <span class="icon">👤</span>
                <span class="icon">🛒 (0)</span>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero Section: Complete the Look -->
        <section class="lookbook-container">
            <h1 class="section-title">Complete the look</h1>
            
            <div class="look-grid">
                <!-- Imagen Principal -->
                <div class="main-model-img">
                    <img src="https://unsplash.com" alt="Modelo Inercia">
                </div>

                <!-- Detalles de Productos -->
                <div class="product-details">
                    <div class="product-item">
                        <div class="prod-thumb">
                            <img src="https://unsplash.com" alt="Vestido Inercia">
                        </div>
                        <div class="prod-info">
                            <h3>Valentino</h3>
                            <p>Short dress in crepe couture</p>
                            <span class="price">7.210 AED</span>
                        </div>
                        <button class="add-btn">+</button>
                    </div>

                    <div class="product-item">
                        <div class="prod-thumb">
                            <img src="https://unsplash.com" alt="Botas Inercia">
                        </div>
                        <div class="prod-info">
                            <h3>Valentino</h3>
                            <p>Rockstud flair suede boots</p>
                            <span class="price">5.200 AED</span>
                        </div>
                        <button class="add-btn">+</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer con Trust Badges -->
    <footer class="trust-footer">
        <div class="badge">🚚 Envío en 24h</div>
        <div class="badge">💳 Pago Seguro</div>
        <div class="badge">🌿 Eco-Friendly Packaging</div>
    </footer>

</body>
</html>
