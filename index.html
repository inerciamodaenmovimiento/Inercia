<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); }

        /* --- TIENDA --- */
        nav { padding: 30px; display: flex; justify-content: space-between; position: fixed; width: 100%; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); }
        .hero { height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 100px; }
        .brand-name { font-size: 4rem; letter-spacing: -2px; }
        
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; padding: 40px; }
        .card { border: 1px solid #eee; padding: 20px; transition: 0.3s; }
        .card img { width: 100%; height: 380px; object-fit: cover; margin-bottom: 15px; }
        .cat-tag { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }
        .btn-black { background: var(--azul); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 0.7rem; text-transform: uppercase; }

        /* --- CARRITO --- */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 350px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); z-index: 1000; transition: 0.5s; padding: 30px; overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .checkout-box { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; }

        /* --- ADMIN --- */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gris); z-index: 2000; overflow-y: auto; padding: 40px; color: #333; }
        .admin-card { background: white; padding: 25px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .order-card { background: #fffde7; border-left: 5px solid #fbc02d; padding: 15px; margin-bottom: 10px; font-family: sans-serif; font-size: 0.85rem; }
        #secret-trigger { position: fixed; bottom: 10px; right: 10px; width: 25px; height: 25px; background: transparent; cursor: pointer; z-index: 3000; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight:bold; letter-spacing:3px">INERCIA</div>
    <div style="cursor:pointer" onclick="toggleCart()">CARRITO (<span id="cart-count">0</span>)</div>
</nav>

<header class="hero">
    <h1 class="brand-name">Inercia</h1>
    <p style="font-style:italic; opacity:0.6">Moda en movimiento</p>
</header>

<section class="productos-grid" id="main-shop"></section>

<div id="cart-panel">
    <h2 onclick="toggleCart()" style="cursor:pointer">← Cerrar</h2>
    <div id="cart-items" style="margin:20px 0"></div>
    <div class="checkout-box">
        <h3>Finalizar Compra</h3>
        <input type="text" id="cust-name" placeholder="Nombre completo">
        <select id="cust-ship"></select>
        <select id="cust-pay" onchange="checkPayMethod()">
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia Bancaria</option>
        </select>
        <div id="bank-info" style="display:none; font-size:0.8rem; background:#f0f0f0; padding:10px; margin-bottom:10px"></div>
        <button class="btn-black" onclick="placeOrder()">Confirmar Pedido</button>
    </div>
</div>

<!-- FOOTER -->
<footer style="padding:60px; text-align:center; border-top:1px solid #eee">
    <a href="#" id="f-ig" style="color:var(--azul); margin:0 15px; text-decoration:none">Instagram</a>
    <a href="#" id="f-wa" style="color:var(--azul); margin:0 15px; text-decoration:none">WhatsApp</a>
</footer>

<div id="secret-trigger" onclick="openAdmin()"></div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px">
        <h2>Inercia Control Panel</h2>
        <button onclick="closeAdmin()">Cerrar</button>
    </div>

    <div class="admin-card">
        <h3>📸 Subir Producto</h3>
        <input type="file" id="p-img" accept="image/*">
        <input type="text" id="p-name" placeholder="Nombre">
        <textarea id="p-desc" placeholder="Descripción del producto"></textarea>
        <input type="number" id="p-price" placeholder="Precio">
        <input type="text" id="p-cat" placeholder="Categoría (ej: Remeras)">
        <button class="btn-black" onclick="uploadProduct()">Publicar en Tienda</button>
    </div>

    <div class="admin-card">
        <h3>⚙️ Configuración (Pagos/Envío/Redes)</h3>
        <textarea id="conf-bank" placeholder="Datos bancarios (Alias, CBU, Banco)"></textarea>
        <input type="text" id="conf-ship" placeholder="Métodos de envío (separados por coma)">
        <input type="text" id="conf-ig" placeholder="Link Instagram">
        <input type="text" id="conf-wa" placeholder="WhatsApp">
        <button class="btn-black" onclick="saveConfig()">Actualizar Configuración</button>
    </div>

    <div class="admin-card">
        <h3>📦 Control de Pedidos</h3>
        <div id="order-list"></div>
    </div>
</div>

<script>
    let products = [];
    let cart = [];
    let orders = [];
    let config = { bank: "", ship: "Retiro en tienda, Envío a domicilio", ig: "#", wa: "#" };

    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }

    function uploadProduct() {
        const file = document.getElementById('p-img').files[0];
        const name = document.getElementById('p-name').value;
        const desc = document.getElementById('p-desc').value;
        const price = document.getElementById('p-price').value;
        const cat = document.getElementById('p-cat').value;

        if(!file || !name || !price) return alert("Completa los campos principales");

        const reader = new FileReader();
        reader.onload = function(e) {
            products.push({ id: Date.now(), img: e.target.result, name, desc, price, cat });
            renderShop();
            alert("Producto subido!");
        }
        reader.readAsDataURL(file);
    }

    function renderShop() {
        const grid = document.getElementById('main-shop');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.img}">
                <span class="cat-tag">${p.cat}</span>
                <h3>${p.name}</h3>
                <p style="font-size:0.8rem; margin:5px 0">${p.desc}</p>
                <p><b>$${p.price}</b></p>
                <button class="btn-black" onclick="addToCart(${p.id})">Añadir</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        cart.push(p);
        document.getElementById('cart-count').innerText = cart.length;
        renderCart();
    }

    function renderCart() {
        document.getElementById('cart-items').innerHTML = cart.map(i => `<p>${i.name} - $${i.price}</p>`).join('');
    }

    function checkPayMethod() {
        const method = document.getElementById('cust-pay').value;
        const info = document.getElementById('bank-info');
        if(method === "Transferencia") {
            info.style.display = "block";
            info.innerText = "Datos para transferir: " + config.bank;
        } else { info.style.display = "none"; }
    }

    function saveConfig() {
        config.bank = document.getElementById('conf-bank').value;
        config.ship = document.getElementById('conf-ship').value;
        document.getElementById('f-ig').href = document.getElementById('conf-ig').value;
        document.getElementById('f-wa').href = "https://wa.me" + document.getElementById('conf-wa').value;
        
        // Update shipping dropdown
        const shipSelect = document.getElementById('cust-ship');
        shipSelect.innerHTML = config.ship.split(',').map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('');
        alert("Configuración guardada");
    }

    function placeOrder() {
        const name = document.getElementById('cust-name').value;
        if(!name || cart.length === 0) return alert("Datos incompletos");

        const order = {
            id: Date.now(),
            client: name,
            items: cart.map(c => `${c.name} (${c.cat})`).join(', '),
            total: cart.reduce((a, b) => a + parseInt(b.price), 0),
            ship: document.getElementById('cust-ship').value,
            pay: document.getElementById('cust-pay').value
        };

        orders.push(order);
        renderOrders();
        cart = [];
        document.getElementById('cart-count').innerText = "0";
        alert("¡Venta exitosa! El administrador ha sido notificado.");
        toggleCart();
    }

    function renderOrders() {
        document.getElementById('order-list').innerHTML = orders.map(o => `
            <div class="order-card">
                <b>ORDEN #${o.id}</b><br>
                Cliente: ${o.client}<br>
                Productos: ${o.items}<br>
                Pago: ${o.pay} | Envío: ${o.ship}<br>
                <b>Total: $${o.total}</b>
            </div>
        `).reverse().join('');
    }

    function openAdmin() { if(prompt("Código Inercia:") === "0110") document.getElementById('admin-panel').style.display = 'block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    
    // Init
    saveConfig();
</script>

</body>
</html>
