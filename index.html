<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Oficial</title>
    <!-- Fuentes y Iconos -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; color: #111; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 100; }
        .logo { font-family: 'Bodoni Moda', serif; font-size: 30px; font-style: italic; font-weight: 700; text-transform: lowercase; }
        nav a { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; color: #000; margin-left: 20px; font-weight: 600; }

        /* HERO - EL DISEÑO QUE PEDISTE */
        .hero { position: relative; height: 80vh; display: flex; align-items: center; padding: 0 5%; background: #f9f9f9; overflow: hidden; }
        .hero-img-main { position: absolute; right: 0; top: 0; width: 60%; height: 100%; object-fit: cover; }
        .hero-text { position: relative; z-index: 10; max-width: 500px; }
        .hero-text h1 { font-family: 'Bodoni Moda', serif; font-size: clamp(50px, 8vw, 90px); line-height: 0.9; font-style: italic; margin-bottom: 20px; }
        .hero-float { position: absolute; right: 35%; bottom: 10%; width: 240px; height: 320px; border: 10px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 20; }
        .hero-float img { width: 100%; height: 100%; object-fit: cover; }

        /* MARQUESINA */
        .marquee { background: #000; color: #fff; padding: 15px 0; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: scroll 20s linear infinite; font-size: 10px; letter-spacing: 4px; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* TIENDA */
        .shop { padding: 80px 5%; }
        .shop h2 { text-align: center; font-family: 'Bodoni Moda', serif; font-size: 40px; font-style: italic; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { text-align: left; }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 2px; }
        .card h3 { font-size: 13px; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .card p { color: #666; font-size: 13px; margin-top: 5px; }

        /* EL CANDADITO (OCULTO PERO ACCESIBLE) */
        .admin-btn { position: fixed; bottom: 20px; right: 20px; color: #ddd; cursor: pointer; z-index: 1000; font-size: 18px; transition: 0.3s; }
        .admin-btn:hover { color: #000; }

        /* PANEL ADMIN */
        #admin { position: fixed; right: -400px; top: 0; width: 400px; height: 100vh; background: #000; color: #fff; z-index: 10001; padding: 40px; transition: 0.5s; overflow-y: auto; }
        #admin.open { right: 0; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .field input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; }
        .btn-save { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .item-list { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        .item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">inercia.</div>
        <nav><a href="#shop">Colección</a><a href="#">Contacto</a></nav>
    </header>

    <div class="hero">
        <img src="https://unsplash.com" class="hero-img-main">
        <div class="hero-text">
            <h1 id="h-title">Chic. Trendy.<br>Timeless.</h1>
            <p>Moda en movimiento para la mujer de hoy.</p>
        </div>
        <div class="hero-float">
            <img src="https://unsplash.com">
        </div>
    </div>

    <div class="marquee"><div class="marquee-content">NUEVA COLECCIÓN • INERCIA • NUEVA COLECCIÓN • INERCIA • NUEVA COLECCIÓN • INERCIA • </div></div>

    <section class="shop" id="shop">
        <h2>novedades</h2>
        <div class="grid" id="grid"></div>
    </section>

    <!-- ACCESO ADMIN -->
    <div class="admin-btn" onclick="toggleAdmin()"><i class="fas fa-lock"></i></div>

    <div id="admin">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
            <h3>Panel Dueña</h3>
            <span onclick="toggleAdmin()" style="cursor:pointer">✕</span>
        </div>
        <div class="field">
            <label>Título Banner (usar . para saltos)</label>
            <input type="text" id="edit-title" oninput="updateTitle()" placeholder="Chic. Trendy. Timeless.">
        </div>
        <hr style="border:0; border-top:1px solid #222; margin:30px 0;">
        <div class="field"><input type="text" id="p-name" placeholder="Nombre"></div>
        <div class="field"><input type="text" id="p-price" placeholder="Precio"></div>
        <div class="field"><input type="text" id="p-img" placeholder="Link Foto"></div>
        <button class="btn-save" onclick="addP()">Publicar Producto</button>
        <div class="item-list" id="list"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('inercia_final')) || [
            { name: "Bomber Inercia", price: "$22.900", img: "https://unsplash.com" },
            { name: "Blusa Seda", price: "$14.500", img: "https://unsplash.com" }
        ];

        // Código 0110
        let keys = "";
        window.addEventListener('keydown', (e) => {
            keys += e.key;
            if (keys.includes("0110")) { toggleAdmin(); keys = ""; }
            if (keys.length > 5) keys = "";
        });

        function toggleAdmin() { document.getElementById('admin').classList.toggle('open'); }
        
        function updateTitle() {
            const val = document.getElementById('edit-title').value;
            if(val) document.getElementById('h-title').innerHTML = val.replace(/\. /g, '.<br>');
        }

        function render() {
            const grid = document.getElementById('grid');
            const list = document.getElementById('list');
            grid.innerHTML = ''; list.innerHTML = '';
            db.forEach((p, i) => {
                grid.innerHTML += `<div class="card"><img src="${p.img}"><h3>${p.name}</h3><p>${p.price}</p></div>`;
                list.innerHTML += `<div class="item">${p.name} <span onclick="del(${i})" style="color:red; cursor:pointer">Eliminar</span></div>`;
            });
            localStorage.setItem('inercia_final', JSON.stringify(db));
        }

        function addP() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if(name && price && img) {
                db.push({name, price, img});
                render();
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img').value = '';
            }
        }

        function del(i) { db.splice(i, 1); render(); }
        render();
    </script>
</body>
</html>
