<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --negro: #111; --gris: #f4f4f4; --rojo: #e63946; }
        body { margin: 0; font-family: 'Inter', sans-serif; color: var(--negro); background: #fff; }
        
        /* CABECERA */
        header { padding: 40px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.8rem; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 15px; }
        nav a { text-decoration: none; color: var(--negro); margin: 0 15px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        /* BANNER PRINCIPAL */
        .hero { 
            height: 75vh; 
            background: #eee url('https://unsplash.com') center/cover; 
            margin-bottom: 60px;
        }

        /* CUADRÍCULA DE PRODUCTOS */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; text-align: center; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 40px; }
        .section-title::after { content: ''; display: block; width: 35px; height: 1px; background: var(--rojo); margin: 15px auto; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .product-card { text-align: center; margin-bottom: 40px; }
        .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--gris); }
        .product-card h3 { font-size: 0.85rem; font-weight: 400; text-transform: uppercase; margin-top: 15px; }
        .product-card p { font-weight: 700; font-size: 0.8rem; color: #555; }

        /* SECCIÓN COLLECTION */
        .collection-section { background: #eee; padding: 120px 0; margin: 80px 0; text-align: center; }
        .collection-section h2 { font-size: 5rem; letter-spacing: 20px; color: #fff; font-weight: 900; margin: 0; }

        /* FOOTER */
        footer { padding: 60px 10%; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.7rem; color: #666; }
        footer div h4 { color: var(--negro); text-transform: uppercase; margin-bottom: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">INERCIA</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">New Arrival</a>
            <a href="#">Clothes</a>
            <a href="#">Jacket</a>
            <a href="#">Sale</a>
        </nav>
    </header>

    <div class="hero"></div>

    <div class="container">
        <h2 class="section-title">New Arrivals</h2>
        <div class="product-grid">
            <!-- Producto 1 -->
            <div class="product-card">
                <img src="https://unsplash.com" alt="Producto">
                <h3>Brown Long Blouse</h3>
                <p>NT$1299</p>
            </div>
            <!-- Producto 2 -->
            <div class="product-card">
                <img src="https://unsplash.com" alt="Producto">
                <h3>White Casual Suit</h3>
                <p>NT$1299</p>
            </div>
        </div>
    </div>

    <div class="collection-section">
        <h2>COLLECTION</h2>
    </div>

    <footer>
        <div>
            <h4>About Us</h4>
            <p>Our Story</p>
            <p>Our Spirit</p>
        </div>
        <div>
            <h4>Customer Service</h4>
            <p>Contact Us</p>
            <p>Delivery Options</p>
        </div>
        <div>
            <h4>Inercia</h4>
            <p>2026 © Inercia Moda</p>
        </div>
    </footer>

</body>
</html>
