<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); overflow-x: hidden; }

        /* NAVEGACIÓN */
        nav { padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; }
        .logo { font-weight: bold; letter-spacing: 5px; font-size: 1.2rem; }

        /* BANNER PRINCIPAL */
        #banner-container { width: 100%; height: 50vh; overflow: hidden; position: relative; margin-top: 70px; }
        #banner-slider { display: flex; transition: 1s ease; height: 100%; }
        #banner-slider img { width: 100%; flex-shrink: 0; object-fit: cover; }

        /* CATÁLOGO (PRODUCTOS CHICOS) */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; padding: 40px 5%; }
        .card { cursor: pointer; text-align: center; }
        .card img { width: 100%; height: 280px; object-fit: cover; margin-bottom: 10px; }
        
        /* CATEGORÍAS MÁS GRANDES */
        .card-cat { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.8; font-weight: bold; display: block; margin-bottom: 5px; }
        .card-name { font-size: 1rem; font-weight: 400; }

        /* MODAL DETALLE */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; padding: 80px 5%; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .modal-imgs img { width: 100%; margin-bottom: 15px; }

        /* CARRITO */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 380px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 40px; box-shadow: -10px 0 50px rgba(0,0,0,0.1); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #eee; font-size: 0.8rem; }
        .bank-info { background: #fffbe6; padding: 15px; font-size: 0.75rem; border: 1px dashed #d4c18d; display: none; margin: 10px 0; }

        /* ADMIN */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 3000; padding: 50px 10%; overflow-y: auto; }
        .admin-box { background: white; padding: 25px; margin-bottom: 20px; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; margin-top: 10px; font-size: 0.7rem; }
        .btn-buy { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

<nav>
    <div class="logo">INERCIA</div>
    <div onclick="toggleCart()" style="cursor:pointer; font-weight:bold; font-size:0.8rem">BOLSA (<span id="cart-count">0</span>)</div>
</nav>

<div id="banner-container"><div id="banner-slider"></div></div>

<header style="text-align:center; padding:40px 0">
    <p style="font-style:italic; opacity:0.5; letter-spacing:5px">CATÁLOGO</p>
</header>

<section class="productos-container" id="shop-grid"></section>

<div id="modal-detalle">
    <button onclick="closeModal()" style="position:fixed; top:20px; right:20px; font-size:2rem; border:none; background:none; cursor:pointer">×</button>
    <div id="modal-content" class="modal-grid"></div>
</div>

<div id="cart-panel">
    <h3 style="letter-spacing:2px; margin-bottom:20px">TU BOLSA</h3>
    <div id="cart-items"></div>
    <div id="cart-total" style="font-weight:bold; border-top:1px solid #eee; padding-top:20px; margin-top:20px">TOTAL: $0</div>
    
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <select id="c-ship" class="input-cart" onchange="toggleShip()"></select>
    
    <div id="ship-details" style="display:none">
        <input type="text" id="c-calle" class="input-cart" placeholder="CALLE Y ALTURA">
        <input type="text" id="c-depto" class="input-cart" placeholder="PISO / DEPTO (OPCIONAL)">
        <input type="text" id="c-city" class="input-cart" placeholder="CIUDAD / LOCALIDAD">
        <input type="text" id="c-prov" class="input-cart" placeholder="PROVINCIA">
        <input type="text" id="c-cp" class="input-cart" placeholder="CÓDIGO POSTAL">
    </div>

    <select id="c-pay" class="input-cart" onchange="togglePay()">
        <option value="Efectivo">EFECTIVO / ACORDAR</option>
        <option value="Transferencia">TRANSFERENCIA BANCARIA</option>
    </select>
    <div id="bank-box" class="bank-info"></div>
    <button class="btn-buy" onclick="confirmOrder()">FINALIZAR COMPRA</button>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<div id="admin-panel">
    <button onclick="closeAdmin()">CERRAR PANEL</button>
    <div class="admin-box">
        <h3>CONFIGURACIÓN</h3>
        <input type="text" id="conf-wa" placeholder="WhatsApp (549...)" class="input-cart">
        <textarea id="conf-bank" placeholder="Datos bancarios" class="input-cart"></textarea>
        <input type="text" id="conf-cats" placeholder="Categorías (comas)" class="input-cart">
        <input type="text" id="conf-ships" placeholder="Envíos (comas)" class="input-cart">
        <button class="btn-buy" onclick="saveConfig()">GUARDAR</button>
    </div>
    <div class="admin-box">
        <h3>NUEVO PRODUCTO</h3>
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción" class="input-cart"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat" class="input-cart"></select>
        <input type="file" id="p-img" multiple>
        <button class="btn-buy" onclick="uploadProduct()">PUBLICAR</button>
    </div>
    <div class="admin-box">
        <h3>GESTIONAR CATÁLOGO</h3>
        <div id="admin-list"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('inercia_v_ultra')) || { products: [], cats: ["Nuevo"], ships: ["Retiro"], bank: "", wa: "", banners: [] };
    let cart = [];

    window.onload = () => { renderShop(); updateUI(); renderBanners(); };
    function save() { localStorage.setItem('inercia_v_ultra', JSON.stringify(db)); }
    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    function toggleShip() { document.getElementById('ship-details').style.display = document.getElementById('c-ship').value.toLowerCase().includes('envio') ? 'block' : 'none'; }
    function togglePay() { 
        const box = document.getElementById('bank-box');
        box.style.display = document.getElementById('c-pay').value === 'Transferencia' ? 'block' : 'none';
        box.innerText = db.bank;
    }

    function updateUI() {
        document.getElementById('p-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('c-ship').innerHTML = db.ships.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa;
        document.getElementById('conf-bank').value = db.bank;
        document.getElementById('conf-cats').value = db.cats.join(', ');
        document.getElementById('conf-ships').value = db.ships.join(', ');
        renderAdminList();
    }

    function saveConfig() {
        db.wa = document.getElementById('conf-wa').value;
        db.bank = document.getElementById('conf-bank').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim());
        db.ships = document.getElementById('conf-ships').value.split(',').map(s => s.trim());
        save(); updateUI(); alert("Configuración guardada");
    }

    async function uploadProduct() {
        const files = document.getElementById('p-img').files;
        const imgs = [];
        for(let f of files) { imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); })); }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, imgs: imgs });
        save(); renderShop(); renderAdminList(); alert("Producto subido");
    }

    function deleteProduct(id) {
        if(confirm("¿Borrar producto?")) {
            db.products = db.products.filter(p => p.id !== id);
            save(); renderShop(); renderAdminList();
        }
    }

    function renderAdminList() {
        document.getElementById('admin-list').innerHTML = db.products.map(p => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee">
                <span>${p.name}</span>
                <button class="btn-del" onclick="deleteProduct(${p.id})">BORRAR</button>
            </div>`).join('');
    }

    function renderShop() {
        document.getElementById('shop-grid').innerHTML = db.products.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <img src="${p.imgs[0]}">
                <span class="card-cat">${p.cat.toUpperCase()}</span>
                <h3 class="card-name">${p.name.toUpperCase()}</h3>
                <p><strong>$${p.price}</strong></p>
            </div>`).join('');
    }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-content').innerHTML = `
            <div class="modal-imgs">${p.imgs.map(i => `<img src="${i}">`).join('')}</div>
            <div class="modal-info">
                <span class="card-cat" style="font-size:1.2rem">${p.cat}</span>
                <h1 style="margin:15px 0">${p.name}</h1>
                <p style="margin-bottom:30px; line-height:1.6">${p.desc}</p>
                <p style="font-size:1.8rem; margin-bottom:30px"><strong>$${p.price}</strong></p>
                <button class="btn-buy" onclick="addToCart(${p.id}); closeModal()">AÑADIR A LA BOLSA</button>
            </div>`;
        document.getElementById('modal-detalle').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }

    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        cart.push(p); updateCart(); toggleCart();
    }
    function updateCart() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="font-size:0.8rem; margin-bottom:5px">${i.name} - $${i.price}</div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        const n = document.getElementById('c-name').value;
        if(!n || !cart.length) return alert("Faltan datos");
        const shipInfo = document.getElementById('ship-details').style.display === 'block' ? 
            `%0ADirección: ${document.getElementById('c-calle').value} ${document.getElementById('c-depto').value}%0ALocalidad: ${document.getElementById('c-city').value}, ${document.getElementById('c-prov').value}%0ACP: ${document.getElementById('c-cp').value}` : '';
        
        const url = `https://wa.me{db.wa}?text=NUEVO PEDIDO INERCIA%0ACliente: ${n}%0AItems: ${cart.map(i=>i.name).join(', ')}%0AEnvío: ${document.getElementById('c-ship').value}${shipInfo}%0APago: ${document.getElementById('c-pay').value}%0A${document.getElementById('cart-total').innerText}`;
        window.open(url, '_blank');
        cart = []; updateCart(); toggleCart();
    }

    function renderBanners() { /* Lógica de banners se mantiene */ }
</script>
</body>
</html>
