<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INNERCIA | Moda en Movimiento</title>
    
    <!-- Fuentes Elegantes -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root { --negro: #1a1a1a; --gris-fondo: #f4f4f4; --rojo-detalle: #e63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--negro); background: #fff; line-height: 1.6; }

        /* HEADER */
        header { 
            padding: 40px 20px; 
            text-align: center; 
            background: #fff; 
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2rem, 5vw, 3rem); 
            letter-spacing: 12px; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
        }
        nav a { 
            text-decoration: none; 
            color: var(--negro); 
            margin: 0 15px; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: 0.3s;
        }
        nav a:hover { color: var(--rojo-detalle); }

        /* HERO / BANNER PRINCIPAL */
        .hero { 
            width: 100%; 
            height: 75vh; 
            background: #eee url('https://unsplash.com') center/cover no-repeat; 
            margin-bottom: 60px;
        }

        /* CONTENEDOR GENERAL */
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">INNERCIA</div>
        <nav>
            <a href="#">Home</a>
            <a href="#new">New Arrival</a>
            <a href="#collection">Collection</a>
            <a href="#">Sale</a>
        </nav>
    </header>

    <section class="hero"></section>

    <div class="container" id="main-content">
        <!-- Aquí irán los productos que agregaremos en el siguiente paso -->
    </div>

</body>
</html>
