<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Librerías de emergencia (Carga garantizada) -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; margin: 0; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-view { display: none; }
        .nav-link { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; color: #999; transition: 0.3s; }
        .nav-link:hover { color: #000; }
    </style>
</head>
<body>

    <!-- NAVBAR TIPO ULTRA -->
    <header class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 py-6">
        <div class="container mx-auto px-8 flex justify-between items-center">
            <div class="serif text-3xl font-bold tracking-[0.3em] uppercase cursor-pointer" onclick="navigate('home')">INERCIA</div>
            <div class="hidden lg:flex space-x-12">
                <a href="javascript:void(0)" onclick="navigate('home')" class="nav-link">Inicio</a>
                <a href="javascript:void(0)" onclick="scrollToNew()" class="nav-link">Colección</a>
                <a href="javascript:void(0)" onclick="navigate('admin')" class="nav-link text-red-400">Admin</a>
            </div>
            <button onclick="toggleCart()" class="text-xl relative">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </header>

    <!-- VISTA TIENDA -->
    <main id="view-home">
        <!-- BANNER GIGANTE -->
        <section class="h-screen bg-stone-100 flex items-center justify-center relative overflow-hidden">
            <img id="main-banner" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover opacity-80">
            <div class="relative z-10 text-center">
                <h1 class="serif text-8xl md:text-[120px] italic text-white drop-shadow-2xl">Inercia</h1>
                <p class="text-white text-xs tracking-[1em] uppercase mt-4">Moda en Movimiento</p>
            </div>
        </section>

        <!-- GRILLA DE PRODUCTOS -->
        <section id="new-arrivals" class="container mx-auto px-8 py-32">
            <div class="text-center mb-20">
                <h2 class="serif text-4xl italic">New Arrivals</h2>
                <div class="h-px w-20 bg-black mx-auto mt-4"></div>
            </div>
            <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
                <!-- Se llenan con JS abajo -->
            </div>
        </section>
    </main>

    <!-- VISTA ADMIN -->
    <main id="view-admin" class="admin-view pt-40 container mx-auto px-8 pb-32">
        <div class="max-w-3xl mx-auto bg-gray-50 p-10 border">
            <h2 class="serif text-3xl mb-8 italic">Panel Administrador</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <input id="adm-nombre" type="text" placeholder="Producto" class="p-3 border-b bg-transparent outline-none">
                <input id="adm-precio" type="number" placeholder="Precio ($)" class="p-3 border-b bg-transparent outline-none">
                <input id="adm-stock" type="number" placeholder="Stock" class="p-3 border-b bg-transparent outline-none">
                <input id="adm-cat" type="text" placeholder="Categoría" class="p-3 border-b bg-transparent outline-none">
            </div>
            <div class="mb-8 p-10 border-2 border-dashed border-gray-200 text-center">
                <p class="text-[10px] font-bold uppercase text-gray-400 mb-4">Elegir foto de tu PC</p>
                <input id="adm-file" type="file" class="text-xs">
            </div>
            <button onclick="saveProduct()" class="w-full bg-black text-white py-4 text-[10px] font-bold uppercase tracking-widest">Publicar Producto</button>
            <button onclick="navigate('home')" class="w-full mt-6 text-[10px] uppercase underline">Volver a la tienda</button>
        </div>
    </main>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white z-[100] shadow-2xl translate-x-full transition-transform duration-500 flex flex-col p-10">
        <div class="flex justify-between items-center border-b pb-6 mb-6 uppercase tracking-widest text-xs font-bold">
            <span>Bolsa de Compras</span>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
        <div class="border-t pt-6">
            <div class="flex justify-between font-bold text-xl mb-6"><span>Total</span><span id="cart-total">$0</span></div>
            <button onclick="checkout()" class="w-full bg-black text-white py-4 text-[10px] font-bold uppercase tracking-widest">Finalizar Pedido</button>
        </div>
    </div>

    <!-- BOTONES WHATSAPP -->
    <a href="https://wa.me" target="_blank" class="fixed bottom-10 right-10 w-14 h-14 bg-white border border-gray-100 rounded-full flex items-center justify-center shadow-xl z-50">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <script>
        // DATOS INICIALES
        let prods = JSON.parse(localStorage.getItem('in_db_v2')) || [
            { id: 1, nombre: 'Blusa Brown Ultra', precio: 12500, stock: 5, cat: 'Clothes', img: 'https://unsplash.com' },
            { id: 2, nombre: 'Grey Coat Inercia', precio: 22900, stock: 3, cat: 'Jacket', img: 'https://unsplash.com' }
        ];
        let cart = [];

        function navigate(v) {
            document.getElementById('view-home').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = v === 'admin' ? 'block' : 'none';
            window.history.pushState("", document.title, window.location.pathname);
        }

        function scrollToNew() {
            navigate('home');
            setTimeout(() => { document.getElementById('new-arrivals').scrollIntoView({behavior: 'smooth'}); }, 100);
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = prods.map(p => `
                <div class="text-center group">
                    <div class="aspect-[2/3] bg-gray-100 overflow-hidden mb-6 relative">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-4 text-[10px] font-bold uppercase opacity-0 group-hover:opacity-100 transition-all">Añadir</button>
                    </div>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-1">${p.cat}</p>
                    <h3 class="serif text-lg mb-1">${p.nombre}</h3>
                    <p class="text-sm font-light">$${p.precio.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function saveProduct() {
            const n = document.getElementById('adm-nombre').value;
            const p = document.getElementById('adm-precio').value;
            const f = document.getElementById('adm-file').files[0];
            if (f) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    prods.unshift({ id: Date.now(), nombre: n, precio: parseInt(p), stock: 10, cat: 'Nuevos', img: e.target.result });
                    localStorage.setItem('in_db_v2', JSON.stringify(prods));
                    render();
                    navigate('home');
                };
                reader.readAsDataURL(f);
            }
        }

        function addToCart(id) {
            cart.push(prods.find(x => x.id === id));
            updateCart();
            toggleCart();
        }

        function updateCart() {
            const c = document.getElementById('cart-items');
            c.innerHTML = cart.map(i => `<div class="flex justify-between text-xs border-b pb-2"><span>${i.nombre}</span><span>$${i.precio}</span></div>`).join('');
            document.getElementById('cart-total').innerText = '$' + cart.reduce((acc, p) => acc + p.precio, 0).toLocaleString();
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            const msg = `Pedido Inercia: ${cart.map(p => p.nombre).join(', ')}. Total: $${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
