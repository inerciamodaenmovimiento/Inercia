<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Editorial</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; }
        .serif { font-family: 'Playfair Display', serif; }
        .magazine-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .border-thin { border: 0.5px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [site, setSite] = useState({
                brand: "INERCIA",
                issue: "ISSUE NO. 01",
                mainTitle: "MOVIMIENTO",
                subTitle: "LA NUEVA ERA DEL DISEÑO"
            });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [isAdminOpen]);

            return (
                <div className="min-h-screen p-4 md:p-10">
                    {/* ENCABEZADO ESTILO REVISTA */}
                    <header className="flex justify-between items-end border-b border-black pb-4 mb-10">
                        <div>
                            <p className="text-[10px] tracking-widest font-bold">{site.issue}</p>
                            <h1 className="text-4xl font-black tracking-tighter">{site.brand}</h1>
                        </div>
                        <div className="text-right">
                            <button onClick={() => setIsAdminOpen(true)} className="hover:opacity-50 transition mr-4">
                                <i data-lucide="menu" className="w-5 h-5 inline"></i>
                            </button>
                            <span className="text-[10px] tracking-widest uppercase font-semibold">Primavera / Verano 2026</span>
                        </div>
                    </header>

                    {/* SECCIÓN PORTADA (GRID ASIMÉTRICO) */}
                    <main className="magazine-grid">
                        <div className="col-span-12 md:col-span-7 relative">
                            <div className="aspect-[4/5] bg-gray-100 overflow-hidden">
                                <img src="https://unsplash.com" 
                                     className="w-full h-full object-cover grayscale" alt="Inercia Moda" />
                            </div>
                            <div className="absolute bottom-10 left-10 text-white mix-blend-difference">
                                <h2 className="serif italic text-6xl md:text-8xl leading-none uppercase">{site.mainTitle}</h2>
                                <p className="text-xs tracking-[0.4em] mt-4">{site.subTitle}</p>
                            </div>
                        </div>

                        <div className="col-span-12 md:col-span-5 flex flex-col justify-center px-4 md:px-12 border-l border-black/5">
                            <h3 className="serif text-3xl mb-6">"El diseño no es estático, es una respuesta constante al cuerpo en acción."</h3>
                            <div className="space-y-4 text-sm leading-relaxed opacity-70">
                                <p>Exploramos la intersección entre la funcionalidad atlética y la alta costura.</p>
                                <p className="font-bold border-b border-black inline-block pb-1 cursor-pointer hover:opacity-50">LEER EDITORIAL</p>
                            </div>
                        </div>
                    </main>

                    {/* SECCIÓN GALERÍA DE PÁGINAS */}
                    <section className="magazine-grid mt-20 pt-20 border-t border-black/10">
                        <div className="col-span-12 md:col-span-4 group cursor-pointer">
                            <div className="aspect-[3/4] bg-gray-50 p-8 border-thin mb-4">
                                <img src="https://unsplash.com" 
                                     className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700" />
                            </div>
                            <p className="text-[9px] tracking-widest font-bold">01. THE NEW COLLECTION</p>
                        </div>
                        <div className="col-span-12 md:col-span-4 group cursor-pointer md:mt-20">
                            <div className="aspect-[3/4] bg-gray-50 p-8 border-thin mb-4">
                                <img src="https://unsplash.com" 
                                     className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700" />
                            </div>
                            <p className="text-[9px] tracking-widest font-bold">02. ESTÉTICA MODERNA</p>
                        </div>
                        <div className="col-span-12 md:col-span-4 group cursor-pointer">
                            <div className="aspect-[3/4] bg-gray-50 p-8 border-thin mb-4">
                                <img src="https://unsplash.com" 
                                     className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700" />
                            </div>
                            <p className="text-[9px] tracking-widest font-bold">03. MINIMALISMO PURO</p>
                        </div>
                    </section>

                    {/* ADMIN PANEL */}
                    <div className={`fixed inset-y-0 right-0 w-80 bg-white shadow-2xl z-50 p-10 transform transition-transform duration-500 ${isAdminOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex justify-between items-center mb-10 border-b pb-4">
                            <span className="text-[10px] font-bold tracking-widest uppercase">Editor Editorial</span>
                            <button onClick={() => setIsAdminOpen(false)}><i data-lucide="x" className="w-4 h-4"></i></button>
                        </div>
                        <div className="space-y-8">
                            <div>
                                <label className="text-[9px] uppercase font-bold opacity-30 block mb-2">Marca</label>
                                <input className="w-full border-b border-black text-sm py-1 outline-none" value={site.brand} onChange={(e) => setSite({...site, brand: e.target.value.toUpperCase()})} />
                            </div>
                            <div>
                                <label className="text-[9px] uppercase font-bold opacity-30 block mb-2">Título Portada</label>
                                <input className="w-full border-b border-black text-sm py-1 outline-none font-serif" value={site.mainTitle} onChange={(e) => setSite({...site, mainTitle: e.target.value.toUpperCase()})} />
                            </div>
                            <div>
                                <label className="text-[9px] uppercase font-bold opacity-30 block mb-2">Subtítulo</label>
                                <input className="w-full border-b border-black text-sm py-1 outline-none" value={site.subTitle} onChange={(e) => setSite({...site, subTitle: e.target.value})} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
