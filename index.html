<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Cargamos Tailwind desde una fuente confiable -->
    <script src="https://tailwindcss.com"></script>
    <style>
        /* Estilos de respaldo por si falla la carga de fuentes */
        @import url('https://googleapis.com');
        body { background-color: #ffffff; color: #1a1a1a; margin: 0; padding: 0; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-view { display: none; }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <header style="position: fixed; width: 100%; z-index: 100; background: rgba(255,255,255,0.9); border-bottom: 1px solid #eee; padding: 20px 0;">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="serif" style="font-size: 24px; letter-spacing: 5px; text-transform: uppercase; cursor: pointer;" onclick="showView('home')">INERCIA</div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <button onclick="showView('admin')" style="font-size: 10px; color: red; font-weight: bold; text-transform: uppercase;">Administrador</button>
                <button onclick="toggleCart()" style="font-size: 20px;">🛒 <span id="cart-count" style="font-size: 10px; background: black; color: white; border-radius: 50%; padding: 2px 6px;">0</span></button>
            </div>
        </div>
    </header>

    <!-- VISTA TIENDA (HOME) -->
    <main id="view-home" style="padding-top: 100px;">
        <!-- BANNER PRINCIPAL (Estilo Minimalista) -->
        <section style="height: 60vh; background: #f3f4f6; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; position: relative;">
            <div style="position: relative; z-index: 10;">
                <h1 class="serif" style="font-size: 60px; margin-bottom: 10px;">Inercia</h1>
                <p style="text-transform: uppercase; letter-spacing: 5px; font-size: 12px;">Moda en Movimiento</p>
            </div>
            <!-- Imagen de fondo de respaldo -->
            <img src="https://unsplash.com" style="position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3;">
        </section>

        <!-- GRILLA DE PRODUCTOS -->
        <section class="container mx-auto px-6 py-20">
            <h2 class="serif" style="text-align: center; font-size: 32px; margin-bottom: 50px;">Nuevos Ingresos</h2>
            <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
                <!-- Los productos aparecerán aquí -->
            </div>
        </section>
    </main>

    <!-- VISTA ADMINISTRADOR -->
    <main id="view-admin" class="admin-view" style="padding-top: 120px; max-width: 600px; margin: 0 auto; padding-left: 20px; padding-right: 20px;">
        <div style="background: #f9f9f9; padding: 40px; border-radius: 10px; border: 1px solid #ddd;">
            <h2 class="serif" style="font-size: 24px; margin-bottom: 20px;">Subir Producto</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <input id="in-nombre" type="text" placeholder="Nombre de la prenda" style="padding: 10px; border: 1px solid #ccc;">
                <input id="in-precio" type="number" placeholder="Precio ($)" style="padding: 10px; border: 1px solid #ccc;">
                <input id="in-cat" type="text" placeholder="Categoría" style="padding: 10px; border: 1px solid #ccc;">
                <label style="font-size: 12px; font-weight: bold;">Foto desde tu PC:</label>
                <input id="in-file" type="file" style="font-size: 12px;">
                <button onclick="saveProduct()" style="background: black; color: white; padding: 15px; font-weight: bold; text-transform: uppercase;">Publicar Ahora</button>
            </div>
            <button onclick="showView('home')" style="margin-top: 20px; font-size: 10px; text-decoration: underline;">Volver a la tienda</button>
        </div>
    </main>

    <!-- CARRITO LATERAL -->
    <div id="cart-sidebar" style="position: fixed; top: 0; right: 0; height: 100%; width: 320px; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transform: translateX(100%); transition: 0.3s; z-index: 200; padding: 30px; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 20px;">
            <span class="serif" style="font-size: 20px;">Tu Bolsa</span>
            <button onclick="toggleCart()" style="font-size: 30px;">&times;</button>
        </div>
        <div id="cart-items" style="flex-grow: 1; overflow-y: auto; padding: 20px 0;">
            <p style="color: #ccc; font-size: 14px; text-align: center;">Vaciío</p>
        </div>
        <div style="border-top: 1px solid #eee; padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
                <span>Total</span>
                <span id="cart-total">$0</span>
            </div>
            <button onclick="finalizarPedido()" style="width: 100%; background: black; color: white; padding: 15px; font-size: 12px; font-weight: bold; text-transform: uppercase;">Pedir por WhatsApp</button>
        </div>
    </div>

    <script>
        // MEMORIA DEL NAVEGADOR
        let productos = JSON.parse(localStorage.getItem('inercia_prods')) || [];
        let carrito = [];

        // Cambiar entre Tienda y Admin
        function showView(view) {
            document.getElementById('view-home').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = view === 'admin' ? 'block' : 'none';
        }

        function toggleCart() {
            const cart = document.getElementById('cart-sidebar');
            cart.style.transform = cart.style.transform === 'translateX(0%)' ? 'translateX(100%)' : 'translateX(0%)';
        }

        // GUARDAR PRODUCTO CON FOTO DE LA PC
        function saveProduct() {
            const nombre = document.getElementById('in-nombre').value;
            const precio = document.getElementById('in-precio').value;
            const cat = document.getElementById('in-cat').value;
            const file = document.getElementById('in-file').files[0];

            if (!file) return alert("Por favor selecciona una foto de tu PC");

            const reader = new FileReader();
            reader.onload = function(e) {
                const nuevoProd = { id: Date.now(), nombre, precio: parseInt(precio), cat, img: e.target.result };
                productos.push(nuevoProd);
                localStorage.setItem('inercia_prods', JSON.stringify(productos));
                renderTienda();
                showView('home');
            };
            reader.readAsDataURL(file);
        }

        // DIBUJAR LA TIENDA
        function renderTienda() {
            const grid = document.getElementById('grid-productos');
            if (productos.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa;">No hay productos. Entra al Administrador para subir el primero.</p>';
                return;
            }
            grid.innerHTML = productos.map(p => `
                <div style="text-align: center;">
                    <div style="background: #f9f9f9; aspect-ratio: 3/4; overflow: hidden; margin-bottom: 15px;">
                        <img src="${p.img}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <p style="font-size: 10px; color: #aaa; text-transform: uppercase;">${p.cat}</p>
                    <h3 style="font-size: 14px; font-weight: bold; margin: 5px 0;">${p.nombre}</h3>
                    <p style="font-size: 14px;">$${p.precio.toLocaleString()}</p>
                    <button onclick="addToCart(${p.id})" style="margin-top: 10px; background: #000; color: #fff; padding: 8px 20px; font-size: 10px; text-transform: uppercase;">Comprar</button>
                    <button onclick="deleteProd(${p.id})" style="display: block; width: 100%; margin-top: 10px; color: red; font-size: 9px;">Eliminar</button>
                </div>
            `).join('');
        }

        function deleteProd(id) {
            productos = productos.filter(p => p.id !== id);
            localStorage.setItem('inercia_prods', JSON.stringify(productos));
            renderTienda();
        }

        function addToCart(id) {
            carrito.push(productos.find(p => p.id === id));
            updateCart();
            toggleCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = carrito.map(i => `<div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px;"><span>${i.nombre}</span><span>$${i.precio}</span></div>`).join('');
            const total = carrito.reduce((acc, p) => acc + p.precio, 0);
            document.getElementById('cart-total').innerText = '$' + total.toLocaleString();
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function finalizarPedido() {
            const total = carrito.reduce((acc, p) => acc + p.precio, 0);
            const texto = `Hola Inercia! Quiero comprar: ${carrito.map(p => p.nombre).join(', ')}. Total: $${total}`;
            window.open(`https://wa.me{encodeURIComponent(texto)}`);
        }

        // Ejecutar al cargar
        renderTienda();
    </script>
</body>
</html>
