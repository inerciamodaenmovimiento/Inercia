<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link rel="stylesheet" href="style.css">
    <!-- Carga de la librería de seguridad de Stripe -->
    <script src="https://stripe.com"></script>
</head>
<body>

    <header>
        <nav class="nav-container">
            <div class="logo">INERCIA</div>
            <div class="cart-icon">
                CESTA (<span id="cart-count">0</span>)
            </div>
        </nav>
    </header>

    <main class="main-content">
        <section class="product-view">
            <!-- Galería -->
            <div class="gallery">
                <img src="https://unsplash.com" alt="Producto Inercia" class="img-hero">
            </div>

            <!-- Detalles del Producto -->
            <div class="details">
                <p class="brand">INERCIA COLLECTION</p>
                <h1>VESTIDO GRANAIG - NOCHE</h1>
                <p class="price">250.00 €</p>

                <div class="options">
                    <label>SELECCIONAR TALLA</label>
                    <select id="size-selector">
                        <option value="36">Talla 36</option>
                        <option value="38">Talla 38</option>
                        <option value="40">Talla 40</option>
                        <option value="42">Talla 42</option>
                    </select>
                </div>

                <button id="checkout-button" class="btn-primary">COMPRAR AHORA</button>
                
                <div class="trust-badges">
                    <p>✓ Pago seguro cifrado SSL</p>
                    <p>✓ Envío premium 24/48h</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Configuración de Stripe
        const stripe = Stripe('TU_CLAVE_PUBLICA_STRIPE'); 

        document.getElementById('checkout-button').addEventListener('click', function () {
            const size = document.getElementById('size-selector').value;
            
            // Llamada al Checkout de Stripe
            // En un entorno real, 'lineItems' vendría de tu catálogo de Stripe
            stripe.redirectToCheckout({
                lineItems: [{
                    price: 'ID_DE_PRECIO_STRIPE', // Se crea en tu panel de Stripe
                    quantity: 1,
                }],
                mode: 'payment',
                successUrl: window.location.origin + '/exito.html',
                cancelUrl: window.location.origin + '/error.html',
            }).then(function (result) {
                if (result.error) {
                    alert(result.error.message);
                }
            });
        });
    </script>
</body>
</html>
