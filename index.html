<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA — Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #0e0e0e; --white: #ffffff; --gray: #1a1a1a; --font-editorial: 'Playfair Display', serif; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* DAZE Noise Overlay */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://vercel.app');
            opacity: 0.07; pointer-events: none; z-index: 9999;
        }

        /* Navigation */
        nav { padding: 40px; display: flex; justify-content: space-between; position: fixed; width: 100%; z-index: 100; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; mix-blend-mode: difference; }
        .logo { font-family: var(--font-editorial); font-style: italic; font-size: 1.8rem; letter-spacing: -1px; }

        /* Hero Editorial */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .hero h1 { font-family: var(--font-editorial); font-size: 25vw; line-height: 0.8; font-weight: 900; letter-spacing: -0.05em; }
        .hero-sub { position: absolute; bottom: 10%; right: 5%; text-align: right; letter-spacing: 5px; opacity: 0.5; font-size: 10px; }

        /* Asymmetrical Magazine Grid */
        .magazine { padding: 100px 5%; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        
        .product { grid-column: span 12; margin-bottom: 150px; position: relative; }
        .product.left { grid-column: 1 / span 7; }
        .product.right { grid-column: 7 / span 5; margin-top: 100px; }

        .image-container { background: var(--gray); overflow: hidden; position: relative; width: 100%; }
        .image-container img { width: 100%; display: block; filter: grayscale(1); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .product:hover img { filter: grayscale(0); transform: scale(1.05); }

        .info { margin-top: 25px; }
        .info h3 { font-family: var(--font-editorial); font-style: italic; font-size: 3rem; margin-bottom: 10px; }
        .info p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #888; }

        /* --- ADMIN SYSTEM --- */
        .admin-trigger { position: fixed; bottom: 20px; right: 20px; opacity: 0.05; cursor: help; border: none; background: none; color: white; font-size: 9px; z-index: 10000; }
        
        #login-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10001; backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        .login-box { text-align: center; width: 300px; }
        input { background: none; border: none; border-bottom: 1px solid #333; color: white; width: 100%; padding: 15px; margin-bottom: 20px; font-family: inherit; text-align: center; outline: none; }
        
        #admin-panel { position: fixed; top: 0; right: -100%; width: 450px; height: 100%; background: #fff; color: #000; z-index: 10002; padding: 60px; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        #admin-panel.active { right: 0; }
        #admin-panel input { border-bottom-color: #ccc; color: #000; font-size: 1.2rem; margin-bottom: 40px; }
        .btn-black { background: #000; color: #fff; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }

        .delete-btn { display: none; color: #ff4444; font-size: 10px; cursor: pointer; margin-top: 15px; letter-spacing: 2px; }
        body.is-admin .delete-btn { display: block; }

        @media (max-width: 768px) {
            .product.left, .product.right { grid-column: span 12; margin-top: 50px; }
            #admin-panel { width: 100%; }
        }
    </style>
</head>
<body id="main">

    <nav>
        <div class="logo">INERCIA.</div>
        <div>ARCHIVE / ISSUE 01</div>
    </nav>

    <section class="hero">
        <h1>Motion.</h1>
        <div class="hero-sub">MODA EN MOVIMIENTO<br>EST. 2024</div>
    </section>

    <main class="magazine" id="content-grid">
        <!-- Products load here -->
    </main>

    <!-- Hidden Admin UI -->
    <button class="admin-trigger" onclick="openLogin()">ADMIN</button>

    <div id="login-modal">
        <div class="login-box">
            <p style="font-size: 10px; letter-spacing: 5px; margin-bottom: 30px;">AUTH REQUIRED</p>
            <input type="password" id="pass-field" placeholder="CODE">
            <button class="btn-black" style="background:white; color:black;" onclick="validate()">ENTER</button>
        </div>
    </div>

    <div id="admin-panel">
        <h2 style="font-family: var(--font-editorial); font-style: italic; font-size: 3rem; margin-bottom: 40px;">Editor.</h2>
        <input type="text" id="p-title" placeholder="PRODUCT NAME">
        <input type="text" id="p-price" placeholder="PRICE (USD)">
        <input type="text" id="p-img" placeholder="IMAGE URL (VERTICAL)">
        <button class="btn-black" onclick="publish()">ADD TO MAGAZINE</button>
        <p onclick="closeAdmin()" style="margin-top: 40px; font-size: 10px; cursor: pointer; opacity: 0.5;">[ CLOSE PANEL ]</p>
    </div>

    <script>
        // Database simulation with LocalStorage
        let store = JSON.parse(localStorage.getItem('inercia_mag')) || [
            { id: 1, title: "Abstract Coat", price: "1.200", img: "https://unsplash.com", pos: 'left' },
            { id: 2, title: "Kinetic Pant", price: "650", img: "https://unsplash.com", pos: 'right' }
        ];

        function render() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = store.map((item, i) => `
                <div class="product ${item.pos}">
                    <div class="image-container"><img src="${item.img}"></div>
                    <div class="info">
                        <p>$${item.price} USD</p>
                        <h3>${item.title}</h3>
                        <span class="delete-btn" onclick="remove(${item.id})">[ REMOVE FROM ISSUE ]</span>
                    </div>
                </div>
            `).join('');
        }

        // Admin Auth
        function openLogin() { document.getElementById('login-modal').style.display = 'flex'; }
        
        function validate() {
            if(document.getElementById('pass-field').value === "0110") {
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('admin-panel').classList.add('active');
                document.body.classList.add('is-admin');
            } else {
                alert("Denied");
                document.getElementById('login-modal').style.display = 'none';
            }
        }

        function publish() {
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            
            if(title && price && img) {
                const pos = store.length % 2 === 0 ? 'left' : 'right';
                store.unshift({ id: Date.now(), title, price, img, pos });
                localStorage.setItem('inercia_mag', JSON.stringify(store));
                render();
                closeAdmin();
            }
        }

        function remove(id) {
            if(confirm("Delete this piece?")) {
                store = store.filter(i => i.id !== id);
                localStorage.setItem('inercia_mag', JSON.stringify(store));
                render();
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.remove('active');
            document.getElementById('pass-field').value = "";
        }

        render();
    </script>
</body>
</html>
