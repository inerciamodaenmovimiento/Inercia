<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #f4f3f0; --text: #1a1a1a; --line: rgba(0,0,0,0.08); --accent: #8b7355; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- NAVEGACIÓN EDITORIAL --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 8%; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 32px; letter-spacing: 8px; font-weight: 700; cursor: pointer; }
        .nav-link { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; }

        /* --- GRID DE PRODUCTOS (BEHANCE STYLE) --- */
        .catalog-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 100px; padding: 120px 15%; }
        .product-card { cursor: pointer; text-align: center; position: relative; }
        .product-card img { width: 100%; height: 650px; object-fit: cover; filter: grayscale(1); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .product-card:hover img { filter: grayscale(0); transform: scale(1.02); }
        .p-name { font-family: 'Playfair Display', serif; font-size: 18px; text-transform: uppercase; margin-top: 30px; letter-spacing: 3px; }

        /* --- MODAL DE DETALLE (CON MULTI-FOTO) --- */
        #product-modal { display: none; position: fixed; inset: 0; background: rgba(244,243,240,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 40px; }
        .modal-content { display: grid; grid-template-columns: 1.2fr 1fr; max-width: 1200px; background: #fff; box-shadow: 0 50px 100px rgba(0,0,0,0.05); }
        .slider-container { width: 100%; height: 750px; overflow: hidden; position: relative; background: #eee; }
        .slider-wrapper { display: flex; transition: transform 0.5s ease; height: 100%; }
        .slider-wrapper img { min-width: 100%; object-fit: cover; }
        .m-details { padding: 80px; display: flex; flex-direction: column; justify-content: center; }
        .m-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; line-height: 1; }
        .btn-add { background: #000; color: #fff; border: none; padding: 20px; width: 100%; cursor: pointer; letter-spacing: 4px; font-size: 11px; text-transform: uppercase; margin-top: 40px; }

        /* --- CARRITO --- */
        #cart-panel { position: fixed; top: 0; right: -100%; width: 450px; height: 100vh; background: #fff; z-index: 3000; transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1); padding: 60px; overflow-y: auto; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; font-size: 12px; }
        .cart-item img { width: 70px; height: 90px; object-fit: cover; }

        /* --- ADMIN PRO (0110) --- */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 500px; height: 100vh; background: #fff; z-index: 4000; border-right: 1px solid #000; padding: 40px; overflow-y: auto; }
        .admin-nav { display: flex; gap: 20px; border-bottom: 1px solid #eee; margin-bottom: 30px; }
        .admin-nav span { cursor: pointer; font-size: 10px; padding-bottom: 10px; opacity: 0.5; text-transform: uppercase; }
        .admin-nav span.active { opacity: 1; border-bottom: 2px solid #000; }
        .admin-tab { display: none; }
        .admin-tab.active { display: block; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; font-family: 'Montserrat'; background: #fafafa; font-size: 12px; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; width: 100%; cursor: pointer; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
        
        #secret-door { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; opacity: 0; z-index: 5000; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-link" onclick="toggleCart(true)">Cart (<span id="cart-count">0</span>)</div>
        <div class="logo" onclick="window.scrollTo(0,0)">INERCIA</div>
        <div class="nav-link" onclick="location.href='#catalog'">Shop</div>
    </nav>

    <div class="catalog-container" id="catalog">
        <!-- Los productos aparecerán aquí -->
    </div>

    <!-- MODAL PRODUCTO -->
    <div id="product-modal">
        <div class="modal-content">
            <div class="slider-container">
                <div class="slider-wrapper" id="m-slider"></div>
                <div style="position:absolute; bottom:20px; right:20px; display:flex; gap:10px;">
                    <button onclick="moveSlider(-1)" style="background:white; border:none; padding:10px; cursor:pointer;">←</button>
                    <button onclick="moveSlider(1)" style="background:white; border:none; padding:10px; cursor:pointer;">→</button>
                </div>
            </div>
            <div class="m-details">
                <span onclick="closeModal()" style="align-self:flex-end; cursor:pointer; margin-bottom:40px;">&times; Close</span>
                <h2 id="m-title" class="m-title">Producto</h2>
                <div id="m-price" style="margin-top:20px; font-size:20px; color:#888;">$0</div>
                <label style="font-size:10px; margin-top:40px; display:block; letter-spacing:2px;">DESCRIPTION</label>
                <p id="m-desc" style="font-size:13px; line-height:2.2; color:#666; margin-top:20px;"></p>
                <button class="btn-add" onclick="addToCart()">Add to Bag</button>
            </div>
        </div>
    </div>

    <!-- CARRITO -->
    <div id="cart-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:60px;">
            <h2 style="font-family:'Playfair Display'; font-size:2.5rem; margin:0;">Shopping Bag</h2>
            <span onclick="toggleCart(false)" style="cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div id="cart-list">Your bag is empty.</div>
        <div style="margin-top:40px; border-top:2px solid #000; padding-top:30px;">
            <div style="display:flex; justify-content:space-between;"><span>Total</span> <span id="cart-total">$0</span></div>
            <button class="btn-black" style="margin-top:30px;" onclick="checkout()">Complete Order</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="secret-door" onclick="login()"></div>
    <div id="admin-panel">
        <h2 style="font-family:'Playfair Display'; font-size:2rem; margin-bottom:20px;">Admin</h2>
        <div class="admin-nav">
            <span class="active" onclick="switchTab(0)">Products</span>
            <span onclick="switchTab(1)">Orders</span>
        </div>

        <div class="admin-tab active">
            <label>Subir Varias Fotos (Selecciona varias):</label>
            <input type="file" id="p-files" accept="image/*" multiple>
            <label>Nombre:</label><input type="text" id="p-name">
            <label>Precio:</label><input type="number" id="p-price">
            <label>Descripción:</label><textarea id="p-desc" rows="4"></textarea>
            <button class="btn-black" onclick="publish()">Publicar Producto</button>
            <div id="admin-checklist" style="margin-top:40px;"></div>
        </div>

        <div class="admin-tab">
            <div id="admin-orders" style="background:#f9f9f9; padding:20px;">No hay pedidos registrados.</div>
        </div>
        
        <button class="btn-black" onclick="exportHTML()" style="background:#8b7355; margin-top:40px;">Exportar index.html</button>
    </div>

    <script>
        let cart = [];
        let curProd = null;
        let slideIndex = 0;

        function login() { if(prompt("Access:") === "0110") document.getElementById('admin-panel').style.display = 'block'; }
        function switchTab(n) {
            document.querySelectorAll('.admin-nav span').forEach((s, i) => s.className = i === n ? 'active' : '');
            document.querySelectorAll('.admin-tab').forEach((t, i) => t.className = i === n ? 'admin-tab active' : 'admin-tab');
        }

        async function toBase64(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });
        }

        async function publish() {
            const files = document.getElementById('p-files').files;
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const desc = document.getElementById('p-desc').value;

            if(files.length === 0 || !name) return alert("Faltan datos");

            const imgs = await Promise.all(Array.from(files).map(f => toBase64(f)));
            const id = "p" + Date.now();
            
            const html = `
                <div class="product-card" id="${id}" onclick='openModal("${name}", ${price}, ${JSON.stringify(imgs)}, "${desc}")'>
                    <img src="${imgs[0]}">
                    <div class="p-name">${name}</div>
                    <div style="font-size:12px; color:#888;">$${price}</div>
                </div>`;
            document.getElementById('catalog').insertAdjacentHTML('beforeend', html);
            
            const check = `<div id="c-${id}" style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${name}</span> <span onclick="baja('${id}')" style="color:red; cursor:pointer;">[BAJA]</span></div>`;
            document.getElementById('admin-checklist').insertAdjacentHTML('beforeend', check);
        }

        function baja(id) {
            document.getElementById(id).remove();
            document.getElementById('c-' + id).remove();
        }

        function openModal(n, p, imgs, d) {
            if(document.getElementById('admin-panel').style.display === 'block') return;
            curProd = { n, p, i: imgs[0], d };
            slideIndex = 0;
            document.getElementById('m-title').innerText = n;
            document.getElementById('m-price').innerText = "$" + p;
            document.getElementById('m-desc').innerText = d;
            
            const slider = document.getElementById('m-slider');
            slider.innerHTML = imgs.map(src => `<img src="${src}">`).join('');
            slider.style.transform = `translateX(0)`;
            document.getElementById('product-modal').style.display = 'flex';
        }

        function moveSlider(n) {
            const wrapper = document.getElementById('m-slider');
            const total = wrapper.children.length;
            slideIndex = (slideIndex + n + total) % total;
            wrapper.style.transform = `translateX(${-slideIndex * 100}%)`;
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
        function toggleCart(s) { document.getElementById('cart-panel').style.right = s ? '0' : '-100%'; }

        function addToCart() {
            cart.push(curProd);
            updateCart();
            closeModal();
            toggleCart(true);
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            let t = 0;
            cart.forEach((x, i) => {
                t += parseInt(x.p);
                list.innerHTML += `<div class="cart-item"><img src="${x.i}"><div><b>${x.n}</b><br>$${x.p}<br><span onclick="removeCart(${i})" style="color:red; cursor:pointer;">Remove</span></div></div>`;
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = "$" + t;
            if(cart.length === 0) list.innerHTML = "Your bag is empty.";
        }

        function removeCart(i) { cart.splice(i, 1); updateCart(); }

        function checkout() {
            if(cart.length === 0) return;
            const orders = document.getElementById('admin-orders');
            if(orders.innerText === "No hay pedidos registrados.") orders.innerHTML = "";
            orders.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px; margin-bottom:10px;"><b>Pedido #${Date.now()}</b><br>${cart.map(x => x.n).join(', ')}<br>Total: $${document.getElementById('cart-total').innerText}</div>`;
            alert("Order completed.");
            cart = []; updateCart(); toggleCart(false);
        }

        function exportHTML() {
            const html = document.documentElement.outerHTML;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([html], {type: 'text/html'}));
            a.download = 'index.html';
            a.click();
        }
    </script>
</body>
</html>
