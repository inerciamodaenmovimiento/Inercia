<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Tailwind CSS (Carga corregida para GitHub) -->
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; margin: 0; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-hidden { display: none; }
        
        /* Estilos de respaldo en caso de que Tailwind falle */
        .header-main { position: fixed; width: 100%; top: 0; background: white; border-bottom: 1px solid #f0f0f0; z-index: 50; padding: 20px; }
        .banner-hero { height: 80vh; background: #f5f5f5; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-top: 60px; }
        .grid-custom { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; padding: 50px; }
        .btn-black { background: black; color: white; padding: 15px 30px; text-transform: uppercase; font-size: 10px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <header class="header-main flex justify-between items-center px-10">
        <div class="serif text-2xl tracking-[0.4em] uppercase cursor-pointer" onclick="navigate('home')">INERCIA</div>
        <div class="flex items-center gap-6">
            <!-- BOTÓN OCULTO PARA ADMIN (Haz clic aquí para poner el código 0110) -->
            <button onclick="promptAdmin()" style="opacity: 0.1; font-size: 10px;">Admin</button>
            <button onclick="toggleCart()" class="text-xl">🛒 <span id="cart-count" class="text-xs bg-black text-white px-2 rounded-full">0</span></button>
        </div>
    </header>

    <!-- VISTA CLIENTE -->
    <main id="view-home">
        <section class="banner-hero">
            <img id="display-banner" src="https://unsplash.com" style="position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
            <div style="position: relative; z-index: 10; text-align: center; color: white;">
                <h1 class="serif text-7xl italic drop-shadow-2xl">Inercia</h1>
                <p style="letter-spacing: 8px; text-transform: uppercase; font-size: 12px; margin-top: 10px;">Moda en Movimiento</p>
            </div>
        </section>

        <section class="container mx-auto mt-10">
            <h2 class="serif text-4xl text-center italic mb-10">New Arrivals</h2>
            <div id="grid-productos" class="grid-custom">
                <!-- Se cargan por JavaScript -->
            </div>
        </section>
    </main>

    <!-- PANEL ADMINISTRADOR (PROTEGIDO CÓDIGO 0110) -->
    <main id="view-admin" class="admin-hidden" style="padding: 120px 50px;">
        <div style="max-width: 800px; margin: 0 auto; background: #fafafa; padding: 40px; border: 1px solid #eee;">
            <h2 class="serif text-3xl mb-8 italic border-b pb-4">Panel de Gestión</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <input id="adm-nombre" type="text" placeholder="Nombre de Prenda" style="padding: 10px; border: 1px solid #ddd;">
                <input id="adm-precio" type="number" placeholder="Precio ($)" style="padding: 10px; border: 1px solid #ddd;">
                <input id="adm-stock" type="number" placeholder="Stock" style="padding: 10px; border: 1px solid #ddd;">
                <input id="adm-cat" type="text" placeholder="Categoría" style="padding: 10px; border: 1px solid #ddd;">
            </div>
            <div style="border: 2px dashed #ddd; padding: 20px; text-align: center; margin-bottom: 20px; background: white;">
                <p style="font-size: 11px; font-weight: bold; color: #999; margin-bottom: 10px;">FOTO DESDE TU PC</p>
                <input id="adm-file" type="file" style="font-size: 12px;">
            </div>
            <button onclick="saveProduct()" class="btn-black" style="width: 100%;">Publicar Producto</button>
            <hr style="margin: 30px 0;">
            <h3 style="font-size: 12px; font-weight: bold; margin-bottom: 10px;">HISTORIAL DE VENTAS / STOCK</h3>
            <div id="adm-ventas" style="font-size: 11px; background: #fff; padding: 15px; height: 150px; overflow-y: auto; border: 1px solid #eee;"></div>
            <button onclick="navigate('home')" style="margin-top: 20px; font-size: 10px; text-decoration: underline; background: none; border: none; cursor: pointer;">Volver a la Tienda</button>
        </div>
    </main>

    <!-- CARRITO SIDEBAR -->
    <div id="cart-sidebar" style="position: fixed; top: 0; right: 0; height: 100%; width: 350px; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transform: translateX(100%); transition: 0.4s; z-index: 100; padding: 40px; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px;">
            <span class="serif text-2xl">Bolsa</span>
            <button onclick="toggleCart()" style="font-size: 30px; border: none; background: none; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-items" style="flex-grow: 1; overflow-y: auto;"></div>
        <div style="border-top: 1px solid #eee; padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; margin-bottom: 20px;">
                <span>Total</span><span id="cart-total">$0</span>
            </div>
            <button onclick="checkout()" class="btn-black" style="width: 100%;">Finalizar por WhatsApp</button>
            <button onclick="alert('Arrepentimiento registrado')" style="width: 100%; margin-top: 15px; font-size: 9px; text-transform: uppercase; text-decoration: underline; background: none; border: none; color: #999;">Botón de Arrepentimiento</button>
        </div>
    </div>

    <script>
        // BASE DE DATOS LOCAL
        let prods = JSON.parse(localStorage.getItem('in_db')) || [
            { id: 1, nombre: 'Blusa Brown Ultra', precio: 12500, stock: 5, cat: 'Summer', img: 'https://unsplash.com' }
        ];
        let ventas = JSON.parse(localStorage.getItem('in_sales')) || [];
        let carrito = [];

        // SEGURIDAD
        function promptAdmin() {
            let pass = prompt("Ingrese código de acceso:");
            if (pass === "0110") navigate('admin');
            else alert("Código incorrecto");
        }

        function navigate(view) {
            document.getElementById('view-home').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').className = view === 'admin' ? '' : 'admin-hidden';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleCart() {
            const cart = document.getElementById('cart-sidebar');
            cart.style.transform = cart.style.transform === 'translateX(0%)' ? 'translateX(100%)' : 'translateX(0%)';
        }

        // ADMIN: GUARDAR
        function saveProduct() {
            const n = document.getElementById('adm-nombre').value;
            const p = document.getElementById('adm-precio').value;
            const s = document.getElementById('adm-stock').value;
            const c = document.getElementById('adm-cat').value;
            const file = document.getElementById('adm-file').files;

            if (file && file[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    prods.push({ id: Date.now(), nombre: n, precio: parseInt(p), stock: parseInt(s), cat: c, img: e.target.result });
                    localStorage.setItem('in_db', JSON.stringify(prods));
                    renderAll();
                    navigate('home');
                };
                r.readAsDataURL(file[0]);
            } else {
                alert("Selecciona una foto");
            }
        }

        function deleteProd(id) {
            prods = prods.filter(x => x.id !== id);
            localStorage.setItem('in_db', JSON.stringify(prods));
            renderAll();
        }

        // RENDER TIENDA
        function renderAll() {
            const grid = document.getElementById('grid-productos');
            const hVentas = document.getElementById('adm-ventas');

            grid.innerHTML = prods.map(p => `
                <div style="text-align: center; border: 1px solid #f9f9f9; padding: 20px;">
                    <div style="aspect-ratio: 2/3; background: #eee; margin-bottom: 20px; overflow: hidden;">
                        <img src="${p.img}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <p style="font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 2px;">${p.cat}</p>
                    <h3 class="serif" style="font-size: 18px; margin: 10px 0;">${p.nombre}</h3>
                    <p style="font-weight: bold;">$${p.precio.toLocaleString()}</p>
                    <p style="font-size: 9px; color: #ccc; margin-bottom: 15px;">Stock: ${p.stock}</p>
                    <button onclick="addToCart(${p.id})" class="btn-black" style="padding: 10px 20px; font-size: 9px;">Añadir a la bolsa</button>
                    <button onclick="deleteProd(${p.id})" style="display:block; width:100%; margin-top:10px; color:red; font-size:9px; border:none; background:none; cursor:pointer;">Eliminar</button>
                </div>
            `).join('');

            hVentas.innerHTML = ventas.map(v => `<div style="border-bottom: 1px solid #eee; padding: 5px 0;">${v.fecha} - ${v.resumen} - $${v.total}</div>`).reverse().join('');
        }

        function addToCart(id) {
            const p = prods.find(x => x.id === id);
            if(p.stock > 0) {
                carrito.push(p);
                updateCartUI();
                toggleCart();
            } else alert("Sin stock");
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = carrito.map((item, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <span style="font-size:12px;">${item.nombre}</span>
                    <span style="font-size:12px; font-weight:bold;">$${item.precio}</span>
                    <button onclick="carrito.splice(${i},1); updateCartUI();" style="border:none; background:none; cursor:pointer; color:#ccc;">&times;</button>
                </div>
            `).join('');
            const total = carrito.reduce((acc, p) => acc + p.precio, 0);
            document.getElementById('cart-total').innerText = '$' + total.toLocaleString();
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function checkout() {
            if(carrito.length === 0) return;
            const t = carrito.reduce((acc, p) => acc + p.precio, 0);
            const msg = `Hola Inercia! Quiero comprar: ${carrito.map(p => p.nombre).join(', ')}. Total: $${t}`;
            
            // Bajar stock y registrar
            ventas.push({ fecha: new Date().toLocaleString(), resumen: carrito.length + " prendas", total: t });
            localStorage.setItem('in_sales', JSON.stringify(ventas));
            
            carrito.forEach(item => {
                const prod = prods.find(x => x.id === item.id);
                if(prod) prod.stock--;
            });
            localStorage.setItem('in_db', JSON.stringify(prods));

            window.open(`https://wa.me{encodeURIComponent(msg)}`);
            carrito = []; updateCartUI(); renderAll(); toggleCart();
        }

        renderAll();
    </script>
</body>
</html>
