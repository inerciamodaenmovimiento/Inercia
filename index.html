<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Edición Editorial</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* --- ESTÉTICA ZAAN MINIMALISTA --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* HEADER TIPO REVISTA */
        header { padding: 60px 40px; text-align: center; border-bottom: 1px solid #eee; }
        .mag-title { font-size: 80px; font-weight: 900; letter-spacing: -3px; text-transform: uppercase; line-height: 0.8; }
        .mag-sub { font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-top: 15px; opacity: 0.5; }

        /* NAVEGACIÓN LIMPIA */
        nav { display: flex; justify-content: center; gap: 40px; padding: 25px; border-bottom: 1px solid #eee; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .nav-item { cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: #000; }

        /* GRILLA EDITORIAL (TIENDA) */
        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 80px; padding: 80px 40px; max-width: 1400px; margin: 0 auto; }
        .product-card { position: relative; margin-bottom: 40px; }
        .img-container { width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #f9f9f9; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 1s ease; }
        .product-card:hover img { filter: grayscale(0%); transform: scale(1.03); }

        /* DETALLES ZAAN */
        .p-cat { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #888; margin-top: 25px; display: block; }
        .p-title { font-size: 32px; font-weight: 900; text-transform: uppercase; margin: 10px 0; line-height: 1; }
        .p-desc { font-size: 14px; line-height: 1.6; opacity: 0.6; margin-bottom: 25px; }
        .p-footer { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid #eee; padding-top: 20px; }
        .p-price { font-size: 20px; font-weight: 400; }
        
        .buy-btn { background: #000; color: #fff; padding: 15px 30px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; letter-spacing: 2px; }
        .buy-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        /* PANEL ADMIN PROFESIONAL (myGESTIÓN) */
        #myGestion { position: fixed; top: 0; left: -100%; width: 100%; height: 100vh; background: #fff; z-index: 10000; transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; padding: 60px; }
        .admin-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px; }
        .admin-tabs { display: flex; gap: 30px; margin-bottom: 40px; border-bottom: 1px solid #eee; }
        .tab { padding: 15px 0; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; opacity: 0.3; }
        .tab.active { opacity: 1; border-bottom: 2px solid #000; }
        
        .admin-grid { display: grid; grid-template-columns: 400px 1fr; gap: 60px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; border: 1px solid #eee; padding: 12px; font-size: 14px; outline: none; }
        
        /* PEDIDOS LOGÍSTICA */
        .order-card { padding: 20px; border: 1px solid #eee; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .status-tag { padding: 5px 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; border-radius: 2px; }

        /* BOTÓN SECRETO */
        #access-trigger { position: fixed; bottom: 0; right: 0; width: 50px; height: 50px; background: transparent; z-index: 99999; cursor: pointer; }

        @media (max-width: 768px) { .mag-title { font-size: 40px; } .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1 class="mag-title serif">INERCIA.</h1>
        <p class="mag-sub">Moda en Movimiento — Edición 2026</p>
    </header>

    <nav>
        <span class="nav-item active" onclick="filtrar('Todas')">Ver Todo</span>
        <span class="nav-item" onclick="filtrar('Tops')">Tops</span>
        <span class="nav-item" onclick="filtrar('Pantalones')">Pantalones</span>
        <span class="nav-item" onclick="filtrar('Vestidos')">Vestidos</span>
        <div style="margin-left: auto; opacity: 0.3;">CARRITO (0)</div>
    </nav>

    <div id="shop-grid"></div>

    <!-- BOTÓN INVISIBLE ESQUINA INFERIOR DERECHA -->
    <div id="access-trigger" onclick="adminAuth()"></div>

    <!-- PANEL myGESTIÓN -->
    <div id="myGestion">
        <div class="admin-header">
            <h2 class="serif" style="font-size: 28px;">myGESTIÓN.</h2>
            <button onclick="document.getElementById('myGestion').style.left='-100%'" style="background:none; border:none; font-weight:900; color:red; cursor:pointer;">CERRAR</button>
        </div>

        <div class="admin-tabs">
            <span class="tab active" id="tab-inv" onclick="showTab('inventario')">Inventario</span>
            <span class="tab" id="tab-ord" onclick="showTab('pedidos')">Pedidos y Logística</span>
        </div>

        <!-- SECCIÓN INVENTARIO -->
        <div id="sec-inventario" class="admin-grid">
            <div style="background:#fafafa; padding:30px;">
                <div class="input-group"><label>Categoría</label><select id="p-cat"><option value="Tops">Tops</option><option value="Pantalones">Pantalones</option><option value="Vestidos">Vestidos</option></select></div>
                <div class="input-group"><label>Nombre</label><input type="text" id="p-name"></div>
                <div class="input-group"><label>Precio</label><input type="number" id="p-price"></div>
                <div class="input-group"><label>Descripción</label><textarea id="p-desc" rows="3"></textarea></div>
                <div class="input-group"><label>Foto</label><input type="file" id="p-file" accept="image/*" style="border:none;"></div>
                <button id="btn-pub" style="width:100%; background:#000; color:#fff; padding:15px; font-weight:900; cursor:pointer; border:none; letter-spacing:1px;">PUBLICAR</button>
            </div>
            <div id="admin-inv-list"></div>
        </div>

        <!-- SECCIÓN PEDIDOS -->
        <div id="sec-pedidos" style="display:none;">
            <div id="admin-orders-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue, update, remove } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504",
            databaseURL: "https://firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let tempImg = "";
        let currentFilter = "Todas";

        // ACCESO
        window.adminAuth = () => { if(prompt("Código:") === "0110") document.getElementById('myGestion').style.left = '0'; };

        // TABS
        window.showTab = (name) => {
            document.getElementById('sec-inventario').style.display = name === 'inventario' ? 'grid' : 'none';
            document.getElementById('sec-pedidos').style.display = name === 'pedidos' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + (name === 'inventario' ? 'inv' : 'ord')).classList.add('active');
        };

        // CARGA IMAGEN
        document.getElementById('p-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { tempImg = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        // PUBLICAR
        document.getElementById('btn-pub').onclick = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const id = Date.now();
            if(!name || !tempImg) return alert("Faltan datos");

            set(ref(db, 'productos/' + id), {
                id, name, price, cat: document.getElementById('p-cat').value,
                desc: document.getElementById('p-desc').value, img: tempImg, stock: 10
            }).then(() => alert("Sincronizado"));
        };

        // LOGÍSTICA: CREAR PEDIDO AL COMPRAR
        window.comprar = (id, name, price, stock) => {
            if(stock <= 0) return;
            const orderId = "ORD-" + Math.floor(Math.random()*10000);
            update(ref(db, 'productos/' + id), { stock: stock - 1 });
            set(ref(db, 'pedidos/' + orderId), {
                id: orderId, prod: name, price, status: "Pendiente", date: new Date().toLocaleDateString()
            }).then(() => alert("Pedido generado. Gracias."));
        };

        window.updateOrderStatus = (id, newStatus) => { update(ref(db, 'pedidos/' + id), { status: newStatus }); };
        window.filtrar = (cat) => {
            currentFilter = cat;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            render();
        };

        // RENDERIZADO TOTAL
        let fullData = { prods: {}, orders: {} };
        onValue(ref(db, 'productos/'), (snap) => { fullData.prods = snap.val() || {}; render(); });
        onValue(ref(db, 'pedidos/'), (snap) => { fullData.orders = snap.val() || {}; render(); });

        function render() {
            const grid = document.getElementById('shop-grid');
            const invList = document.getElementById('admin-inv-list');
            const ordList = document.getElementById('admin-orders-list');
            grid.innerHTML = ""; invList.innerHTML = ""; ordList.innerHTML = "";

            // Tienda y Inventario
            Object.keys(fullData.prods).forEach(key => {
                const p = fullData.prods[key];
                if(currentFilter !== "Todas" && p.cat !== currentFilter) return;
                
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="img-container"><img src="${p.img}"></div>
                        <span class="p-cat">${p.cat}</span>
                        <h3 class="p-title serif">${p.name}</h3>
                        <p class="p-desc">${p.desc}</p>
                        <div class="p-footer">
                            <span class="p-price">$${p.price}</span>
                            <button class="buy-btn" onclick="comprar('${key}', '${p.name}', ${p.price}, ${p.stock})" ${p.stock <= 0 ? 'disabled' : ''}>
                                ${p.stock <= 0 ? 'AGOTADO' : 'AÑADIR'}
                            </button>
                        </div>
                    </div>`;

                invList.innerHTML += `<div class="order-card"><span>${p.name} (Stock: ${p.stock})</span><button onclick="remove(ref(db, 'productos/${key}'))" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>`;
            });

            // Pedidos
            Object.keys(fullData.orders).forEach(key => {
                const o = fullData.orders[key];
                ordList.innerHTML += `
                    <div class="order-card">
                        <div><strong>${o.id}</strong> - ${o.prod} ($${o.price})</div>
                        <div style="display:flex; gap:15px; align-items:center;">
                            <span class="status-tag" style="background:${o.status==='Enviado'?'#e1f5fe':'#fff3e0'}">${o.status}</span>
                            <select onchange="updateOrderStatus('${o.id}', this.value)" style="font-size:10px;"><option value="">Cambiar...</option><option value="Pagado">Pagado</option><option value="Enviado">Enviado</option><option value="Devuelto">Devuelto</option></select>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
