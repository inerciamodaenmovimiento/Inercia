<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); overflow-x: hidden; }

        /* NAVEGACIÓN */
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; }
        .logo { font-weight: bold; letter-spacing: 5px; font-size: 1.1rem; }
        
        /* BANNERS */
        #banner-container { width: 100%; height: 45vh; overflow: hidden; position: relative; margin-top: 60px; }
        #banner-slider { display: flex; transition: 1s ease; height: 100%; }
        #banner-slider img { width: 100%; flex-shrink: 0; object-fit: cover; }

        /* PRODUCTOS CHICOS */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { text-align: center; cursor: pointer; }
        .card img { width: 100%; height: 240px; object-fit: cover; margin-bottom: 10px; }
        .card-cat { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-weight: bold; }
        .card-name { font-size: 0.85rem; margin: 5px 0; }
        
        /* MODAL DETALLE */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 5000; overflow-y: auto; padding: 50px 5%; }
        .modal-content { display: flex; flex-wrap: wrap; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .modal-imgs { flex: 1; min-width: 300px; }
        .modal-info { flex: 1; min-width: 300px; }

        /* CARRITO */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 350px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 30px; box-shadow: -10px 0 50px rgba(0,0,0,0.1); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #eee; font-size: 0.8rem; }
        .bank-data-box { background: #fffbe6; padding: 15px; font-size: 0.75rem; border: 1px dashed #d4c18d; margin: 10px 0; display: none; }

        /* ADMIN */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 3000; padding: 50px 10%; overflow-y: auto; }
        .btn-add { background: var(--azul); color: white; border: none; padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; width: 100%; }
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

<nav>
    <div class="logo">INERCIA</div>
    <div onclick="toggleCart()" style="cursor:pointer; font-weight:bold; font-size:0.7rem">BOLSA (<span id="cart-count">0</span>)</div>
</nav>

<div id="banner-container"><div id="banner-slider"></div></div>

<section class="productos-container" id="shop-grid"></section>

<!-- MODAL DETALLE PRODUCTO -->
<div id="modal-detalle">
    <button onclick="closeModal()" style="position:fixed; top:20px; right:20px; background:none; border:none; font-size:2rem; cursor:pointer">×</button>
    <div class="modal-content" id="modal-body"></div>
</div>

<!-- CARRITO -->
<div id="cart-panel">
    <h3 style="margin-bottom:20px">TU BOLSA</h3>
    <div id="cart-items"></div>
    <div id="cart-total" style="font-weight:bold; margin: 20px 0; border-top: 1px solid #eee; padding-top: 10px;">TOTAL: $0</div>
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <select id="c-ship" class="input-cart" onchange="toggleShip()"></select>
    <div id="ship-fields" style="display:none"><input type="text" id="c-address" class="input-cart" placeholder="DIRECCIÓN"></div>
    <select id="c-pay" class="input-cart" onchange="showBankData()">
        <option value="Efectivo">EFECTIVO / ACORDAR</option>
        <option value="Transferencia">TRANSFERENCIA BANCARIA</option>
    </select>
    <div id="bank-data-cart" class="bank-data-box"></div>
    <button class="btn-add" onclick="confirmOrder()">FINALIZAR COMPRA</button>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<div id="admin-panel">
    <button onclick="closeAdmin()">CERRAR</button>
    <div style="background:white; padding:20px; margin-top:20px">
        <h3>NUEVO PRODUCTO</h3>
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción detallada" class="input-cart"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat" class="input-cart"></select>
        <input type="file" id="p-img" multiple class="input-cart">
        <button class="btn-add" onclick="uploadProduct()">PUBLICAR</button>
    </div>
    <div style="background:white; padding:20px; margin-top:20px">
        <h3>CONFIGURACIÓN</h3>
        <input type="text" id="conf-wa" placeholder="WhatsApp (549...)" class="input-cart">
        <textarea id="conf-bank" placeholder="Datos de transferencia" class="input-cart"></textarea>
        <input type="text" id="conf-cats" placeholder="Categorías (comas)" class="input-cart">
        <input type="text" id="conf-ships" placeholder="Envíos (comas)" class="input-cart">
        <button class="btn-add" onclick="saveConfig()">GUARDAR</button>
    </div>
    <div id="admin-orders" style="margin-top:20px"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('inercia_vfinal')) || { products: [], orders: [], cats: ["Nuevo"], ships: ["Retiro"], banners: [], bank: "", wa: "" };
    let cart = [];

    window.onload = () => { renderShop(); renderBanners(); updateUI(); };
    function save() { localStorage.setItem('inercia_vfinal', JSON.stringify(db)); }
    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    function toggleShip() { document.getElementById('ship-fields').style.display = document.getElementById('c-ship').value.toLowerCase().includes('envio') ? 'block' : 'none'; }
    function showBankData() { 
        const box = document.getElementById('bank-data-cart');
        box.style.display = document.getElementById('c-pay').value === 'Transferencia' ? 'block' : 'none';
        box.innerText = db.bank;
    }

    function updateUI() {
        document.getElementById('p-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('c-ship').innerHTML = db.ships.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa;
        document.getElementById('conf-bank').value = db.bank;
        document.getElementById('conf-cats').value = db.cats.join(', ');
        document.getElementById('conf-ships').value = db.ships.join(', ');
    }

    function saveConfig() {
        db.wa = document.getElementById('conf-wa').value;
        db.bank = document.getElementById('conf-bank').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim());
        db.ships = document.getElementById('conf-ships').value.split(',').map(s => s.trim());
        save(); updateUI(); alert("Guardado");
    }

    async function uploadProduct() {
        const files = document.getElementById('p-img').files;
        const imgs = [];
        for(let f of files) { imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); })); }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, imgs: imgs });
        save(); renderShop(); alert("Subido");
    }

    function renderShop() {
        document.getElementById('shop-grid').innerHTML = db.products.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <img src="${p.imgs[0]}">
                <span class="card-cat">${p.cat}</span>
                <h3 class="card-name">${p.name}</h3>
                <p><strong>$${p.price}</strong></p>
            </div>`).join('');
    }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-body').innerHTML = `
            <div class="modal-imgs">${p.imgs.map(i => `<img src="${i}" style="width:100%; margin-bottom:10px">`).join('')}</div>
            <div class="modal-info">
                <span class="card-cat">${p.cat}</span>
                <h1 style="margin:10px 0">${p.name}</h1>
                <p style="margin-bottom:20px; line-height:1.6">${p.desc}</p>
                <p style="font-size:1.5rem; margin-bottom:20px"><strong>$${p.price}</strong></p>
                <button class="btn-add" onclick="addToCart(${p.id}); closeModal()">AÑADIR A LA BOLSA</button>
            </div>`;
        document.getElementById('modal-detalle').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }

    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        cart.push(p); updateCart(); toggleCart();
    }
    function updateCart() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="font-size:0.8rem; margin-bottom:5px">${i.name} - $${i.price}</div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        const n = document.getElementById('c-name').value;
        if(!n || !cart.length) return alert("Faltan datos");
        const msg = `PEDIDO INERCIA%0ACliente: ${n}%0AItems: ${cart.map(i=>i.name).join(', ')}%0AEnvío: ${document.getElementById('c-ship').value}%0APago: ${document.getElementById('c-pay').value}%0A${document.getElementById('cart-total').innerText}`;
        window.open(`https://wa.me{db.wa}?text=${msg}`);
        db.orders.push({ cliente: n, items: cart.map(i=>i.name), total: document.getElementById('cart-total').innerText });
        save(); cart = []; updateCart(); toggleCart();
    }

    function renderBanners() { /* Lógica de banners similar a previa */ }
</script>
</body>
</html>
