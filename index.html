<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); overflow-x: hidden; }

        /* NAVEGACIÓN */
        nav { padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; }
        .logo { font-weight: bold; letter-spacing: 5px; font-size: 1.2rem; }
        .cart-trigger { cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; font-weight: bold; }

        /* BANNER */
        #banner-container { width: 100%; height: 60vh; overflow: hidden; position: relative; margin-top: 70px; background: #f0f0f0; }
        #banner-slider { display: flex; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        #banner-slider img { width: 100%; flex-shrink: 0; object-fit: cover; }

        .hero-text { padding: 60px 20px; text-align: center; }
        .hero-text h1 { font-size: 4.5rem; letter-spacing: -2px; }
        .hero-text p { font-style: italic; opacity: 0.5; letter-spacing: 6px; text-transform: uppercase; font-size: 0.7rem; }

        /* PRODUCTOS CHICOS */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; padding: 0 5% 80px; }
        .card { cursor: pointer; text-align: center; }
        .card img { width: 100%; height: 320px; object-fit: cover; margin-bottom: 15px; }
        .card-cat { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; }
        .card-name { font-size: 1rem; margin: 5px 0; }

        /* MODAL DE DETALLE */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; padding: 80px 5%; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; max-width: 1100px; margin: 0 auto; }
        .modal-imgs img { width: 100%; margin-bottom: 20px; }
        .btn-close-modal { position: fixed; top: 30px; right: 30px; font-size: 2rem; cursor: pointer; background: none; border: none; }

        /* CARRITO */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 400px; height: 100%; background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); padding: 40px; box-shadow: -10px 0 50px rgba(0,0,0,0.15); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; background: var(--gris); font-size: 0.8rem; }
        .bank-info-box { background: #fffbe6; padding: 15px; font-size: 0.8rem; border: 1px dashed #d4c18d; margin: 10px 0; display: none; }
        
        .btn-buy { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

        /* ADMIN */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 3000; padding: 50px 10%; overflow-y: auto; }
        .admin-box { background: white; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; z-index: 4000; }

        footer { padding: 60px; text-align: center; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<nav>
    <div class="logo">INERCIA</div>
    <div class="cart-trigger" onclick="toggleCart()">BOLSA (<span id="cart-count">0</span>)</div>
</nav>

<div id="banner-container"><div id="banner-slider"></div></div>
<header class="hero-text"><h1>Inercia</h1><p>Moda en movimiento</p></header>
<section class="productos-container" id="shop-grid"></section>

<!-- MODAL DE DETALLE -->
<div id="modal-detalle">
    <button class="btn-close-modal" onclick="closeModal()">×</button>
    <div id="modal-content" class="modal-grid"></div>
</div>

<!-- CARRITO -->
<div id="cart-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px">
        <h3>TU BOLSA</h3>
        <span onclick="toggleCart()" style="cursor:pointer">CERRAR ×</span>
    </div>
    <div id="cart-items"></div>
    <div id="cart-total" style="font-weight:bold; border-top:1px solid #eee; padding-top:20px; margin-top:20px">TOTAL: $0</div>
    
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <select id="c-ship" class="input-cart" onchange="toggleShipDetails()"></select>
    <div id="ship-fields" style="display:none"><input type="text" id="c-address" class="input-cart" placeholder="DIRECCIÓN Y CIUDAD"></div>
    
    <select id="c-pay" class="input-cart" onchange="updatePayDisplay()">
        <option value="Efectivo">EFECTIVO / ACORDAR</option>
        <option value="Transferencia">TRANSFERENCIA BANCARIA</option>
    </select>
    <div id="bank-info-cart" class="bank-info-box"></div>
    <button class="btn-buy" onclick="confirmOrder()">FINALIZAR COMPRA</button>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<div id="admin-panel">
    <button onclick="closeAdmin()">CERRAR PANEL</button>
    <div class="admin-box">
        <h3>AÑADIR PRODUCTO</h3>
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción de la prenda" class="input-cart" style="height:100px"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat" class="input-cart"></select>
        <input type="file" id="p-img" multiple class="input-cart">
        <button class="btn-buy" onclick="uploadProduct()">PUBLICAR PRODUCTO</button>
    </div>
    <div class="admin-box">
        <h3>CONFIGURACIÓN</h3>
        <input type="text" id="conf-wa" placeholder="WhatsApp (Ej: 54911...)" class="input-cart">
        <textarea id="conf-bank" placeholder="Datos de cuenta bancaria" class="input-cart"></textarea>
        <input type="text" id="conf-cats" placeholder="Categorías (Separar por comas)" class="input-cart">
        <input type="text" id="conf-ships" placeholder="Envíos (Separar por comas)" class="input-cart">
        <button class="btn-buy" onclick="saveConfig()" style="background:#2e7d32">GUARDAR CAMBIOS</button>
    </div>
    <div class="admin-box"><h3>BANNERS</h3><input type="file" id="b-img" onchange="uploadBanner()"></div>
    <div class="admin-box"><h3>PEDIDOS</h3><div id="admin-orders"></div></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('inercia_final_db')) || { 
        products: [], orders: [], cats: ["Nuevo"], ships: ["Retiro"], banners: [], bank: "", wa: "" 
    };
    let cart = [];

    window.onload = () => { renderShop(); renderBanners(); updateUI(); };
    function save() { localStorage.setItem('inercia_final_db', JSON.stringify(db)); }
    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    
    function toggleShipDetails() {
        const val = document.getElementById('c-ship').value.toLowerCase();
        document.getElementById('ship-fields').style.display = (val.includes('envio') || val.includes('correo')) ? 'block' : 'none';
    }

    function updatePayDisplay() {
        const box = document.getElementById('bank-info-cart');
        if(document.getElementById('c-pay').value === 'Transferencia') {
            box.style.display = 'block';
            box.innerText = db.bank;
        } else { box.style.display = 'none'; }
    }

    function updateUI() {
        document.getElementById('p-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('c-ship').innerHTML = db.ships.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa;
        document.getElementById('conf-bank').value = db.bank;
        document.getElementById('conf-cats').value = db.cats.join(', ');
        document.getElementById('conf-ships').value = db.ships.join(', ');
        renderOrders();
    }

    function saveConfig() {
        db.wa = document.getElementById('conf-wa').value;
        db.bank = document.getElementById('conf-bank').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim());
        db.ships = document.getElementById('conf-ships').value.split(',').map(s => s.trim());
        save(); updateUI(); alert("Configuración guardada.");
    }

    async function uploadProduct() {
        const files = document.getElementById('p-img').files;
        const imgs = [];
        for(let f of files) { imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); })); }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value.toUpperCase(), desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, imgs: imgs });
        save(); renderShop(); alert("Producto publicado");
    }

    function renderShop() {
        document.getElementById('shop-grid').innerHTML = db.products.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <img src="${p.imgs[0]}">
                <span class="card-cat">${p.cat.toUpperCase()}</span>
                <h3 class="card-name">${p.name}</h3>
                <p><strong>$${p.price}</strong></p>
            </div>`).join('');
    }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-content').innerHTML = `
            <div class="modal-imgs">${p.imgs.map(i => `<img src="${i}">`).join('')}</div>
            <div class="modal-info">
                <span class="card-cat">${p.cat}</span>
                <h1 style="margin:15px 0">${p.name}</h1>
                <p style="line-height:1.6; margin-bottom:30px; opacity:0.8">${p.desc}</p>
                <p style="font-size:1.5rem; margin-bottom:30px"><strong>$${p.price}</strong></p>
                <button class="btn-buy" onclick="addToCart(${p.id}); closeModal()">AÑADIR A LA BOLSA</button>
            </div>`;
        document.getElementById('modal-detalle').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }

    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        cart.push(p); updateCartUI(); toggleCart();
    }

    function updateCartUI() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="font-size:0.8rem; margin-bottom:10px">${i.name} - $${i.price}</div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        const n = document.getElementById('c-name').value;
        if(!n || !cart.length) return alert("Completa los datos");
        const msg = `NUEVO PEDIDO INERCIA%0ACliente: ${n}%0AProductos: ${cart.map(i=>i.name).join(', ')}%0APrecio: ${document.getElementById('cart-total').innerText}%0AEnvío: ${document.getElementById('c-ship').value}%0APago: ${document.getElementById('c-pay').value}`;
        window.open(`https://wa.me{db.wa}?text=${msg}`);
        db.orders.push({ cliente: n, items: cart.map(i=>i.name).join(', '), total: document.getElementById('cart-total').innerText });
        save(); cart = []; updateCartUI(); toggleCart();
    }

    function uploadBanner() {
        const f = document.getElementById('b-img').files[0];
        const r = new FileReader();
        r.onload = e => { db.banners.push(e.target.result); save(); renderBanners(); };
        r.readAsDataURL(f);
    }

    function renderBanners() {
        const s = document.getElementById('banner-slider');
        s.innerHTML = db.banners.map(img => `<img src="${img}">`).join('');
        if(db.banners.length > 1) {
            setInterval(() => { s.appendChild(s.firstElementChild); }, 5000);
        }
    }

    function renderOrders() {
        document.getElementById('admin-orders').innerHTML = db.orders.map(o => `<div style="font-size:0.7rem; border-bottom:1px solid #eee; padding:10px">${o.cliente} - ${o.items} - ${o.total}</div>`).reverse().join('');
    }
</script>
</body>
</html>
