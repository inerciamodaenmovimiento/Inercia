<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pastel-pink': '#FFF0F5',
                        'vibrant-mint': '#98FF98',
                        'vibrant-lavender': '#E6E6FA',
                        'vibrant-coral': '#FF7F50',
                        'noche': '#1A1A1A'
                    },
                    fontFamily: {
                        'serif': ['Cormorant Garamond', 'serif'],
                        'sans': ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FFFBFA; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .card-hover { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(255,127,80,0.1); }
        .hidden { display: none; }
        .cart-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="text-noche">

    <!-- NAV -->
    <nav class="fixed top-0 w-full z-40 border-b border-vibrant-lavender glass">
        <div class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
            <div class="flex flex-col cursor-pointer" onclick="showView('home')">
                <h1 class="font-serif text-4xl italic font-semibold tracking-tighter text-vibrant-coral">Inercia</h1>
                <span class="text-[9px] uppercase tracking-[0.5em] text-stone-500">Moda en movimiento</span>
            </div>
            <div class="flex items-center gap-6">
                <a href="#productos" class="nav-link text-xs uppercase tracking-widest font-bold hover:text-vibrant-coral transition">Colección</a>
                <button onclick="toggleCart()" class="relative p-2 bg-vibrant-lavender rounded-full">
                    <i data-lucide="shopping-cart" class="w-5 h-5 text-vibrant-coral"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-vibrant-coral text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- CARRITO (SIDEBAR) -->
    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-96 bg-white z-50 shadow-2xl transition-transform transform translate-x-full border-l border-vibrant-lavender p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-serif text-3xl italic">Tu Bolsa</h2>
            <button onclick="toggleCart()"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="space-y-6"></div>
        <div class="mt-12 border-t pt-6">
            <div class="flex justify-between mb-4 font-bold text-xl">
                <span>Total:</span>
                <span id="cart-total">$0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-vibrant-coral text-white py-4 rounded-full font-bold uppercase tracking-widest hover:bg-noche transition">Finalizar por WhatsApp</button>
        </div>
    </div>

    <main class="pt-24">
        <!-- VISTA HOME -->
        <section id="view-home" class="view">
            <!-- Banner Artístico -->
            <div class="relative h-[80vh] flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-r from-pastel-pink to-vibrant-lavender opacity-50"></div>
                <div class="z-10 text-center px-6">
                    <span class="text-xs uppercase tracking-[1em] mb-4 block text-vibrant-coral font-bold">Nueva Curaduría</span>
                    <h2 class="font-serif text-7xl md:text-9xl italic leading-none mb-6">El Arte de<br>Vibrar</h2>
                    <button class="px-10 py-4 border border-noche rounded-full hover:bg-noche hover:text-white transition uppercase text-xs tracking-widest font-bold">Explorar Piezas</button>
                </div>
            </div>

            <!-- Categorías -->
            <div class="py-12 px-6 flex flex-wrap justify-center gap-4" id="category-filter">
                <button onclick="filterCat('todos')" class="px-6 py-2 rounded-full bg-vibrant-mint text-xs font-bold uppercase tracking-tighter">Todos</button>
            </div>

            <!-- Productos -->
            <div id="productos" class="max-w-7xl mx-auto px-6 py-20">
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                    <!-- Se inyecta con JS -->
                </div>
            </div>
        </section>

        <!-- VISTA ADMIN (PROTEGIDA) -->
        <section id="view-admin" class="view hidden min-h-screen p-10 bg-vibrant-lavender/20">
            <div class="max-w-6xl mx-auto bg-white p-10 rounded-3xl shadow-sm border border-vibrant-lavender">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="font-serif text-5xl italic text-vibrant-coral">Panel de Estudio</h2>
                    <button onclick="showView('home')" class="text-xs font-bold uppercase tracking-widest">Cerrar Sesión</button>
                </div>
                
                <div class="grid lg:grid-cols-2 gap-10">
                    <!-- Formulario -->
                    <div class="space-y-6">
                        <input type="text" id="adm-name" placeholder="Nombre de la prenda" class="w-full p-4 border-b border-vibrant-lavender outline-none focus:border-vibrant-coral transition">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="adm-price" placeholder="Precio ($)" class="w-full p-4 border-b border-vibrant-lavender outline-none">
                            <select id="adm-cat" class="w-full p-4 border-b border-vibrant-lavender outline-none bg-transparent">
                                <option value="Vestidos">Vestidos</option>
                                <option value="Accesorios">Accesorios</option>
                                <option value="Sastrería">Sastrería</option>
                            </select>
                        </div>
                        <input type="file" id="adm-img" class="w-full text-xs">
                        <button onclick="admSave()" class="w-full bg-vibrant-coral text-white py-4 rounded-xl font-bold uppercase">Publicar en Inercia</button>
                    </div>
                    <!-- Lista -->
                    <div id="adm-list" class="space-y-4 max-h-[500px] overflow-y-auto"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER CON ENTRADA OCULTA -->
    <footer class="py-20 border-t border-vibrant-lavender text-center space-y-6">
        <div class="flex justify-center gap-8">
            <a href="#" class="text-vibrant-coral flex items-center gap-2 font-bold"><i data-lucide="instagram"></i> Instagram</a>
            <a href="#" class="text-vibrant-coral flex items-center gap-2 font-bold"><i data-lucide="message-circle"></i> WhatsApp</a>
        </div>
        <p class="text-[10px] text-stone-400 uppercase tracking-widest">© 2024 INERCIA - MODA EN MOVIMIENTO<span class="cursor-default" onclick="loginAdmin()">.</span></p>
    </footer>

    <script>
        let db = JSON.parse(localStorage.getItem('inercia_v3')) || [];
        let cart = [];

        // NAVEGACIÓN Y LOGIN
        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function loginAdmin() {
            const pass = prompt("Código de acceso:");
            if(pass === "0110") showView('admin');
            else alert("Acceso denegado");
        }

        // GESTIÓN DE PRODUCTOS
        function admSave() {
            const name = document.getElementById('adm-name').value;
            const price = document.getElementById('adm-price').value;
            const cat = document.getElementById('adm-cat').value;
            const imgFile = document.getElementById('adm-img').files[0];

            if(!name || !price || !imgFile) return alert("Completa todo");

            const reader = new FileReader();
            reader.onload = (e) => {
                db.push({ id: Date.now(), name, price, cat, img: e.target.result });
                localStorage.setItem('inercia_v3', JSON.stringify(db));
                render();
            };
            reader.readAsDataURL(imgFile);
        }

        function render(filter = 'todos') {
            const grid = document.getElementById('product-grid');
            const admList = document.getElementById('adm-list');
            
            // Render Tienda
            const filtered = filter === 'todos' ? db : db.filter(p => p.cat === filter);
            grid.innerHTML = filtered.map(p => `
                <div class="card-hover group">
                    <div class="relative overflow-hidden rounded-[2rem] bg-stone-100 aspect-[3/4]">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest shadow-xl opacity-0 group-hover:opacity-100 transition-all translate-y-4 group-hover:translate-y-0">
                            Agregar al carrito
                        </button>
                    </div>
                    <div class="mt-6 text-center">
                        <span class="text-[10px] text-vibrant-coral font-bold uppercase tracking-widest">${p.cat}</span>
                        <h3 class="font-serif text-2xl italic mt-1">${p.name}</h3>
                        <p class="font-bold text-lg mt-1">$${p.price}</p>
                    </div>
                </div>
            `).join('');

            // Render Admin
            admList.innerHTML = db.map(p => `
                <div class="flex items-center justify-between p-4 border rounded-2xl">
                    <div class="flex items-center gap-4">
                        <img src="${p.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div><p class="font-bold text-sm">${p.name}</p><p class="text-xs text-stone-400">${p.cat}</p></div>
                    </div>
                    <button onclick="deleteProd(${p.id})" class="text-red-400 p-2 hover:bg-red-50 rounded-full"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteProd(id) {
            db = db.filter(p => p.id !== id);
            localStorage.setItem('inercia_v3', JSON.stringify(db));
            render();
        }

        // CARRITO
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('cart-open');
        }

        function addToCart(id) {
            const prod = db.find(p => p.id === id);
            cart.push(prod);
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.length;
            
            container.innerHTML = cart.map((item, index) => `
                <div class="flex gap-4 border-b border-pastel-pink pb-4">
                    <img src="${item.img}" class="w-20 h-24 object-cover rounded-xl">
                    <div class="flex-1">
                        <h4 class="font-serif italic text-xl">${item.name}</h4>
                        <p class="font-bold text-vibrant-coral">$${item.price}</p>
                        <button onclick="removeFromCart(${index})" class="text-[10px] uppercase font-bold text-stone-400 mt-2">Eliminar</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + Number(item.price), 0);
            document.getElementById('cart-total').innerText = `$${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function checkout() {
            const total = document.getElementById('cart-total').innerText;
            const items = cart.map(i => i.name).join(', ');
            const msg = `¡Hola Inercia! Quisiera comprar: ${items}. Total: ${total}`;
            window.open(`https://wa.me{encodeURIComponent(msg)}`);
        }

        // Iniciar
        lucide.createIcons();
        render();
    </script>
</body>
</html>
