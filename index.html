<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Tailwind CSS Corregido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Corregido -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <!-- NAVEGACIÓN -->
    <header class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-[0.2em] serif uppercase">Inercia</div>
            <ul class="hidden md:flex space-x-8 text-[10px] uppercase tracking-widest font-bold">
                <li><a href="#" class="hover:text-gray-500">Inicio</a></li>
                <li><a href="#productos" class="hover:text-gray-500">Colección</a></li>
                <li><a href="#admin" class="text-red-500 hover:text-red-800">Administrador</a></li>
            </ul>
            <div class="flex items-center space-x-5">
                <button onclick="toggleCart()" class="relative">
                    <i class="fa-solid fa-bag-shopping text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- HERO SECTION (BANNER) -->
    <section id="home-banner" class="relative h-[90vh] flex items-center justify-center bg-gray-900 text-white">
        <img id="banner-img" src="https://unsplash.com" 
             class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-10 text-center px-4">
            <h1 class="text-6xl md:text-8xl serif mb-2">Inercia</h1>
            <p class="text-sm tracking-[0.5em] uppercase opacity-80 mb-10">Moda en Movimiento</p>
            <a href="#productos" class="border border-white px-10 py-4 text-[10px] uppercase tracking-[0.2em] hover:bg-white hover:text-black transition duration-300">Ver Catálogo</a>
        </div>
    </section>

    <!-- SECCIÓN DE PRODUCTOS -->
    <section id="productos" class="container mx-auto px-6 py-20">
        <div class="flex justify-between items-end mb-16">
            <div>
                <h2 class="text-4xl serif mb-2">Nuevos Ingresos</h2>
                <div class="h-1 w-20 bg-black"></div>
            </div>
        </div>
        <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            <!-- Cargados por JS -->
        </div>
    </section>

    <!-- PANEL ADMINISTRADOR -->
    <section id="admin" class="bg-gray-50 py-20 border-t border-gray-200">
        <div class="container mx-auto px-6 max-w-3xl">
            <div class="text-center mb-12">
                <h2 class="text-3xl serif mb-2">Panel de Control</h2>
                <p class="text-xs uppercase tracking-widest text-gray-400">Gestiona tu tienda Inercia</p>
            </div>
            <div class="bg-white p-10 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-bold uppercase mb-6 border-b pb-2">Subir Nuevo Producto</h3>
                <div class="space-y-6">
                    <input id="admin-nombre" type="text" placeholder="Nombre" class="w-full border-b py-2 outline-none">
                    <div class="grid grid-cols-2 gap-6">
                        <input id="admin-precio" type="number" placeholder="Precio ($)" class="w-full border-b py-2 outline-none">
                        <input id="admin-stock" type="number" placeholder="Stock" class="w-full border-b py-2 outline-none">
                    </div>
                    <input id="admin-img" type="text" placeholder="URL de la foto" class="w-full border-b py-2 outline-none">
                    <button onclick="agregarProductoDesdeAdmin()" class="w-full bg-black text-white py-4 text-xs font-bold uppercase tracking-widest">Publicar en la Web</button>
                </div>
            </div>
        </div>
    </section>

    <!-- CARRITO LATERAL -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white z-[60] shadow-2xl translate-x-full transition-transform duration-500">
        <div class="p-8 flex flex-col h-full">
            <div class="flex justify-between items-center border-b pb-6 mb-6">
                <span class="serif text-2xl tracking-tighter">Mi Carrito</span>
                <button onclick="toggleCart()" class="text-3xl font-light">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-6"></div>
            <div class="border-t pt-6 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <span class="text-xs uppercase font-bold tracking-widest">Total</span>
                    <span id="cart-total" class="text-xl serif">$0</span>
                </div>
                <button class="w-full bg-black text-white py-5 text-[10px] uppercase font-bold tracking-widest">Proceder al Pago</button>
            </div>
        </div>
    </div>

    <!-- CONTACTO -->
    <div class="fixed bottom-8 right-8 flex flex-col space-y-4 z-50">
        <a href="#" class="w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-xl"><i class="fa-brands fa-whatsapp text-3xl"></i></a>
        <a href="#" class="w-14 h-14 bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] text-white rounded-full flex items-center justify-center shadow-xl"><i class="fa-brands fa-instagram text-3xl"></i></a>
    </div>

    <script>
        let productos = [
            { id: 1, nombre: 'Blusa Larga Brown', precio: 12500, img: 'https://unsplash.com' },
            { id: 2, nombre: 'Abrigo Grey Check', precio: 22900, img: 'https://unsplash.com' }
        ];
        let carrito = [];

        function renderProductos() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = productos.map(p => `
                <div class="group relative">
                    <div class="aspect-[3/4] overflow-hidden bg-gray-100 mb-4 relative">
                        <img src="${p.img}" class="w-full h-full object-cover">
                        <button onclick="agregarAlCarrito(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-4 text-[10px] uppercase font-bold opacity-0 group-hover:opacity-100 transition-all">Agregar al carrito</button>
                    </div>
                    <h3 class="text-sm font-medium">${p.nombre}</h3>
                    <p class="text-gray-500 text-xs mt-1">$${p.precio.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        function agregarAlCarrito(id) {
            carrito.push(productos.find(p => p.id === id));
            actualizarCarritoUI();
            toggleCart();
        }

        function actualizarCarritoUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = carrito.map((item, i) => `
                <div class="flex justify-between border-b pb-4">
                    <span class="text-xs font-bold uppercase">${item.nombre}</span>
                    <span class="text-xs">$${item.precio.toLocaleString()}</span>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = '$' + carrito.reduce((acc, p) => acc + p.precio, 0).toLocaleString();
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function agregarProductoDesdeAdmin() {
            const n = document.getElementById('admin-nombre').value;
            const p = parseInt(document.getElementById('admin-precio').value);
            const i = document.getElementById('admin-img').value;
            if(n && p && i) {
                productos.push({ id: Date.now(), nombre: n, precio: p, img: i });
                renderProductos();
            }
        }

        renderProductos();
    </script>
</body>
</html>
