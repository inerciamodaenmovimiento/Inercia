<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sézane Edit Mode - Inercia</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; transition: all 0.3s ease; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Estilo Admin por Inercia */
        .admin-on [contenteditable="true"]:hover { background: rgba(0,0,0,0.03); cursor: text; }
        .admin-on .admin-img:hover { filter: brightness(0.8); cursor: pointer; border: 1px solid #000; }
        .save-btn { transition: transform 0.2s; }
        .save-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-white">

    <!-- BARRA DE CONTROL DISCRETA -->
    <div id="admin-ui" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full hidden z-50 flex items-center gap-6 shadow-2xl">
        <span class="text-[10px] tracking-widest font-bold uppercase">Modo Editor</span>
        <div class="h-4 w-[1px] bg-gray-700"></div>
        <button onclick="saveChanges()" class="save-btn text-[10px] font-bold hover:text-gray-400">GUARDAR TODO</button>
        <button onclick="toggleAdmin()" class="text-[10px] text-red-500 font-bold uppercase">Cerrar</button>
    </div>

    <!-- HEADER EDITABLE -->
    <header class="py-12 border-b border-gray-100 sticky top-0 bg-white z-40">
        <div class="container mx-auto px-4 flex flex-col items-center">
            <h1 class="serif text-6xl tracking-widest uppercase mb-8 admin-txt" id="site-logo">SÉZANE</h1>
            <nav class="flex gap-10 text-[11px] font-medium tracking-[0.25em] uppercase">
                <span class="admin-txt">E-Shop</span>
                <span class="admin-txt">Lookbook</span>
                <span class="admin-txt">Journal</span>
                <span class="admin-txt">Videos</span>
                <span class="admin-txt">À Propos</span>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16 max-w-5xl">
        <div class="flex flex-col md:flex-row gap-20">
            
            <!-- CONTENEDOR DE IMÁGENES -->
            <div class="w-full md:w-3/5 space-y-4">
                <div class="overflow-hidden bg-gray-50">
                    <img id="hero-img" src="https://unsplash.com" 
                         class="w-full h-auto admin-img object-cover transition-all" 
                         onclick="triggerImageUpload('hero-img')">
                </div>
                <div class="grid grid-cols-4 gap-4">
                    <img id="thumb-1" src="https://unsplash.com" class="admin-img" onclick="triggerImageUpload('thumb-1')">
                    <img id="thumb-2" src="https://unsplash.com" class="admin-img" onclick="triggerImageUpload('thumb-2')">
                </div>
            </div>

            <!-- BLOQUE DE INFORMACIÓN -->
            <div class="w-full md:w-2/5 flex flex-col justify-center">
                <div class="border-b border-black pb-6 mb-8">
                    <h2 class="serif text-4xl mb-4 admin-txt" id="prod-name">Essentiels - Hunter</h2>
                    <p class="text-2xl font-light">€ <span class="admin-txt" id="prod-price">180</span></p>
                </div>

                <div class="space-y-6 text-sm text-gray-800 leading-loose">
                    <p class="italic admin-txt" id="prod-quote">
                        "Ustedes los amaron tanto estos meses que debían integrar los Esenciales... Increíblemente femeninos y confortables."
                    </p>
                    <div class="text-[11px] admin-txt" id="prod-details">
                        • Daim et cuir<br>
                        • Talons 9 cm<br>
                        • Fabriquées avec amour à Porto
                    </div>
                </div>

                <button class="mt-12 w-full bg-black text-white py-5 text-[10px] font-bold uppercase tracking-[0.3em]">
                    Ajouter au Panier
                </button>
            </div>
        </div>
    </main>

    <!-- INPUT DE ARCHIVO OCULTO PARA LA INERCIA -->
    <input type="file" id="image-input" class="hidden" accept="image/*">

    <script>
        let isAdmin = false;
        let buffer = "";
        let currentTargetImg = null;

        // Activación por código 0110
        window.addEventListener('keydown', (e) => {
            buffer += e.key;
            if (buffer.length > 4) buffer = buffer.substring(1);
            if (buffer === "0110") toggleAdmin();
        });

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.body.classList.toggle('admin-on', isAdmin);
            document.getElementById('admin-ui').classList.toggle('hidden', !isAdmin);
            
            document.querySelectorAll('.admin-txt').forEach(el => {
                el.contentEditable = isAdmin;
            });
            
            if(isAdmin) console.log("Sistema: Modo Edición Inercial Activo.");
        }

        // Cambio de imagen por inercia (Carga de archivo local)
        function triggerImageUpload(imgId) {
            if (!isAdmin) return;
            currentTargetImg = document.getElementById(imgId);
            document.getElementById('image-input').click();
        }

        document.getElementById('image-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && currentTargetImg) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentTargetImg.src = event.target.result; // Cambia la imagen instantáneamente
                };
                reader.readAsDataURL(file);
            }
        });

        function saveChanges() {
            // Recopilar todos los textos
            const content = {
                logo: document.getElementById('site-logo').innerText,
                name: document.getElementById('prod-name').innerText,
                price: document.getElementById('prod-price').innerText,
                quote: document.getElementById('prod-quote').innerText,
                images: [
                    document.getElementById('hero-img').src,
                    document.getElementById('thumb-1').src,
                    document.getElementById('thumb-2').src
                ]
            };

            // Aquí se enviaría al servidor por inercia
            console.log("Guardando estado actual de la web...", content);
            alert("Cambios guardados con éxito.");
            toggleAdmin();
        }
    </script>
</body>
</html>
