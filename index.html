<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris-claro: #fbfbfb; --font-serif: 'Playfair Display', serif; --font-sans: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--blanco); color: var(--azul); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        /* NAVEGACIÓN */
        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .logo { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; color: var(--azul); }
        .cart-trigger { cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--azul); }

        /* BANNER */
        .main-banner { width: 100%; height: 60vh; background: #eee; margin-top: 80px; overflow: hidden; position: relative; }
        .main-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* CATEGORÍAS ARRIBA */
        .cat-nav { display: flex; justify-content: center; gap: 30px; padding: 40px 0; background: white; position: sticky; top: 80px; z-index: 900; }
        .cat-link { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .cat-link:hover, .cat-link.active { opacity: 1; font-weight: bold; }

        /* CATÁLOGO */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 40px 25px; padding: 20px 5% 100px; max-width: 1400px; margin: 0 auto; }
        .card { cursor: pointer; transition: 0.4s; text-align: center; }
        .card-img-wrapper { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #f9f9f9; margin-bottom: 15px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-cat { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 5px; display: block; }
        .card-name { font-family: var(--font-serif); font-size: 1rem; margin-bottom: 5px; }

        /* CONTACTO */
        .contacto-footer { padding: 80px 5%; text-align: center; background: var(--gris-claro); }
        .contacto-footer h3 { font-family: var(--font-serif); font-size: 2rem; margin-bottom: 30px; }
        .social-links a { margin: 0 20px; text-decoration: none; color: var(--azul); font-size: 0.8rem; letter-spacing: 2px; font-weight: bold; }

        /* MODAL, CARRITO Y ADMIN (Igual que antes pero pulidos) */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); min-height: 100vh; }
        .modal-imgs { padding: 20px; background: var(--gris-claro); }
        .modal-imgs img { width: 100%; margin-bottom: 10px; }
        .modal-info { padding: 10%; display: flex; flex-direction: column; justify-content: center; }
        
        #cart-panel { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 40px; box-shadow: -20px 0 60px rgba(0,0,0,0.05); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 12px 0; margin-bottom: 15px; border: none; border-bottom: 1px solid #eee; font-size: 0.8rem; outline: none; }
        
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gris-claro); z-index: 6000; padding: 5% 10%; overflow-y: auto; }
        .admin-box { background: white; padding: 30px; margin-bottom: 20px; }
        .btn-black { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
        .btn-del { color: red; border: none; background: none; cursor: pointer; font-size: 0.7rem; }
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; z-index: 7000; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">INERCIA</a>
    <div class="cart-trigger" onclick="toggleCart()">BOLSA (<span id="cart-count">0</span>)</div>
</nav>

<!-- BANNER -->
<div class="main-banner" id="banner-home"></div>

<!-- CATEGORÍAS ARRIBA -->
<div class="cat-nav" id="cat-menu"></div>

<section class="productos-container" id="shop-grid"></section>

<!-- CONTACTO -->
<section class="contacto-footer">
    <h3>Conectate con nosotros</h3>
    <div class="social-links">
        <a href="#" id="link-ig" target="_blank">INSTAGRAM</a>
        <a href="#" id="link-wa" target="_blank">WHATSAPP</a>
    </div>
</section>

<!-- MODAL DETALLE -->
<div id="modal-detalle">
    <button style="position:fixed; top:30px; right:40px; font-size:1rem; cursor:pointer; border:none; background:none; z-index:6000" onclick="closeModal()">CERRAR</button>
    <div id="modal-content" class="modal-grid"></div>
</div>

<!-- CARRITO -->
<div id="cart-panel">
    <h2 style="font-family:var(--font-serif); margin-bottom:30px">BOLSA</h2>
    <div id="cart-items" style="margin-bottom:30px"></div>
    <div id="cart-total" style="font-weight:bold; border-top:1px solid #eee; padding-top:20px; margin-bottom:30px">TOTAL: $0</div>
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <select id="c-ship" class="input-cart"></select>
    <select id="c-pay" class="input-cart"><option value="Efectivo">EFECTIVO</option><option value="Transferencia">TRANSFERENCIA</option></select>
    <button class="btn-black" onclick="confirmOrder()">COMPRAR</button>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<!-- ADMIN -->
<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px"><h2>ADMIN</h2><button onclick="closeAdmin()">SALIR</button></div>
    
    <div class="admin-box">
        <h3>BANNER PRINCIPAL</h3>
        <input type="file" id="b-img" onchange="uploadBanner()">
    </div>

    <div class="admin-box">
        <h3>NUEVO PRODUCTO</h3>
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción" class="input-cart" style="height:80px"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat" class="input-cart"></select>
        <input type="file" id="p-img" multiple class="input-cart">
        <button class="btn-black" onclick="uploadProduct()">PUBLICAR</button>
    </div>

    <div class="admin-box">
        <h3>CONFIGURACIÓN & LINKS</h3>
        <input type="text" id="conf-wa" placeholder="WhatsApp (549...)" class="input-cart">
        <input type="text" id="conf-ig" placeholder="Link de Instagram" class="input-cart">
        <input type="text" id="conf-cats" placeholder="Categorías (comas)" class="input-cart">
        <input type="text" id="conf-ships" placeholder="Envíos (comas)" class="input-cart">
        <button class="btn-black" onclick="saveConfig()">GUARDAR</button>
    </div>

    <div class="admin-box">
        <h3>BORRAR PRODUCTOS</h3>
        <div id="admin-list"></div>
    </div>
</div>

<script>
    // Usamos una clave nueva para asegurar que cargue limpio
    let db = JSON.parse(localStorage.getItem('inercia_v_new')) || { products: [], cats: ["Ver Todo"], ships: ["Retiro"], wa: "", ig: "", banner: "", orders: [] };
    let cart = [];

    window.onload = () => { renderShop(); renderBanner(); updateUI(); renderCatMenu(); };
    function save() { localStorage.setItem('inercia_v_new', JSON.stringify(db)); }
    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }

    function updateUI() {
        document.getElementById('p-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('c-ship').innerHTML = db.ships.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa;
        document.getElementById('conf-ig').value = db.ig;
        document.getElementById('conf-cats').value = db.cats.join(', ');
        document.getElementById('conf-ships').value = db.ships.join(', ');
        document.getElementById('link-wa').href = "https://wa.me" + db.wa;
        document.getElementById('link-ig').href = db.ig;
        renderAdminList();
    }

    function renderCatMenu() {
        const menu = document.getElementById('cat-menu');
        menu.innerHTML = db.cats.map(c => `<span class="cat-link" onclick="filterShop('${c}')">${c}</span>`).join('');
    }

    function saveConfig() {
        db.wa = document.getElementById('conf-wa').value;
        db.ig = document.getElementById('conf-ig').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim());
        db.ships = document.getElementById('conf-ships').value.split(',').map(s => s.trim());
        save(); updateUI(); renderCatMenu(); alert("Guardado");
    }

    function uploadBanner() {
        const file = document.getElementById('b-img').files[0];
        const reader = new FileReader();
        reader.onload = e => { db.banner = e.target.result; save(); renderBanner(); };
        reader.readAsDataURL(file);
    }

    function renderBanner() {
        if(db.banner) document.getElementById('banner-home').innerHTML = `<img src="${db.banner}">`;
    }

    async function uploadProduct() {
        const f = document.getElementById('p-img').files;
        const imgs = [];
        for(let file of f) { imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); })); }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, imgs: imgs });
        save(); renderShop(); renderAdminList(); alert("Publicado");
    }

    function deleteProduct(id) {
        if(confirm("¿Borrar?")) { db.products = db.products.filter(p => p.id !== id); save(); renderShop(); renderAdminList(); }
    }

    function renderAdminList() {
        document.getElementById('admin-list').innerHTML = db.products.map(p => `<div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>${p.name}</span><button class="btn-del" onclick="deleteProduct(${p.id})">ELIMINAR</button></div>`).join('');
    }

    function renderShop(cat = "Ver Todo") {
        const grid = document.getElementById('shop-grid');
        const prods = (cat === "Ver Todo" || !db.cats.includes(cat)) ? db.products : db.products.filter(p => p.cat === cat);
        grid.innerHTML = prods.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <div class="card-img-wrapper"><img src="${p.imgs[0]}"></div>
                <span class="card-cat">${p.cat}</span>
                <h3 class="card-name">${p.name}</h3>
                <p style="font-size:0.8rem; opacity:0.6">$${p.price}</p>
            </div>`).join('');
    }

    function filterShop(cat) { renderShop(cat); }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-content').innerHTML = `
            <div class="modal-imgs">${p.imgs.map(i => `<img src="${i}">`).join('')}</div>
            <div class="modal-info">
                <span class="card-cat">${p.cat}</span>
                <h1 style="font-family:var(--font-serif); font-size:2.5rem; margin:20px 0">${p.name}</h1>
                <p style="opacity:0.7; line-height:1.8; margin-bottom:30px">${p.desc}</p>
                <p style="font-size:1.4rem; margin-bottom:30px">$${p.price}</p>
                <button class="btn-black" onclick="addToCart(${p.id}); closeModal()">AÑADIR A LA BOLSA</button>
            </div>`;
        document.getElementById('modal-detalle').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }

    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        cart.push(p); updateCart(); toggleCart();
    }
    function updateCart() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem"><span>${i.name}</span><span>$${i.price}</span></div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        const n = document.getElementById('c-name').value;
        if(!n || !cart.length) return alert("Faltan datos");
        const msg = `NUEVO PEDIDO INERCIA%0ACliente: ${n}%0AItems: ${cart.map(i=>i.name).join(', ')}%0A${document.getElementById('cart-total').innerText}`;
        window.open(`https://wa.me${db.wa}?text=${msg}`);
        cart = []; updateCart(); toggleCart();
    }
</script>
</body>
</html>
