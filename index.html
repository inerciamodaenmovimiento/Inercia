<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #fff; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-section { display: none; }
        .bg-overlay { background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <!-- NAVBAR ESTILO ULTRA -->
    <header class="fixed w-full z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100">
        <nav class="container mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-[0.4em] serif uppercase cursor-pointer" onclick="showView('home')">Inercia</div>
            <ul class="hidden md:flex space-x-10 text-[10px] uppercase tracking-[0.2em] font-bold">
                <li><a href="#" onclick="showView('home')" class="hover:text-gray-400 transition">Colecciones</a></li>
                <li><button onclick="showView('admin')" class="text-red-500 hover:text-red-800">Administrador</button></li>
            </ul>
            <button onclick="toggleCart()" class="relative">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
            </button>
        </nav>
    </header>

    <!-- VISTA CLIENTE -->
    <main id="view-home">
        <!-- Banner Dinámico (Modificable desde Admin) -->
        <section class="relative h-[80vh] flex items-center justify-center bg-gray-100 overflow-hidden">
            <img id="main-banner" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-overlay"></div>
            <div class="relative z-10 text-center text-white">
                <h1 class="text-6xl md:text-8xl serif mb-4">Inercia</h1>
                <p class="text-xs tracking-[0.6em] uppercase opacity-90">Moda en Movimiento</p>
            </div>
        </section>

        <!-- Categorías Personalizadas -->
        <div id="home-categories" class="container mx-auto px-6 py-12 flex justify-center gap-8 text-[10px] uppercase tracking-widest font-bold"></div>

        <!-- Grilla de Productos -->
        <section class="container mx-auto px-6 py-16">
            <h2 class="text-3xl serif text-center mb-16 underline underline-offset-8 decoration-1">New Arrivals</h2>
            <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12 text-center">
                <!-- Se llenan por JS -->
            </div>
        </section>
    </main>

    <!-- VISTA ADMINISTRADOR (Panel Completo) -->
    <main id="view-admin" class="admin-section pt-32 container mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- 1. Alta de Productos -->
            <div class="lg:col-span-2 bg-gray-50 p-10 rounded-2xl border">
                <h3 class="serif text-2xl mb-8 border-b pb-4">Gestión de Stock</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <input id="adm-nombre" type="text" placeholder="Nombre" class="p-3 border rounded text-sm">
                    <input id="adm-precio" type="number" placeholder="Precio ($)" class="p-3 border rounded text-sm">
                    <input id="adm-stock" type="number" placeholder="Stock Inicial" class="p-3 border rounded text-sm">
                    <input id="adm-cat" type="text" placeholder="Categoría" class="p-3 border rounded text-sm">
                </div>
                <div class="mb-6">
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2">Imagen desde tu PC</label>
                    <input id="adm-file" type="file" class="w-full bg-white p-4 border-2 border-dashed rounded text-xs">
                </div>
                <button onclick="guardarProducto()" class="w-full bg-black text-white py-4 font-bold text-[10px] uppercase tracking-widest">Publicar en la Tienda</button>
            </div>

            <!-- 2. Banners e Historial -->
            <div class="space-y-6">
                <div class="bg-white p-6 border rounded-2xl shadow-sm">
                    <h4 class="text-[10px] font-bold uppercase mb-4 tracking-widest">Modificar Banner Principal</h4>
                    <input id="adm-banner" type="text" placeholder="URL de nueva imagen" class="w-full p-2 border rounded text-xs mb-3">
                    <button onclick="cambiarBanner()" class="w-full bg-gray-100 py-2 text-[9px] font-bold uppercase hover:bg-black hover:text-white transition">Actualizar Banner</button>
                </div>
                <div class="bg-white p-6 border rounded-2xl shadow-sm h-80 overflow-y-auto">
                    <h4 class="text-[10px] font-bold uppercase mb-4 tracking-widest">Historial de Pedidos</h4>
                    <div id="adm-historial" class="text-[10px] space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- CARRITO LATERAL -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-white z-[100] shadow-2xl translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-8 flex justify-between items-center border-b">
            <span class="serif text-2xl">Bolsa</span>
            <button onclick="toggleCart()" class="text-4xl font-light">&times;</button>
        </div>
        <div id="cart-content" class="flex-grow p-8 overflow-y-auto space-y-6"></div>
        <div class="p-8 border-t space-y-4 bg-gray-50">
            <div class="flex justify-between font-bold text-xl px-2"><span>Total</span><span id="cart-total">$0</span></div>
            <button onclick="checkout()" class="w-full bg-black text-white py-5 text-[10px] font-bold uppercase tracking-[0.3em]">Finalizar Pedido (WhatsApp)</button>
            <button onclick="alert('Botón de arrepentimiento según Ley 24.240. Registrado.')" class="w-full text-gray-400 text-[9px] uppercase underline tracking-widest">Botón de Arrepentimiento</button>
        </div>
    </div>

    <!-- BOTONES DE CONTACTO -->
    <div class="fixed bottom-8 right-8 flex flex-col space-y-4 z-50">
        <a href="https://wa.me" target="_blank" class="w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition"><i class="fa-brands fa-whatsapp text-3xl"></i></a>
        <a href="https://instagram.com" target="_blank" class="w-14 h-14 bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition"><i class="fa-brands fa-instagram text-3xl"></i></a>
    </div>

    <script>
        // MEMORIA LOCAL (Para que no se borren tus productos)
        let productos = JSON.parse(localStorage.getItem('inercia_db')) || [
            { id: 1, nombre: 'Blusa Larga Brown', precio: 12500, stock: 10, cat: 'Summer', img: 'https://unsplash.com' },
            { id: 2, nombre: 'Grey Check Coat', precio: 22900, stock: 5, cat: 'Winter', img: 'https://unsplash.com' }
        ];
        let historial = JSON.parse(localStorage.getItem('inercia_ventas')) || [];
        let bannerActual = localStorage.getItem('inercia_banner_img') || "https://unsplash.com";
        let carrito = [];

        window.onload = () => { refreshUI(); document.getElementById('main-banner').src = bannerActual; }

        function showView(v) {
            document.getElementById('view-home').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = v === 'admin' ? 'block' : 'none';
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        // ADMINISTRADOR: GUARDAR PRODUCTOS
        function guardarProducto() {
            const n = document.getElementById('adm-nombre').value;
            const p = document.getElementById('adm-precio').value;
            const s = document.getElementById('adm-stock').value;
            const c = document.getElementById('adm-cat').value;
            const file = document.getElementById('adm-file').files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    productos.push({ id: Date.now(), nombre: n, precio: parseInt(p), stock: parseInt(s), cat: c, img: e.target.result });
                    localStorage.setItem('inercia_db', JSON.stringify(productos));
                    refreshUI();
                    alert("Producto guardado!");
                };
                reader.readAsDataURL(file);
            } else { alert("Selecciona una foto"); }
        }

        function eliminarProd(id) {
            productos = productos.filter(x => x.id !== id);
            localStorage.setItem('inercia_db', JSON.stringify(productos));
            refreshUI();
        }

        function cambiarBanner() {
            const url = document.getElementById('adm-banner').value;
            if(url) {
                bannerActual = url;
                localStorage.setItem('inercia_banner_img', url);
                document.getElementById('main-banner').src = url;
            }
        }

        // TIENDA: DIBUJAR TODO
        function refreshUI() {
            const grid = document.getElementById('grid-productos');
            const cats = document.getElementById('home-categories');
            const log = document.getElementById('adm-historial');

            // Render Grilla
            grid.innerHTML = productos.map(p => `
                <div class="group relative">
                    <div class="aspect-[3/4] bg-gray-100 overflow-hidden mb-5 relative">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-4 text-[10px] font-bold uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-all">Añadir a la bolsa</button>
                        <button onclick="eliminarProd(${p.id})" class="absolute top-2 right-2 bg-white text-red-500 w-8 h-8 rounded-full shadow-sm opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-1">${p.cat}</p>
                    <h3 class="text-xs font-bold uppercase tracking-tighter">${p.nombre}</h3>
                    <div class="flex justify-between mt-1"><span class="text-sm font-light">$${p.precio.toLocaleString()}</span><span class="text-[9px] text-gray-300">Stock: ${p.stock}</span></div>
                </div>
            `).join('');

            // Categorías Home
            const uniqueCats = [...new Set(productos.map(p => p.cat))];
            cats.innerHTML = uniqueCats.map(c => `<button class="hover:underline transition">${c}</button>`).join('');

            // Historial Admin
            log.innerHTML = historial.map(v => `<div class="border-b pb-2"><b>${v.fecha}</b><br>${v.resumen} - $${v.total}</div>`).reverse().join('');
        }

        // CARRITO Y WHATSAPP
        function addToCart(id) {
            const p = productos.find(x => x.id === id);
            if(p.stock > 0) { carrito.push(p); updateCartUI(); toggleCart(); }
            else alert("Sin stock");
        }

        function updateCartUI() {
            const c = document.getElementById('cart-content');
            c.innerHTML = carrito.map((item, i) => `
                <div class="flex items-center gap-4 pb-4 border-b border-gray-50">
                    <img src="${item.img}" class="w-16 h-20 object-cover">
                    <div class="flex-grow"><h4 class="text-[10px] font-bold uppercase">${item.nombre}</h4><p class="text-xs">$${item.precio}</p></div>
                    <button onclick="carrito.splice(${i},1); updateCartUI();" class="text-gray-300">&times;</button>
                </div>
            `).join('');
            const total = carrito.reduce((acc, p) => acc + p.precio, 0);
            document.getElementById('cart-total').innerText = '$' + total.toLocaleString();
            document.getElementById('cart-count').innerText = carrito.length;
        }

        function checkout() {
            if(carrito.length === 0) return;
            const total = carrito.reduce((acc, p) => acc + p.precio, 0);
            const msg = `PEDIDO INERCIA:\n${carrito.map(p => "- " + p.nombre).join("\n")}\nTOTAL: $${total}`;
            
            // Bajar stock y registrar
            historial.push({ fecha: new Date().toLocaleDateString(), resumen: carrito.length + " prendas", total: total });
            localStorage.setItem('inercia_ventas', JSON.stringify(historial));
            
            carrito.forEach(item => { const p = productos.find(x => x.id === item.id); if(p) p.stock--; });
            localStorage.setItem('inercia_db', JSON.stringify(productos));

            window.open(`https://wa.me?text=${encodeURIComponent(msg)}`);
            carrito = []; updateCartUI(); refreshUI(); toggleCart();
        }
    </script>
</body>
</html>
