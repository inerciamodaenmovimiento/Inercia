<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-pink': '#FF007F',
                        'electric-purple': '#7A00FF',
                        'acid-green': '#BAFF39',
                        'hot-orange': '#FF4500'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0A0A; color: white; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .vibrant-gradient { background: linear-gradient(45deg, #FF007F, #7A00FF, #FF4500); }
        .product-card:hover { transform: scale(1.02); transition: all 0.4s ease; border-color: #BAFF39; }
        .cart-sidebar { transform: translateX(100%); transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); }
        .cart-open .cart-sidebar { transform: translateX(0); }
        .neon-shadow { box-shadow: 0 0 20px rgba(186, 255, 57, 0.3); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-black">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
            <div class="cursor-pointer" onclick="showView('home')">
                <h1 class="font-serif text-5xl italic text-neon-pink leading-none">Inercia</h1>
                <p class="text-[9px] uppercase tracking-[0.6em] text-acid-green font-black">Moda en Movimiento</p>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="toggleCart()" class="relative bg-acid-green p-3 rounded-full hover:rotate-12 transition">
                    <i data-lucide="shopping-cart" class="w-6 h-6 text-black"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-neon-pink text-white text-xs w-6 h-6 rounded-full flex items-center justify-center font-black">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- CARRITO DETALLADO -->
    <div id="cart-panel" class="cart-sidebar fixed right-0 top-0 h-full w-full md:w-[450px] bg-zinc-900 z-[100] p-8 border-l-4 border-neon-pink shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-serif text-4xl italic text-acid-green">Tu Selección</h2>
            <button onclick="toggleCart()" class="text-white hover:text-neon-pink"><i data-lucide="x-circle" class="w-10 h-10"></i></button>
        </div>
        <div id="cart-items" class="space-y-6 max-h-[60vh] overflow-y-auto pr-4">
            <!-- Items aquí -->
        </div>
        <div class="absolute bottom-0 left-0 w-full p-8 bg-zinc-800 border-t border-white/10">
            <div class="flex justify-between text-2xl font-black mb-6">
                <span>TOTAL:</span>
                <span id="cart-total" class="text-acid-green">$0</span>
            </div>
            <button onclick="checkout()" class="w-full vibrant-gradient py-5 rounded-2xl font-black text-xl uppercase tracking-widest hover:brightness-125 transition">Comprar vía WhatsApp</button>
        </div>
    </div>

    <!-- BOTÓN SECRETO "STUDIO" (Inferior Derecha) -->
    <button onclick="accessStudio()" class="fixed bottom-6 right-6 z-50 w-12 h-12 bg-white/5 hover:bg-acid-green/20 rounded-full flex items-center justify-center transition group">
        <i data-lucide="settings" class="w-4 h-4 text-white/20 group-hover:text-acid-green"></i>
    </button>

    <main class="pt-24">
        <!-- VISTA HOME -->
        <section id="view-home">
            <!-- HERO ARTÍSTICO -->
            <div class="relative h-[70vh] flex items-center justify-center">
                <div class="absolute inset-0 vibrant-gradient opacity-20 blur-3xl animate-pulse"></div>
                <div class="text-center z-10">
                    <h2 class="text-8xl md:text-[12rem] font-black italic tracking-tighter leading-none mb-4 mix-blend-difference">NUEVA<br>ERA</h2>
                    <p class="text-acid-green font-bold tracking-[1em] text-sm">COLECCIÓN 2024</p>
                </div>
            </div>

            <!-- GRILLA PRODUCTOS -->
            <div class="max-w-7xl mx-auto px-6 py-20">
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                    <!-- Productos inyectados -->
                </div>
            </div>
        </section>

        <!-- VISTA STUDIO (ADMIN) -->
        <section id="view-admin" class="hidden min-h-screen p-6 md:p-20 bg-zinc-950">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-20">
                    <h2 class="font-serif text-6xl italic text-acid-green">Panel Studio</h2>
                    <button onclick="showView('home')" class="bg-neon-pink px-6 py-2 rounded-full font-bold">Cerrar</button>
                </div>
                
                <div class="grid md:grid-cols-2 gap-20">
                    <div class="space-y-8 bg-zinc-900 p-10 rounded-[3rem] border border-white/10">
                        <h3 class="text-acid-green font-bold uppercase tracking-widest">Subir Pieza</h3>
                        <input type="text" id="adm-name" placeholder="Nombre" class="w-full bg-transparent border-b-2 border-zinc-700 p-4 outline-none focus:border-neon-pink">
                        <input type="number" id="adm-price" placeholder="Precio" class="w-full bg-transparent border-b-2 border-zinc-700 p-4 outline-none focus:border-neon-pink">
                        <select id="adm-cat" class="w-full bg-zinc-800 p-4 rounded-xl">
                            <option>Vestidos</option><option>Tops</option><option>Accesorios</option>
                        </select>
                        <input type="file" id="adm-img" class="block w-full text-sm text-zinc-500">
                        <button onclick="saveProduct()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase hover:bg-acid-green transition">Publicar</button>
                    </div>
                    <div id="adm-list" class="space-y-4">
                        <!-- Lista de control -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let products = JSON.parse(localStorage.getItem('inercia_v4')) || [];
        let cart = [];

        // NAVEGACIÓN Y SEGURIDAD
        function showView(view) {
            document.getElementById('view-home').classList.toggle('hidden', view !== 'home');
            document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
            window.scrollTo(0,0);
        }

        function accessStudio() {
            const pass = prompt("🔐 CÓDIGO STUDIO:");
            if(pass === "0110") showView('admin');
            else alert("Código incorrecto");
        }

        function toggleCart() {
            document.body.classList.toggle('cart-open');
        }

        // LÓGICA DE PRODUCTOS
        function saveProduct() {
            const name = document.getElementById('adm-name').value;
            const price = document.getElementById('adm-price').value;
            const cat = document.getElementById('adm-cat').value;
            const file = document.getElementById('adm-img').files[0];

            if(!name || !price || !file) return alert("Faltan datos");

            const reader = new FileReader();
            reader.onload = (e) => {
                products.push({ id: Date.now(), name, price, cat, img: e.target.result });
                localStorage.setItem('inercia_v4', JSON.stringify(products));
                render();
                alert("¡Pieza añadida!");
            };
            reader.readAsDataURL(file);
        }

        function render() {
            const grid = document.getElementById('product-grid');
            const admList = document.getElementById('adm-list');

            grid.innerHTML = products.map(p => `
                <div class="product-card border border-white/10 rounded-[2.5rem] overflow-hidden p-4 bg-zinc-900">
                    <div class="relative h-[400px] rounded-[2rem] overflow-hidden mb-6">
                        <img src="${p.img}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        <button onclick="addToCart(${p.id})" class="absolute bottom-6 left-6 right-6 bg-acid-green text-black py-4 rounded-xl font-black uppercase text-xs hover:scale-105 transition">Agregar al Carrito</button>
                    </div>
                    <div class="px-2">
                        <span class="text-neon-pink font-bold text-[10px] uppercase tracking-widest">${p.cat}</span>
                        <h3 class="font-serif text-3xl italic mt-1">${p.name}</h3>
                        <p class="text-2xl font-black text-white mt-2">$${p.price}</p>
                    </div>
                </div>
            `).join('');

            admList.innerHTML = products.map(p => `
                <div class="flex items-center justify-between p-4 bg-zinc-900 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <img src="${p.img}" class="w-12 h-12 object-cover rounded-lg">
                        <p class="font-bold text-sm">${p.name}</p>
                    </div>
                    <button onclick="deleteProd(${p.id})" class="text-red-500 hover:bg-red-500/10 p-2 rounded-lg"><i data-lucide="trash-2"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // LÓGICA CARRITO
        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            cart.push(p);
            updateCartUI();
            toggleCart(); // Abre el carrito automáticamente al agregar
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.length;
            
            container.innerHTML = cart.map((item, idx) => `
                <div class="flex gap-4 items-center bg-white/5 p-4 rounded-2xl">
                    <img src="${item.img}" class="w-16 h-20 object-cover rounded-lg">
                    <div class="flex-1">
                        <p class="font-bold">${item.name}</p>
                        <p class="text-acid-green font-black">$${item.price}</p>
                    </div>
                    <button onclick="removeItem(${idx})" class="text-zinc-500 hover:text-neon-pink"><i data-lucide="trash"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((s, i) => s + Number(i.price), 0);
            document.getElementById('cart-total').innerText = `$${total}`;
            lucide.createIcons();
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            updateCartUI();
        }

        function checkout() {
            const total = document.getElementById('cart-total').innerText;
            const items = cart.map(i => i.name).join(', ');
            const msg = `¡Hola! Quiero comprar en Inercia: ${items}. TOTAL: ${total}`;
            window.open(`https://wa.me{encodeURIComponent(msg)}`);
        }

        function deleteProd(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('inercia_v4', JSON.stringify(products));
            render();
        }

        lucide.createIcons();
        render();
    </script>
</body>
</html>
