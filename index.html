<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-view { display: none; }
        .transition-ultra { transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="file"]::file-selector-button {
            background: #000; color: #fff; padding: 8px 16px; border: none; font-size: 10px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <header class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-50 py-6 px-10">
        <nav class="container mx-auto flex justify-between items-center">
            <div id="display-logo" class="text-2xl font-bold tracking-[0.4em] serif uppercase cursor-pointer" onclick="navigate('home')">INERCIA</div>
            <button onclick="toggleCart()" class="relative hover:opacity-50 transition">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full font-bold">0</span>
            </button>
        </nav>
    </header>

    <!-- VISTA CLIENTE -->
    <main id="view-home">
        <!-- BANNER 1 -->
        <section class="relative h-[85vh] flex items-center justify-center overflow-hidden">
            <img id="banner-hero" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/10"></div>
            <div class="relative z-10 text-center text-white">
                <h1 id="txt-hero-title" class="serif text-7xl md:text-[100px] italic drop-shadow-2xl">Inercia</h1>
                <p id="txt-hero-sub" class="text-[10px] tracking-[0.8em] uppercase font-light">Moda en Movimiento</p>
            </div>
        </section>

        <!-- PRODUCTOS -->
        <section class="container mx-auto px-10 py-24">
            <div class="text-center mb-16">
                <h2 id="txt-arrivals" class="serif text-4xl italic mb-4">New Arrivals</h2>
                <div class="h-px w-16 bg-black mx-auto"></div>
                <div id="display-cats" class="mt-8 flex justify-center gap-6 text-[10px] uppercase font-bold text-stone-300"></div>
            </div>
            <div id="grid-productos" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8 text-center"></div>
        </section>

        <!-- BANNER 2 -->
        <section class="relative h-[70vh] flex items-center justify-center overflow-hidden">
            <img id="banner-coll" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover grayscale">
            <div class="relative z-10 text-center text-white">
                <h2 id="txt-coll-title" class="text-6xl serif uppercase tracking-tighter mb-6">Collection</h2>
                <button class="border border-white px-10 py-3 text-[10px] uppercase tracking-widest font-bold hover:bg-white hover:text-black transition">View</button>
            </div>
        </section>
    </main>

    <!-- ACCESO ADMIN (INFERIOR DERECHA) -->
    <button onclick="promptAdmin()" class="fixed bottom-4 right-4 w-4 h-4 opacity-10 hover:opacity-100 z-[100] transition text-[8px] text-gray-400 font-bold">ADM</button>

    <!-- PANEL ADMIN (PROTEGIDO) -->
    <main id="view-admin" class="admin-view pt-32 container mx-auto px-10 pb-40">
        <div class="flex justify-between items-center border-b pb-8 mb-12">
            <h2 class="serif text-4xl italic">Configuración Inercia</h2>
            <button onclick="navigate('home')" class="text-[10px] font-bold underline">Cerrar</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 text-sm">
            <!-- 1. CARGA DE ARCHIVOS -->
            <div class="space-y-8">
                <div class="bg-gray-50 p-8 border rounded-sm">
                    <h3 class="font-bold uppercase text-[10px] mb-6">1. Subir Producto (desde PC)</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <input id="adm-n" type="text" placeholder="Nombre" class="p-2 border-b bg-transparent outline-none">
                        <input id="adm-p" type="number" placeholder="Precio" class="p-2 border-b bg-transparent outline-none">
                        <input id="adm-s" type="number" placeholder="Stock" class="p-2 border-b bg-transparent outline-none">
                        <input id="adm-c" type="text" placeholder="Categoría" class="p-2 border-b bg-transparent outline-none">
                    </div>
                    <input id="adm-f" type="file" class="w-full mb-4">
                    <button onclick="saveProduct()" class="w-full bg-black text-white py-4 text-[10px] font-bold uppercase">Publicar</button>
                </div>

                <div class="bg-stone-50 p-8 border rounded-sm">
                    <h3 class="font-bold uppercase text-[10px] mb-6">2. Banners (desde PC)</h3>
                    <div class="space-y-4">
                        <div><label class="text-[9px] block mb-1 uppercase font-bold">Banner Principal</label><input id="file-hero" type="file"></div>
                        <div><label class="text-[9px] block mb-1 uppercase font-bold">Banner Colección</label><input id="file-coll" type="file"></div>
                        <button onclick="updateFiles()" class="w-full bg-gray-200 py-3 text-[10px] font-bold uppercase mt-4">Actualizar Banners</button>
                    </div>
                </div>
            </div>

            <!-- 2. TEXTOS Y MÉTODOS -->
            <div class="space-y-8">
                <div class="bg-white p-8 border rounded-sm">
                    <h3 class="font-bold uppercase text-[10px] mb-6">3. Personalizar Textos y Métodos</h3>
                    <div class="space-y-4">
                        <input id="edit-logo" type="text" placeholder="Nombre Logo" class="w-full p-2 border-b outline-none">
                        <textarea id="edit-pago" placeholder="Métodos de Pago (Info para cliente)" class="w-full p-2 border border-gray-100 text-xs h-20"></textarea>
                        <textarea id="edit-envio" placeholder="Métodos de Envío (Info para cliente)" class="w-full p-2 border border-gray-100 text-xs h-20"></textarea>
                        <button onclick="updateSettings()" class="w-full bg-black text-white py-3 text-[10px] font-bold uppercase">Guardar Ajustes</button>
                    </div>
                </div>
                <div class="bg-white p-8 border rounded-sm h-60 overflow-y-auto">
                    <h3 class="font-bold uppercase text-[10px] mb-4">Ventas e Historial</h3>
                    <div id="adm-history" class="text-[10px] space-y-2"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-white z-[200] shadow-2xl translate-x-full transition-ultra flex flex-col p-10">
        <div class="flex justify-between items-center border-b pb-8">
            <span class="serif text-3xl italic">Tu Bolsa</span>
            <button onclick="toggleCart()" class="text-4xl font-light">&times;</button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto py-10 space-y-6"></div>
        <div class="border-t pt-8 space-y-6">
            <div id="info-extra" class="text-[9px] text-gray-400 space-y-2 mb-4 italic"></div>
            <div class="flex justify-between font-bold text-2xl tracking-tighter px-2"><span>Total</span><span id="cart-total">$0</span></div>
            <button onclick="checkout()" class="w-full bg-black text-white py-6 text-[11px] font-bold uppercase tracking-[0.4em]">Finalizar Pedido</button>
            <button onclick="alert('Arrepentimiento legal registrado')" class="w-full text-gray-400 text-[10px] uppercase underline tracking-widest">Arrepentimiento</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('inercia_v3')) || {
            logo: "INERCIA", arrivals: "New Arrivals", heroImg: "", collImg: "",
            pago: "Efectivo, Transferencia", envio: "Correo Argentino, Moto mensajería",
            prods: [], sales: []
        };
        let cart = [];

        window.onload = () => { refresh(); }

        function promptAdmin() { if(prompt("Código Seguridad:") === "0110") navigate('admin'); }
        function navigate(v) {
            document.getElementById('view-home').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').className = v === 'admin' ? 'pt-32 container mx-auto px-10 pb-40' : 'admin-view';
            window.scrollTo(0,0);
        }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        // CARGA DESDE PC (BASE64)
        function readFile(inputId, dbKey) {
            return new Promise((resolve) => {
                const file = document.getElementById(inputId).files[0];
                if (!file) return resolve(null);
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function saveProduct() {
            const img = await readFile('adm-f');
            if (img) {
                db.prods.push({ 
                    id: Date.now(), n: document.getElementById('adm-n').value, p: parseInt(document.getElementById('adm-p').value),
                    s: parseInt(document.getElementById('adm-s').value), c: document.getElementById('adm-c').value, img 
                });
                save(); refresh(); navigate('home');
            }
        }

        async function updateFiles() {
            const h = await readFile('file-hero');
            const c = await readFile('file-coll');
            if(h) db.heroImg = h; if(c) db.collImg = c;
            save(); refresh();
        }

        function updateSettings() {
            db.logo = document.getElementById('edit-logo').value || db.logo;
            db.pago = document.getElementById('edit-pago').value || db.pago;
            db.envio = document.getElementById('edit-envio').value || db.envio;
            save(); refresh();
        }

        function refresh() {
            document.getElementById('display-logo').innerText = db.logo;
            document.getElementById('txt-hero-title').innerText = db.logo;
            if(db.heroImg) document.getElementById('banner-hero').src = db.heroImg;
            if(db.collImg) document.getElementById('banner-coll').src = db.collImg;
            document.getElementById('info-extra').innerHTML = `<b>Pago:</b> ${db.pago}<br><b>Envío:</b> ${db.envio}`;

            const grid = document.getElementById('grid-productos');
            grid.innerHTML = db.prods.map(p => `
                <div class="group relative">
                    <div class="aspect-[2/3] bg-stone-50 overflow-hidden mb-4 relative">
                        <img src="${p.img}" class="w-full h-full object-cover transition duration-1000 group-hover:scale-110">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-4 text-[9px] font-bold uppercase opacity-0 group-hover:opacity-100 transition-all">Add</button>
                        <button onclick="deleteProd(${p.id})" class="absolute top-2 right-2 bg-white text-red-500 w-6 h-6 rounded-full shadow-sm opacity-0 group-hover:opacity-100 transition">×</button>
                    </div>
                    <h3 class="serif text-sm italic mb-1 uppercase tracking-tighter">${p.n}</h3>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest">$${p.p}</p>
                    <p class="text-[7px] text-stone-200 mt-1 uppercase">Stock: ${p.s}</p>
                </div>
            `).join('');

            const uniqueCats = [...new Set(db.prods.map(p => p.c))];
            document.getElementById('display-cats').innerHTML = uniqueCats.join(' | ');
            document.getElementById('adm-history').innerHTML = db.sales.map(s => `<div class="border-b pb-1">${s.d} - $${s.t}</div>`).reverse().join('');
        }

        function deleteProd(id) { db.prods = db.prods.filter(x => x.id !== id); save(); refresh(); }
        function addToCart(id) { const p = db.prods.find(x => x.id === id); if(p.s > 0) { cart.push(p); updateCart(); toggleCart(); } }
        
        function updateCart() {
            const cont = document.getElementById('cart-content');
            cont.innerHTML = cart.map((i, idx) => `<div class="flex justify-between border-b pb-4 text-xs"><span>${i.n}</span><span>$${i.p}</span></div>`).join('');
            document.getElementById('cart-total').innerText = '$' + cart.reduce((a, b) => a + b.p, 0).toLocaleString();
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            const t = cart.reduce((a, b) => a + b.p, 0);
            window.open(`https://wa.me{encodeURIComponent("PEDIDO INERCIA:\n" + cart.map(p => "- " + p.n).join("\n") + "\nTOTAL: $" + t)}`);
            cart.forEach(i => { const p = db.prods.find(x => x.id === i.id); if(p) p.s--; });
            db.sales.push({ d: new Date().toLocaleString(), t });
            cart = []; save(); refresh(); updateCart(); toggleCart();
        }

        function save() { localStorage.setItem('inercia_v3', JSON.stringify(db)); }
        refresh();
    </script><!-- COPIAR DESDE AQUÍ HACIA ABAJO Y PEGAR AL FINAL DE TU ARCHIVO -->

<script>
    /** 
     * EXTENSIÓN DE CONTROL DE VENTAS DETALLADAS - INERCIA 
     * Este código mejora el historial para que puedas ver QUÉ se vendió.
     */

    // 1. Mejoramos la función de Checkout para que guarde los nombres de los productos
    const originalCheckout = window.checkout;
    window.checkout = function() {
        if(cart.length === 0) return;
        
        const total = cart.reduce((a, b) => a + b.p, 0);
        const nombresProductos = cart.map(p => p.n).join(", ");
        const fechaVenta = new Date().toLocaleString('es-AR');

        // Guardamos la venta con lujo de detalle
        db.sales.push({ 
            d: fechaVenta, 
            t: total, 
            items: nombresProductos,
            cantidad: cart.length 
        });
        
        // Ejecutamos la función original que abre WhatsApp y descuenta stock
        originalCheckout();
        renderDetailedHistory(); // Actualizamos la tabla
    };

    // 2. Creamos una nueva sección visual para el historial detallado
    function renderDetailedHistory() {
        const historyContainer = document.getElementById('adm-history-detailed');
        if (!historyContainer) {
            // Si no existe el contenedor, lo creamos dinámicamente en el Admin
            const adminPanel = document.getElementById('view-admin');
            const historySection = document.createElement('div');
            historySection.className = "mt-12 p-8 bg-white border border-black/5 rounded-sm shadow-sm";
            historySection.innerHTML = `
                <h3 class="serif text-2xl italic mb-6">Control de Ventas Detallado</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px] uppercase tracking-wider">
                        <thead>
                            <tr class="border-b border-black">
                                <th class="py-3 px-2 text-gray-400">Fecha</th>
                                <th class="py-3 px-2 text-gray-400">Productos Vendidos</th>
                                <th class="py-3 px-2 text-gray-400 text-right">Monto Total</th>
                                <th class="py-3 px-2 text-center text-gray-400">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="adm-history-rows"></tbody>
                    </table>
                </div>
                <button onclick="clearAllSales()" class="mt-8 text-[9px] text-red-400 hover:text-red-600 font-bold uppercase tracking-widest underline">
                    Limpiar todo el historial
                </button>
            `;
            adminPanel.appendChild(historySection);
        }

        const rows = document.getElementById('adm-history-rows');
        rows.innerHTML = db.sales.length === 0 ? '<tr><td colspan="4" class="py-10 text-center text-gray-300">No hay ventas registradas aún.</td></tr>' : 
            db.sales.map((sale, index) => `
            <tr class="border-b border-gray-50 hover:bg-stone-50">
                <td class="py-4 px-2 font-medium">${sale.d}</td>
                <td class="py-4 px-2 italic text-gray-500">${sale.items || 'Venta Express'}</td>
                <td class="py-4 px-2 text-right font-bold">$${sale.t.toLocaleString()}</td>
                <td class="py-4 px-2 text-center">
                    <button onclick="deleteSale(${index})" class="text-gray-300 hover:text-red-500">×</button>
                </td>
            </tr>
        `).reverse().join('');
    }

    // 3. Funciones para borrar registros individuales o todo el historial
    window.deleteSale = function(index) {
        if(confirm("¿Eliminar este registro de venta?")) {
            db.sales.splice(index, 1);
            localStorage.setItem('inercia_v3', JSON.stringify(db));
            renderDetailedHistory();
        }
    }

    window.clearAllSales = function() {
        if(confirm("¿Seguro quieres borrar TODO el historial de ventas? Esto no se puede deshacer.")) {
            db.sales = [];
            localStorage.setItem('inercia_v3', JSON.stringify(db));
            renderDetailedHistory();
        }
    }

    // 4. Activamos el historial apenas cargue la página
    const originalRefresh = window.refresh;
    window.refresh = function() {
        if(originalRefresh) originalRefresh();
        renderDetailedHistory();
    };

    // Lanzar al cargar para asegurar que aparezca en el admin
    setTimeout(renderDetailedHistory, 500);

</script>
<!-- FIN DEL PARCHE -->

</body>
</html>
