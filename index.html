<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INERCIA — Identity & Motion</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #111; --line: #eeeeee; --accent: #0057FF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

        /* The Editorial Frame */
        .frame { position: fixed; border: 1px solid var(--line); z-index: 1000; pointer-events: none; }
        .v-line { width: 1px; height: 100vh; left: 40px; top: 0; }
        .v-line-r { width: 1px; height: 100vh; right: 40px; top: 0; }

        header { height: 100vh; padding: 100px 80px; display: flex; flex-direction: column; justify-content: space-between; }
        .brand h1 { font-family: 'Syncopate', sans-serif; font-size: 12vw; line-height: 0.8; letter-spacing: -0.05em; text-transform: uppercase; }
        .brand p { font-size: 10px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin-top: 20px; }
        
        .manifesto { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2.2rem; align-self: flex-end; max-width: 500px; text-align: right; line-height: 1.1; }

        /* Broken Grid Gallery */
        .editorial-grid { display: grid; grid-template-columns: repeat(12, 1fr); padding: 0 80px 200px 80px; gap: 20px; }
        .img-container { background: #f7f7f7; overflow: hidden; position: relative; filter: grayscale(1); transition: 1s ease-in-out; }
        .img-container:hover { filter: grayscale(0); }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Asymmetrical Placement */
        .pos-1 { grid-column: 1 / 9; height: 90vh; } 
        .pos-2 { grid-column: 8 / 13; height: 50vh; margin-top: -20vh; border: 20px solid white; z-index: 2; }
        .pos-3 { grid-column: 2 / 7; height: 75vh; margin-top: 100px; }
        
        .label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; display: block; }

        footer { border-top: 1px solid var(--line); padding: 100px 80px; text-align: center; }
        footer h2 { font-family: 'Syncopate', sans-serif; font-size: 15vw; opacity: 0.05; }
    </style>
</head>
<body>
    <div class="frame v-line"></div>
    <div class="frame v-line-r"></div>

    <header>
        <div class="brand">
            <p>2024 Identity System</p>
            <h1>INE<br>RCIA.</h1>
        </div>
        <div class="manifesto">
            "Explorando la tensión entre la forma estática y el tejido en movimiento."
        </div>
    </header>

    <main class="editorial-grid">
        <div class="img-container pos-1">
            <img src="https://unsplash.com" alt="Inercia 01">
            <span class="label">FIG 01 // KINETIC FLOW</span>
        </div>
        <div class="img-container pos-2">
            <img src="https://unsplash.com" alt="Inercia 02">
            <span class="label">FIG 02 // DETAIL TENSION</span>
        </div>
        <div class="img-container pos-3">
            <img src="https://unsplash.com" alt="Inercia 03">
            <span class="label">FIG 03 // STRUCTURAL MOTION</span>
        </div>
    </main>

    <footer><h2>INERCIA</h2></footer>
</body>
</html>
