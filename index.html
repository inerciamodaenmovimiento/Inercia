<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Fuentes: Inter para texto y Playfair para ese toque de lujo -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Iconos vectoriales finos -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="nav-left">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="logo">INERCIA</div>
        <div class="nav-right">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>
    </header>

    <main class="container">
        <h1 class="section-title">Complete the look</h1>
        
        <section class="look-wrapper">
            <!-- Imagen Principal -->
            <div class="main-visual">
                <img src="https://unsplash.com" alt="Look Principal">
            </div>

            <!-- Lista de Productos lateral -->
            <div class="product-sidebar">
                <div class="product-card">
                    <div class="thumb">
                        <img src="https://unsplash.com" alt="Producto">
                    </div>
                    <div class="details">
                        <span class="brand">VALENTINO</span>
                        <p class="desc">Short dress in crepe couture</p>
                        <span class="price">7.210 AED</span>
                    </div>
                    <button class="add-circle">+</button>
                </div>

                <div class="product-card">
                    <div class="thumb">
                        <img src="https://unsplash.com" alt="Producto">
                    </div>
                    <div class="details">
                        <span class="brand">VALENTINO</span>
                        <p class="desc">Rockstud flair suede boots</p>
                        <span class="price">5.200 AED</span>
                    </div>
                    <button class="add-circle">+</button>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
