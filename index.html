<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .italic { font-style: italic; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 60px; border-bottom: 1px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .brand-box h1 { font-size: 32px; font-weight: 900; letter-spacing: -2px; line-height: 0.8; text-transform: uppercase; }
        .brand-box span { font-size: 10px; letter-spacing: 5px; opacity: 0.5; text-transform: uppercase; }
        .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; min-height: 80vh; border-bottom: 1px solid #eee; }
        .hero-text { padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .hero-text h2 { font-size: 8vw; line-height: 0.85; margin-bottom: 30px; text-transform: uppercase; }
        .hero-image { background: #f9f9f9; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .img-frame { width: 100%; aspect-ratio: 3/4; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 1s ease; }
        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 60px; }
        .product-card { margin-bottom: 40px; }
        .product-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f4f4f4; margin-bottom: 15px; filter: grayscale(100%); transition: 0.5s; }
        .product-card:hover .product-img { filter: grayscale(0%); }
        .product-info { display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .product-desc { font-size: 11px; opacity: 0.5; margin-top: 5px; line-height: 1.4; }
        
        /* PANEL ADMIN */
        #myGestion-Inercia { position: fixed; top: 0; left: -100%; width: 100%; height: 100vh; background: #fff; z-index: 10000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; padding: 60px; }
        .admin-grid { display: grid; grid-template-columns: 380px 1fr; gap: 60px; max-width: 1300px; margin: 0 auto; }
        .form-card { background: #f8f8f8; padding: 40px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
        .input-group input, .input-group textarea { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 10px 0; background: transparent; outline: none; font-size: 13px; }
        .file-box { border: 1px dashed #000; padding: 20px; text-align: center; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        /* AREA DE ACCESO ADMIN (INFERIOR DERECHA) */
        #hidden-trigger { 
            position: fixed; 
            bottom: 0; 
            right: 0; 
            width: 100px; 
            height: 100px; 
            background: rgba(255,0,0,0.05); /* Rojo muy suave para que sepas donde tocar */
            border: 1px dashed rgba(0,0,0,0.1); 
            z-index: 99999; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-box"><span>Edición Limitada</span><h1>Inercia</h1></div>
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px;">CESTA (0)</div>
    </nav>

    <main class="hero">
        <section class="hero-text">
            <h2 class="serif italic">Moda en<br>Movimiento</h2>
            <p style="font-size: 13px; opacity: 0.4; max-width: 350px;">Curaduría de prendas minimalistas diseñadas para la fluidez.</p>
        </section>
        <section class="hero-image">
            <div class="img-frame"><img src="https://unsplash.com"></div>
        </section>
    </main>

    <div id="shop-grid"></div>

    <!-- HAZ CLIC EN ESTE CUADRO EN LA ESQUINA -->
    <div id="hidden-trigger" onclick="acceder()"></div>

    <div id="myGestion-Inercia">
        <div style="display:flex; justify-content:space-between; align-items: baseline; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px;">
            <h2 style="font-weight:900; font-size: 22px;">myGESTIÓN | INERCIA</h2>
            <button onclick="document.getElementById('myGestion-Inercia').style.left='-100%'" style="font-size: 10px; font-weight:900; color:red; cursor:pointer; background:none; border:none;">CERRAR PANEL</button>
        </div>
        <div class="admin-grid">
            <div class="form-card">
                <div class="input-group"><label>Producto</label><input type="text" id="p-name"></div>
                <div class="input-group"><label>Precio ($)</label><input type="number" id="p-price"></div>
                <div class="input-group"><label>Descripción</label><textarea id="p-desc" rows="3"></textarea></div>
                <div class="input-group"><label>Variantes</label><input type="text" id="p-vars"></div>
                <div class="input-group">
                    <label>Imagen</label>
                    <div class="file-box" onclick="document.getElementById('p-file').click()">Subir desde PC</div>
                    <input type="file" id="p-file" style="display:none" accept="image/*">
                </div>
                <button id="publish-btn" style="width:100%; background:#000; color:#fff; padding:20px; font-weight:900; font-size:10px; border:none; cursor:pointer;">PUBLICAR EN TIENDA</button>
            </div>
            <div>
                <h3 style="font-size:10px; font-weight:900; margin-bottom:20px; opacity:0.4;">STOCK ACTIVO</h3>
                <div id="admin-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Función de acceso global (Funciona sí o sí)
        function acceder() {
            const pass = prompt("Código de seguridad:");
            if(pass === "0110") {
                document.getElementById('myGestion-Inercia').style.left = "0";
            } else {
                alert("Código incorrecto.");
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue, update, remove } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504",
            databaseURL: "https://firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let tempImg = "";

        // Manejo de Imagen
        document.getElementById('p-file').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { tempImg = ev.target.result; alert("Foto cargada."); };
            reader.readAsDataURL(e.target.files);
        };

        // Acciones Globales vinculadas al Módulo
        window.vender = (id, stock) => {
            if (stock > 0) update(ref(db, 'productos/' + id), { stock: stock - 1 });
        };
        window.borrar = (id) => { if(confirm("¿Eliminar?")) remove(ref(db, 'productos/' + id)); };

        document.getElementById('publish-btn').onclick = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = prompt("Stock inicial:", "10");
            if(!name || !price || !tempImg) return alert("Faltan datos");

            const id = Date.now();
            set(ref(db, 'productos/' + id), {
                id, name, price, desc: document.getElementById('p-desc').value,
                vars: document.getElementById('p-vars').value, img: tempImg,
                stock: parseInt(stock) || 0
            }).then(() => {
                alert("Producto en línea.");
                tempImg = "";
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
            });
        };

        // Renderizado
        onValue(ref(db, 'productos/'), (snap) => {
            const grid = document.getElementById('shop-grid');
            const list = document.getElementById('admin-list');
            const data = snap.val();
            grid.innerHTML = ""; list.innerHTML = "";
            if(data) {
                Object.keys(data).forEach(key => {
                    const p = data[key];
                    const out = p.stock <= 0;
                    grid.innerHTML += `
                        <div class="product-card" style="opacity:${out?'0.5':'1'}">
                            <img src="${p.img}" class="product-img">
                            <div class="product-info"><span>${p.name}</span><span class="serif italic">$${p.price}</span></div>
                            <p class="product-desc">${p.desc}</p>
                            <button onclick="vender('${key}', ${p.stock})" ${out?'disabled':''} style="width:100%; margin-top:15px; padding:15px; font-weight:900; cursor:pointer; background:${out?'#EEE':'#000'}; color:${out?'#AAA':'#FFF'}; border:none;">${out?'SIN STOCK':'AÑADIR A CESTA'}</button>
                        </div>`;
                    list.innerHTML += `
                        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:11px;">
                            <span>${p.name} (${p.stock})</span>
                            <button onclick="borrar('${key}')" style="color:red; background:none; border:none; cursor:pointer;">ELIMINAR</button>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
