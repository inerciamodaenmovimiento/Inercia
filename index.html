<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICKY | Inercia Style</title>
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f5f5f5;
            --accent-color: #000000;
            --text-muted: #666666;
            --font-main: 'Helvetica Neue', Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--primary-bg); color: var(--accent-color); line-height: 1.6; padding-bottom: 80px; }
        
        /* HEADER & NAV */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background: #fff; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .logo { font-weight: 700; font-size: 1.6rem; letter-spacing: 4px; }
        .cart-icon { cursor: pointer; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }

        /* HERO SECTION */
        .hero { height: 75vh; background: #eee url('https://unsplash.com') center/cover; display: flex; align-items: center; justify-content: center; }
        .hero-title { font-size: 3.5rem; letter-spacing: 8px; text-transform: uppercase; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }

        /* PRODUCT GRID */
        .products-container { padding: 80px 8%; }
        .section-title { font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 50px; text-align: center; color: var(--text-muted); font-weight: 400; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; }
        .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--secondary-bg); cursor: pointer; transition: transform 0.4s ease; }
        .product-card img:hover { transform: scale(1.02); }
        .product-info { padding: 20px 0; text-align: left; }
        .product-info h3 { font-size: 0.85rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
        .price { color: var(--text-muted); margin: 8px 0 20px; font-size: 0.9rem; }

        /* BUTTONS */
        .btn-add { width: 100%; padding: 14px; background: #000; color: #fff; border: 1px solid #000; cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .btn-add:hover { background: #333; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; position: relative; }
        .close-btn { position: absolute; top: -40px; right: 0; cursor: pointer; font-size: 1.5rem; }

        /* CART FLOATING */
        .cart-float { position: fixed; right: 40px; bottom: 40px; width: 340px; background: #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1); padding: 30px; z-index: 1500; border: 1px solid #f0f0f0; }
        #cart-list { list-style: none; margin: 20px 0; max-height: 200px; overflow-y: auto; font-size: 0.8rem; }
        .cart-total { border-top: 1px solid #eee; padding-top: 15px; display: flex; justify-content: space-between; font-weight: 700; }

        /* ADMIN */
        .admin-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; background: #111; color: #fff; padding: 40px; z-index: 3000; }
        .admin-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #333; color: #fff; }

        @media (max-width: 768px) { .modal-content { grid-template-columns: 1fr; } .hero-title { font-size: 2rem; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VICKY</div>
        <div class="cart-icon" onclick="toggleCart()">BOLSA (<span id="count">0</span>)</div>
    </nav>

    <div class="hero"><h1 class="hero-title">Inercia 2026</h1></div>

    <main class="products-container">
        <h2 class="section-title">COLECCIÓN RECIENTE</h2>
        <div class="product-grid" id="grid">
            <div class="product-card">
                <img src="https://unsplash.com" alt="Prod">
                <div class="product-info">
                    <h3>Abrigo Minimal Grey</h3>
                    <p class="price">$25.000</p>
                    <button class="btn-add" onclick="add('Abrigo Minimal', 25000)">Añadir al Carrito</button>
                </div>
            </div>
        </div>
    </main>

    <aside class="cart-float" id="cart-ui" style="display:none">
        <h3 style="font-size:0.9rem; letter-spacing:2px">TU BOLSA</h3>
        <ul id="cart-list"></ul>
        <div class="cart-total"><span>TOTAL</span><span id="total">$0</span></div>
        <button class="btn-add" style="margin-top:20px">Finalizar Pago</button>
    </aside>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeM()">&times;</span>
            <img id="m-img" src="" style="width:100%">
            <div style="padding-top:40px">
                <h2 id="m-title" style="letter-spacing:3px; margin-bottom:15px"></h2>
                <p id="m-price" class="price" style="font-size:1.2rem"></p>
                <p style="font-size:0.85rem; margin-bottom:30px">Calidad premium y diseño atemporal para movimiento constante.</p>
                <button id="m-btn" class="btn-add">Añadir a la bolsa</button>
            </div>
        </div>
    </div>

    <div id="admin" class="admin-box">
        <h2 style="font-size:0.8rem; margin-bottom:20px; letter-spacing:3px">ADMIN ACCESS (0110)</h2>
        <input type="text" id="a-name" placeholder="Nombre del Producto">
        <input type="number" id="a-price" placeholder="Precio">
        <input type="text" id="a-img" placeholder="URL de Imagen">
        <button class="btn-add" style="background:#fff; color:#000" onclick="pushProd()">Publicar</button>
    </div>

    <script>
        let bag = [];
        let code = "";

        function add(n, p) {
            bag.push({n, p});
            render();
            document.getElementById('cart-ui').style.display = 'block';
        }

        function render() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let t = 0;
            bag.forEach(i => {
                list.innerHTML += `<li style="display:flex; justify-content:space-between; margin-bottom:10px">${i.n} <span>$${i.p.toLocaleString()}</span></li>`;
                t += i.p;
            });
            document.getElementById('count').innerText = bag.length;
            document.getElementById('total').innerText = `$${t.toLocaleString()}`;
        }

        function toggleCart() {
            const ui = document.getElementById('cart-ui');
            ui.style.display = ui.style.display === 'none' ? 'block' : 'none';
        }

        // Modal Logic
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'IMG' && e.target.closest('.product-card')) {
                const card = e.target.closest('.product-card');
                const btn = card.querySelector('.btn-add');
                const pName = card.querySelector('h3').innerText;
                const pPrice = card.querySelector('.price').innerText;
                
                document.getElementById('m-img').src = e.target.src;
                document.getElementById('m-title').innerText = pName;
                document.getElementById('m-price').innerText = pPrice;
                
                document.getElementById('m-btn').onclick = () => {
                    add(pName, parseInt(pPrice.replace(/[^0-9]/g, '')));
                    closeM();
                };
                document.getElementById('modal').style.display = 'flex';
            }
        });

        function closeM() { document.getElementById('modal').style.display = 'none'; }

        // Secret Admin Access (0110)
        window.onkeydown = (e) => {
            code += e.key;
            if(code.includes("0110")) {
                document.getElementById('admin').style.display = 'block';
                code = "";
            }
            if(code.length > 5) code = "";
        };

        function pushProd() {
            const n = document.getElementById('a-name').value;
            const p = document.getElementById('a-price').value;
            const i = document.getElementById('a-img').value || 'https://unsplash.com';
            if(!n || !p) return;

            const div = document.createElement('div');
            div.className = 'product-card';
            div.innerHTML = `<img src="${i}"><div class="product-info"><h3>${n}</h3><p class="price">$${parseInt(p).toLocaleString()}</p><button class="btn-add" onclick="add('${n}', ${p})">Añadir al Carrito</button></div>`;
            document.getElementById('grid').prepend(div);
            document.getElementById('admin').style.display = 'none';
        }
    </script>
</body>
</html>
