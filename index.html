<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f9f9f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); overflow-x: hidden; }

        /* NAVEGACIÓN */
        nav { padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; }
        .logo { font-weight: bold; letter-spacing: 5px; font-size: 1.2rem; }
        .cart-count { cursor: pointer; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; }

        /* HERO & BANNER */
        #banner-container { width: 100%; height: 45vh; overflow: hidden; position: relative; margin-top: 75px; background: var(--gris); }
        #banner-slider { display: flex; transition: 1s ease; height: 100%; }
        #banner-slider img { width: 100%; flex-shrink: 0; object-fit: cover; }

        header { padding: 60px 20px 20px; text-align: center; }
        header h1 { font-size: 3.5rem; letter-spacing: -2px; font-weight: 400; }
        header p { font-style: italic; opacity: 0.5; letter-spacing: 6px; text-transform: uppercase; font-size: 0.7rem; margin-top: 10px; }

        /* CATÁLOGO (GRILLA PEQUEÑA Y PROLIJA) */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px; padding: 40px 5%; max-width: 1300px; margin: 0 auto; }
        .card { cursor: pointer; text-align: center; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 320px; object-fit: cover; margin-bottom: 15px; }
        
        /* CATEGORÍAS GRANDES */
        .card-cat { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; display: block; margin-bottom: 8px; opacity: 0.9; }
        .card-name { font-size: 1rem; font-weight: 400; margin-bottom: 5px; }
        .card-price { font-weight: bold; font-size: 0.9rem; }

        /* MODAL DETALLE */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; padding: 80px 5%; }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; max-width: 1100px; margin: 0 auto; }
        .modal-imgs img { width: 100%; margin-bottom: 20px; }
        .close-modal { position: fixed; top: 30px; right: 40px; font-size: 2.5rem; cursor: pointer; border: none; background: none; }

        /* CARRITO */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 400px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 40px; box-shadow: -10px 0 50px rgba(0,0,0,0.1); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #eee; background: var(--gris); font-size: 0.8rem; }
        .bank-data { background: #fffbe6; padding: 15px; font-size: 0.8rem; border: 1px dashed #d4c18d; display: none; margin: 15px 0; line-height: 1.5; }
        .btn-main { background: var(--azul); color: white; border: none; padding: 16px; width: 100%; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; font-size: 0.7rem; margin-top: 15px; }

        /* ADMIN */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 3000; padding: 50px 10%; overflow-y: auto; }
        .admin-box { background: white; padding: 30px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .admin-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; background: white; }
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

<nav>
    <div class="logo">INERCIA</div>
    <div class="cart-count" onclick="toggleCart()">BOLSA (<span id="cart-count-val">0</span>)</div>
</nav>

<div id="banner-container"><div id="banner-slider"></div></div>

<header>
    <h1>Inercia</h1>
    <p>Moda en movimiento</p>
</header>

<section class="productos-container" id="shop-grid"></section>

<!-- MODAL DETALLE -->
<div id="modal-detalle">
    <button class="close-modal" onclick="closeModal()">×</button>
    <div id="modal-content" class="modal-grid"></div>
</div>

<!-- CARRITO -->
<div id="cart-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h3 style="letter-spacing:3px">CARRITO</h3>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:0.7rem">CERRAR ×</span>
    </div>
    <div id="cart-items"></div>
    <div id="cart-total" style="font-weight:bold; border-top:1px solid #eee; padding-top:20px; margin-top:20px">TOTAL: $0</div>
    
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <select id="c-ship" class="input-cart" onchange="toggleShipDetails()"></select>
    
    <div id="ship-details" style="display:none">
        <input type="text" id="c-calle" class="input-cart" placeholder="DIRECCIÓN Y NÚMERO">
        <input type="text" id="c-piso" class="input-cart" placeholder="PISO / DEPTO">
        <input type="text" id="c-city" class="input-cart" placeholder="CIUDAD / LOCALIDAD">
        <input type="text" id="c-prov" class="input-cart" placeholder="PROVINCIA">
        <input type="text" id="c-cp" class="input-cart" placeholder="CÓDIGO POSTAL">
    </div>

    <select id="c-pay" class="input-cart" onchange="togglePayInfo()">
        <option value="Efectivo">EFECTIVO / ACORDAR</option>
        <option value="Transferencia">TRANSFERENCIA BANCARIA</option>
    </select>
    <div id="bank-box-cart" class="bank-data"></div>
    <button class="btn-main" onclick="confirmOrder()">FINALIZAR COMPRA</button>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<!-- ADMIN -->
<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:40px">
        <h2>INERCIA ADMIN</h2>
        <button onclick="closeAdmin()">CERRAR SESIÓN</button>
    </div>

    <div class="admin-box">
        <h3>CONFIGURACIÓN GENERAL</h3>
        <input type="text" id="conf-wa" placeholder="WhatsApp (Ej: 54911...)" class="input-cart">
        <textarea id="conf-bank" placeholder="Datos Bancarios (CBU, Alias, etc)" class="input-cart" style="height:80px"></textarea>
        <input type="text" id="conf-cats" placeholder="Categorías (Separadas por comas)" class="input-cart">
        <input type="text" id="conf-ships" placeholder="Métodos de Envío (Separadas por comas)" class="input-cart">
        <button class="btn-main" onclick="saveConfig()">GUARDAR CAMBIOS</button>
    </div>

    <div class="admin-box">
        <h3>AÑADIR PRODUCTO</h3>
        <input type="text" id="p-name" placeholder="Nombre de prenda" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción detallada" class="input-cart" style="height:100px"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat" class="input-cart"></select>
        <input type="file" id="p-img" multiple class="input-cart">
        <button class="btn-main" onclick="uploadProduct()">PUBLICAR PRODUCTO</button>
    </div>

    <div class="admin-box">
        <h3>GESTIONAR CATÁLOGO</h3>
        <div id="admin-list"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('inercia_v_premium')) || { products: [], cats: ["General"], ships: ["Retiro"], bank: "", wa: "", banners: [] };
    let cart = [];

    window.onload = () => { renderShop(); updateUI(); };
    function save() { localStorage.setItem('inercia_v_premium', JSON.stringify(db)); }
    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    
    function toggleShipDetails() {
        const isShip = document.getElementById('c-ship').value.toLowerCase().includes('envio') || document.getElementById('c-ship').value.toLowerCase().includes('correo');
        document.getElementById('ship-details').style.display = isShip ? 'block' : 'none';
    }

    function togglePayInfo() {
        const box = document.getElementById('bank-box-cart');
        box.style.display = document.getElementById('c-pay').value === 'Transferencia' ? 'block' : 'none';
        box.innerText = db.bank;
    }

    function updateUI() {
        document.getElementById('p-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c.toUpperCase()}</option>`).join('');
        document.getElementById('c-ship').innerHTML = db.ships.map(s => `<option value="${s}">${s.toUpperCase()}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa;
        document.getElementById('conf-bank').value = db.bank;
        document.getElementById('conf-cats').value = db.cats.join(', ');
        document.getElementById('conf-ships').value = db.ships.join(', ');
        renderAdminList();
    }

    function saveConfig() {
        db.wa = document.getElementById('conf-wa').value;
        db.bank = document.getElementById('conf-bank').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim());
        db.ships = document.getElementById('conf-ships').value.split(',').map(s => s.trim());
        save(); updateUI(); alert("Configuración guardada.");
    }

    async function uploadProduct() {
        const files = document.getElementById('p-img').files;
        if(!files.length) return;
        const imgs = [];
        for(let f of files) { imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); })); }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value.toUpperCase(), desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, imgs: imgs });
        save(); renderShop(); renderAdminList(); alert("Producto añadido.");
    }

    function deleteProduct(id) {
        if(confirm("¿Borrar este producto?")) {
            db.products = db.products.filter(p => p.id !== id);
            save(); renderShop(); renderAdminList();
        }
    }

    function renderAdminList() {
        document.getElementById('admin-list').innerHTML = db.products.map(p => `
            <div class="admin-item">
                <span>${p.name}</span>
                <button onclick="deleteProduct(${p.id})" style="color:red; border:none; background:none; cursor:pointer">BORRAR</button>
            </div>`).join('');
    }

    function renderShop() {
        document.getElementById('shop-grid').innerHTML = db.products.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <img src="${p.imgs}">
                <span class="card-cat">${p.cat}</span>
                <h3 class="card-name">${p.name}</h3>
                <p class="card-price">$${p.price}</p>
            </div>`).join('');
    }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-content').innerHTML = `
            <div class="modal-imgs">${p.imgs.map(i => `<img src="${i}">`).join('')}</div>
            <div class="modal-info">
                <span class="card-cat" style="font-size:1.1rem">${p.cat}</span>
                <h1 style="margin:20px 0; font-size:2.5rem">${p.name}</h1>
                <p style="margin-bottom:30px; line-height:1.8; opacity:0.8">${p.desc}</p>
                <p style="font-size:1.8rem; margin-bottom:30px"><strong>$${p.price}</strong></p>
                <button class="btn-main" onclick="addToCart(${p.id}); closeModal()">AÑADIR A LA BOLSA</button>
            </div>`;
        document.getElementById('modal-detalle').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }

    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        cart.push(p); updateCart(); toggleCart();
    }
    function updateCart() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="font-size:0.8rem; margin-bottom:10px">${i.name} - $${i.price}</div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count-val').innerText = cart.length;
    }

    function confirmOrder() {
        const n = document.getElementById('c-name').value;
        if(!n || !cart.length) return alert("Completa los datos.");
        const ship = document.getElementById('c-ship').value;
        const msg = `NUEVO PEDIDO INERCIA%0ACliente: ${n}%0AItems: ${cart.map(i=>i.name).join(', ')}%0AEnvío: ${ship}%0APago: ${document.getElementById('c-pay').value}%0A${document.getElementById('cart-total').innerText}`;
        window.open(`https://wa.me{db.wa}?text=${msg}`, '_blank');
        cart = []; updateCart(); toggleCart();
    }
</script>
</body>
</html>
