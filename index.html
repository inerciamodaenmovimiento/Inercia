<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --gray: #1a1a1a;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* Estilo DAZE Concept */
        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://unsplash.com') center/cover;
        }

        .hero h1 {
            font-size: 12vw;
            line-height: 0.8;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 2rem;
        }

        .catalog {
            padding: 5rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--gray);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover { transform: scale(1.02); }

        .product-card img { width: 100%; height: 500px; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .product-card:hover img { filter: grayscale(0%); }

        .product-info { padding: 1.5rem; border-top: 1px solid #333; }
        .product-info h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
        .product-info p { color: var(--text-dim); font-weight: 300; }

        /* Panel Admin Oculto */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 999;
            padding: 5rem 2rem;
        }

        .admin-content { max-width: 500px; margin: auto; }
        .admin-content h2 { margin-bottom: 2rem; letter-spacing: 5px; }
        input { 
            padding: 1.2rem; width: 100%; margin: 10px 0; 
            background: #111; border: 1px solid #333; color: white; 
            outline: none;
        }
        button { 
            padding: 1.2rem; width: 100%; margin: 20px 0; 
            cursor: pointer; background: white; color: black; 
            font-weight: bold; border: none; text-transform: uppercase;
        }
        .close-btn { background: transparent; color: #555; border: 1px solid #333; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">INERCIA</div>
        <nav style="font-size: 0.8rem; letter-spacing: 3px;">COLLECTIONS / 2024 / ARCHIVE</nav>
    </header>

    <section class="hero">
        <h1>INERCIA</h1>
        <p style="letter-spacing: 10px; font-weight: 300;">MODA EN MOVIMIENTO</p>
    </section>

    <section class="catalog" id="product-list">
        <!-- Los productos se cargan dinámicamente -->
    </section>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <div class="admin-content">
            <h2>MODO EDITOR</h2>
            <input type="text" id="p-name" placeholder="NOMBRE DE PRENDA">
            <input type="text" id="p-price" placeholder="PRECIO (Ej: $120)">
            <input type="text" id="p-img" placeholder="URL DE IMAGEN (Unsplash recomendado)">
            <button onclick="addProduct()">PUBLICAR EN CATÁLOGO</button>
            <button onclick="closeAdmin()" class="close-btn">SALIR DEL PANEL</button>
        </div>
    </div>

    <script>
        let secretCode = "";
        const ADMIN_KEY = "0110";

        // Detector de secuencia de teclas para el Admin
        window.addEventListener('keydown', (e) => {
            secretCode += e.key;
            if (secretCode.length > 4) secretCode = secretCode.slice(1);
            if (secretCode === ADMIN_KEY) {
                document.getElementById('admin-panel').style.display = 'block';
                secretCode = ""; 
            }
        });

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        // Base de datos local (se reinicia al refrescar, para persistencia real usaría localStorage)
        const products = [
            { name: "Inertia Tech Hoodie", price: "$95", img: "https://unsplash.com" },
            { name: "Kinetic Cargo V1", price: "$140", img: "https://unsplash.com" },
            { name: "Ghost Shell Jacket", price: "$210", img: "https://unsplash.com" }
        ];

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.price}</p>
                    </div>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            
            if(name && price && img) {
                products.unshift({name, price, img}); // Añade al inicio
                renderProducts();
                closeAdmin();
                // Limpiar campos
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
                document.getElementById('p-img').value = "";
            } else {
                alert("Por favor completa todos los campos");
            }
        }

        renderProducts();
    </script>
</body>
</html>
