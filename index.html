<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INNERCIA | Admin & Shop</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Snipcart para Carrito y Pagos (Necesitarás crear cuenta en snipcart.com) -->
    <link rel="stylesheet" href="https://snipcart.com" />

    <style>
        /* Estilos anteriores + Mejoras de tienda */
        :root { --negro: #1a1a1a; --rojo: #e63946; }
        body { margin: 0; font-family: 'Inter', sans-serif; }
        
        .nav-container { display: flex; justify-content: space-around; align-items: center; padding: 20px; border-bottom: 1px solid #eee; }
        .cart-icon { cursor: pointer; font-weight: bold; }

        /* Carrusel de Producto */
        .product-card { position: relative; overflow: hidden; }
        .product-images { display: flex; overflow-x: scroll; scroll-snap-type: x mandatory; }
        .product-images img { width: 100%; flex-shrink: 0; scroll-snap-align: start; cursor: zoom-in; }

        /* Botón de compra elegante */
        .buy-button {
            background: var(--negro); color: white; border: none;
            padding: 10px 20px; width: 100%; cursor: pointer;
            margin-top: 10px; font-size: 0.7rem; letter-spacing: 1px;
        }
        .buy-button:hover { background: #333; }
        
        /* Modal de zoom (simplificado) */
        .zoom-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); z-index:1000; justify-content:center; align-items:center; }
        .zoom-overlay img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

    <header class="nav-container">
        <div class="logo" style="font-family:'Playfair Display'; font-size: 2rem; letter-spacing: 5px;">INNERCIA</div>
        <nav>
            <a href="#new">New Arrival</a>
            <a href="#collection">Collection</a>
        </nav>
        <div class="snipcart-checkout cart-icon">🛒 CARRITO (<span class="snipcart-items-count">0</span>)</div>
    </header>

    <!-- PRODUCTO EJEMPLO CON CARRUSEL Y STOCK -->
    <div class="container" id="new">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-images">
                    <!-- El cliente puede deslizar para ver varias fotos -->
                    <img src="https://unsplash.com" onclick="openZoom(this.src)">
                    <img src="https://unsplash.com" onclick="openZoom(this.src)">
                </div>
                <h3>Blusa "Inercia" Movimiento</h3>
                <p>Stock: 15 unidades</p>
                <p><strong>$1,299.00</strong></p>
                
                <!-- Botón funcional para el carrito -->
                <button class="snipcart-add-item buy-button"
                  data-item-id="blusa-01"
                  data-item-price="1299.00"
                  data-item-url="https://inerciamodaenmovimiento.github.io/Inercia/"
                  data-item-description="Blusa de seda con caída natural."
                  data-item-image="https://unsplash.com"
                  data-item-name="Blusa Inercia">
                  AÑADIR A BOLSA
                </button>
            </div>
        </div>
    </div>

    <!-- Overlay de Zoom -->
    <div id="zoomOverlay" class="zoom-overlay" onclick="this.style.display='none'">
        <img id="zoomImg" src="">
    </div>

    <!-- Scripts de Funcionalidad -->
    <script async src="https://snipcart.com"></script>
    <div hidden id="snipcart" data-api-key="TU_API_KEY_DE_SNIPCART"></div>

    <script>
        function openZoom(src) {
            document.getElementById('zoomImg').src = src;
            document.getElementById('zoomOverlay').style.display = 'flex';
        }
    </script>

</body>
</html>
