<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICKY | Minimalist Shop</title>
    <style>
        :root {
            --primary-bg: #ffffff;
            --secondary-bg: #f5f5f5;
            --accent-color: #000000;
            --text-muted: #666666;
            --font-main: 'Helvetica Neue', Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--primary-bg);
            color: var(--accent-color);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-weight: bold; font-size: 1.5rem; letter-spacing: 3px; }
        .cart-icon { cursor: pointer; font-size: 1.2rem; }

        /* HERO */
        .hero {
            height: 60vh;
            background: #e0e0e0 url('https://unsplash.com') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .hero-content h1 { font-size: 3rem; letter-spacing: 5px; text-transform: uppercase; }

        /* GRID */
        .products-container { padding: 60px 5%; }
        .section-title { font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 40px; text-align: center; font-weight: 300; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background-color: var(--secondary-bg); cursor: zoom-in; transition: opacity 0.3s; }
        .product-info { padding: 15px 0; }
        .price { color: var(--text-muted); margin: 5px 0 15px; }

        /* BOTONES */
        .add-to-cart { width: 100%; padding: 12px; background: var(--accent-color); color: white; border: 1px solid var(--accent-color); cursor: pointer; font-size: 0.75rem; letter-spacing: 2px; }

        /* CARRITO */
        .cart-summary { position: fixed; right: 30px; bottom: 30px; width: 320px; background: white; box-shadow: 0 15px 40px rgba(0,0,0,0.15); padding: 25px; z-index: 1000; }
        #cart-items { list-style: none; max-height: 150px; overflow-y: auto; margin: 15px 0; font-size: 0.8rem; }
        .cart-total { border-top: 1px solid #eee; padding-top: 15px; font-weight: bold; display: flex; justify-content: space-between; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 850px; padding: 40px; position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .close-modal { position: absolute; right: 20px; top: 10px; font-size: 25px; cursor: pointer; }

        /* ADMIN PANEL */
        .admin-panel { display: none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #1a1a1a; color: #fff; padding: 30px; z-index: 3000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .admin-form input { width: 100%; padding: 10px; margin-bottom: 10px; background: #333; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VICKY</div>
        <div class="cart-icon">BOLSA (<span id="cart-count">0</span>)</div>
    </nav>

    <div class="hero"><h1>Colección 2026</h1></div>

    <main class="products-container">
        <h2 class="section-title">PRODUCTOS DESTACADOS</h2>
        <div class="product-grid" id="main-grid">
            <div class="product-card">
                <img src="https://unsplash.com" alt="Item">
                <div class="product-info">
                    <h3>Abrigo Minimal Grey</h3>
                    <p class="price">$25.000</p>
                    <button class="add-to-cart" data-name="Abrigo Minimal" data-price="25000">AGREGAR AL CARRITO</button>
                </div>
            </div>
        </div>
    </main>

    <aside class="cart-summary">
        <h3>Tu Carrito</h3>
        <ul id="cart-items"></ul>
        <div class="cart-total"><span>TOTAL</span><span id="total-price">$0</span></div>
        <button class="add-to-cart" style="margin-top:15px">FINALIZAR COMPRA</button>
    </aside>

    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-image"><img id="modal-img" src="" style="width:100%"></div>
            <div class="modal-details">
                <h2 id="modal-title"></h2>
                <p id="modal-price" class="price"></p>
                <button id="modal-add-btn" class="add-to-cart">AGREGAR AL CARRITO</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel">
        <span style="float:right; cursor:pointer" onclick="this.parentElement.style.display='none'">[X]</span>
        <h2>ADMIN (0110)</h2>
        <div class="admin-form">
            <input type="text" id="new-name" placeholder="Nombre">
            <input type="number" id="new-price" placeholder="Precio">
            <input type="text" id="new-img" placeholder="URL Imagen">
            <button class="add-to-cart" onclick="addNewProduct()" style="background:#fff; color:#000">PUBLICAR</button>
        </div>
    </div>

    <script>
        let cart = [];
        let secretCode = "";

        // Carrito
        function addToCart(name, price) {
            cart.push({ name, price });
            const itemsList = document.getElementById('cart-items');
            itemsList.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                itemsList.innerHTML += `<li>${item.name} <span>$${item.price.toLocaleString()}</span></li>`;
                total += item.price;
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total-price').innerText = `$${total.toLocaleString()}`;
        }

        // Eventos delegados para botones
        document.addEventListener('click', (e) => {
            if(e.target.classList.contains('add-to-cart') && e.target.hasAttribute('data-name')) {
                addToCart(e.target.dataset.name, parseInt(e.target.dataset.price));
            }
            if(e.target.tagName === 'IMG' && e.target.closest('.product-card')) {
                const card = e.target.closest('.product-card');
                const btn = card.querySelector('.add-to-cart');
                document.getElementById('modal-img').src = e.target.src;
                document.getElementById('modal-title').innerText = btn.dataset.name;
                document.getElementById('modal-price').innerText = `$${btn.dataset.price}`;
                document.getElementById('product-modal').style.display = 'flex';
            }
        });

        // Modal close
        document.querySelector('.close-modal').onclick = () => document.getElementById('product-modal').style.display = 'none';

        // Admin Trigger (0110)
        window.addEventListener('keydown', (e) => {
            secretCode += e.key;
            if (secretCode.includes("0110")) {
                document.getElementById('admin-panel').style.display = 'block';
                secretCode = "";
            }
            if (secretCode.length > 10) secretCode = "";
        });

        function addNewProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const img = document.getElementById('new-img').value || 'https://unsplash.com';
            
            if(!name || !price) return;

            const div = document.createElement('div');
            div.className = 'product-card';
            div.innerHTML = `<img src="${img}"><div class="product-info"><h3>${name}</h3><p class="price">$${parseInt(price).toLocaleString()}</p><button class="add-to-cart" data-name="${name}" data-price="${price}">AGREGAR AL CARRITO</button></div>`;
            document.getElementById('main-grid').prepend(div);
            document.getElementById('admin-panel').style.display = 'none';
        }
    </script>
</body>
</html>
