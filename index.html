<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Título de fondo tipo marca de agua -->
    <div class="bg-watermark">INERCIA</div>

    <header class="main-header">
        <h1 class="logo">INERCIA</h1>
        <nav>
            <a href="#">COLECCIONES</a>
            <a href="#">MOVIMIENTO</a>
            <a href="#">CONTACTO</a>
        </nav>
    </header>

    <main class="editorial-container">
        
        <!-- Bloque Hero (Imagen + Título encimado) -->
        <section class="hero-block">
            <div class="main-img-wrapper">
                <img src="https://unsplash.com" alt="Editorial 1">
            </div>
            <div class="hero-text">
                <span class="tag">EST. 2024 / BS AS</span>
                <h2 class="main-title">MODA EN <br><em>MOVIMIENTO</em></h2>
            </div>
        </section>

        <!-- Bloque Manifiesto (Asimétrico) -->
        <section class="manifesto-block">
            <div class="text-content">
                <p class="curator">Curadores de estilo</p>
                <h3 class="story-title">A Story That <br>Eye Witnessed</h3>
                <p class="description">
                    La inercia no es solo física, es el impulso de quien no se detiene. 
                    Nuestras prendas están diseñadas para acompañar cada giro, cada paso.
                </p>
            </div>
            <div class="side-img-wrapper">
                <img src="https://unsplash.com" alt="Editorial 2">
            </div>
        </section>

    </main>

</body>
</html>
