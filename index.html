<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        
        body { background-color: var(--blanco); color: var(--azul); min-height: 100vh; display: flex; flex-direction: column; }

        /* Navegación */
        nav { padding: 30px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 100; background: rgba(255,255,255,0.9); }
        .cart-trigger { cursor: pointer; font-weight: bold; border-bottom: 1px solid var(--azul); }

        /* Hero & Tienda */
        .hero { height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 80px; }
        .brand-name { font-size: 4rem; font-weight: 700; }
        .tagline { font-style: italic; letter-spacing: 5px; opacity: 0.7; }

        .productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; padding: 40px; }
        .card { text-align: center; }
        .card img { width: 100%; height: 350px; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .card img:hover { filter: grayscale(0%); }
        .btn-add { background: var(--azul); color: white; border: none; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; font-size: 0.7rem; }

        /* Carrito Lateral */
        #carrito-panel { position: fixed; right: -100%; top: 0; width: 320px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: 0.5s; padding: 30px; }
        #carrito-panel.active { right: 0; }
        .cart-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* Footer Contacto */
        footer { padding: 50px; text-align: center; border-top: 1px solid #eee; margin-top: auto; }
        .footer-links a { color: var(--azul); text-decoration: none; margin: 0 15px; font-size: 0.8rem; letter-spacing: 2px; }

        /* Administrador */
        #admin-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9f9f9; z-index: 2000; overflow-y: auto; padding: 40px; color: #333; }
        .admin-box { max-width: 800px; margin: auto; background: white; padding: 30px; border: 1px solid #eee; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        
        /* Gatillo Secreto (Abajo Derecha) */
        #secret-dot { position: fixed; bottom: 10px; right: 10px; width: 30px; height: 30px; background: rgba(0,0,0,0.02); cursor: pointer; z-index: 3000; border-radius: 50%; }
        #secret-dot:hover { background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav>
        <div style="letter-spacing: 3px; font-weight: bold;">INERCIA</div>
        <div class="cart-trigger" onclick="toggleCarrito()">CARRITO (<span id="cart-count">0</span>)</div>
    </nav>

    <header class="hero">
        <h1 class="brand-name">Inercia</h1>
        <p class="tagline">Moda en movimiento</p>
    </header>

    <section class="productos">
        <div class="card">
            <img src="https://unsplash.com" alt="Prenda">
            <h3>Remera Art</h3>
            <p>$18.000</p>
            <button class="btn-add" onclick="agregarItem('Remera Art', 18000)">Añadir</button>
        </div>
    </section>

    <div id="carrito-panel">
        <h2 onclick="toggleCarrito()" style="cursor:pointer">← Cerrar</h2>
        <div id="items-lista" style="margin-top:30px"></div>
        <button class="btn-add" onclick="alert('Pedido enviado al sistema del Admin')">Confirmar Pedido</button>
    </div>

    <footer>
        <div class="footer-links">
            <a href="https://instagram.com" target="_blank">Instagram</a>
            <a href="https://wa.me" target="_blank">WhatsApp</a>
        </div>
    </footer>

    <!-- ACCESO ADMIN SEGURO -->
    <div id="secret-dot" onclick="loginAdmin()"></div>

    <div id="admin-view">
        <div class="admin-box">
            <div style="display:flex; justify-content:space-between">
                <h2>Panel Inercia</h2>
                <button onclick="cerrarAdmin()">Cerrar</button>
            </div>
            
            <hr style="margin:20px 0">
            
            <h3>📸 Subir Producto</h3>
            <input type="file" id="upload-file" accept="image/*">
            <input type="text" placeholder="Nombre">
            <input type="number" placeholder="Precio">
            <button class="btn-add">Subir a la Web</button>

            <h3 style="margin-top:40px">📦 Control de Pedidos</h3>
            <div id="order-log" style="background:#f0f0f0; padding:15px; margin-top:10px; font-family:sans-serif; font-size:0.8rem">
                Aún no hay ventas registradas.
            </div>

            <h3 style="margin-top:40px">⚙️ Configuración</h3>
            <input type="text" placeholder="Costo de Envío">
            <select><option>Metodo de Pago: Transferencia</option><option>Metodo de Pago: Efectivo</option></select>
        </div>
    </div>

    <script>
        let items = [];
        function toggleCarrito() { document.getElementById('carrito-panel').classList.toggle('active'); }
        
        function agregarItem(nome, precio) {
            items.push({nome, precio});
            document.getElementById('cart-count').innerText = items.length;
            renderCart();
        }

        function renderCart() {
            const lista = document.getElementById('items-lista');
            lista.innerHTML = items.map(i => `<div class="cart-item"><strong>${i.nome}</strong><br>$${i.precio}</div>`).join('');
        }

        function loginAdmin() {
            if(prompt("Seguridad Inercia. Código:") === "0110") {
                document.getElementById('admin-view').style.display = 'block';
            } else { alert("Error"); }
        }

        function cerrarAdmin() { document.getElementById('admin-view').style.display = 'none'; }
    </script>
</body>
</html>
