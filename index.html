<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Fuentes elegantes -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #f0f0e8; --text: #2c2c2c; --line: rgba(0,0,0,0.1); }
        
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }

        /* Efecto Grano de Película */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url(https://vercel.app); opacity: 0.04; pointer-events: none; z-index: 1000; }

        /* 1. Header Minimalista */
        nav { display: flex; justify-content: space-around; align-items: center; padding: 40px 5%; text-transform: uppercase; font-size: 10px; letter-spacing: 3px; border-bottom: 1px solid var(--line); }
        .logo { font-family: 'Playfair Display', serif; font-size: 45px; letter-spacing: 8px; font-weight: 400; }

        /* 2. Hero Section (Foto Principal) */
        .hero { position: relative; width: 90%; margin: 30px auto; height: 85vh; overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) contrast(1.1); }
        .hero-text { position: absolute; bottom: 8%; left: 5%; color: white; text-transform: uppercase; }
        .hero-text h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin: 0; letter-spacing: 2px; }
        .hero-text p { font-size: 11px; letter-spacing: 4px; margin-top: 10px; border-bottom: 1px solid white; display: inline-block; padding-bottom: 5px; }

        /* 3. Grilla de Colecciones (01, 02, 03) */
        .collections { display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; padding: 100px 10%; text-align: center; }
        .col-item span { font-size: 13px; color: #999; display: block; margin-bottom: 25px; letter-spacing: 2px; }
        .col-item .img-wrapper { width: 100%; height: 480px; overflow: hidden; border: 1px solid var(--line); }
        .col-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.8); transition: 0.6s; }
        .col-item img:hover { filter: grayscale(0); transform: scale(1.03); }
        .col-item h3 { font-family: 'Playfair Display', serif; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-top: 25px; border-bottom: 1px solid var(--text); display: inline-block; padding-bottom: 3px; }

        /* 4. Sección de Frase (The Magic) */
        .quote-block { position: relative; height: 90vh; background: #ddd; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .quote-block img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; filter: sepia(0.2) grayscale(0.4); }
        .quote-content { z-index: 10; color: white; padding: 0 10%; }
        .quote-content h2 { font-family: 'Playfair Display', serif; font-size: 4.5rem; font-weight: 400; line-height: 1.1; margin: 0; }
        .quote-content i { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 5.5rem; text-transform: none; }

        /* Footer */
        footer { padding: 80px 10%; text-align: center; font-size: 10px; letter-spacing: 3px; color: #888; border-top: 1px solid var(--line); }
    </style>
</head>
<body>

    <nav>
        <span>Colecciones</span>
        <span>Editorial</span>
        <div class="logo">INERCIA</div>
        <span>Shop</span>
        <span>Info</span>
    </nav>

    <section class="hero">
        <img src="https://unsplash.com" alt="Inercia Hero">
        <div class="hero-text">
            <h2>Miracle Collection</h2>
            <p>Explorar ahora</p>
        </div>
    </section>

    <section class="collections">
        <div class="col-item">
            <span>01</span>
            <div class="img-wrapper"><img src="https://unsplash.com"></div>
            <h3>Bestsellers</h3>
        </div>
        <div class="col-item">
            <span>02</span>
            <div class="img-wrapper"><img src="https://unsplash.com"></div>
            <h3>Destacados</h3>
        </div>
        <div class="col-item">
            <span>03</span>
            <div class="img-wrapper"><img src="https://unsplash.com"></div>
            <h3>Ver Todo</h3>
        </div>
    </section>

    <section class="quote-block">
        <img src="https://unsplash.com">
        <div class="quote-content">
            <h2>Donde hay <i>Movimiento</i>,<br>hay magia</h2>
        </div>
    </section>

    <footer>
        INERCIA &copy; 2026 — MODA EN CONSTANTE MOVIMIENTO
    </footer>

</body>
</html>
