<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INERCIA — Movement Editorial</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #f8f8f8; --text: #1a1a1a; --accent: #000; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow-x: hidden; 
            line-height: 1.4;
        }

        /* Estilo Revista: Textura y Grano */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://vercel.app');
            opacity: 0.05; pointer-events: none; z-index: 1000;
        }

        header {
            padding: 40px; display: flex; justify-content: space-between;
            position: absolute; width: 100%; z-index: 10;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-style: italic; }

        /* Hero Editorial */
        .hero {
            height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
            align-items: center; padding: 0 5%;
        }
        .hero-text h1 {
            font-family: 'Playfair Display', serif; font-size: 15vw;
            line-height: 0.75; letter-spacing: -0.05em;
        }
        .hero-img { height: 80vh; background: #e0e0e0; position: relative; }
        .hero-img img { width: 100%; height: 100%; object-fit: cover; }

        /* Secciones de Prendas Únicas */
        .editorial-section {
            padding: 100px 5%; display: grid; grid-template-columns: repeat(12, 1fr);
            gap: 20px; align-items: start;
        }
        
        .item-big { grid-column: 1 / span 7; }
        .item-small { grid-column: 9 / span 4; margin-top: 150px; }

        .image-wrapper { position: relative; overflow: hidden; background: #eee; }
        .image-wrapper img { width: 100%; transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .image-wrapper:hover img { transform: scale(1.08); }

        .meta { margin-top: 20px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }
        .item-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 10px 0; }

        /* Admin Panel (Oculto) */
        #admin {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100%;
            background: #fff; border-left: 1px solid #ddd; z-index: 2000;
            padding: 60px; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #admin.active { right: 0; }
        #admin input { width: 100%; padding: 15px; border: none; border-bottom: 1px solid #000; margin-bottom: 30px; font-family: inherit; }
        .btn { background: #000; color: #fff; border: none; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        @media (max-width: 900px) {
            .hero { grid-template-columns: 1fr; }
            .item-big, .item-small { grid-column: span 12; margin-top: 40px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">INERCIA.</div>
    <nav style="font-size: 10px; text-transform: uppercase; letter-spacing: 3px;">Issues / 001 — Movement</nav>
</header>

<section class="hero">
    <div class="hero-text">
        <p style="text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px;">The New Era</p>
        <h1>Moda en<br>Mov.</h1>
    </div>
    <div class="hero-img">
        <img src="https://unsplash.com" alt="Hero">
    </div>
</section>

<div id="catalog">
    <section class="editorial-section">
        <div class="item-big">
            <div class="image-wrapper"><img src="https://unsplash.com"></div>
            <div class="meta">Essential / Collection 01</div>
            <h2 class="item-title">Ethereal Silk Gown</h2>
            <p>$450.00</p>
        </div>
        <div class="item-small">
            <div class="image-wrapper"><img src="https://unsplash.com"></div>
            <div class="meta">Accessories / Unique</div>
            <h2 class="item-title">Void Glass Ring</h2>
            <p>$120.00</p>
        </div>
    </section>
</div>

<div id="admin">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 40px;">Editor Mode</h2>
    <input type="text" id="itemName" placeholder="NOMBRE DE LA PRENDA">
    <input type="text" id="itemPrice" placeholder="PRECIO">
    <input type="text" id="itemImg" placeholder="URL DE IMAGEN (VERTICAL)">
    <button class="btn" onclick="saveItem()">Publicar en Editorial</button>
    <p style="font-size: 11px; margin-top: 40px; color: #888;">Escribe 0110 de nuevo para cerrar.</p>
</div>

<script>
    let buffer = "";
    window.addEventListener('keydown', e => {
        buffer += e.key;
        if (buffer.length > 4) buffer = buffer.slice(1);
        if (buffer === "0110") {
            document.getElementById('admin').classList.toggle('active');
            buffer = "";
        }
    });

    function saveItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;

        if (name && price && img) {
            const newItem = `
            <section class="editorial-section">
                <div class="item-big" style="grid-column: 3 / span 8;">
                    <div class="image-wrapper"><img src="${img}"></div>
                    <div class="meta">New Arrival / Issue 01</div>
                    <h2 class="item-title">${name}</h2>
                    <p>$${price}</p>
                </div>
            </section>`;
            document.getElementById('catalog').insertAdjacentHTML('afterbegin', newItem);
            document.getElementById('admin').classList.remove('active');
        }
    }
</script>

</body>
</html>
