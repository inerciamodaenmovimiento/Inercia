<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | SMFK Style</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --black: #000000;
            --grey: #f2f2f2;
            --border: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--black);
            text-transform: uppercase; /* Todo en mayúsculas como SMFK */
        }

        /* HEADER BRUTALISTA */
        header {
            padding: 40px;
            text-align: center;
            border-bottom: 1.5px solid var(--black);
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 12px;
        }

        /* HERO SECTION - LOOKBOOK */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1.5px solid var(--black);
        }

        .hero-img {
            width: 100%;
            height: 80vh;
            object-fit: cover;
            border-right: 1.5px solid var(--black);
        }

        /* ICONO DE CRUZ (MARCA DE IDENTIDAD) */
        .brand-cross {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
        }

        /* CUADRÍCULA DE PRODUCTOS TIPO SMFK */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-top: 1.5px solid var(--black);
        }

        .product-item {
            padding: 20px;
            border-right: 1.5px solid var(--black);
            border-bottom: 1.5px solid var(--black);
            text-align: center;
            transition: background 0.3s;
        }

        .product-item:last-child { border-right: none; }

        .product-item img {
            width: 100%;
            height: auto;
            margin-bottom: 15px;
            filter: grayscale(100%);
        }

        .product-item:hover { background-color: var(--grey); }
        .product-item:hover img { filter: none; }

        .prod-info {
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .add-icon {
            margin-top: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        /* SECCIÓN NEW ARRIVALS */
        .arrivals-title {
            padding: 20px;
            font-size: 14px;
            letter-spacing: 4px;
            text-align: center;
            background: var(--black);
            color: var(--white);
        }

        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; }
            .product-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">INERCIA</div>
    </header>

    <section class="hero">
        <img src="https://unsplash.com" class="hero-img" alt="Look 1">
        <img src="https://unsplash.com" class="hero-img" alt="Look 2">
    </section>

    <div class="brand-cross">
        <!-- Cruz minimalista SVG -->
        <svg width="40" height="40" viewBox="0 0 24 24" fill="black">
            <path d="M11 2h2v9h9v2h-9v9h-2v-9H2v-2h9V2z"/>
        </svg>
    </div>

    <div class="arrivals-title" style="color: white;">New Arrivals / 新着</div>

    <div class="product-grid">
        <div class="product-item">
            <img src="https://unsplash.com">
            <div class="prod-info">SMFK JACKET<br>9.500 AED</div>
            <div class="add-icon">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
        </div>
        <div class="product-item">
            <img src="https://unsplash.com">
            <div class="prod-info">B&W BEANIE<br>1.200 AED</div>
            <div class="add-icon">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
        </div>
        <div class="product-item">
            <img src="https://unsplash.com">
            <div class="prod-info">FLAIR BOOTS<br>5.200 AED</div>
            <div class="add-icon">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
        </div>
        <div class="product-item">
            <img src="https://unsplash.com">
            <div class="prod-info">CREPE DRESS<br>7.210 AED</div>
            <div class="add-icon">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </div>
        </div>
    </div>

</body>
</html>
