<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); overflow-x: hidden; }

        /* NAVEGACIÓN */
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; }
        .logo { font-weight: bold; letter-spacing: 5px; font-size: 1.1rem; }
        .cart-trigger { cursor: pointer; font-size: 0.75rem; letter-spacing: 2px; font-weight: bold; }

        /* BANNERS PRINCIPALES */
        #banner-container { width: 100%; height: 50vh; overflow: hidden; position: relative; margin-top: 60px; background: #f0f0f0; }
        #banner-slider { display: flex; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        #banner-slider img { width: 100%; flex-shrink: 0; object-fit: cover; }

        .hero-text { padding: 40px 20px; text-align: center; }
        .hero-text h1 { font-size: 3.5rem; letter-spacing: -1px; }
        .hero-text p { font-style: italic; opacity: 0.5; letter-spacing: 5px; text-transform: uppercase; font-size: 0.6rem; }

        /* PRODUCTOS COMPACTOS CON CARRUSEL */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; padding: 0 5% 60px; }
        .card { text-align: center; background: white; padding-bottom: 15px; }
        
        .product-carousel { width: 100%; height: 350px; overflow: hidden; position: relative; margin-bottom: 15px; }
        .product-slider { display: flex; transition: 0.5s; height: 100%; }
        .product-slider img { width: 100%; flex-shrink: 0; object-fit: cover; }
        .nav-prod { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 10px; pointer-events: none; }
        .nav-prod button { background: rgba(255,255,255,0.7); border: none; width: 25px; height: 25px; cursor: pointer; pointer-events: auto; border-radius: 50%; font-size: 0.8rem; }

        .card-cat { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; }
        .card-name { font-size: 1rem; margin: 5px 0; }
        .card-desc { font-size: 0.75rem; opacity: 0.7; margin-bottom: 10px; height: 34px; overflow: hidden; }
        .btn-add { background: var(--azul); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; }

        /* PANEL ADMIN PEDIDOS */
        .order-row { border-left: 4px solid var(--azul); background: var(--gris); padding: 15px; margin-bottom: 15px; font-family: sans-serif; font-size: 0.8rem; line-height: 1.6; }

        /* OTROS (CARRITO / ADMIN) SE MANTIENEN IGUAL */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 380px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 40px; box-shadow: -10px 0 50px rgba(0,0,0,0.1); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #eee; font-family: sans-serif; font-size: 0.8rem; }
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 3000; overflow-y: auto; padding: 50px 10%; }
        .admin-box { background: white; padding: 25px; margin-bottom: 25px; }
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

<nav>
    <div class="logo">INERCIA</div>
    <div class="cart-trigger" onclick="toggleCart()">BOLSA (<span id="cart-count">0</span>)</div>
</nav>

<div id="banner-container"><div id="banner-slider"></div></div>
<header class="hero-text"><h1>Inercia</h1><p>Moda en movimiento</p></header>
<section class="productos-container" id="shop-grid"></section>

<!-- CARRITO -->
<div id="cart-panel">
    <h3 style="margin-bottom:20px; letter-spacing:2px">TU BOLSA</h3>
    <div id="cart-items" style="margin-bottom:20px"></div>
    <div id="cart-total" style="font-weight:bold; border-top:1px solid #eee; padding:15px 0">TOTAL: $0</div>
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <select id="c-ship" class="input-cart" onchange="toggleShipDetails()"></select>
    <div id="ship-address-fields" style="display:none">
        <input type="text" id="c-address" class="input-cart" placeholder="DIRECCIÓN Y NÚMERO">
    </div>
    <div id="meet-points-field" style="display:none">
        <select id="c-meet-point" class="input-cart"></select>
    </div>
    <select id="c-pay" class="input-cart" onchange="toggleBankInfo()">
        <option value="Efectivo">EFECTIVO / ACORDAR</option>
        <option value="Transferencia">TRANSFERENCIA BANCARIA</option>
    </select>
    <div id="bank-info-display" style="font-size:0.7rem; background:#fffbe6; padding:10px; display:none"></div>
    <button class="btn-add" onclick="confirmOrder()">CONFIRMAR Y AVISAR POR WHATSAPP</button>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<!-- ADMIN -->
<div id="admin-panel">
    <button onclick="closeAdmin()">CERRAR PANEL</button>
    <div class="admin-box">
        <h3>AÑADIR PRODUCTO (Carrusel)</h3>
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción" class="input-cart"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat-select" class="input-cart"></select>
        <label>Fotos (puedes elegir varias):</label>
        <input type="file" id="p-img" accept="image/*" multiple>
        <button class="btn-add" onclick="uploadProduct()">PUBLICAR</button>
    </div>
    <div class="admin-box">
        <h3>CONFIGURACIÓN</h3>
        <input type="text" id="conf-wa" class="input-cart" placeholder="Número WhatsApp (ej: 54911...)">
        <input type="text" id="conf-cats" class="input-cart" placeholder="Categorías (comas)">
        <input type="text" id="conf-ships" class="input-cart" placeholder="Envíos (comas)">
        <input type="text" id="conf-meets" class="input-cart" placeholder="Puntos de Encuentro (comas)">
        <textarea id="conf-bank" class="input-cart" placeholder="Datos Bancarios"></textarea>
        <button class="btn-add" onclick="saveConfig()">GUARDAR</button>
    </div>
    <div class="admin-box"><h3>PEDIDOS RECIBIDOS</h3><div id="admin-orders-list"></div></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('inercia_v4_db')) || { 
        products: [], orders: [], cats: ["Nuevo"], ships: ["Retiro"], meets: [], banners: [], bank: "", wa: "" 
    };
    let cart = [];

    window.onload = () => { renderShop(); renderBanners(); updateUI(); };
    function save() { localStorage.setItem('inercia_v4_db', JSON.stringify(db)); }
    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }

    function toggleShipDetails() {
        const val = document.getElementById('c-ship').value.toLowerCase();
        document.getElementById('ship-address-fields').style.display = (val.includes('envio') || val.includes('domicilio')) ? 'block' : 'none';
        document.getElementById('meet-points-field').style.display = val.includes('encuentro') ? 'block' : 'none';
    }

    function toggleBankInfo() {
        const d = document.getElementById('bank-info-display');
        d.style.display = document.getElementById('c-pay').value === 'Transferencia' ? 'block' : 'none';
        d.innerText = db.bank;
    }

    function updateUI() {
        document.getElementById('p-cat-select').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('c-ship').innerHTML = db.ships.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('c-meet-point').innerHTML = db.meets.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa;
        document.getElementById('conf-cats').value = db.cats.join(', ');
        document.getElementById('conf-ships').value = db.ships.join(', ');
        document.getElementById('conf-meets').value = db.meets.join(', ');
        document.getElementById('conf-bank').value = db.bank;
        renderOrders();
    }

    function saveConfig() {
        db.wa = document.getElementById('conf-wa').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim());
        db.ships = document.getElementById('conf-ships').value.split(',').map(s => s.trim());
        db.meets = document.getElementById('conf-meets').value.split(',').map(s => s.trim());
        db.bank = document.getElementById('conf-bank').value;
        save(); updateUI(); alert("Guardado");
    }

    // PRODUCTOS CON CARRUSEL
    async function uploadProduct() {
        const files = document.getElementById('p-img').files;
        if(!files.length) return;
        const imgs = [];
        for(let f of files) {
            imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); }));
        }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat-select').value, imgs: imgs });
        save(); renderShop();
    }

    function renderShop() {
        document.getElementById('shop-grid').innerHTML = db.products.map(p => `
            <div class="card">
                <div class="product-carousel">
                    <div class="product-slider" id="slider-${p.id}">
                        ${p.imgs.map(img => `<img src="${img}">`).join('')}
                    </div>
                    ${p.imgs.length > 1 ? `<div class="nav-prod">
                        <button onclick="moveP(${p.id}, -1)">❮</button>
                        <button onclick="moveP(${p.id}, 1)">❯</button>
                    </div>` : ''}
                </div>
                <span class="card-cat">${p.cat}</span>
                <h3 class="card-name">${p.name}</h3>
                <p class="card-desc">${p.desc}</p>
                <p><strong>$${p.price}</strong></p>
                <button class="btn-add" onclick="addToCart(${p.id})">COMPRAR</button>
            </div>`).join('');
    }

    function moveP(id, dir) {
        const s = document.getElementById('slider-'+id);
        const count = s.querySelectorAll('img').length;
        s.curr = ((s.curr || 0) + dir + count) % count;
        s.style.transform = `translateX(-${s.curr * 100}%)`;
    }

    // CARRITO Y AVISO WHATSAPP
    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        cart.push({...p, cartId: Date.now()});
        updateCartUI(); toggleCart();
    }

    function updateCartUI() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="display:flex;justify-content:space-between;font-size:0.7rem;margin-bottom:5px"><span>${i.name}</span><span>$${i.price}</span></div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        const name = document.getElementById('c-name').value;
        if(!cart.length || !name) return alert("Faltan datos");
        
        const order = {
            id: Date.now(),
            fecha: new Date().toLocaleString(),
            cliente: name,
            productos: cart.map(i => i.name).join(', '),
            envio: document.getElementById('c-ship').value,
            detalleEnvio: document.getElementById('c-address').value || document.getElementById('c-meet-point').value || 'Retiro local',
            pago: document.getElementById('c-pay').value,
            total: document.getElementById('cart-total').innerText
        };

        db.orders.push(order); save(); renderOrders();

        // MENSAJE DE WHATSAPP (Aviso al dueño)
        const msg = `NUEVO PEDIDO EN INERCIA%0A--------------------%0ACliente: ${order.cliente}%0AProductos: ${order.productos}%0AEnvío: ${order.envio} (${order.detalleEnvio})%0APago: ${order.pago}%0A${order.total}`;
        window.open(`https://wa.me{db.wa}?text=${msg}`);
        
        cart = []; updateCartUI(); toggleCart();
    }

    function renderOrders() {
        document.getElementById('admin-orders-list').innerHTML = db.orders.map(o => `
            <div class="order-row">
                <strong>${o.fecha} - ${o.cliente}</strong><br>
                🛒 ${o.productos}<br>
                📍 ${o.envio}: ${o.detalleEnvio}<br>
                💳 ${o.pago} | 💰 ${o.total}
            </div>`).reverse().join('');
    }

    // BANNERS (Misma lógica previa)
    function renderBanners() {
        const s = document.getElementById('banner-slider');
        s.innerHTML = db.banners.map(img => `<img src="${img}">`).join('');
    }
</script>
</body>
</html>
