<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INERCIA | Moda en Movimiento</title>
  <script src="https://tailwindcss.com"></script>
  <script src="https://unpkg.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cafe': '#3d2b1f',
            'crema': '#fdfbf7',
            'arena': '#e8e2d9'
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #fdfbf7; color: #1a1a1a; font-family: 'Outfit', sans-serif; margin: 0; }
    .font-serif { font-family: 'Cormorant Garamond', serif; }
    .cart-sidebar { transform: translateX(100%); transition: 0.4s ease-in-out; }
    .cart-open .cart-sidebar { transform: translateX(0); }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-crema">

  <!-- NAVEGACIÓN -->
  <nav class="fixed top-0 w-full z-50 bg-white border-b border-arena h-20 flex items-center px-6 justify-between">
    <div class="cursor-pointer" onclick="showView('home')">
      <h1 class="font-serif text-3xl italic text-cafe leading-none">Inercia</h1>
      <p class="text-[8px] uppercase tracking-[0.5em] text-stone-400 font-bold">Moda en movimiento</p>
    </div>
    
    <div class="flex items-center gap-6">
      <button onclick="toggleCart()" class="relative p-2 bg-cafe rounded-full">
        <i data-lucide="shopping-bag" class="w-5 h-5 text-white"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
      </button>
    </div>
  </nav>

  <!-- CARRITO -->
  <div id="cart-panel" class="cart-sidebar fixed right-0 top-0 h-full w-80 bg-white z-50 shadow-2xl p-6 border-l border-arena flex flex-col">
    <div class="flex justify-between items-center mb-8">
      <h2 class="font-serif text-2xl italic">Tu Bolsa</h2>
      <button onclick="toggleCart()"><i data-lucide="x"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 text-sm">
      <!-- Items -->
    </div>
    <div class="pt-6 border-t">
      <div class="flex justify-between font-bold mb-4"><span>Total:</span><span id="cart-total">$0</span></div>
      <button onclick="checkout()" class="w-full bg-cafe text-white py-4 rounded-lg font-bold uppercase text-xs tracking-widest">WhatsApp Checkout</button>
    </div>
  </div>

  <main class="pt-20">
    <!-- HOME -->
    <section id="view-home">
      <!-- HERO -->
      <div class="relative h-[60vh] bg-arena flex items-center justify-center text-center px-6">
        <div class="z-10">
          <h2 class="font-serif text-6xl md:text-8xl italic text-cafe mb-2">Keyn Concept</h2>
          <p class="text-xs uppercase tracking-[0.8em] text-stone-600 font-semibold">La confianza empieza aquí</p>
        </div>
      </div>

      <!-- CATALOG -->
      <div class="max-w-7xl mx-auto px-6 py-20 text-center">
        <h3 class="font-serif text-5xl italic mb-12">catalog</h3>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <!-- Productos -->
        </div>
      </div>

      <!-- PHILOSOPHY -->
      <div class="bg-white py-20 px-6 border-t border-arena">
        <div class="max-w-4xl mx-auto text-center">
            <h3 class="font-serif text-4xl italic mb-6">Our Philosophy</h3>
            <p class="text-stone-500 leading-loose text-sm italic">"Inercia no son solo prendas. Es ropa que otorga confianza. Es lo que ayuda a enamorarte de ti y sentir que eres capaz de todo."</p>
        </div>
      </div>
    </section>

    <!-- ADMIN -->
    <section id="view-admin" class="hidden min-h-screen p-10 bg-white">
      <div class="max-w-2xl mx-auto border p-8 rounded-2xl">
        <h2 class="font-serif text-3xl mb-6 italic text-cafe">Panel Studio</h2>
        <div class="space-y-4">
            <input type="text" id="adm-name" placeholder="Nombre" class="w-full border p-3 rounded-lg outline-none">
            <input type="number" id="adm-price" placeholder="Precio" class="w-full border p-3 rounded-lg outline-none">
            <input type="file" id="adm-img" class="w-full text-xs">
            <button onclick="saveProduct()" class="w-full bg-cafe text-white py-4 rounded-lg font-bold">PUBLICAR</button>
            <button onclick="showView('home')" class="w-full text-xs uppercase font-bold text-stone-400 mt-4">Salir</button>
        </div>
        <div id="adm-list" class="mt-10 space-y-2 border-t pt-6"></div>
      </div>
    </section>
  </main>

  <footer class="py-10 text-center text-[10px] text-stone-400 uppercase tracking-widest">
    © 2024 INERCIA STUDIO <button onclick="accessStudio()" class="opacity-0">.</button>
  </footer>

  <script>
    // PRODUCTOS DE MUESTRA (BASADOS EN TU IMAGEN)
    const initialProducts = [
      { id: 1, name: "Rashguard Negro", price: "12900", img: "https://unsplash.com" },
      { id: 2, name: "Rashguard Blanco", price: "12900", img: "https://unsplash.com" },
      { id: 3, name: "Bomber Suede", price: "18900", img: "https://unsplash.com" }
    ];

    let db = JSON.parse(localStorage.getItem('inercia_final')) || initialProducts;
    let cart = [];

    function showView(v) {
      document.getElementById('view-home').classList.toggle('hidden', v !== 'home');
      document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
    }

    function accessStudio() {
      if(prompt("Code:") === "0110") showView('admin');
    }

    function toggleCart() { document.body.classList.toggle('cart-open'); }

    function saveProduct() {
      const name = document.getElementById('adm-name').value;
      const price = document.getElementById('adm-price').value;
      const file = document.getElementById('adm-img').files;
      if(!name || !price || !file) return alert("Faltan datos");

      const reader = new FileReader();
      reader.onload = (e) => {
        db.push({ id: Date.now(), name, price, img: e.target.result });
        localStorage.setItem('inercia_final', JSON.stringify(db));
        render();
      };
      reader.readAsDataURL(file);
    }

    function render() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = db.map(p => `
        <div class="group">
          <div class="aspect-[3/4] bg-arena rounded-2xl overflow-hidden mb-4 relative">
            <img src="${p.img}" class="w-full h-full object-cover">
            <button onclick="addToCart(${p.id})" class="absolute bottom-4 left-4 right-4 bg-white/90 py-3 rounded-xl font-bold text-xs uppercase opacity-0 group-hover:opacity-100 transition">Agregar</button>
          </div>
          <h4 class="font-serif text-2xl italic">${p.name}</h4>
          <p class="text-sm font-bold text-stone-400">$${Number(p.price).toLocaleString()}</p>
        </div>
      `).join('');

      document.getElementById('adm-list').innerHTML = db.map(p => `
        <div class="flex justify-between items-center p-2 border-b text-xs">
          <span>${p.name}</span>
          <button onclick="deleteProd(${p.id})" class="text-red-500">Eliminar</button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function addToCart(id) {
      cart.push(db.find(p => p.id === id));
      updateCart();
      toggleCart();
    }

    function updateCart() {
      document.getElementById('cart-count').innerText = cart.length;
      document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
        <div class="flex gap-4 border-b pb-2">
            <img src="${item.img}" class="w-10 h-12 object-cover rounded">
            <div class="flex-1">
                <p class="font-bold text-xs">${item.name}</p>
                <p class="text-stone-400">$${Number(item.price).toLocaleString()}</p>
                <button onclick="cart.splice(${i},1); updateCart()" class="text-[9px] text-red-500 uppercase">Quitar</button>
            </div>
        </div>
      `).join('');
      const total = cart.reduce((s, x) => s + Number(x.price), 0);
      document.getElementById('cart-total').innerText = "$" + total.toLocaleString();
    }

    function deleteProd(id) {
      db = db.filter(x => x.id !== id);
      localStorage.setItem('inercia_final', JSON.stringify(db));
      render();
    }

    function checkout() {
      const msg = `Hola Inercia! Quiero comprar: ${cart.map(x => x.name).join(', ')}. Total: ${document.getElementById('cart-total').innerText}`;
      window.open(`https://wa.me{encodeURIComponent(msg)}`);
    }

    lucide.createIcons();
    render();
  </script>
</body>
</html>
