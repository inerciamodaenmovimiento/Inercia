<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Tailwind de Respaldo -->
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        
        /* DISEÑO DE LUJO - CSS INTERNO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        
        header { position: fixed; width: 100%; top: 0; background: rgba(255,255,255,0.98); border-bottom: 1px solid #f0f0f0; z-index: 100; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; letter-spacing: 6px; text-transform: uppercase; font-weight: bold; cursor: pointer; }
        
        .hero { height: 90vh; background: #f5f5f5; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-top: 70px; }
        .hero img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: 1s; }
        .hero-text { position: relative; z-index: 10; text-align: center; color: white; }
        .hero-text h1 { font-size: clamp(60px, 10vw, 120px); font-style: italic; text-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .hero-text p { letter-spacing: 12px; text-transform: uppercase; font-size: 11px; margin-top: 10px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 50px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 40px; padding: 80px 0; }
        .product-card { text-align: center; position: relative; }
        .img-holder { aspect-ratio: 2/3; background: #f9f9f9; overflow: hidden; position: relative; margin-bottom: 20px; }
        .img-holder img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .product-card:hover img { transform: scale(1.08); }
        
        .buy-btn { position: absolute; bottom: 0; width: 100%; background: black; color: white; padding: 15px; font-size: 10px; text-transform: uppercase; font-weight: bold; opacity: 0; transition: 0.3s; border: none; cursor: pointer; }
        .product-card:hover .buy-btn { opacity: 1; }

        /* PANEL ADMIN */
        .admin-view { display: none; padding-top: 150px; padding-bottom: 100px; }
        .admin-box { background: #fafafa; border: 1px solid #eee; padding: 50px; border-radius: 2px; }
        input, textarea { padding: 15px; border: 1px solid #ddd; outline: none; font-size: 13px; width: 100%; margin-bottom: 15px; }
        .btn-black { background: black; color: white; padding: 20px; width: 100%; border: none; font-size: 11px; font-bold; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }

        /* CARRITO */
        .cart-sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 450px; background: white; z-index: 200; box-shadow: -20px 0 50px rgba(0,0,0,0.1); transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 50px; display: flex; flex-direction: column; }
        .cart-sidebar.open { transform: translateX(0); }
    </style>
</head>
<body>

    <header>
        <div class="logo serif" onclick="navigate('home')">INERCIA</div>
        <button onclick="toggleCart()" style="background:none; border:none; cursor:pointer; font-size: 22px;">🛒 <span id="cart-count" style="font-size: 11px; font-weight: bold;">0</span></button>
    </header>

    <!-- TIENDA -->
    <main id="view-home">
        <section class="hero">
            <img id="main-banner" src="">
            <div class="hero-text">
                <h1 id="txt-logo" class="serif italic">Inercia</h1>
                <p>Moda en Movimiento</p>
            </div>
        </section>

        <div class="container">
            <div style="text-align: center; padding-top: 100px;">
                <h2 id="txt-arrivals" class="serif italic" style="font-size: 40px;">New Arrivals</h2>
                <div style="width: 30px; height: 1px; background: #000; margin: 20px auto;"></div>
                <div id="home-cats" style="font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 4px; margin-top: 20px;"></div>
            </div>
            <section id="grid-productos" class="products-grid"></section>
        </div>

        <section style="height: 70vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
            <img id="coll-banner" src="" style="position: absolute; width: 100%; height: 100%; object-fit: cover; filter: grayscale(1);">
            <div style="position: relative; z-index: 10; text-align: center; color: white;">
                <h2 class="serif" style="font-size: 80px; text-transform: uppercase;">Collection</h2>
                <button style="border: 1px solid white; background: none; color: white; padding: 15px 50px; font-size: 10px; text-transform: uppercase; cursor: pointer; letter-spacing: 4px;">View</button>
            </div>
        </section>
    </main>

    <!-- ADMIN -->
    <main id="view-admin" class="admin-view container">
        <div class="admin-box">
            <h2 class="serif italic" style="font-size: 35px; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px;">Configuración Inercia</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div>
                    <p style="font-size: 10px; font-weight: bold; margin-bottom: 15px; color: #999;">1. CARGAR PRODUCTO (PC)</p>
                    <input id="adm-n" type="text" placeholder="Nombre">
                    <input id="adm-p" type="number" placeholder="Precio ($)">
                    <input id="adm-s" type="number" placeholder="Stock">
                    <input id="adm-c" type="text" placeholder="Categoría">
                    <input id="adm-f" type="file">
                    <button onclick="saveProd()" class="btn-black">Publicar</button>
                </div>
                <div>
                    <p style="font-size: 10px; font-weight: bold; margin-bottom: 15px; color: #999;">2. PERSONALIZAR BANNERS Y TEXTOS</p>
                    <input id="adm-logo" type="text" placeholder="Nombre Marca">
                    <textarea id="adm-pago" placeholder="Métodos de Pago"></textarea>
                    <textarea id="adm-envio" placeholder="Métodos de Envío"></textarea>
                    <label style="font-size: 10px; font-bold; display:block; margin-bottom: 5px;">Banner Principal (PC):</label>
                    <input id="file-h" type="file">
                    <label style="font-size: 10px; font-bold; display:block; margin-bottom: 5px;">Banner Colección (PC):</label>
                    <input id="file-c" type="file">
                    <button onclick="updateSettings()" class="btn-black" style="background: #f0f0f0; color: #000;">Guardar Cambios</button>
                </div>
            </div>

            <div style="margin-top: 60px;">
                <h3 class="serif italic" style="font-size: 24px; margin-bottom: 20px;">Historial Detallado de Ventas</h3>
                <div id="adm-ventas" style="background: white; border: 1px solid #eee; padding: 20px; font-size: 11px;"></div>
                <button onclick="clearSales()" style="margin-top: 10px; color: red; font-size: 10px; text-decoration: underline; background: none; border: none; cursor: pointer;">Limpiar Historial</button>
            </div>
            <button onclick="navigate('home')" style="margin-top: 40px; font-size: 10px; text-transform: uppercase; text-decoration: underline; background: none; border: none; cursor: pointer;">Salir del Editor</button>
        </div>
    </main>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 30px; margin-bottom: 30px;">
            <span class="serif italic" style="font-size: 28px;">Mi Bolsa</span>
            <button onclick="toggleCart()" style="font-size: 35px; border: none; background: none; cursor: pointer;">&times;</button>
        </div>
        <div id="cart-content" style="flex-grow: 1; overflow-y: auto;"></div>
        <div id="info-cliente" style="font-size: 10px; color: #999; margin-bottom: 20px; line-height: 1.6;"></div>
        <div style="border-top: 1px solid #eee; padding-top: 30px;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 24px; margin-bottom: 30px;">
                <span>Total</span><span id="cart-total">$0</span>
            </div>
            <button onclick="checkout()" class="btn-black">Finalizar por WhatsApp</button>
            <button onclick="alert('Arrepentimiento registrado')" style="width: 100%; margin-top: 20px; font-size: 9px; text-decoration: underline; background: none; border: none; color: #ccc; cursor: pointer; text-transform: uppercase;">Arrepentimiento</button>
        </div>
    </div>

    <!-- ACCESO ADMIN INVISIBLE -->
    <button onclick="promptAdmin()" style="position: fixed; bottom: 10px; right: 10px; opacity: 0.05; cursor: pointer; font-size: 8px;">ADM</button>

    <script>
        let db = JSON.parse(localStorage.getItem('inercia_v4')) || {
            prods: [], ventas: [], h: '', c: '', logo: 'INERCIA', pago: 'Transferencia, Efectivo', envio: 'Correo Argentino, Moto'
        };
        let cart = [];

        function promptAdmin() { if (prompt("Código Acceso:") === "0110") navigate('admin'); }
        function navigate(v) {
            document.getElementById('view-home').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = v === 'admin' ? 'block' : 'none';
            window.history.pushState("", "", window.location.pathname);
            window.scrollTo(0,0);
        }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }

        const readFile = (id) => new Promise(res => {
            const f = document.getElementById(id).files;
            if(!f) return res(null);
            const r = new FileReader();
            r.onload = e => res(e.target.result);
            r.readAsDataURL(f);
        });

        async function saveProd() {
            const img = await readFile('adm-f');
            if(img) {
                db.prods.push({ id: Date.now(), n: document.getElementById('adm-n').value, p: parseInt(document.getElementById('adm-p').value), s: parseInt(document.getElementById('adm-s').value), c: document.getElementById('adm-c').value, img });
                save(); refresh(); navigate('home');
            }
        }

        async function updateSettings() {
            const h = await readFile('file-h'), c = await readFile('file-c');
            if(h) db.h = h; if(c) db.c = c;
            db.logo = document.getElementById('adm-logo').value || db.logo;
            db.pago = document.getElementById('adm-pago').value || db.pago;
            db.envio = document.getElementById('adm-envio').value || db.envio;
            save(); refresh();
        }

        function refresh() {
            document.getElementById('main-banner').src = db.h;
            document.getElementById('coll-banner').src = db.c;
            document.getElementById('txt-logo').innerText = db.logo;
            document.getElementById('info-cliente').innerHTML = `<b>PAGOS:</b> ${db.pago}<br><b>ENVÍOS:</b> ${db.envio}`;
            
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = db.prods.map(p => `
                <div class="product-card">
                    <div class="img-holder"><img src="${p.img}"></div>
                    <p style="font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 2px;">${p.c}</p>
                    <h3 class="serif italic" style="font-size: 20px; margin: 10px 0;">${p.n}</h3>
                    <p style="font-weight: 300;">$${p.p.toLocaleString()}</p>
                    <p style="font-size: 8px; color: #ddd; margin-top: 10px;">STOCK: ${p.s}</p>
                    <button onclick="addToCart(${p.id})" class="buy-btn">Add to Bag</button>
                    <button onclick="deleteProd(${p.id})" style="font-size: 9px; color: red; background: none; border: none; margin-top: 15px; cursor: pointer; text-decoration: underline;">Eliminar</button>
                </div>
            `).join('');

            const cats = [...new Set(db.prods.map(p => p.c))];
            document.getElementById('home-cats').innerHTML = cats.join(' | ');
            document.getElementById('adm-ventas').innerHTML = db.ventas.map(v => `
                <div style="border-bottom: 1px solid #eee; padding: 10px 0;">
                    <b>${v.f}</b> - $${v.t.toLocaleString()} <br> <span style="color: #999 italic">${v.items}</span>
                </div>
            `).reverse().join('');
        }

        function deleteProd(id) { db.prods = db.prods.filter(x => x.id !== id); save(); refresh(); }
        function addToCart(id) { const p = db.prods.find(x => x.id === id); if(p.s > 0) { cart.push(p); updateCart(); toggleCart(); } }
        
        function updateCart() {
            const cont = document.getElementById('cart-content');
            cont.innerHTML = cart.map((item, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:14px;">
                    <span class="serif italic">${item.n}</span><span>$${item.p.toLocaleString()}</span>
                    <button onclick="cart.splice(${i},1); updateCart();" style="border:none; background:none; cursor:pointer; color:red;">&times;</button>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = '$' + cart.reduce((acc, p) => acc + p.p, 0).toLocaleString();
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            const t = cart.reduce((acc, p) => acc + p.p, 0);
            db.ventas.push({ f: new Date().toLocaleString(), t, items: cart.map(p => p.n).join(", ") });
            cart.forEach(i => { const p = db.prods.find(x => x.id === i.id); if(p) p.s--; });
            save();
            window.open(`https://wa.me{encodeURIComponent("PEDIDO INERCIA: " + cart.map(p => p.n).join(", ") + ". Total: $" + t)}`);
            cart = []; updateCart(); refresh(); toggleCart();
        }

        function clearSales() { db.ventas = []; save(); refresh(); }
        function save() { localStorage.setItem('inercia_v4', JSON.stringify(db)); }
        refresh();
    </script>
</body>
</html>
