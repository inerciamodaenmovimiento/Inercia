<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-view { display: none; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <!-- NAVBAR -->
    <header class="fixed w-full z-50 bg-white/95 backdrop-blur-sm border-b">
        <nav class="container mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-[0.3em] serif uppercase cursor-pointer" onclick="showView('home')">Inercia</div>
            <div class="flex items-center space-x-8">
                <button onclick="showView('admin')" class="text-[10px] uppercase font-bold text-red-500 tracking-widest">Admin</button>
                <button onclick="toggleCart()" class="relative">
                    <i class="fa-solid fa-bag-shopping text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- VISTA CLIENTE -->
    <main id="view-home" class="pt-20">
        <!-- Banner Principal -->
        <section class="relative h-[70vh] flex items-center justify-center bg-gray-200">
            <img id="display-banner" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover">
            <div class="relative z-10 text-center text-white">
                <h1 class="text-6xl md:text-8xl serif mb-2">Inercia</h1>
                <p class="text-sm tracking-[0.5em] uppercase">Moda en Movimiento</p>
            </div>
        </section>

        <!-- Grilla de Productos -->
        <section class="container mx-auto px-6 py-20">
            <h2 class="text-3xl serif text-center mb-16 underline underline-offset-8">Nueva Colección</h2>
            <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
                <!-- Se cargan por JavaScript -->
            </div>
        </section>
    </main>

    <!-- VISTA ADMINISTRADOR (Oculta por defecto) -->
    <main id="view-admin" class="admin-view pt-32 container mx-auto px-6">
        <div class="max-w-2xl mx-auto bg-gray-50 p-10 rounded-2xl border">
            <h2 class="serif text-2xl mb-8">Panel de Control</h2>
            <div class="space-y-4">
                <input id="in-nombre" type="text" placeholder="Nombre de prenda" class="w-full p-3 border rounded">
                <input id="in-precio" type="number" placeholder="Precio ($)" class="w-full p-3 border rounded">
                <input id="in-cat" type="text" placeholder="Categoría (Ej: Abrigos)" class="w-full p-3 border rounded">
                <input id="in-img" type="text" placeholder="Link de imagen (URL)" class="w-full p-3 border rounded">
                <button onclick="saveProduct()" class="w-full bg-black text-white py-4 font-bold uppercase text-xs tracking-widest">Publicar Producto</button>
            </div>
            <button onclick="showView('home')" class="mt-8 text-xs uppercase underline">Volver a la tienda</button>
        </div>
    </main>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white z-[60] shadow-2xl translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-8 flex justify-between items-center border-b">
            <span class="serif text-2xl">Bolsa</span>
            <button onclick="toggleCart()" class="text-4xl">&times;</button>
        </div>
        <div id="cart-content" class="flex-grow p-8 overflow-y-auto"></div>
        <div class="p-8 border-t space-y-4">
            <div class="flex justify-between font-bold"><span>Total</span><span id="cart-total">$0</span></div>
            <button onclick="checkout()" class="w-full bg-black text-white py-5 font-bold uppercase text-xs tracking-widest">Finalizar por WhatsApp</button>
        </div>
    </div>

    <!-- BOTONES FLOTANTES -->
    <div class="fixed bottom-6 right-6 flex flex-col space-y-4 z-50">
        <a href="https://wa.me" target="_blank" class="w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-xl"><i class="fa-brands fa-whatsapp text-3xl"></i></a>
    </div>

    <script>
        // PRODUCTOS DE EJEMPLO PARA QUE NO ESTÉ VACÍO
        let products = [
            { id: 1, nombre: 'Blusa Minimal', precio: 12500, cat: 'Nuevos', img: 'https://unsplash.com' },
            { id: 2, nombre: 'Abrigo Grey', precio: 22900, cat: 'Invierno', img: 'https://unsplash.com' },
            { id: 3, nombre: 'Suéter Beige', precio: 15400, cat: 'Nuevos', img: 'https://unsplash.com' }
        ];
        let cart = [];

        function showView(view) {
            document.getElementById('view-home').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = view === 'admin' ? 'block' : 'none';
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = products.map(p => `
                <div class="group">
                    <div class="aspect-[3/4] overflow-hidden bg-gray-100 mb-4 relative">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-4 text-[10px] uppercase font-bold opacity-0 group-hover:opacity-100 transition-all">Agregar</button>
                    </div>
                    <h3 class="text-xs uppercase font-bold tracking-widest">${p.nombre}</h3>
                    <p class="text-sm text-gray-500 mt-1">$${p.precio.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateCart();
            toggleCart();
        }

        function updateCart() {
            const cont = document.getElementById('cart-content');
            cont.innerHTML = cart.map(item => `<div class="flex justify-between py-2 border-b text-xs uppercase font-bold"><span>${item.nombre}</span><span>$${item.precio}</span></div>`).join('');
            document.getElementById('cart-total').innerText = '$' + cart.reduce((acc, p) => acc + p.precio, 0);
            document.getElementById('cart-count').innerText = cart.length;
        }

        function saveProduct() {
            const n = document.getElementById('in-nombre').value;
            const p = document.getElementById('in-precio').value;
            const c = document.getElementById('in-cat').value;
            const i = document.getElementById('in-img').value;
            if(n && p && i) {
                products.unshift({ id: Date.now(), nombre: n, precio: parseInt(p), cat: c, img: i });
                render();
                showView('home');
            }
        }

        function checkout() {
            const total = cart.reduce((acc, p) => acc + p.precio, 0);
            const msg = `Hola Inercia, quiero: ${cart.map(p => p.nombre).join(', ')}. Total: $${total}`;
            window.open(`https://wa.me?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
