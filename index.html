<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inercia — Concept Store</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --bg: #ffffff; --txt: #000000; --accent: #f8f8f8; --admin-bg: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); overflow-x: hidden; }

        /* --- VISTA TIENDA --- */
        #shop-view { display: block; }
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #f0f0f0; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: -1px; text-transform: lowercase; }
        .cart-trigger { cursor: pointer; font-size: 18px; position: relative; }
        .cart-dot { position: absolute; top: -8px; right: -8px; background: #000; color: #fff; font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .hero { padding: 80px 5%; display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: center; }
        .hero-info h1 { font-size: clamp(50px, 8vw, 100px); line-height: 0.9; font-weight: 700; margin-bottom: 20px; }
        .hero-img { width: 100%; height: 75vh; object-fit: cover; border-radius: 4px; background: #eee; }

        .catalog { padding: 100px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .product { text-align: left; margin-bottom: 40px; cursor: pointer; }
        .p-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #eee; margin-bottom: 15px; }
        .btn-buy { width: 100%; padding: 15px; background: #000; color: #fff; border: none; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        /* --- PANEL ADMIN (PANTALLA COMPLETA) --- */
        #admin-view { display: none; background: #f4f4f4; min-height: 100vh; color: #333; }
        .admin-nav { background: #fff; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .admin-container { display: grid; grid-template-columns: 250px 1fr; min-height: calc(100vh - 80px); }
        .admin-sidebar { background: #fff; border-right: 1px solid #ddd; padding: 40px 20px; }
        .admin-menu-btn { width: 100%; padding: 15px; text-align: left; background: none; border: none; cursor: pointer; font-weight: 600; border-radius: 8px; margin-bottom: 10px; }
        .admin-menu-btn.active { background: #000; color: #fff; }
        
        .admin-content { padding: 60px; max-width: 900px; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .card { background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 30px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; color: #666; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-save { background: #000; color: #fff; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        
        .p-preview-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .p-preview-item { background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }

        /* CARRITO MODAL */
        #cart-modal { position: fixed; right: -100%; top: 0; width: 450px; height: 100vh; background: #fff; z-index: 2000; padding: 40px; transition: 0.5s; box-shadow: -10px 0 50px rgba(0,0,0,0.1); overflow-y: auto; }
        #cart-modal.open { right: 0; }
    </style>
</head>
<body>

    <!-- VISTA TIENDA -->
    <div id="shop-view">
        <nav>
            <div class="logo" id="logo-shop">inercia</div>
            <div class="cart-trigger" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <div class="cart-dot" id="cart-count">0</div>
            </div>
        </nav>

        <section class="hero">
            <div class="hero-info">
                <h1 id="hero-title">Movement is style.</h1>
                <p id="hero-desc">Curaduría de esenciales diseñados para durar.</p>
                <a href="#catalogo" style="color: black; font-weight: 700; text-transform: uppercase; font-size: 12px;">Comprar</a>
            </div>
            <img src="https://unsplash.com" class="hero-img" id="hero-img-display">
        </section>

        <section class="catalog" id="catalogo">
            <div class="grid" id="main-grid"></div>
        </section>
    </div>

    <!-- PANEL ADMINISTRADOR (CECILIÉ BOUTIQUE STYLE) -->
    <div id="admin-view">
        <div class="admin-nav">
            <h2>Panel de Gestión — inercia</h2>
            <button class="btn-save" onclick="closeAdmin()" style="background:#ff4b4b;">Cerrar sesión</button>
        </div>

        <div class="admin-container">
            <div class="admin-sidebar">
                <button class="admin-menu-btn active" onclick="switchSection('gen')">General</button>
                <button class="admin-menu-btn" onclick="switchSection('prod')">Productos</button>
                <button class="admin-menu-btn" onclick="switchSection('log')">Logística & WhatsApp</button>
                <button class="admin-menu-btn" onclick="switchSection('pay')">Pagos</button>
            </div>

            <div class="admin-content">
                <!-- SECCIÓN GENERAL -->
                <div id="sec-gen" class="admin-section active">
                    <h3>Configuración de Portada</h3><br>
                    <div class="card">
                        <div class="field"><label>Nombre de la marca</label><input type="text" id="adm-name"></div>
                        <div class="field"><label>Título del Banner</label><input type="text" id="adm-title"></div>
                        <div class="field"><label>Imagen Principal</label><input type="file" id="adm-img-file" accept="image/*"></div>
                    </div>
                </div>

                <!-- SECCIÓN PRODUCTOS -->
                <div id="sec-prod" class="admin-section">
                    <h3>Gestión de Inventario</h3><br>
                    <div class="card">
                        <div class="field"><label>Nombre del Producto</label><input type="text" id="p-name"></div>
                        <div class="field"><label>Precio</label><input type="number" id="p-price"></div>
                        <div class="field"><label>Foto del Producto</label><input type="file" id="p-img-file" accept="image/*"></div>
                        <button class="btn-save" onclick="addNewProduct()">Publicar Producto</button>
                    </div>
                    <div id="admin-p-list" class="p-preview-list"></div>
                </div>

                <!-- SECCIÓN LOGÍSTICA -->
                <div id="sec-log" class="admin-section">
                    <h3>Ventas y Contacto</h3><br>
                    <div class="card">
                        <div class="field"><label>Número de WhatsApp (549...)</label><input type="text" id="adm-wsp"></div>
                        <div class="field"><label>Email Corporativo</label><input type="text" id="adm-email"></div>
                    </div>
                </div>

                <!-- SECCIÓN PAGOS -->
                <div id="sec-pay" class="admin-section">
                    <h3>Métodos de Cobro</h3><br>
                    <div class="card">
                        <div class="field"><label>Métodos que aceptas (separados por coma)</label><textarea id="adm-payments"></textarea></div>
                    </div>
                </div>

                <button class="btn-save" onclick="saveGlobalSettings()">Guardar todos los cambios</button>
            </div>
        </div>
    </div>

    <!-- MODAL CARRITO -->
    <div id="cart-modal">
        <h2 style="margin-bottom:30px;">Tu Carrito</h2>
        <div id="cart-items"></div>
        <div id="cart-total" style="font-size:20px; font-weight:700; margin-top:20px;">Total: $0</div>
        <div style="margin-top:40px; border-top:1px solid #eee; padding-top:20px;">
            <h3>Datos del Pedido</h3><br>
            <div class="field"><input type="text" id="cust-name" placeholder="Nombre completo"></div>
            <div class="field"><input type="text" id="cust-dir" placeholder="Dirección de entrega"></div>
            <button class="btn-buy" onclick="checkout()">Enviar pedido por WhatsApp</button>
        </div>
        <br><button onclick="toggleCart()" style="border:none; background:none; text-decoration:underline; cursor:pointer;">Seguir comprando</button>
    </div>

    <script>
        // Memoria
        let settings = JSON.parse(localStorage.getItem('in_set')) || {
            name: "inercia",
            title: "Movement is style.",
            heroImg: "https://unsplash.com",
            wsp: "5491100000000",
            email: "hola@inercia.com",
            payments: "Transferencia Bancaria, Efectivo"
        };

        let products = JSON.parse(localStorage.getItem('in_prod')) || [
            { name: "Suede Jacket", price: 25000, img: "https://unsplash.com" }
        ];

        let cart = [];

        // Admin Trigger 0110
        let keys = "";
        window.onkeydown = (e) => {
            keys += e.key;
            if(keys.includes("0110")) { 
                document.getElementById('shop-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                keys = "";
                loadAdminFields();
            }
            if(keys.length > 5) keys = "";
        }

        function closeAdmin() {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('shop-view').style.display = 'block';
        }

        function switchSection(sec) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.admin-menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + sec).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Manejo de Fotos desde la PC
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function addNewProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-img-file').files[0];
            
            if(name && price && file) {
                const imgData = await getBase64(file);
                products.push({ name, price: parseInt(price), img: imgData });
                render();
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img-file').value = '';
            }
        }

        function saveGlobalSettings() {
            settings.name = document.getElementById('adm-name').value;
            settings.title = document.getElementById('adm-title').value;
            settings.wsp = document.getElementById('adm-wsp').value;
            settings.email = document.getElementById('adm-email').value;
            settings.payments = document.getElementById('adm-payments').value;
            
            const heroFile = document.getElementById('adm-img-file').files[0];
            if(heroFile) {
                getBase64(heroFile).then(data => {
                    settings.heroImg = data;
                    finishSave();
                });
            } else {
                finishSave();
            }
        }

        function finishSave() {
            localStorage.setItem('in_set', JSON.stringify(settings));
            localStorage.setItem('in_prod', JSON.stringify(products));
            render();
            alert("¡Todo actualizado con éxito!");
        }

        function render() {
            // Web
            document.getElementById('logo-shop').innerText = settings.name;
            document.getElementById('hero-title').innerText = settings.title;
            document.getElementById('hero-img-display').src = settings.heroImg;

            const grid = document.getElementById('main-grid');
            const adminList = document.getElementById('admin-p-list');
            grid.innerHTML = ''; adminList.innerHTML = '';

            products.forEach((p, i) => {
                grid.innerHTML += `
                    <div class="product">
                        <img src="${p.img}" class="p-img">
                        <h3>${p.name}</h3>
                        <p style="color:#888; margin-bottom:10px;">$${p.price.toLocaleString()}</p>
                        <button class="btn-buy" onclick="addToCart(${i})">Agregar al Carrito</button>
                    </div>
                `;
                adminList.innerHTML += `
                    <div class="p-preview-item">
                        <span>${p.name}</span>
                        <button onclick="delP(${i})" style="color:red; background:none; border:none; cursor:pointer;">Eliminar</button>
                    </div>
                `;
            });
        }

        function loadAdminFields() {
            document.getElementById('adm-name').value = settings.name;
            document.getElementById('adm-title').value = settings.title;
            document.getElementById('adm-wsp').value = settings.wsp;
            document.getElementById('adm-email').value = settings.email;
            document.getElementById('adm-payments').value = settings.payments;
            render();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('open'); }
        
        function addToCart(i) {
            cart.push(products[i]);
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            cart.forEach((item, i) => {
                total += item.price;
                container.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">${item.name} <span>$${item.price}</span></div>`;
            });
            document.getElementById('cart-total').innerText = "Total: $" + total.toLocaleString();
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            const name = document.getElementById('cust-name').value;
            const dir = document.getElementById('cust-dir').value;
            if(!name || !dir || cart.length === 0) return alert("Completa los datos.");
            
            let itemsTxt = cart.map(p => `- ${p.name} ($${p.price})`).join('%0A');
            const total = cart.reduce((a,b) => a + b.price, 0);
            const msg = `*PEDIDO INERCIA*%0A%0A*Cliente:* ${name}%0A*Dirección:* ${dir}%0A%0A*Items:*%0A${itemsTxt}%0A%0A*TOTAL:* $${total}%0A%0A*Pagos aceptados:* ${settings.payments}`;
            window.open(`https://wa.me{settings.wsp}?text=${msg}`);
        }

        function delP(i) { products.splice(i, 1); render(); }
        render();
    </script>
</body>
</html>
