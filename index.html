<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Studio</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #fdfdfd; --txt: #1a1a1a; --muted: #888; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* HEADER MINIMAL */
        header { padding: 40px 6%; display: flex; justify-content: space-between; align-items: baseline; background: var(--bg); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; letter-spacing: -1px; text-transform: lowercase; cursor: default; }
        nav { display: flex; gap: 40px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }

        /* HERO ASIMÉTRICO */
        .hero { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2px; padding: 0 6% 100px; align-items: end; }
        .hero-left img { width: 100%; height: 70vh; object-fit: cover; }
        .hero-right { position: relative; padding-left: 10%; }
        .hero-right img { width: 100%; height: 85vh; object-fit: cover; }
        .hero-brand-name { position: absolute; left: -100px; top: 40%; font-family: 'Cormorant Garamond', serif; font-size: 80px; font-weight: 300; opacity: 0.8; }

        /* SECCIÓN PRODUCTOS */
        .shop-section { padding: 100px 6%; }
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 60px; }
        .product-card { cursor: pointer; text-align: left; transition: 0.4s; }
        .product-card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; filter: saturate(0.9); }
        .product-card:hover { opacity: 0.7; }
        .product-info { margin-top: 20px; font-size: 12px; letter-spacing: 0.5px; }
        .p-name { text-transform: uppercase; font-weight: 400; margin-bottom: 5px; }
        .p-price { color: var(--muted); }

        /* SECCIÓN TEXTO / FILOSOFÍA */
        .philosophy { padding: 150px 6%; display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center; border-top: 1px solid #eee; }
        .phi-text { font-family: 'Cormorant Garamond', serif; font-size: 24px; line-height: 1.4; font-style: italic; color: #444; }

        /* ADMIN OCULTO */
        .lock-icon { position: fixed; bottom: 30px; right: 30px; font-size: 12px; color: #ccc; cursor: pointer; z-index: 1000; transition: 0.3s; }
        .lock-icon:hover { color: #000; }

        #admin-panel { position: fixed; right: -450px; top: 0; width: 400px; height: 100vh; background: #fff; border-left: 1px solid #eee; z-index: 2000; padding: 60px 40px; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -20px 0 60px rgba(0,0,0,0.05); overflow-y: auto; }
        #admin-panel.open { right: 0; }
        .admin-field { margin-bottom: 30px; }
        .admin-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; color: #999; }
        .admin-field input { width: 100%; padding: 15px 0; border: none; border-bottom: 1px solid #eee; font-size: 14px; outline: none; background: transparent; }
        .btn-admin { width: 100%; padding: 20px; background: #000; color: #fff; border: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 20px; }
        
        .stock-list { margin-top: 50px; border-top: 1px solid #f5f5f5; padding-top: 30px; }
        .stock-item { display: flex; justify-content: space-between; padding: 12px 0; font-size: 11px; text-transform: uppercase; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo">inercia.</div>
        <nav><span>Colección</span> <span>Estudio</span> <span>Contacto</span></nav>
    </header>

    <section class="hero">
        <div class="hero-left">
            <img src="https://unsplash.com">
        </div>
        <div class="hero-right">
            <div class="hero-brand-name">inercia</div>
            <img src="https://unsplash.com">
        </div>
    </section>

    <section class="shop-section">
        <div class="shop-grid" id="main-catalog"></div>
    </section>

    <section class="philosophy">
        <div class="phi-text">
            "Inercia es una oda a la simplicidad deliberada. Creemos en piezas que no gritan, sino que perduran en el tiempo a través del movimiento."
        </div>
        <div style="text-align: right;">
            <img src="https://unsplash.com" style="width: 80%; filter: grayscale(1);">
        </div>
    </section>

    <!-- ACCESO DUEÑA -->
    <div class="lock-icon" onclick="toggleAdmin()"><i class="fas fa-lock"></i></div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:50px;">
            <h2 style="font-family:'Cormorant Garamond', serif; font-size:24px; font-style:italic;">Panel Inercia</h2>
            <span onclick="toggleAdmin()" style="cursor:pointer; font-size:20px;">&times;</span>
        </div>

        <div class="admin-field">
            <label>NUEVO PRODUCTO</label>
            <input type="text" id="p-name" placeholder="Nombre (Ej: Pantalón de Lino)">
            <input type="text" id="p-price" placeholder="Precio (Ej: $24.000)">
            <input type="text" id="p-img" placeholder="Link de Foto">
            <button class="btn-admin" onclick="addProduct()">Publicar</button>
        </div>

        <div class="stock-list" id="stock-manager"></div>
    </div>

    <script>
        // Datos con memoria local
        let products = JSON.parse(localStorage.getItem('inercia_studio_v1')) || [
            { name: "Camisa de Lino Rayada", price: "$18.500", img: "https://unsplash.com" },
            { name: "Pantalón Sastre Negro", price: "$22.000", img: "https://unsplash.com" },
            { name: "Blazer Soft Sand", price: "$35.000", img: "https://unsplash.com" }
        ];

        // Código 0110
        let keys = "";
        window.onkeydown = (e) => {
            keys += e.key;
            if(keys.includes("0110")) toggleAdmin();
            if(keys.length > 5) keys = "";
        }

        function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('open'); }

        function render() {
            const grid = document.getElementById('main-catalog');
            const list = document.getElementById('stock-manager');
            grid.innerHTML = '';
            list.innerHTML = '<label style="font-size:10px; letter-spacing:2px; color:#ccc; display:block; margin-bottom:20px;">Inventario</label>';

            products.forEach((p, i) => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}">
                        <div class="product-info">
                            <p class="p-name">${p.name}</p>
                            <p class="p-price">${p.price}</p>
                        </div>
                    </div>
                `;
                list.innerHTML += `
                    <div class="stock-item">
                        <span>${p.name}</span>
                        <span onclick="deleteItem(${i})" style="color:red; cursor:pointer">X</span>
                    </div>
                `;
            });
            localStorage.setItem('inercia_studio_v1', JSON.stringify(products));
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if(name && price && img) {
                products.push({name, price, img});
                render();
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img').value = '';
            }
        }

        function deleteItem(i) { products.splice(i, 1); render(); }
        render();
    </script>
</body>
</html>
