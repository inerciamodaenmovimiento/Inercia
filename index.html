<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Pro</title>
    <!-- Iconos: FontAwesome (Uso gratuito) -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --side-bg: #ffffff;
            --primary: #4e73df;
            --text-dark: #333;
            --text-light: #858796;
            --white: #ffffff;
            --shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 250px; background: var(--side-bg); border-right: 1px solid #e3e6f0; transition: 0.3s; }
        .brand { padding: 20px; font-weight: bold; font-size: 1.2rem; color: var(--primary); text-align: center; border-bottom: 1px solid #eee; }
        .nav-link { padding: 15px 25px; display: block; color: var(--text-dark); text-decoration: none; transition: 0.2s; }
        .nav-link:hover { background: #f8f9fc; color: var(--primary); padding-left: 30px; }
        .nav-link i { margin-right: 10px; width: 20px; }

        /* Main Content */
        .content { flex: 1; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Stats Cards */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--white); padding: 20px; border-radius: 10px; box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
        .card h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--primary); margin-bottom: 10px; }
        .card .value { font-size: 1.5rem; font-weight: bold; }

        /* Table */
        .table-container { background: var(--white); padding: 20px; border-radius: 10px; box-shadow: var(--shadow); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: var(--text-light); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        /* Buttons */
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; margin-bottom: 15px; }
        .btn-delete { background: #e74a3b; color: white; }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fas fa-shield-alt"></i> ADMIN PANEL</div>
        <nav>
            <a href="#" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="#" class="nav-link"><i class="fas fa-users"></i> Usuarios</a>
            <a href="#" class="nav-link"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="#" class="nav-link"><i class="fas fa-cog"></i> Configuración</a>
        </nav>
    </div>

    <div class="content">
        <div class="header">
            <h1>Resumen General</h1>
            <div class="user-profile">Admin <i class="fas fa-user-circle"></i></div>
        </div>

        <div class="cards-grid">
            <div class="card">
                <h3>Ventas Mensuales</h3>
                <div class="value">$40,000</div>
            </div>
            <div class="card" style="border-left-color: #1cc88a;">
                <h3>Usuarios Activos</h3>
                <div id="user-count" class="value">0</div>
            </div>
            <div class="card" style="border-left-color: #f6c23e;">
                <h3>Tareas Pendientes</h3>
                <div class="value">18</div>
            </div>
        </div>

        <div class="table-container">
            <button class="btn btn-add" onclick="addUser()">+ Nuevo Usuario</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- Datos dinámicos aquí -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Lógica Funcional del Dashboard
        let users = [
            { id: 1, name: 'Juan Pérez', email: 'juan@example.com' },
            { id: 2, name: 'María García', email: 'maria@example.com' }
        ];

        function renderUsers() {
            const tbody = document.getElementById('user-table-body');
            const countDisplay = document.getElementById('user-count');
            
            tbody.innerHTML = '';
            users.forEach((user, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>#${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>
                            <button class="btn btn-delete" onclick="deleteUser(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            countDisplay.innerText = users.length;
        }

        function addUser() {
            const name = prompt("Nombre del usuario:");
            if (name) {
                const id = users.length > 0 ? users[users.length - 1].id + 1 : 1;
                users.push({ id: id, name: name, email: name.toLowerCase().replace(' ', '') + '@example.com' });
                renderUsers();
            }
        }

        function deleteUser(index) {
            if(confirm("¿Seguro que quieres eliminar este usuario?")) {
                users.splice(index, 1);
                renderUsers();
            }
        }

        // Inicializar tabla
        renderUsers();
    </script>
</body>
</html>
