<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris-claro: #fbfbfb; --font-serif: 'Playfair Display', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--blanco); color: var(--azul); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* NAV */
        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; }
        .logo { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; color: var(--azul); }
        .cart-trigger { cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--azul); }

        /* BANNER */
        .main-banner { width: 100%; height: 60vh; background: #f4f4f4; margin-top: 80px; overflow: hidden; }
        .main-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* CATEGORÍAS */
        .cat-nav { display: flex; justify-content: center; gap: 25px; padding: 30px 0; background: white; position: sticky; top: 80px; z-index: 900; border-bottom: 1px solid #f0f0f0; }
        .cat-link { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .cat-link:hover { opacity: 1; font-weight: bold; }

        /* CATÁLOGO */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px 20px; padding: 40px 5% 60px; max-width: 1400px; margin: 0 auto; }
        .card { cursor: pointer; text-align: center; }
        .card-img-wrapper { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #f9f9f9; margin-bottom: 12px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-cat { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 5px; display: block; }
        .card-name { font-family: var(--font-serif); font-size: 1rem; margin-bottom: 5px; }

        /* CARRITO */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 40px; box-shadow: -10px 0 60px rgba(0,0,0,0.05); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 12px 0; margin-bottom: 15px; border: none; border-bottom: 1px solid #eee; font-size: 0.8rem; outline: none; }
        .btn-black { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; margin-top: 10px; }

        /* ADMIN */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gris-claro); z-index: 6000; padding: 50px 10%; overflow-y: auto; }
        .admin-box { background: white; padding: 30px; margin-bottom: 20px; border-radius: 4px; }
        .order-card { border-left: 3px solid var(--azul); padding: 15px; background: #fff; margin-bottom: 10px; font-size: 0.8rem; }
        
        #admin-btn-fixed { position: fixed; bottom: 10px; right: 10px; width: 20px; height: 20px; background: #ddd; cursor: pointer; z-index: 7000; opacity: 0.3; border-radius: 3px; }
        
        /* MODAL */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); min-height: 100vh; }
        .modal-imgs img { width: 100%; margin-bottom: 10px; }
        .modal-info { padding: 10%; display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">INERCIA</a>
    <div class="cart-trigger" onclick="toggleCart()">BOLSA (<span id="cart-count">0</span>)</div>
</nav>

<div class="main-banner" id="banner-home"></div>
<div class="cat-nav" id="cat-menu"></div>
<section class="productos-container" id="shop-grid"></section>

<div id="modal-detalle">
    <button style="position:fixed; top:30px; right:40px; font-size:0.7rem; letter-spacing:2px; cursor:pointer; border:none; background:none; z-index:6000" onclick="closeModal()">CERRAR ×</button>
    <div id="modal-content" class="modal-grid"></div>
</div>

<div id="cart-panel">
    <button onclick="toggleCart()" style="background:none; border:none; font-size:0.6rem; letter-spacing:2px; cursor:pointer; margin-bottom:20px">← VOLVER</button>
    <h2 style="font-family:var(--font-serif); margin-bottom:30px">BOLSA</h2>
    <div id="cart-items"></div>
    <div id="cart-total" style="font-weight:bold; border-top:1px solid #eee; padding-top:20px; margin:20px 0">TOTAL: $0</div>
    
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <input type="text" id="c-phone" class="input-cart" placeholder="TELÉFONO">
    
    <select id="c-ship" class="input-cart" onchange="toggleShip()">
        <option value="Retiro">RETIRO LOCAL</option>
        <option value="Correo">ENVÍO A DOMICILIO</option>
    </select>

    <div id="ship-data" style="display:none">
        <input type="text" id="c-addr" class="input-cart" placeholder="DIRECCIÓN">
        <input type="text" id="c-city" class="input-cart" placeholder="CIUDAD">
        <input type="text" id="c-zip" class="input-cart" placeholder="CÓDIGO POSTAL">
    </div>

    <select id="c-pay" class="input-cart"><option value="Efectivo">EFECTIVO</option><option value="Transferencia">TRANSFERENCIA</option></select>
    <button class="btn-black" onclick="confirmOrder()">FINALIZAR COMPRA</button>
</div>

<div id="admin-btn-fixed" onclick="accessAdmin()"></div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px"><h2>PANEL ADMIN</h2><button onclick="closeAdmin()">SALIR</button></div>
    
    <div class="admin-box">
        <h3>1. CONFIGURACIÓN (WhatsApp y Categorías)</h3>
        <input type="text" id="conf-wa" placeholder="WhatsApp Dueño (549...)" class="input-cart">
        <input type="text" id="conf-cats" placeholder="Categorías (ej: Tops, Jeans)" class="input-cart">
        <label>Subir Banner Principal:</label>
        <input type="file" id="b-img" class="input-cart">
        <button class="btn-black" onclick="saveConfig()">GUARDAR CONFIGURACIÓN</button>
    </div>

    <div class="admin-box">
        <h3>2. NUEVO PRODUCTO</h3>
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción" class="input-cart" style="height:80px; border:1px solid #eee; padding:10px"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat" class="input-cart"></select>
        <input type="file" id="p-img" multiple class="input-cart">
        <button class="btn-black" onclick="uploadProduct()">PUBLICAR PRODUCTO</button>
    </div>

    <div class="admin-box"><h3>HISTORIAL DE PEDIDOS</h3><div id="order-list"></div></div>
    <div class="admin-box"><h3>BORRAR PRODUCTOS</h3><div id="admin-prod-list"></div></div>
</div>

<script>
    // Nueva base de datos para asegurar limpieza
    let db = JSON.parse(localStorage.getItem('inercia_v_final_secure')) || { products: [], cats: ["VER TODO"], wa: "", banner: "", orders: [] };
    let cart = [];

    window.onload = () => {
        renderShop();
        renderBanner();
        renderCats();
        renderOrders();
        updateInputs();
    };

    function save() {
        localStorage.setItem('inercia_v_final_secure', JSON.stringify(db));
    }

    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    function toggleShip() { document.getElementById('ship-data').style.display = document.getElementById('c-ship').value === 'Correo' ? 'block' : 'none'; }

    function updateInputs() {
        document.getElementById('p-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa || "";
        document.getElementById('conf-cats').value = db.cats.join(', ');
        renderAdminProds();
    }

    function saveConfig() {
        // Guardar Texto
        db.wa = document.getElementById('conf-wa').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim().toUpperCase());
        if (db.cats.length === 0 || db.cats[0] === "") db.cats = ["VER TODO"];
        
        // Guardar Imagen de Banner si existe
        const bFiles = document.getElementById('b-img').files;
        if(bFiles.length > 0) {
            const r = new FileReader();
            r.onload = e => {
                db.banner = e.target.result;
                finishSaveConfig();
            };
            r.readAsDataURL(bFiles[0]);
        } else {
            finishSaveConfig();
        }
    }

    function finishSaveConfig() {
        save();
        renderCats();
        renderBanner();
        updateInputs();
        alert("¡Configuración y Banner guardados correctamente!");
    }

    function renderBanner() { 
        const bannerHome = document.getElementById('banner-home');
        if(db.banner) {
            bannerHome.innerHTML = `<img src="${db.banner}" style="width:100%;height:100%;object-fit:cover">`;
        } else {
            bannerHome.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;opacity:0.2">Sube un banner desde el Admin</div>`;
        }
    }

    function renderCats() { 
        document.getElementById('cat-menu').innerHTML = db.cats.map(c => `<span class="cat-link" onclick="renderShop('${c}')">${c}</span>`).join(''); 
    }

    async function uploadProduct() {
        const files = document.getElementById('p-img').files;
        if(!files.length) return alert("Selecciona fotos para el producto");
        const imgs = [];
        for(let f of files) { imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); })); }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, imgs: imgs });
        save(); renderShop(); renderAdminProds(); alert("Producto publicado con éxito");
    }

    function deleteProd(id) { if(confirm("¿Borrar producto?")) { db.products = db.products.filter(p => p.id !== id); save(); renderShop(); renderAdminProds(); } }

    function renderAdminProds() { document.getElementById('admin-prod-list').innerHTML = db.products.map(p => `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.7rem; background:#f9f9f9; padding:5px"><span>${p.name}</span><button onclick="deleteProd(${p.id})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold">ELIMINAR</button></div>`).join(''); }

    function renderShop(filter = "VER TODO") {
        const prods = (filter === "VER TODO" || filter === "") ? db.products : db.products.filter(p => p.cat === filter);
        const grid = document.getElementById('shop-grid');
        if(prods.length === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;opacity:0.3;padding:50px">No hay productos en esta categoría.</p>`;
            return;
        }
        grid.innerHTML = prods.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <div class="card-img-wrapper"><img src="${p.imgs[0]}"></div>
                <span class="card-cat">${p.cat}</span>
                <h3 class="card-name">${p.name}</h3>
                <p style="font-size:0.8rem; opacity:0.6">$${p.price}</p>
            </div>`).join('');
    }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-content').innerHTML = `
            <div class="modal-imgs">${p.imgs.map(i => `<img src="${i}" style="width:100%">`).join('')}</div>
            <div class="modal-info">
                <span class="card-cat">${p.cat}</span>
                <h1 style="font-family:var(--font-serif); font-size:2.5rem; margin:20px 0">${p.name}</h1>
                <p style="opacity:0.6; line-height:1.8; margin-bottom:30px">${p.desc}</p>
                <p style="font-size:1.5rem; margin-bottom:30px">$${p.price}</p>
                <button class="btn-black" onclick="addToCart(${p.id}); closeModal()">AÑADIR A LA BOLSA</button>
            </div>`;
        document.getElementById('modal-detalle').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }

    function addToCart(id) { 
        const product = db.products.find(x => x.id === id);
        cart.push(product); 
        updateCart(); 
        toggleCart(); 
    }

    function updateCart() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:10px"><span>${i.name}</span><span>$${i.price}</span></div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        const n = document.getElementById('c-name').value;
        const ph = document.getElementById('c-phone').value;
        if(!n || !ph || !cart.length) return alert("Faltan datos de contacto o productos");
        const s = document.getElementById('c-ship').value;
        const info = s === 'Correo' ? `${document.getElementById('c-addr').value}, ${document.getElementById('c-city').value} (${document.getElementById('c-zip').value})` : 'Retiro Local';
        
        const order = { id: Date.now(), date: new Date().toLocaleString(), name: n, phone: ph, items: cart.map(i=>i.name).join(', '), total: document.getElementById('cart-total').innerText, ship: s, info: info };
        db.orders.push(order); 
        save(); 
        renderOrders();
        
        const text = `INERCIA PEDIDO%0ACliente: ${n}%0AItems: ${order.items}%0AEnvío: ${s} (${info})%0A${order.total}`;
        window.open(`https://wa.me{db.wa}?text=${text}`);
        cart = []; updateCart(); toggleCart();
    }

    function renderOrders() { document.getElementById('order-list').innerHTML = db.orders.map(o => `<div class="order-card"><strong>${o.date} - ${o.name}</strong> (${o.phone})<br>${o.items}<br>${o.info}<br>${o.total}</div>`).reverse().join(''); }
</script>
</body>

<!-- Botón Flotante del Carrito -->
<div id="carrito-flotante" style="position: fixed; bottom: 20px; right: 20px; background: #fff; border: 2px solid #000; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none; z-index: 1000;">
    <h4>Tu Carrito</h4>
    <ul id="lista-carrito" style="list-style: none; padding: 0;"></ul>
    <hr>
    <p><strong>Total: $<span id="total-precio">0</span></strong></p>
    <button onclick="enviarWhatsApp()" style="background: #25D366; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer;">Finalizar Compra por WhatsApp</button>
    <button onclick="cerrarCarrito()" style="background: #eee; border: none; padding: 5px; width: 100%; margin-top: 5px; cursor: pointer;">Cerrar</button>
</div>

<script>
let carrito = [];
let total = 0;

function agregarAlCarrito(nombre, precio) {
    carrito.push({nombre, precio});
    total += precio;
    actualizarInterfaz();
    document.getElementById('carrito-flotante').style.display = 'block';
}

function actualizarInterfaz() {
    const lista = document.getElementById('lista-carrito');
    lista.innerHTML = "";
    carrito.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = `${item.nombre} - $${item.precio}`;
        lista.appendChild(li);
    });
    document.getElementById('total-precio').textContent = total;
}

function cerrarCarrito() {
    document.getElementById('carrito-flotante').style.display = 'none';
}

function enviarWhatsApp() {
    const numero = "54911XXXXXXXX"; // PONE TU NUMERO ACA (Código de país + área + número)
    let mensaje = "¡Hola Inercia! Quiero realizar el siguiente pedido:\n\n";
    
    carrito.forEach(item => {
        mensaje += `- ${item.nombre} ($${item.precio})\n`;
    });
    
    mensaje += `\n*Total a pagar: $${total}*`;
    const url = `https://wa.me{numero}?text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');
}<!-- TABLA DE GESTIÓN EN TU ADMIN -->

    <table style="width: 100%; border-collapse: collapse; background: white;">

<script>
// Función para mostrar los productos en el Admin
function cargarProductosAdmin() {
    const tabla = document.getElementById('tabla-productos-admin');
    const productos = JSON.parse(localStorage.getItem('mis_productos')) || [];
    
    tabla.innerHTML = ""; // Limpiar tabla
    
    productos.forEach((prod, index) => {
        tabla.innerHTML += `
            <tr style="border-bottom: 1px solid #ddd;">
                <td style="padding: 10px;">${prod.nombre}</td>
                <td style="padding: 10px;">$${prod.precio}</td>
                <td style="padding: 10px;">
                    <button onclick="borrarProducto(${index})" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">Borrar</button>
                </td>
            </tr>
        `;
    });
}

// Función para borrar y GUARDAR los cambios
function borrarProducto(index) {
    let productos = JSON.parse(localStorage.getItem('mis_productos')) || [];
    productos.splice(index, 1); // Quitar el producto de la lista
    localStorage.setItem('mis_productos', JSON.stringify(productos)); // Guardar cambios
    cargarProductosAdmin(); // Refrescar la tabla
    alert("Producto eliminado y cambios guardados.");
}

// Ejecutar al cargar la página
window.onload = cargarProductosAdmin;
