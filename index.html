<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); overflow-x: hidden; }

        nav { padding: 30px; display: flex; justify-content: space-between; position: fixed; width: 100%; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .hero { height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 80px; }
        .brand-name { font-size: 5rem; letter-spacing: -2px; line-height: 1; }
        
        /* PASO 1: GRILLA MÁS CHICA */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; padding: 40px; }
        .card { border: 1px solid #f0f0f0; padding: 20px; transition: 0.3s; position: relative; cursor: pointer; }
        .card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; }
        .btn-buy { background: var(--azul); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }

        /* PASO 2: MODAL DETALLE */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 80px 5%; overflow-y: auto; }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1100px; margin: 0 auto; }
        .btn-close { position: fixed; top: 30px; right: 30px; font-size: 2rem; cursor: pointer; background: none; border: none; }

        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gris); z-index: 3000; padding: 40px; overflow-y: auto; }
        .admin-box { background: white; padding: 25px; max-width: 500px; margin: 0 auto; }
        #secret-trigger { position: fixed; bottom: 10px; right: 10px; width: 25px; height: 25px; background: transparent; cursor: pointer; z-index: 4000; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight:bold; letter-spacing:3px">INERCIA</div>
    <div style="cursor:pointer; font-weight:bold">CARRITO (0)</div>
</nav>

<header class="hero">
    <h1 class="brand-name">Inercia</h1>
    <p style="font-style:italic; opacity:0.6; letter-spacing:5px">Moda en movimiento</p>
</header>

<section class="productos-container" id="shop-grid"></section>

<!-- MODAL DETALLE -->
<div id="modal-detalle">
    <button class="btn-close" onclick="closeModal()">×</button>
    <div id="modal-content" class="modal-grid"></div>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<div id="admin-panel">
    <div class="admin-box">
        <h3>Subir Producto</h3>
        <input type="text" id="p-name" placeholder="Nombre" style="width:100%; padding:10px; margin:10px 0">
        <textarea id="p-desc" placeholder="Descripción" style="width:100%; height:80px; padding:10px; margin:10px 0"></textarea>
        <input type="number" id="p-price" placeholder="Precio" style="width:100%; padding:10px; margin:10px 0">
        <input type="file" id="p-img" style="margin:10px 0">
        <button class="btn-buy" onclick="uploadProduct()">Publicar</button>
        <button onclick="closeAdmin()" style="margin-top:10px; border:none; background:none; color:red; cursor:pointer">Cerrar</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('inercia_base')) || { products: [] };
    window.onload = renderShop;

    function accessAdmin() { if(prompt("Código:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

    function uploadProduct() {
        const file = document.getElementById('p-img').files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            db.products.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                desc: document.getElementById('p-desc').value,
                price: document.getElementById('p-price').value,
                img: reader.result
            });
            localStorage.setItem('inercia_base', JSON.stringify(db));
            renderShop(); closeAdmin();
        }
        if(file) reader.readAsDataURL(file);
    }

    function renderShop() {
        document.getElementById('shop-grid').innerHTML = db.products.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p><strong>$${p.price}</strong></p>
            </div>
        `).join('');
    }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-content').innerHTML = `
            <img src="${p.img}">
            <div>
                <h1 style="font-size:3rem; margin-bottom:20px">${p.name}</h1>
                <p style="font-size:1.1rem; line-height:1.6; margin-bottom:20px">${p.desc}</p>
                <p style="font-size:1.5rem"><strong>$${p.price}</strong></p>
                <button class="btn-buy">Añadir al Carrito</button>
            </div>
        `;
        document.getElementById('modal-detalle').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }
</script>

</body>
</html>
