<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>INERCIA — Identity System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --white: #ffffff; --black: #0e0e0e; --accent: #0057FF; --line: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--white); color: var(--black); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Guías de diseño (Sello de Coral) */
        .guide-line { position: fixed; background: var(--line); z-index: 1000; pointer-events: none; }
        .v-1 { left: 5%; width: 1px; height: 100vh; }
        .v-2 { right: 5%; width: 1px; height: 100vh; }

        /* Navegación Editorial */
        nav { padding: 40px 5%; display: flex; justify-content: space-between; position: fixed; width: 100%; z-index: 100; mix-blend-mode: difference; color: white; }
        .nav-link { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

        /* Hero: Impacto Tipográfico */
        header { height: 100vh; padding: 15vh 5% 5% 5%; display: flex; flex-direction: column; justify-content: space-between; }
        .hero-title { font-family: 'Syncopate', sans-serif; font-size: 15vw; line-height: 0.8; letter-spacing: -0.05em; text-transform: uppercase; }
        .hero-details { display: grid; grid-template-columns: repeat(12, 1fr); margin-top: 40px; }
        .hero-sub { grid-column: 7 / 13; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2.5rem; line-height: 1; }

        /* Sección de Galería "Rota" */
        .editorial-section { padding: 100px 5%; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        
        .img-wrap { background: #f9f9f9; position: relative; overflow: hidden; filter: grayscale(1); transition: 1s ease; }
        .img-wrap:hover { filter: grayscale(0); }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* Posiciones asimétricas estilo Lia Exiliav */
        .p-1 { grid-column: 1 / 8; height: 90vh; } /* Grande a la izquierda */
        .p-2 { grid-column: 9 / 13; height: 50vh; align-self: flex-end; margin-bottom: -100px; border: 15px solid white; z-index: 5; } /* Superpuesta */
        .p-3 { grid-column: 3 / 10; height: 70vh; margin-top: 150px; }

        .caption { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-top: 15px; display: block; border-top: 1px solid #eee; padding-top: 10px; }

        footer { padding: 100px 5%; background: var(--black); color: white; text-align: center; }
        footer h2 { font-family: 'Syncopate', sans-serif; font-size: 12vw; margin: 0; }
    </style>
</head>
<body>

    <div class="guide-line v-1"></div>
    <div class="guide-line v-2"></div>

    <nav>
        <div class="nav-link">INERCIA / SYSTEM</div>
        <div class="nav-link">IDENTITY 2024</div>
    </nav>

    <header>
        <h1 class="hero-title">INE<br>RCIA.</h1>
        <div class="hero-details">
            <div class="hero-sub">"El movimiento no es solo una acción, es una estructura que define la forma."</div>
        </div>
    </header>

    <main class="editorial-section">
        <div class="img-wrap p-1">
            <img src="https://unsplash.com" alt="Moda 1">
            <span class="caption">Fig. 01 / Kinetic Form</span>
        </div>
        <div class="img-wrap p-2">
            <img src="https://unsplash.com" alt="Moda 2">
            <span class="caption">Fig. 02 / Tension Detail</span>
        </div>
        <div class="img-wrap p-3">
            <img src="https://unsplash.com" alt="Moda 3">
            <span class="caption">Fig. 03 / Fluid Movement</span>
        </div>
    </main>

    <footer>
        <h2>INERCIA</h2>
        <p style="font-size: 10px; letter-spacing: 5px; margin-top: 20px; opacity: 0.5;">REDEFINING MOTION IN FASHION</p>
    </footer>

</body>
</html>
