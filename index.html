<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fuente elegante similar para el estilo artístico -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Navegación Minimalista -->
    <nav>
        <div class="nav-links">
            <a href="#">Colecciones</a>
            <a href="#">Tienda</a>
            <a href="#">Contacto</a>
        </div>
    </nav>

    <!-- Hero Section (Portada Artística) -->
    <header class="hero">
        <div class="logo-container">
            <h1 class="brand-name">Inercia</h1>
            <p class="tagline">Moda en movimiento</p>
        </div>
    </header>

    <!-- Botón de Admin Oculto -->
    <div id="admin-trigger" onclick="checkAdmin()"></div>

    <script>
        function checkAdmin() {
            let pass = prompt("Acceso restringido. Ingrese código:");
            if (pass === "0110") {
                alert("Acceso concedido. Redirigiendo al panel...");
                // Aquí pondrías la URL de tu panel de administración
                // window.location.href = "admin-panel.html"; 
            } else {
                alert("Código incorrecto.");
            }
        }
    </script>
</body>
</html>
