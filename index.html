<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Store | Tienda Online</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Barra de Navegación -->
    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <a href="#" class="text-xl font-bold tracking-tighter uppercase">Minimal<span class="text-blue-600">Store</span></a>
            
            <div class="flex items-center gap-6">
                <ul class="hidden md:flex gap-6 text-sm font-medium text-gray-600">
                    <li><a href="#" class="hover:text-black">Hombres</a></li>
                    <li><a href="#" class="hover:text-black">Mujeres</a></li>
                    <li><a href="#" class="hover:text-black">Accesorios</a></li>
                </ul>
                
                <!-- Icono Carrito -->
                <button class="relative p-2 hover:bg-gray-100 rounded-full transition-colors" id="cart-btn">
                    <i class="fa-solid fa-bag-shopping text-xl"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Héroe / Banner -->
    <header class="bg-white py-12 border-b border-gray-100">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Nueva Colección</h1>
            <p class="text-gray-500 max-w-xl mx-auto">Diseños esenciales para el día a día con la mejor calidad textil.</p>
        </div>
    </header>

    <!-- Grilla de Productos -->
    <main class="container mx-auto px-4 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="product-grid">
            <!-- Los productos se cargan dinámicamente con JS -->
        </div>
    </main>

    <!-- Footer Simple -->
    <footer class="bg-white border-t border-gray-200 py-8">
        <div class="text-center text-gray-400 text-sm">
            &copy; 2024 Minimal Store. Inspirado en Tienda Nube.
        </div>
    </footer>

    <script>
        // Datos de ejemplo
        const products = [
            { id: 1, name: "Remera Oversize Blanca", price: 15900, img: "https://unsplash.com" },
            { id: 2, name: "Jean Slim Fit Azul", price: 42000, img: "https://unsplash.com" },
            { id: 3, name: "Campera Denim Classic", price: 58500, img: "https://unsplash.com" },
            { id: 4, name: "Gorra Urbana Negra", price: 8900, img: "https://unsplash.com" },
        ];

        let cartCount = 0;
        const grid = document.getElementById('product-grid');
        const countBadge = document.getElementById('cart-count');

        // Renderizar Productos
        function renderProducts() {
            grid.innerHTML = products.map(p => `
                <div class="group bg-white rounded-lg overflow-hidden transition-all duration-300 hover:shadow-xl border border-transparent hover:border-gray-100">
                    <div class="relative overflow-hidden aspect-[3/4]">
                        <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        <button onclick="addToCart()" class="absolute bottom-4 left-4 right-4 bg-white/90 backdrop-blur-sm text-black py-3 rounded-md font-semibold opacity-0 translate-y-4 transition-all duration-300 group-hover:opacity-100 group-hover:translate-y-0 shadow-lg hover:bg-black hover:text-white">
                            Agregar al carrito
                        </button>
                    </div>
                    <div class="p-4">
                        <h3 class="text-sm text-gray-600 uppercase tracking-widest mb-1">Esenciales</h3>
                        <p class="font-bold text-lg mb-2">${p.name}</p>
                        <p class="text-blue-600 font-bold text-xl">$${p.price.toLocaleString('es-AR')}</p>
                    </div>
                </div>
            `).join('');
        }

        // Lógica de Carrito Simple
        function addToCart() {
            cartCount++;
            countBadge.innerText = cartCount;
            
            // Animación pequeña al badge
            countBadge.classList.add('scale-125');
            setTimeout(() => countBadge.classList.remove('scale-125'), 200);
        }

        renderProducts();
    </script>
</body>
</html>
