<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Librerías con enlaces seguros y actualizados -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1a1a1a; margin: 0; }
        .serif { font-family: 'Playfair Display', serif; }
        .admin-view { display: none; }
        .transition-main { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <header class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-50">
        <nav class="container mx-auto px-8 py-6 flex justify-between items-center">
            <div class="text-3xl font-bold tracking-[0.4em] serif uppercase cursor-pointer" onclick="scrollToSection('top')">Inercia</div>
            <ul class="hidden lg:flex space-x-12 text-[10px] uppercase tracking-[0.3em] font-bold text-gray-400">
                <li><a href="javascript:void(0)" onclick="scrollToSection('top')" class="hover:text-black transition">Home</a></li>
                <li><a href="javascript:void(0)" onclick="scrollToSection('new-arrivals')" class="hover:text-black transition">Colección</a></li>
                <li><a href="javascript:void(0)" onclick="showView('admin')" class="text-red-400 hover:text-red-600">Admin</a></li>
            </ul>
            <button onclick="toggleCart()" class="relative hover:opacity-50 transition">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
            </button>
        </nav>
    </header>

    <!-- VISTA CLIENTE -->
    <main id="view-home">
        <section id="top" class="relative h-screen flex items-center justify-center overflow-hidden">
            <img id="main-banner" src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/10"></div>
            <div class="relative z-10 text-center text-white">
                <h1 class="text-7xl md:text-[120px] serif italic mb-4 drop-shadow-2xl">Inercia</h1>
                <p class="text-xs md:text-sm tracking-[0.8em] uppercase font-light">Moda en Movimiento</p>
            </div>
        </section>

        <section id="new-arrivals" class="container mx-auto px-8 py-32">
            <div class="text-center mb-20">
                <h2 class="text-4xl serif mb-4">New Arrivals</h2>
                <div class="h-[1px] w-20 bg-black mx-auto"></div>
            </div>
            <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-20">
                <!-- Productos dinámicos -->
            </div>
        </section>
    </main>

    <!-- VISTA ADMIN -->
    <main id="view-admin" class="admin-view pt-40 container mx-auto px-8 pb-32">
        <div class="max-w-2xl mx-auto bg-gray-50 p-10 border rounded-sm">
            <h2 class="serif text-3xl mb-8">Panel Administrador</h2>
            <div class="space-y-4">
                <input id="in-nombre" type="text" placeholder="Producto" class="w-full border-b p-3 outline-none focus:border-black">
                <input id="in-precio" type="number" placeholder="Precio ($)" class="w-full border-b p-3 outline-none focus:border-black">
                <input id="in-cat" type="text" placeholder="Categoría" class="w-full border-b p-3 outline-none focus:border-black">
                <input id="in-file" type="file" class="w-full text-xs mt-4">
                <button onclick="saveProduct()" class="w-full bg-black text-white py-4 mt-6 text-[10px] font-bold uppercase tracking-widest">Publicar Producto</button>
                <button onclick="showView('home')" class="w-full text-gray-400 text-[10px] uppercase underline mt-4">Volver a la Tienda</button>
            </div>
        </div>
    </main>

    <!-- CARRITO -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-80 md:w-96 bg-white z-[100] shadow-2xl translate-x-full transition-main flex flex-col p-8">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <span class="serif text-xl">Tu Bolsa</span>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-content" class="flex-grow overflow-y-auto text-sm space-y-4"></div>
        <div class="border-t pt-4">
            <div class="flex justify-between font-bold mb-4"><span>Total</span><span id="cart-total">$0</span></div>
            <button onclick="checkout()" class="w-full bg-black text-white py-4 text-[10px] font-bold uppercase tracking-widest">Pedir por WhatsApp</button>
        </div>
    </div>

    <!-- BOTÓN WHATSAPP -->
    <a href="https://wa.me" target="_blank" class="fixed bottom-8 right-8 w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-xl z-50">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
    </a>

    <script>
        let prods = JSON.parse(localStorage.getItem('in_db')) || [
            { id: 1, nombre: 'Blusa Brown', precio: 12500, cat: 'Clothes', img: 'https://unsplash.com' },
            { id: 2, nombre: 'Grey Coat', precio: 22900, cat: 'Jacket', img: 'https://unsplash.com' }
        ];
        let cart = [];

        function scrollToSection(id) {
            showView('home');
            const target = id === 'top' ? 0 : document.getElementById(id).offsetTop - 80;
            window.scrollTo({ top: target, behavior: 'smooth' });
            // Limpia la URL
            window.history.pushState("", document.title, window.location.pathname);
        }

        function showView(v) {
            document.getElementById('view-home').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('view-admin').style.display = v === 'admin' ? 'block' : 'none';
            window.history.pushState("", document.title, window.location.pathname);
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }

        function saveProduct() {
            const n = document.getElementById('in-nombre').value;
            const p = document.getElementById('in-precio').value;
            const f = document.getElementById('in-file').files[0];
            if (f) {
                const r = new FileReader();
                r.onload = (e) => {
                    prods.push({ id: Date.now(), nombre: n, precio: parseInt(p), img: e.target.result });
                    localStorage.setItem('in_db', JSON.stringify(prods));
                    render();
                    showView('home');
                };
                r.readAsDataURL(f);
            }
        }

        function render() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = prods.map(p => `
                <div class="text-center group">
                    <div class="aspect-[2/3] bg-gray-100 overflow-hidden mb-4 relative">
                        <img src="${p.img}" class="w-full h-full object-cover transition-main group-hover:scale-110">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-4 text-[10px] uppercase opacity-0 group-hover:opacity-100 transition-all">Agregar</button>
                    </div>
                    <h3 class="serif text-lg">${p.nombre}</h3>
                    <p class="text-sm font-light">$${p.precio.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function addToCart(id) {
            cart.push(prods.find(x => x.id === id));
            updateCart();
            toggleCart();
        }

        function updateCart() {
            const c = document.getElementById('cart-content');
            c.innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.nombre}</span><span>$${i.precio}</span></div>`).join('');
            document.getElementById('cart-total').innerText = '$' + cart.reduce((acc, p) => acc + p.precio, 0).toLocaleString();
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            const msg = `Pedido Inercia: ${cart.map(p => p.nombre).join(', ')}. Total: $${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
