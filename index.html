<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA — Identity System</title>
    <!-- Tipografías de Coral: Sans-Serif técnica y Serif itálica -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #0057FF;
            --line: #efefef;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Estructura de Grilla Coral */
        .page-border { position: fixed; background: var(--line); z-index: 1000; }
        .v-line { width: 1px; height: 100vh; top: 0; }
        .h-line { height: 1px; width: 100vw; left: 0; }

        header {
            height: 100vh;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
        }

        .brand h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2rem, 15vw, 12rem); line-height: 0.8; letter-spacing: -0.05em; text-transform: uppercase; }
        .brand p { font-size: 10px; text-transform: uppercase; letter-spacing: 5px; margin-top: 20px; color: var(--accent); }

        .statement { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2.5rem; max-width: 600px; align-self: flex-end; line-height: 1.1; }

        /* Galería Editorial */
        .gallery { padding: 100px 60px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }

        .img-box { position: relative; background: #f4f4f4; overflow: hidden; margin-bottom: 80px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .img-box:hover img { filter: grayscale(0%); transform: scale(1.05); }

        .item-1 { grid-column: 1 / 9; height: 80vh; }
        .item-2 { grid-column: 8 / 13; height: 50vh; margin-top: -15vh; border: 20px solid white; z-index: 2; }
        .item-3 { grid-column: 2 / 7; height: 70vh; }
        .item-4 { grid-column: 9 / 12; height: 40vh; align-self: end; }

        .meta { position: absolute; bottom: -30px; left: 0; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; }

        footer { padding: 100px 60px; border-top: 1px solid var(--line); text-align: center; }
        footer h2 { font-family: 'Syncopate', sans-serif; font-size: 10vw; opacity: 0.1; }

        @media (max-width: 768px) {
            .gallery { display: block; }
            .img-box { width: 100% !important; height: 60vh !important; margin: 0 0 50px 0 !important; border: none !important; }
        }
    </style>
</head>
<body>

    <!-- Líneas de Guía Estética -->
    <div class="page-border v-line" style="left: 60px;"></div>
    <div class="page-border v-line" style="right: 60px;"></div>

    <header>
        <div class="brand">
            <p>Identity System v.01</p>
            <h1>INE<br>RCIA.</h1>
        </div>
        <div class="statement">
            "Moda en movimiento: Una exploración de la forma humana y la inercia del tejido."
        </div>
    </header>

    <main class="gallery">
        <div class="img-box item-1">
            <img src="https://unsplash.com" alt="Inercia 01">
            <span class="meta">01 — Concept / Flow</span>
        </div>
        <div class="img-box item-2">
            <img src="https://unsplash.com" alt="Inercia 02">
            <span class="meta">02 — Kinetic Detail</span>
        </div>
        <div class="img-box item-3">
            <img src="https://unsplash.com" alt="Inercia 03">
            <span class="meta">03 — Structural Motion</span>
        </div>
        <div class="img-box item-4">
            <img src="https://unsplash.com" alt="Inercia 04">
            <span class="meta">04 — Atmosphere</span>
        </div>
    </main>

    <footer>
        <h2>INERCIA</h2>
    </footer>

</body>
</html>
