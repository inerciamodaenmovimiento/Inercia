<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Admin Dashboard</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --bg-dark: #0f111a;      /* Fondo ultra oscuro */
            --card-bg: #1a1d29;     /* Fondo de tarjetas */
            --accent: #ff6b00;      /* Naranja Pinterest/Moderno */
            --text-main: #ffffff;
            --text-muted: #8b8e9f;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; }

        /* Sidebar Minimalista */
        .sidebar { width: var(--sidebar-width); height: 100vh; background: var(--bg-dark); border-right: 1px solid #2d303e; padding: 30px 20px; position: fixed; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin-bottom: 50px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 15px; border-radius: 12px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #242736; color: var(--text-main); }
        .nav-item.active i { color: var(--accent); }

        /* Contenedor Principal */
        .main { margin-left: var(--sidebar-width); flex: 1; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 1.8rem; font-weight: 600; }

        /* Grid de Tarjetas */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; position: relative; overflow: hidden; border: 1px solid #2d303e; }
        .card h3 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; }
        .card .number { font-size: 2rem; font-weight: 700; }
        .card .trend { color: var(--accent); font-size: 0.8rem; margin-top: 5px; }

        /* Tabla de Usuarios */
        .table-section { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid #2d303e; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-muted); font-size: 0.85rem; padding-bottom: 15px; border-bottom: 1px solid #2d303e; }
        td { padding: 15px 0; border-bottom: 1px solid #242736; font-size: 0.95rem; }

        /* Botones Acción */
        .btn-orange { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-orange:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { color: var(--accent); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fas fa-bolt"></i> CORE.</div>
        <nav>
            <a href="#" class="nav-item active"><i class="fas fa-chart-pie"></i> Overview</a>
            <a href="#" class="nav-item"><i class="fas fa-user-friends"></i> Customers</a>
            <a href="#" class="nav-item"><i class="fas fa-wallet"></i> Payments</a>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
        </nav>
    </div>

    <div class="main">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <button class="btn-orange" onclick="addUser()">+ Add User</button>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Total Revenue</h3>
                <div class="number">$128,430</div>
                <div class="trend"><i class="fas fa-arrow-up"></i> +12.5%</div>
            </div>
            <div class="card">
                <h3>Active Sessions</h3>
                <div id="stat-users" class="number">0</div>
                <div class="trend">Live updates</div>
            </div>
            <div class="card">
                <h3>System Health</h3>
                <div class="number">99.9%</div>
                <div class="trend" style="color: #00ff88;">Stable</div>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h2>User Management</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>NAME</th>
                        <th>EMAIL</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="user-body">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let userData = [
            { name: "Alex Rivera", email: "alex@core.io", status: "Active" },
            { name: "Sofia Chen", email: "sofia.c@web.com", status: "Pending" }
        ];

        function render() {
            const container = document.getElementById('user-body');
            document.getElementById('stat-users').innerText = userData.length;
            container.innerHTML = "";
            
            userData.forEach((u, i) => {
                container.innerHTML += `
                    <tr>
                        <td><strong>${u.name}</strong></td>
                        <td>${u.email}</td>
                        <td style="color: ${u.status === 'Active' ? '#00ff88' : '#ffb800'}">${u.status}</td>
                        <td>
                            <button class="btn-icon" onclick="remove(${i})"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function addUser() {
            const name = prompt("Enter User Name:");
            if (name) {
                userData.push({ name, email: `${name.split(' ')[0].toLowerCase()}@system.com`, status: "Active" });
                render();
            }
        }

        function remove(i) {
            userData.splice(i, 1);
            render();
        }

        render();
    </script>
</body>
</html>
