<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Store | Tienda de Ropa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">MINIMAL<b>STUDIO</b></div>
            <div class="cart-icon" onclick="toggleCart()">
                Carrito (<span id="cart-count">0</span>)
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Colección Editorial</h1>
            <p>Diseño local con proyección internacional.</p>
        </section>

        <section id="catalog" class="product-grid">
            <!-- Los productos se cargan con JS -->
        </section>
    </main>

    <!-- Modal del Carrito -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2>Tu Carrito</h2>
            <div id="cart-items"></div>
            <div class="cart-total">Total: $<span id="total-price">0</span></div>
            
            <hr>
            
            <h3>Datos de Envío</h3>
            <form id="checkout-form">
                <input type="text" placeholder="Nombre completo" required>
                <input type="text" placeholder="Dirección de envío" required>
                <button type="submit" class="btn-checkout">Finalizar Compra</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
