<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Studio</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #f7f7f7; --txt: #1a1a1a; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { padding: 40px 6%; display: flex; justify-content: space-between; align-items: center; background: var(--bg); }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; text-transform: lowercase; letter-spacing: -1px; }
        nav { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; }

        /* HERO ASIMÉTRICO (ESTILO THOM MORISON) */
        .hero { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; padding: 0 6% 100px; align-items: end; }
        .hero-left img { width: 100%; height: 65vh; object-fit: cover; background: #eee; }
        .hero-right { position: relative; }
        .hero-right img { width: 100%; height: 80vh; object-fit: cover; background: #eee; }
        .hero-tag { position: absolute; left: -60px; top: 40%; font-family: 'Cormorant Garamond', serif; font-size: 70px; font-style: italic; opacity: 0.6; transform: rotate(-90deg); }

        /* CATÁLOGO */
        .catalog { padding: 100px 6%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .product { text-align: left; transition: 0.5s; cursor: pointer; }
        .product:hover { opacity: 0.7; }
        .product img { width: 100%; aspect-ratio: 4/5; object-fit: cover; background: #eee; margin-bottom: 20px; }
        .p-info { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .p-price { color: #888; margin-top: 5px; }

        /* PIE DE PÁGINA / FILOSOFÍA */
        .footer-info { padding: 120px 6%; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; border-top: 1px solid #e0e0e0; }
        .f-text { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-style: italic; line-height: 1.4; color: #444; }

        /* --- ADMINISTRADOR INVISIBLE --- */
        /* Área secreta en la esquina inferior derecha */
        .secret-trigger { 
            position: fixed; bottom: 0; right: 0; width: 50px; height: 50px; 
            background: transparent; z-index: 9999; cursor: default; 
        }

        #admin-panel { 
            position: fixed; right: -400px; top: 0; width: 400px; height: 100vh; 
            background: #fff; border-left: 1px solid #eee; z-index: 10000; padding: 50px 30px; 
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: -20px 0 60px rgba(0,0,0,0.05); 
            overflow-y: auto; color: #000;
        }
        #admin-panel.open { right: 0; }
        .admin-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; text-transform: uppercase; color: #999; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #eee; outline: none; font-size: 14px; }
        .btn-admin { width: 100%; padding: 18px; background: #000; color: #fff; border: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 10px; }
        .stock-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f9f9f9; font-size: 11px; text-transform: uppercase; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="logo">inercia.</div>
        <nav>Shop • Studio • Contact</nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-left">
                <img src="https://unsplash.com" alt="Moda 1">
            </div>
            <div class="hero-right">
                <div class="hero-tag">inercia</div>
                <img src="https://unsplash.com" alt="Moda 2">
            </div>
        </section>

        <section class="catalog" id="catalog-display">
            <!-- Los productos se cargan aquí -->
        </section>

        <section class="footer-info">
            <div class="f-text">
                "Inercia es la búsqueda de la belleza en lo simple. Cada prenda es un movimiento hacia la calidad duradera."
            </div>
            <div style="text-align: right;">
                <img src="https://unsplash.com" style="width: 70%; filter: grayscale(1);">
            </div>
        </section>
    </main>

    <!-- ACCESO INVISIBLE PARA LA DUEÑA -->
    <div class="secret-trigger" onclick="toggleAdmin()"></div>

    <div id="admin-panel">
        <div class="admin-title">Panel Inercia</div>
        <div class="input-group">
            <label>Nombre del Producto</label>
            <input type="text" id="p-name" placeholder="Ej: Pantalón Sastre">
        </div>
        <div class="input-group">
            <label>Precio</label>
            <input type="text" id="p-price" placeholder="Ej: $22.500">
        </div>
        <div class="input-group">
            <label>Link de Imagen</label>
            <input type="text" id="p-img" placeholder="https://...">
        </div>
        <button class="btn-admin" onclick="addProduct()">Agregar a la tienda</button>

        <div id="stock-list" style="margin-top: 40px;">
            <p style="font-size: 10px; color: #ccc; margin-bottom: 15px;">GESTIÓN DE STOCK</p>
            <!-- Lista de productos para borrar -->
        </div>
        <button class="btn-admin" style="background:#eee; color:#000; margin-top:20px;" onclick="toggleAdmin()">Cerrar</button>
    </div>

    <script>
        // Datos con memoria en el navegador
        let products = JSON.parse(localStorage.getItem('inercia_final_db')) || [
            { name: "Suede Bomber Jacket", price: "$22.900", img: "https://unsplash.com" },
            { name: "Minimal Silk Shirt", price: "$14.500", img: "https://unsplash.com" },
            { name: "Luxury Leg Trousers", price: "$18.200", img: "https://unsplash.com" }
        ];

        // Lógica de Código Secreto 0110
        let buffer = "";
        window.addEventListener('keydown', (e) => {
            buffer += e.key;
            if (buffer.includes("0110")) {
                toggleAdmin();
                buffer = "";
            }
            if (buffer.length > 5) buffer = "";
        });

        function toggleAdmin() {
            document.getElementById('admin-panel').classList.toggle('open');
        }

        function render() {
            const display = document.getElementById('catalog-display');
            const list = document.getElementById('stock-list');
            display.innerHTML = '';
            list.innerHTML = '<p style="font-size: 10px; color: #ccc; margin-bottom: 15px;">GESTIÓN DE STOCK</p>';

            products.forEach((p, i) => {
                display.innerHTML += `
                    <div class="product">
                        <img src="${p.img}" alt="${p.name}">
                        <div class="p-info">
                            <p>${p.name}</p>
                            <p class="p-price">${p.price}</p>
                        </div>
                    </div>
                `;
                list.innerHTML += `
                    <div class="stock-item">
                        <span>${p.name}</span>
                        <span onclick="deleteItem(${i})" style="color:red; cursor:pointer">Eliminar</span>
                    </div>
                `;
            });
            localStorage.setItem('inercia_final_db', JSON.stringify(products));
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if (name && price && img) {
                products.push({ name, price, img });
                render();
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-img').value = '';
            } else {
                alert("Completa todos los campos");
            }
        }

        function deleteItem(i) {
            if(confirm("¿Eliminar este producto?")) {
                products.splice(i, 1);
                render();
            }
        }

        render();
    </script>
</body>
</html>
