<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sézane Style - Admin In-Place</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; }
        .serif { font-family: 'Crimson Text', serif; }
        .admin-active { outline: 2px dashed #3b82f6 !important; position: relative; cursor: pointer; }
        .admin-active::after { content: '✎'; position: absolute; top: -10px; right: -10px; background: #3b82f6; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; font-size: 12px; }
    </style>
</head>
<body class="bg-white">

    <!-- PANEL ADMIN SUPERIOR (Solo visible con 0110) -->
    <div id="top-admin-bar" class="fixed top-0 left-0 w-full bg-blue-600 text-white p-2 text-center text-xs font-bold hidden z-[100] shadow-xl">
        MODO DISEÑO ACTIVADO - Haz clic en textos o imágenes para editarlos 
        <button onclick="saveSession()" class="ml-6 bg-white text-blue-600 px-4 py-1 rounded uppercase">Guardar Cambios</button>
    </div>

    <!-- HEADER -->
    <header class="py-8 border-b border-gray-100 sticky top-0 bg-white z-40">
        <div class="container mx-auto px-4 flex flex-col items-center">
            <h1 class="serif text-5xl tracking-widest uppercase mb-6 admin-field" data-id="brand-name">SÉZANE</h1>
            <nav class="flex gap-8 text-[11px] font-semibold tracking-[0.2em] uppercase">
                <a href="#" class="hover:underline">E-Shop</a>
                <a href="#" class="hover:underline">Lookbook</a>
                <a href="#" class="hover:underline">Journal</a>
                <a href="#" class="hover:underline">À Propos</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 max-w-6xl">
        <!-- SECCIÓN PRODUCTO -->
        <div class="flex flex-col md:flex-row gap-16">
            
            <!-- GALERÍA (EDITABLE) -->
            <div class="w-full md:w-1/2">
                <div class="relative group">
                    <img id="main-img" src="https://unsplash.com" 
                         class="w-full h-auto cursor-pointer admin-img" onclick="changeImage(this)">
                </div>
                <div class="grid grid-cols-4 gap-2 mt-4">
                    <img src="https://unsplash.com" class="admin-img" onclick="changeImage(this)">
                    <img src="https://unsplash.com" class="admin-img" onclick="changeImage(this)">
                </div>
            </div>

            <!-- INFO PRODUCTO -->
            <div class="w-full md:w-1/2 space-y-6">
                <div class="flex justify-between items-baseline border-b pb-4">
                    <h2 class="serif text-3xl admin-field uppercase tracking-wide" data-id="p-title">Essentiels - Hunter</h2>
                    <span class="text-xl font-light">€ <span class="admin-field" data-id="p-price">180</span></span>
                </div>

                <div class="text-sm text-gray-700 leading-relaxed italic border-l-2 border-black pl-4 admin-field" data-id="p-desc">
                    "Ustedes los amaron tanto estos meses que debían integrar los Esenciales... Increíblemente femeninos y confortables."
                </div>

                <!-- TALLAS -->
                <div class="py-4">
                    <p class="text-[10px] uppercase font-bold mb-3 tracking-tighter">Seleccionar Talla</p>
                    <div class="flex gap-2">
                        <button class="border px-4 py-2 text-xs hover:border-black">35</button>
                        <button class="border px-4 py-2 text-xs hover:border-black">36</button>
                        <button class="border px-4 py-2 text-xs hover:border-black font-bold border-black">37</button>
                    </div>
                </div>

                <button class="w-full bg-[#1a1a1a] text-white py-4 text-xs font-bold uppercase tracking-widest hover:bg-black transition">
                    Ajouter au Panier
                </button>
            </div>
        </div>
    </main>

    <script>
        let isAdmin = false;
        let buffer = "";

        // Detector de código secreto 0110
        window.addEventListener('keydown', (e) => {
            buffer += e.key;
            if (buffer.length > 4) buffer = buffer.substring(1);
            if (buffer === "0110") toggleAdmin();
        });

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.getElementById('top-admin-bar').classList.toggle('hidden');
            
            // Activar edición de textos
            document.querySelectorAll('.admin-field').forEach(el => {
                el.contentEditable = isAdmin;
                el.classList.toggle('admin-active', isAdmin);
            });

            // Activar edición de imágenes
            document.querySelectorAll('.admin-img').forEach(el => {
                el.classList.toggle('admin-active', isAdmin);
            });

            if(isAdmin) alert("💻 MODO ADMIN ACTIVO\n- Haz clic en cualquier texto para escribir.\n- Haz clic en imágenes para cambiar la URL.");
        }

        // Función para cambiar imágenes en modo admin
        function changeImage(imgElement) {
            if (!isAdmin) return;
            const newUrl = prompt("Introduce la URL de la nueva imagen:", imgElement.src);
            if (newUrl) imgElement.src = newUrl;
        }

        // Simulación de guardado
        function saveSession() {
            const siteData = {};
            document.querySelectorAll('.admin-field').forEach(el => {
                siteData[el.dataset.id] = el.innerText;
            });
            
            console.log("Enviando cambios al servidor...", siteData);
            alert("✅ ¡Configuración guardada! Todos los cambios en la Home ahora son permanentes.");
            toggleAdmin(); // Salir del modo admin
        }
    </script>
</body>
</html>
