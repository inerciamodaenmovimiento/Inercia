<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fuente Serif para Títulos y Sans para cuerpo -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <h1 class="logo">INERCIA</h1>
        <nav>
            <span>COLECCIONES</span>
            <span>MOVIMIENTO</span>
            <span>CONTACTO</span>
        </nav>
    </header>

    <main class="editorial-grid">
        <!-- Bloque Grande (Hero) -->
        <section class="hero-section">
            <div class="main-image">
                <img src="tu-foto-principal.jpg" alt="Modelo en movimiento">
            </div>
            <div class="hero-text">
                <p class="born-in">EST. 2024 / BUENOS AIRES</p>
                <h2 class="title-overlap">MODA EN<br><em>MOVIMIENTO</em></h2>
            </div>
        </section>

        <!-- Bloque de Texto Lateral (Estilo Manifiesto) -->
        <section class="manifesto">
            <p class="curator">Curadores de estilo</p>
            <h3 class="story-title">A Story That<br>Eye Witnessed</h3>
            <p class="description">
                La inercia no es solo física, es el impulso de quien no se detiene. 
                Nuestras prendas están diseñadas para acompañar cada giro, cada paso, 
                cada cambio de ritmo.
            </p>
        </section>

        <!-- Galería Asimétrica -->
        <section class="product-preview">
            <div class="img-small">
                <img src="foto2.jpg" alt="Detalle">
            </div>
            <div class="img-medium">
                <img src="foto3.jpg" alt="Prenda">
            </div>
        </section>
    </main>

</body>
</html>
