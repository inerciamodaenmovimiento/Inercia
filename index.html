<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lookbook - Admin Oculto</title>
    <style>
        /* Estilos base para que el ejemplo sea visible */
        body { font-family: sans-serif; height: 100vh; margin: 0; background: #f0f0f0; }
        .hero, .lookbook { padding: 50px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

    <section class="hero"><h1>Hero Section</h1></section>
    <section class="lookbook"><h2>Lookbook Section</h2></section>

    <!-- Candado invisible en la esquina -->
    <div id="secret-admin-trigger" 
         onclick="checkCode()" 
         style="position:fixed; bottom:10px; right:10px; width:20px; height:20px; cursor:pointer; opacity:0.1; z-index:9999;">
         🔒
    </div>

    <!-- Panel de Administración Oculto -->
    <div id="admin-panel" 
         style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:40px; border:1px solid #000; z-index:10000; box-shadow: 0 0 50px rgba(0,0,0,0.5); font-family: sans-serif; width: 80%; max-width: 500px;">
        <h3>Panel de Control</h3>
        <p>Acceso concedido.</p>
        <button onclick="document.getElementById('admin-panel').style.display='none'">Cerrar</button>
    </div>

    <script>
        function checkCode() {
            // Se solicita una clave al usuario
            const password = prompt("Introduce la clave de administrador:");
            
            // Definimos una clave sencilla, por ejemplo: '1234'
            if (password === "1234") {
                const panel = document.getElementById('admin-panel');
                panel.style.display = "block";
            } else {
                alert("Acceso denegado.");
            }
        }
    </script>

</body>
</html>
