<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .italic { font-style: italic; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 60px; border-bottom: 1px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .brand-box { cursor: default; user-select: none; }
        .brand-box h1 { font-size: 32px; font-weight: 900; letter-spacing: -2px; line-height: 0.8; text-transform: uppercase; }
        .brand-box span { font-size: 10px; letter-spacing: 5px; opacity: 0.5; text-transform: uppercase; }
        
        .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; min-height: 80vh; border-bottom: 1px solid #eee; }
        .hero-text { padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .hero-text h2 { font-size: 8vw; line-height: 0.85; margin-bottom: 30px; text-transform: uppercase; }
        .hero-image { background: #f9f9f9; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .img-frame { width: 100%; aspect-ratio: 3/4; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 1s ease; }

        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 60px; }
        .product-card { margin-bottom: 40px; }
        .product-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f4f4f4; margin-bottom: 15px; grayscale: 100%; transition: 0.5s; }
        .product-card:hover .product-img { grayscale: 0%; }
        .product-info { display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .product-desc { font-size: 11px; opacity: 0.5; margin-top: 5px; line-height: 1.4; }

        #myGestion-Inercia { position: fixed; top: 0; left: -100%; width: 100%; height: 100vh; background: #fff; z-index: 10000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; padding: 60px; }
        .admin-grid { display: grid; grid-template-columns: 380px 1fr; gap: 60px; max-width: 1300px; margin: 0 auto; }
        .form-card { background: #f8f8f8; padding: 40px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
        .input-group input, .input-group textarea { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 10px 0; background: transparent; outline: none; font-size: 13px; }
        .file-box { border: 1px dashed #000; padding: 20px; text-align: center; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        /* BOTÓN OCULTO INFERIOR DERECHO */
        #hidden-admin-trigger {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background: transparent;
            z-index: 9999;
            cursor: default;
        }

        @media (max-width: 768px) { .hero { grid-template-columns: 1fr; } nav { padding: 20px; } }
    </style>
</head>
<body>

    <nav>
        <div class="brand-box">
            <span>Edición Limitada</span>
            <h1 id="main-brand">Inercia</h1>
        </div>
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px;">
            CESTA (0)
        </div>
    </nav>

    <main class="hero">
        <section class="hero-text">
            <h2 class="serif italic">Moda en<br>Movimiento</h2>
            <p style="font-size: 13px; opacity: 0.4; max-width: 350px;">Curaduría de prendas minimalistas diseñadas para la fluidez del día a día.</p>
        </section>
        <section class="hero-image">
            <div class="img-frame"><img src="https://unsplash.com"></div>
        </section>
    </main>

    <div id="shop-grid"></div>

    <!-- BOTÓN INVISIBLE PARA ACCESO ADMIN -->
    <div id="hidden-admin-trigger" onclick="openAdminWithCode()"></div>

    <div id="myGestion-Inercia">
        <div style="display:flex; justify-content:space-between; align-items: baseline; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px;">
            <h2 style="font-weight:900; font-size: 22px; letter-spacing:-1px;">myGESTIÓN <span style="font-weight:200; opacity:0.5;">| INERCIA</span></h2>
            <button onclick="closeAdmin()" style="font-size: 10px; font-weight:900; color:red; cursor:pointer; background:none; border:none;">CERRAR PANEL</button>
        </div>

        <div class="admin-grid">
            <div class="form-card">
                <div class="input-group"><label>Nombre del Producto</label><input type="text" id="p-name"></div>
                <div class="input-group"><label>Precio ($)</label><input type="number" id="p-price"></div>
                <div class="input-group"><label>Descripción Detallada</label><textarea id="p-desc" rows="3"></textarea></div>
                <div class="input-group"><label>Variantes (S, M, L / Negro)</label><input type="text" id="p-vars"></div>
                <div class="input-group">
                    <label>Imagen</label>
                    <div class="file-box" onclick="document.getElementById('p-file').click()">Subir desde PC</div>
                    <input type="file" id="p-file" style="display:none" accept="image/*" onchange="previewImg(this)">
                </div>
                <button onclick="publishProduct()" style="width:100%; background:#000; color:#fff; padding:20px; font-weight:900; font-size:10px; border:none; cursor:pointer; letter-spacing:2px;">PUBLICAR EN TIENDA</button>
            </div>
            <div>
                <h3 style="font-size:10px; font-weight:900; margin-bottom:20px; opacity:0.4;">REFERENCIAS ACTIVAS</h3>
                <div id="admin-list"></div>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let tempImg = "";

        function openAdminWithCode() {
            const code = prompt("Código de Seguridad:");
            if (code === "0110") {
                document.getElementById('myGestion-Inercia').style.left = "0";
            } else {
                alert("Acceso denegado.");
            }
        }

        function closeAdmin() { document.getElementById('myGestion-Inercia').style.left = "-100%"; }

        function previewImg(input) {
            const reader = new FileReader();
            reader.onload = (e) => { tempImg = e.target.result; alert("Imagen cargada correctamente"); };
            reader.readAsDataURL(input.files);
        }

        function publishProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const desc = document.getElementById('p-desc').value;

            if(!name || !price || !tempImg) return alert("Faltan datos o imagen.");

            const newProd = { id: Date.now(), name, price, desc, img: tempImg, vars: document.getElementById('p-vars').value };
            products.push(newProd);
            
            updateGallery();
            alert("Producto publicado con éxito.");
            
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-desc').value = "";
            document.getElementById('p-vars').value = "";
            tempImg = "";
        }

        function updateGallery() {
            const grid = document.getElementById('shop-grid');
            const adminList = document.getElementById('admin-list');
            
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <span>${p.name}</span>
                        <span class="serif italic">$${p.price}</span>
                    </div>
                    <p class="product-desc">${p.desc}</p>
                    <p style="font-size:9px; margin-top:5px; opacity:0.3;">Tallas: ${p.vars}</p>
                </div>
            `).join('');

            adminList.innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:11px;">
                    <span>${p.name}</span>
                    <button onclick="deleteProd(${p.id})" style="color:red; font-weight:bold; background:none; border:none; cursor:pointer;">ELIMINAR</button>
                </div>
            `).join('');
        }

        function deleteProd(id) {
            products = products.filter(p => p.id !== id);
            updateGallery();
        }
    </script><!-- INTEGRACIÓN FIREBASE + CONTROL DE STOCK (PUNTO 2) -->
<script type="module">
    // 1. IMPORTACIÓN DE FIREBASE (Versión CDN para que funcione en GitHub)
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, set, onValue, update, remove } from "https://gstatic.com";

    // 2. TUS CREDENCIALES (Reemplaza esto con los datos de tu consola de Firebase)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_://firebaseapp.com",
        databaseURL: "https://TU_://firebaseio.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_://appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 3. VINCULACIÓN CON TUS FUNCIONES EXISTENTES
    // Sobrescribimos 'publishProduct' para que guarde en la nube y maneje stock
    window.publishProduct = function() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const desc = document.getElementById('p-desc').value;
        const vars = document.getElementById('p-vars').value;
        const stockInput = prompt("Ingrese cantidad inicial de Stock:", "10"); // Pedimos stock al publicar
        
        if(!name || !price || !window.tempImg) return alert("Faltan datos o imagen.");

        const productId = Date.now();
        const productData = {
            id: productId,
            name: name,
            price: price,
            desc: desc,
            vars: vars,
            img: window.tempImg,
            stock: parseInt(stockInput) || 0
        };

        // Guardar en Firebase
        set(ref(db, 'productos/' + productId), productData)
            .then(() => {
                alert("Producto sincronizado con éxito.");
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
                document.getElementById('p-desc').value = "";
                window.tempImg = "";
            });
    };

    // 4. FUNCIÓN DE VENTA (RESTA STOCK)
    window.simularVenta = function(id, stockActual) {
        if (stockActual <= 0) return;

        const nuevoStock = stockActual - 1;
        update(ref(db, 'productos/' + id), {
            stock: nuevoStock
        });
    };

    // 5. FUNCIÓN PARA ELIMINAR DESDE EL ADMIN
    window.deleteProd = function(id) {
        if(confirm("¿Seguro que deseas eliminar esta referencia?")) {
            remove(ref(db, 'productos/' + id));
        }
    };

    // 6. RENDERIZADO EN TIEMPO REAL (DISEÑO + LÓGICA DE BOTÓN AGOTADO)
    onValue(ref(db, 'productos/'), (snapshot) => {
        const grid = document.getElementById('shop-grid');
        const adminList = document.getElementById('admin-list');
        const data = snapshot.val();
        
        grid.innerHTML = "";
        adminList.innerHTML = "";

        if (data) {
            Object.keys(data).forEach(key => {
                const p = data[key];
                const isOutOfStock = p.stock <= 0;

                // Render en Galería de Cliente
                grid.innerHTML += `
                    <div class="product-card" style="opacity: ${isOutOfStock ? '0.6' : '1'}">
                        <img src="${p.img}" class="product-img">
                        <div class="product-info">
                            <span>${p.name}</span>
                            <span class="serif italic">$${p.price}</span>
                        </div>
                        <p class="product-desc">${p.desc}</p>
                        <p style="font-size:9px; margin-top:5px; opacity:0.3;">Tallas: ${p.vars} | Stock: ${p.stock}</p>
                        
                        <button 
                            onclick="simularVenta('${key}', ${p.stock})"
                            ${isOutOfStock ? 'disabled' : ''}
                            style="width:100%; margin-top:20px; padding:15px; font-size:10px; font-weight:900; letter-spacing:2px; transition: 0.3s;
                            background: ${isOutOfStock ? '#E0E0E0' : '#000'}; 
                            color: ${isOutOfStock ? '#A0A0A0' : '#FFF'}; 
                            border: none; cursor: ${isOutOfStock ? 'not-allowed' : 'pointer'};">
                            ${isOutOfStock ? 'SIN STOCK' : 'AÑADIR A CESTA'}
                        </button>
                    </div>
                `;

                // Render en Lista de Admin
                adminList.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:11px;">
                        <span>${p.name} (${p.stock} unid.)</span>
                        <button onclick="deleteProd('${key}')" style="color:red; font-weight:bold; background:none; border:none; cursor:pointer;">ELIMINAR</button>
                    </div>
                `;
            });
        }
    });
</script>
<!-- BLOQUE UNIFICADO: FIREBASE + CARRUSEL + CONTROL DE STOCK -->
<script type="module">
    // 1. IMPORTACIÓN DE MOTORES
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, set, onValue, update, remove } from "https://gstatic.com";

    // 2. CONFIGURACIÓN (RELLENA CON TUS DATOS DE FIREBASE)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_://firebaseapp.com",
        databaseURL: "https://TU_://firebaseio.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_://appspot.com",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 3. FUNCIÓN PARA PUBLICAR (Se activa desde tu Admin)
    window.publishProduct = function() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const desc = document.getElementById('p-desc').value;
        const vars = document.getElementById('p-vars').value;
        const stock = prompt("Cantidad de stock inicial:", "10");
        
        if(!name || !price || !window.tempImg) return alert("Faltan datos o imagen.");

        const id = Date.now();
        // Guardamos como array para permitir carrusel en el futuro
        const productData = {
            id, name, price, desc, vars,
            img: [window.tempImg], 
            stock: parseInt(stock) || 0
        };

        set(ref(db, 'productos/' + id), productData).then(() => {
            alert("Sincronizado con éxito.");
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-desc').value = "";
        });
    };

    // 4. FUNCIÓN DE VENTA (RESTA STOCK)
    window.simularVenta = function(id, stockActual) {
        if (stockActual <= 0) return;
        update(ref(db, 'productos/' + id), { stock: stockActual - 1 });
    };

    // 5. FUNCIÓN DE CARRUSEL
    window.moveCarousel = function(id, direction) {
        const container = document.querySelector(`#carousel-${id}`);
        const scrollAmount = container.clientWidth;
        container.scrollBy({ left: scrollAmount * direction, behavior: 'smooth' });
    };

    // 6. RENDERIZADO AUTOMÁTICO (ESCUCHA A FIREBASE)
    onValue(ref(db, 'productos/'), (snapshot) => {
        const grid = document.getElementById('shop-grid');
        const adminList = document.getElementById('admin-list');
        const data = snapshot.val();
        
        grid.innerHTML = "";
        adminList.innerHTML = "";

        if (data) {
            Object.keys(data).forEach(key => {
                const p = data[key];
                const isOutOfStock = p.stock <= 0;
                const imagenes = Array.isArray(p.img) ? p.img : [p.img];

                // Render en la Tienda con Carrusel
                grid.innerHTML += `
                    <div class="product-card" style="opacity: ${isOutOfStock ? '0.6' : '1'}">
                        <div style="position:relative; overflow:hidden; aspect-ratio:3/4;">
                            <div id="carousel-${key}" style="display:flex; overflow-x:hidden; scroll-behavior:smooth;">
                                ${imagenes.map(img => `<img src="${img}" style="min-width:100%; object-fit:cover;">`).join('')}
                            </div>
                            ${imagenes.length > 1 ? `
                                <button onclick="moveCarousel('${key}', -1)" style="position:absolute; left:10px; top:50%; background:white; border:none; padding:5px; cursor:pointer;">&#10094;</button>
                                <button onclick="moveCarousel('${key}', 1)" style="position:absolute; right:10px; top:50%; background:white; border:none; padding:5px; cursor:pointer;">&#10095;</button>
                            ` : ''}
                        </div>
                        <div class="product-info" style="margin-top:15px; display:flex; justify-content:space-between; font-weight:900; text-transform:uppercase; font-size:12px;">
                            <span>${p.name}</span>
                            <span class="serif italic">$${p.price}</span>
                        </div>
                        <p style="font-size:11px; opacity:0.5; margin-top:5px;">${p.desc}</p>
                        <p style="font-size:9px; margin-top:5px; opacity:0.3;">Tallas: ${p.vars} | Stock: ${p.stock}</p>
                        
                        <button 
                            onclick="simularVenta('${key}', ${p.stock})"
                            ${isOutOfStock ? 'disabled' : ''}
                            style="width:100%; margin-top:15px; padding:15px; font-size:10px; font-weight:900; cursor:pointer;
                            background: ${isOutOfStock ? '#E0E0E0' : '#000'}; 
                            color: ${isOutOfStock ? '#A0A0A0' : '#FFF'}; border:none;">
                            ${isOutOfStock ? 'SIN STOCK' : 'AÑADIR A CESTA'}
                        </button>
                    </div>
                `;

                // Render en el Admin
                adminList.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:11px;">
                        <span>${p.name} (${p.stock})</span>
                        <button onclick="window.removeProd('${key}')" style="color:red; border:none; background:none; cursor:pointer;">ELIMINAR</button>
                    </div>
                `;
            });
        }
    });

    window.removeProd = (id) => { if(confirm("¿Eliminar?")) remove(ref(db, 'productos/' + id)); };
</script>

</body>
</html>
