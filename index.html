<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel (Versiones completas) -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .hero-text { font-style: italic; letter-spacing: -0.05em; }
        /* Animación para el panel admin */
        .admin-panel { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [config, setConfig] = useState({
                brand: "INERCIA",
                slogan: "Moda en Movimiento",
                hero: "ESTÉTICA FLUIDA",
                accent: "#000000"
            });

            // Inicializar iconos
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isAdminOpen]);

            return (
                <div className="min-h-screen bg-[#FDFDFD] text-black overflow-x-hidden">
                    {/* NAVEGACIÓN */}
                    <nav className="fixed w-full z-40 flex justify-between items-center px-6 md:px-10 py-8 mix-blend-difference text-white">
                        <div className="text-xl font-light tracking-[0.3em]">{config.brand}</div>
                        <div className="flex items-center gap-6">
                            <button onClick={() => setIsAdminOpen(true)} className="opacity-70 hover:opacity-100 transition">
                                <i data-lucide="settings" className="w-5 h-5"></i>
                            </button>
                            <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                        </div>
                    </nav>

                    {/* SECCIÓN PRINCIPAL */}
                    <section className="h-screen flex flex-col justify-center items-center text-center px-4">
                        <p className="text-[10px] tracking-[0.6em] uppercase mb-4 opacity-50">{config.slogan}</p>
                        <h1 className="text-6xl md:text-[10vw] font-light leading-none hero-text uppercase mb-12">
                            {config.hero}
                        </h1>
                        <button className="border border-black px-10 py-4 text-[10px] uppercase tracking-widest hover:bg-black hover:text-white transition-all duration-500">
                            Explorar Colección
                        </button>
                    </section>

                    {/* GRILLA DE PRODUCTOS */}
                    <div className="max-w-6xl mx-auto px-6 md:px-10 pb-40 grid grid-cols-1 md:grid-cols-2 gap-16 md:gap-24">
                        <div className="space-y-6">
                            <div className="aspect-[3/4] bg-gray-100 overflow-hidden">
                                <img src="https://unsplash.com" className="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-1000" alt="Producto 1" />
                            </div>
                            <div className="flex justify-between text-[11px] uppercase tracking-widest">
                                <span>Edición Limitada 01</span>
                                <span>$85.00</span>
                            </div>
                        </div>
                        <div className="space-y-6 md:mt-32">
                            <div className="aspect-[3/4] bg-gray-100 overflow-hidden">
                                <img src="https://unsplash.com" className="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-1000" alt="Producto 2" />
                            </div>
                            <div className="flex justify-between text-[11px] uppercase tracking-widest">
                                <span>Minimal Pant</span>
                                <span>$120.00</span>
                            </div>
                        </div>
                    </div>

                    {/* PANEL DE ADMINISTRADOR */}
                    <div className={`fixed top-0 right-0 h-full w-72 bg-white shadow-2xl z-50 p-8 border-l transform transition-transform duration-300 ${isAdminOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex justify-between items-center mb-10">
                            <h2 className="text-[10px] font-bold uppercase tracking-widest">Editor Visual</h2>
                            <button onClick={() => setIsAdminOpen(false)}>
                                <i data-lucide="x" className="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="text-[9px] uppercase opacity-40 block mb-2 font-bold">Nombre</label>
                                <input className="w-full border-b border-gray-300 py-1 outline-none text-sm focus:border-black" value={config.brand} onChange={(e) => setConfig({...config, brand: e.target.value.toUpperCase()})} />
                            </div>
                            <div>
                                <label className="text-[9px] uppercase opacity-40 block mb-2 font-bold">Slogan</label>
                                <input className="w-full border-b border-gray-300 py-1 outline-none text-sm focus:border-black" value={config.slogan} onChange={(e) => setConfig({...config, slogan: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-[9px] uppercase opacity-40 block mb-2 font-bold">Título Hero</label>
                                <input className="w-full border-b border-gray-300 py-1 outline-none text-sm focus:border-black" value={config.hero} onChange={(e) => setConfig({...config, hero: e.target.value.toUpperCase()})} />
                            </div>
                        </div>
                        
                        <div className="mt-10 p-4 bg-gray-50 rounded text-[9px] uppercase leading-relaxed opacity-60">
                            Modifica los textos para ver el cambio instantáneo en el diseño.
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
