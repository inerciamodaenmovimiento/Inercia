<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Edición Tienda Nube</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* --- ESTÉTICA EDITORIAL ZAAN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f9f7f2; color: #1a1a1a; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 60px; border-bottom: 1px solid rgba(0,0,0,0.1); background: #f9f7f2; position: sticky; top: 0; z-index: 100; }
        .nav-logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        
        /* FILTROS TIPO REVISTA */
        #cat-filter { display: flex; justify-content: center; gap: 40px; padding: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .filter-item { cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .filter-item.active { opacity: 1; border-bottom: 2px solid #000; }

        /* GRID EDITORIAL */
        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 60px; padding: 60px; max-width: 1600px; margin: 0 auto; }
        .product-card { background: white; padding: 20px; border: 1px solid rgba(0,0,0,0.05); transition: transform 0.4s ease; }
        .product-card:hover { transform: translateY(-5px); }

        /* CARRUSEL TIENDA NUBE */
        .carousel { position: relative; width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #eee; margin-bottom: 20px; }
        .carousel-inner { display: flex; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); height: 100%; overflow: hidden; }
        .carousel-inner img { min-width: 100%; object-fit: cover; }
        .c-btn { position: absolute; top: 50%; transform: translateY(-50%); background: white; border: none; width: 40px; height: 40px; cursor: pointer; font-size: 14px; z-index: 10; opacity: 0.8; }
        .c-btn:hover { opacity: 1; }
        .next { right: 0; } .prev { left: 0; }

        .product-info { border-top: 1px solid #eee; pt-4; padding-top: 20px; }
        .price { font-size: 20px; font-weight: 400; margin-bottom: 10px; }
        .p-title { font-size: 24px; text-transform: uppercase; font-weight: 900; line-height: 1; margin-bottom: 10px; }
        .p-desc { font-size: 13px; opacity: 0.6; line-height: 1.6; margin-bottom: 20px; height: 40px; overflow: hidden; }

        .buy-btn { width: 100%; background: #000; color: #fff; border: none; padding: 18px; font-size: 11px; font-weight: 900; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .buy-btn:disabled { background: #ddd; color: #999; cursor: not-allowed; }

        /* PANEL GESTIÓN */
        #myGestion-Inercia { position: fixed; top: 0; left: -100%; width: 100%; height: 100vh; background: #fff; z-index: 10000; transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; padding: 60px; }
        .admin-grid { display: grid; grid-template-columns: 400px 1fr; gap: 60px; max-width: 1400px; margin: 0 auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; border: 1px solid #eee; padding: 15px; outline: none; background: #fafafa; }
        .file-box { border: 2px dashed #000; padding: 30px; text-align: center; font-size: 11px; cursor: pointer; font-weight: bold; background: #fafafa; }

        #admin-trigger { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; background: transparent; z-index: 99999; cursor: pointer; }

        @media (max-width: 768px) { #shop-grid { grid-template-columns: 1fr; padding: 20px; } .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Inercia</div>
        <div style="font-size: 10px; font-weight: 900;">CARRITO (0)</div>
    </nav>

    <div id="cat-filter">
        <span class="filter-item active" onclick="filtrar('Todas')">Ver Todo</span>
        <span class="filter-item" onclick="filtrar('Tops')">Tops</span>
        <span class="filter-item" onclick="filtrar('Pantalones')">Pantalones</span>
        <span class="filter-item" onclick="filtrar('Vestidos')">Vestidos</span>
    </div>

    <div id="shop-grid"></div>

    <div id="admin-trigger" onclick="abrirAdmin()"></div>

    <!-- PANEL myGESTIÓN -->
    <div id="myGestion-Inercia">
        <div style="display:flex; justify-content:space-between; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px;">
            <h2 style="font-weight:900; font-size: 24px;">myGESTIÓN <span style="font-weight:200; opacity:0.5;">| TIENDA NUBE CONTROL</span></h2>
            <button onclick="document.getElementById('myGestion-Inercia').style.left='-100%'" style="font-size: 11px; font-weight:900; color:red; cursor:pointer; background:none; border:none; border-bottom: 1px solid red;">CERRAR PANEL</button>
        </div>
        
        <div class="admin-grid">
            <div style="background:#fcfcfc; padding:40px; border: 1px solid #eee;">
                <div class="input-group"><label>Categoría</label>
                    <select id="p-cat">
                        <option value="Tops">Tops</option>
                        <option value="Pantalones">Pantalones</option>
                        <option value="Vestidos">Vestidos</option>
                    </select>
                </div>
                <div class="input-group"><label>Nombre del Producto</label><input type="text" id="p-name" placeholder="Ej: Top Elemental"></div>
                <div class="input-group"><label>Precio de Venta</label><input type="number" id="p-price" placeholder="0.00"></div>
                <div class="input-group"><label>Descripción del Producto</label><textarea id="p-desc" rows="3"></textarea></div>
                <div class="input-group">
                    <label>Imágenes (Selecciona varias)</label>
                    <div class="file-box" onclick="document.getElementById('p-file').click()">SUBIR ARCHIVOS DESDE PC</div>
                    <input type="file" id="p-file" style="display:none" accept="image/*" multiple>
                    <div id="status-files" style="font-size:10px; margin-top:10px; font-weight:bold; color:black;"></div>
                </div>
                <button id="pub-btn" style="width:100%; background:#000; color:#fff; padding:20px; font-weight:900; border:none; cursor:pointer; letter-spacing:2px;">PUBLICAR PRODUCTO</button>
            </div>
            <div>
                <h3 style="font-size:11px; font-weight:900; opacity:0.3; margin-bottom:20px;">INVENTARIO EN NUBE</h3>
                <div id="admin-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue, update, remove } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504",
            databaseURL: "https://firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentImgs = [];
        let filterActive = "Todas";
        let fullData = {};

        window.abrirAdmin = () => { if(prompt("Acceso myGESTIÓN:") === "0110") document.getElementById('myGestion-Inercia').style.left = "0"; };
        
        document.getElementById('p-file').onchange = (e) => {
            currentImgs = [];
            const files = e.target.files;
            for(let f of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentImgs.push(ev.target.result);
                    document.getElementById('status-files').innerText = `${currentImgs.length} imágenes cargadas`;
                };
                reader.readAsDataURL(f);
            }
        };

        window.vender = (id, stock) => { if(stock > 0) update(ref(db, 'productos/'+id), {stock: stock-1}); };
        window.borrar = (id) => { if(confirm("¿Eliminar?")) remove(ref(db, 'productos/'+id)); };
        window.filtrar = (c) => { 
            filterActive = c; 
            document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            render(); 
        };

        document.getElementById('pub-btn').onclick = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = prompt("Stock inicial:", "10");
            if(!name || !price || currentImgs.length === 0) return alert("Falta info o imágenes");

            const id = Date.now();
            set(ref(db, 'productos/'+id), {
                id, name, price, cat: document.getElementById('p-cat').value,
                desc: document.getElementById('p-desc').value,
                img: currentImgs, stock: parseInt(stock) || 0
            }).then(() => {
                alert("Producto en Tienda Nube");
                currentImgs = []; document.getElementById('status-files').innerText = "";
            });
        };

        onValue(ref(db, 'productos/'), (snap) => { fullData = snap.val() || {}; render(); });

        function render() {
            const grid = document.getElementById('shop-grid');
            const list = document.getElementById('admin-list');
            grid.innerHTML = ""; list.innerHTML = "";
            
            Object.keys(fullData).forEach(key => {
                const p = fullData[key];
                if(filterActive !== "Todas" && p.cat !== filterActive) return;

                const out = p.stock <= 0;
                const imgs = Array.isArray(p.img) ? p.img : [p.img];

                grid.innerHTML += `
                    <div class="product-card" style="opacity:${out?0.6:1}">
                        <div class="carousel">
                            <div class="carousel-inner" id="inner-${key}">
                                ${imgs.map(i => `<img src="${i}">`).join('')}
                            </div>
                            ${imgs.length > 1 ? `
                                <button class="c-btn prev" onclick="m_c('${key}', -1)">&#10094;</button>
                                <button class="c-btn next" onclick="m_c('${key}', 1)">&#10095;</button>
                            ` : ''}
                        </div>
                        <div class="product-info">
                            <h3 class="p-title">${p.name}</h3>
                            <p class="price serif italic">$${p.price}</p>
                            <p class="p-desc">${p.desc}</p>
                            <p style="font-size:10px; margin-bottom:15px; opacity:0.3; font-weight:bold;">STOCK: ${p.stock} UNIDADES</p>
                            <button class="buy-btn" onclick="vender('${key}', ${p.stock})" ${out?'disabled':''}>
                                ${out ? 'SIN STOCK' : 'AÑADIR AL CARRITO'}
                            </button>
                        </div>
                    </div>`;
                
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #eee; font-size:12px;">
                    <span><b>${p.name}</b> (${p.cat})</span><button onclick="borrar('${key}')" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">ELIMINAR</button>
                </div>`;
            });
        }

        window.m_c = (id, dir) => {
            const inner = document.getElementById('inner-'+id);
            inner.scrollBy({left: inner.offsetWidth * dir, behavior: 'smooth'});
        };
    </script>
</body>
</html>
