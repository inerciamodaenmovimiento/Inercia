<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        
        :root { --bg-color: #fcfcfc; --text-main: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .serif { font-family: 'Crimson Text', serif; }
        
        /* Diseño Editorial */
        .img-container { background: #f4f4f4; overflow: hidden; position: relative; }
        .admin-active .editable:hover { background: rgba(0,0,0,0.03); outline: 1px solid #ddd; cursor: cell; }
        
        /* Ocultar barra de desplazamiento pero mantener funcionalidad */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* Botón de compra Sézane */
        .btn-buy {
            background: #1a1a1a; color: white;
            padding: 20px; text-transform: uppercase;
            letter-spacing: 0.3em; font-size: 11px; font-weight: 600;
            transition: all 0.4s ease; border: 1px solid #1a1a1a;
        }
        .btn-buy:hover { background: transparent; color: #1a1a1a; }
    </style>
</head>
<body class="selection:bg-black selection:text-white">

    <!-- ADMIN PANEL (SÓLO CON 0110) -->
    <div id="admin-ui" class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md border-b border-black h-16 z-50 flex items-center justify-between px-10 hidden shadow-xl">
        <span class="text-[10px] tracking-[0.4em] font-bold uppercase">Admin Mode / Inercia</span>
        <div class="flex gap-8">
            <button onclick="saveToCloud()" class="text-[10px] tracking-widest font-black underline uppercase">Publicar Cambios</button>
            <button onclick="toggleAdminMode()" class="text-[10px] tracking-widest text-red-500 uppercase">Cerrar</button>
        </div>
    </div>

    <!-- HEADER LIMPIO (SIN HASHES) -->
    <header class="pt-16 pb-12 text-center border-b border-gray-100">
        <h1 class="serif text-6xl tracking-[0.2em] uppercase mb-8 cursor-default editable" id="main-title">INERCIA</h1>
        <nav class="flex justify-center gap-12 text-[10px] tracking-[0.3em] uppercase font-light text-gray-500">
            <span class="hover:text-black cursor-pointer transition editable">E-shop</span>
            <span class="hover:text-black cursor-pointer transition editable">Lookbook</span>
            <span class="hover:text-black cursor-pointer transition editable">Journal</span>
            <span class="hover:text-black cursor-pointer transition editable">Bag (0)</span>
        </nav>
    </header>

    <!-- CUERPO DE PÁGINA (ESTÉTICA SÉZANE) -->
    <main class="max-w-6xl mx-auto px-6 py-20">
        <div class="flex flex-col lg:flex-row gap-24 items-start">
            
            <!-- GALERÍA DE IMÁGENES -->
            <div class="w-full lg:w-[60%] space-y-8">
                <div class="img-container">
                    <img id="hero-img" src="https://unsplash.com" 
                         class="w-full grayscale-[10%] hover:grayscale-0 transition-all duration-700 cursor-pointer"
                         onclick="changeImage('hero-img')">
                </div>
                <div class="grid grid-cols-2 gap-8">
                    <div class="img-container aspect-[3/4]">
                        <img id="sub-1" src="https://unsplash.com" class="w-full h-full object-cover cursor-pointer" onclick="changeImage('sub-1')">
                    </div>
                    <div class="img-container aspect-[3/4]">
                        <img id="sub-2" src="https://unsplash.com" class="w-full h-full object-cover cursor-pointer" onclick="changeImage('sub-2')">
                    </div>
                </div>
            </div>

            <!-- BLOQUE DE TEXTO Y COMPRA -->
            <div class="w-full lg:w-[40%] lg:sticky lg:top-40">
                <div class="border-b border-black/10 pb-10 mb-10">
                    <h2 id="product-name" class="serif text-4xl mb-4 uppercase tracking-widest editable">Essentiels - Hunter</h2>
                    <p class="text-2xl font-extralight tracking-tighter">€ <span id="product-price" class="editable">180</span></p>
                </div>

                <div class="space-y-8 text-[13px] leading-[1.8] text-gray-600">
                    <p id="product-desc" class="italic editable font-light">"Diseño atemporal pensado para la fluidez y el movimiento. Una pieza esencial que redefine la silueta femenina con elegancia natural."</p>
                    
                    <div class="pt-6 border-t border-black/5">
                        <span class="text-[10px] uppercase tracking-widest font-bold block mb-6">Seleccionar Talla</span>
                        <div class="flex gap-4">
                            <button class="w-10 h-10 border border-gray-200 text-[10px] hover:border-black transition">36</button>
                            <button class="w-10 h-10 border border-black text-[10px] font-bold">37</button>
                            <button class="w-10 h-10 border border-gray-200 text-[10px] hover:border-black transition">38</button>
                        </div>
                    </div>

                    <button class="w-full btn-buy mt-8">Añadir a la Cesta</button>
                </div>
            </div>
        </div>
    </main>

    <!-- INPUT OCULTO PARA CARGA DE IMÁGENES -->
    <input type="file" id="image-upload" class="hidden" accept="image/*">

    <script>
        let adminMode = false;
        let buffer = "";
        let activeImageId = "";

        // 1. ELIMINAR CUALQUIER HASH DE LA URL POR DISEÑO
        if(window.location.hash) {
            history.replaceState("", document.title, window.location.pathname);
        }

        // 2. ACTIVACIÓN INVISIBLE (0110)
        window.addEventListener('keydown', (e) => {
            buffer += e.key;
            if (buffer.length > 4) buffer = buffer.substring(1);
            if (buffer === "0110") toggleAdminMode();
        });

        function toggleAdminMode() {
            adminMode = !adminMode;
            document.body.classList.toggle('admin-active', adminMode);
            document.getElementById('admin-ui').classList.toggle('hidden', !adminMode);
            document.querySelectorAll('.editable').forEach(el => el.contentEditable = adminMode);
            console.log("Admin: " + (adminMode ? "Habilitado" : "Deshabilitado"));
        }

        // 3. CAMBIO DE IMAGEN POR INERCIA
        function changeImage(id) {
            if(!adminMode) return;
            activeImageId = id;
            document.getElementById('image-upload').click();
        }

        document.getElementById('image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => document.getElementById(activeImageId).src = ev.target.result;
                reader.readAsDataURL(file);
            }
        });

        // 4. GUARDADO EN BASE DE DATOS LOCAL
        function saveToCloud() {
            const data = {
                title: document.getElementById('main-title').innerText,
                product: document.getElementById('product-name').innerText,
                price: document.getElementById('product-price').innerText,
                desc: document.getElementById('product-desc').innerText,
                images: {
                    hero: document.getElementById('hero-img').src,
                    s1: document.getElementById('sub-1').src,
                    s2: document.getElementById('sub-2').src
                }
            };
            localStorage.setItem('inercia_db', JSON.stringify(data));
            alert("✨ Cambios publicados con éxito. Se verán reflejados en cada visita.");
            toggleAdminMode();
        }

        // 5. CARGA DE DATOS AL INICIAR
        window.onload = () => {
            const savedData = JSON.parse(localStorage.getItem('inercia_db'));
            if(savedData) {
                document.getElementById('main-title').innerText = savedData.title;
                document.getElementById('product-name').innerText = savedData.product;
                document.getElementById('product-price').innerText = savedData.price;
                document.getElementById('product-desc').innerText = savedData.desc;
                document.getElementById('hero-img').src = savedData.images.hero;
                document.getElementById('sub-1').src = savedData.images.s1;
                document.getElementById('sub-2').src = savedData.images.s2;
            }
        }
    </script>
</body>
</html>
