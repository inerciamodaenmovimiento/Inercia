<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris-claro: #fbfbfb; --font-serif: 'Playfair Display', serif; --font-sans: 'Inter', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--blanco); color: var(--azul); font-family: var(--font-sans); overflow-x: hidden; }

        /* NAV */
        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .logo { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; color: var(--azul); }
        .cart-trigger { cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--azul); }

        /* BANNER */
        .main-banner { width: 100%; height: 60vh; background: #f4f4f4; margin-top: 80px; overflow: hidden; }
        .main-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* CATEGORÍAS */
        .cat-nav { display: flex; justify-content: center; gap: 25px; padding: 30px 0; background: white; position: sticky; top: 80px; z-index: 900; border-bottom: 1px solid #f0f0f0; }
        .cat-link { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .cat-link:hover, .cat-link.active { opacity: 1; font-weight: bold; }

        /* CATÁLOGO */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px 20px; padding: 40px 5% 60px; max-width: 1400px; margin: 0 auto; }
        .card { cursor: pointer; transition: 0.4s; text-align: center; }
        .card-img-wrapper { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #f9f9f9; margin-bottom: 12px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-cat { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 5px; display: block; }
        .card-name { font-family: var(--font-serif); font-size: 1rem; margin-bottom: 5px; }

        /* CARRITO */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 40px; box-shadow: -20px 0 60px rgba(0,0,0,0.05); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .btn-volver { background: none; border: none; font-size: 0.65rem; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; margin-bottom: 30px; opacity: 0.5; }
        .input-cart { width: 100%; padding: 12px 0; margin-bottom: 15px; border: none; border-bottom: 1px solid #eee; font-size: 0.8rem; outline: none; }
        .btn-black { background: var(--azul); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }

        /* ADMIN */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gris-claro); z-index: 6000; padding: 5% 10%; overflow-y: auto; }
        .admin-box { background: white; padding: 30px; margin-bottom: 20px; border-radius: 4px; }
        .order-card { border-left: 3px solid var(--azul); padding: 15px; background: #fff; margin-bottom: 10px; font-size: 0.8rem; line-height: 1.6; }
        
        /* MODAL */
        #modal-detalle { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; }
        .modal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); min-height: 100vh; }
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 30px; height: 30px; cursor: pointer; z-index: 7000; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">INERCIA</a>
    <div class="cart-trigger" onclick="toggleCart()">BOLSA (<span id="cart-count">0</span>)</div>
</nav>

<div class="main-banner" id="banner-home"></div>
<div class="cat-nav" id="cat-menu"></div>
<section class="productos-container" id="shop-grid"></section>

<!-- MODAL -->
<div id="modal-detalle">
    <button style="position:fixed; top:30px; right:40px; font-size:0.7rem; letter-spacing:2px; cursor:pointer; border:none; background:none; z-index:6000" onclick="closeModal()">CERRAR ×</button>
    <div id="modal-content" class="modal-grid"></div>
</div>

<!-- CARRITO -->
<div id="cart-panel">
    <button class="btn-volver" onclick="toggleCart()">← VOLVER</button>
    <h2 style="font-family:var(--font-serif); margin-bottom:30px">BOLSA</h2>
    <div id="cart-items" style="margin-bottom:30px"></div>
    <div id="cart-total" style="font-weight:bold; border-top:1px solid #eee; padding-top:20px; margin-bottom:30px">TOTAL: $0</div>
    
    <input type="text" id="c-name" class="input-cart" placeholder="NOMBRE COMPLETO">
    <input type="text" id="c-phone" class="input-cart" placeholder="TELÉFONO / WHATSAPP">
    
    <select id="c-ship" class="input-cart" onchange="toggleShipInputs()">
        <option value="Retiro">RETIRO LOCAL</option>
        <option value="Correo">ENVÍO POR CORREO / DOMICILIO</option>
    </select>

    <div id="shipping-details" style="display:none">
        <input type="text" id="c-address" class="input-cart" placeholder="DIRECCIÓN (CALLE Y ALTURA)">
        <input type="text" id="c-city" class="input-cart" placeholder="LOCALIDAD">
        <input type="text" id="c-zip" class="input-cart" placeholder="CÓDIGO POSTAL">
    </div>

    <select id="c-pay" class="input-cart">
        <option value="Efectivo">EFECTIVO</option>
        <option value="Transferencia">TRANSFERENCIA</option>
    </select>
    <button class="btn-black" onclick="confirmOrder()">FINALIZAR COMPRA</button>
</div>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<!-- ADMIN -->
<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px"><h2>PANEL CONTROL</h2><button onclick="closeAdmin()">SALIR</button></div>
    
    <div class="admin-box">
        <h3>HISTORIAL DE PEDIDOS (<span id="total-orders-count">0</span>)</h3>
        <div id="admin-orders-list"></div>
    </div>

    <div class="admin-box">
        <h3>CONTENIDO & AJUSTES</h3>
        <input type="text" id="conf-wa" placeholder="WhatsApp Dueño (549...)" class="input-cart">
        <input type="text" id="conf-cats" placeholder="Categorías (comas)" class="input-cart">
        <label>Banner Principal:</label>
        <input type="file" id="b-img" class="input-cart">
        <button class="btn-black" onclick="saveSettings()">GUARDAR CONFIGURACIÓN</button>
    </div>

    <div class="admin-box">
        <h3>SUBIR PRODUCTO</h3>
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <textarea id="p-desc" placeholder="Descripción" class="input-cart" style="height:80px"></textarea>
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat" class="input-cart"></select>
        <input type="file" id="p-img" multiple class="input-cart">
        <button class="btn-black" onclick="uploadProduct()">PUBLICAR</button>
    </div>

    <div class="admin-box">
        <h3>PRODUCTOS ACTIVOS</h3>
        <div id="admin-list"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('inercia_db_final')) || { products: [], cats: ["VER TODO"], ships: ["RETIRO"], wa: "", banner: "", orders: [] };
    let cart = [];

    window.onload = () => { renderShop(); renderBanner(); renderCatMenu(); renderOrders(); updateUI(); };

    function save() { localStorage.setItem('inercia_db_final', JSON.stringify(db)); }
    function accessAdmin() { if(prompt("CÓDIGO:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }

    function toggleShipInputs() {
        const isShipping = document.getElementById('c-ship').value === "Correo";
        document.getElementById('shipping-details').style.display = isShipping ? 'block' : 'none';
    }

    function updateUI() {
        document.getElementById('p-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('conf-wa').value = db.wa;
        document.getElementById('conf-cats').value = db.cats.join(', ');
        renderAdminList();
    }

    function saveSettings() {
        db.wa = document.getElementById('conf-wa').value;
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim().toUpperCase());
        const bannerFile = document.getElementById('b-img').files[0];
        if(bannerFile) {
            const reader = new FileReader();
            reader.onload = e => { db.banner = e.target.result; save(); renderBanner(); };
            reader.readAsDataURL(bannerFile);
        }
        save(); renderCatMenu(); updateUI(); alert("Configuración actualizada");
    }

    function renderBanner() {
        if(db.banner) document.getElementById('banner-home').innerHTML = `<img src="${db.banner}">`;
    }

    function renderCatMenu() {
        document.getElementById('cat-menu').innerHTML = db.cats.map(c => `<span class="cat-link" onclick="renderShop('${c}')">${c}</span>`).join('');
    }

    async function uploadProduct() {
        const files = document.getElementById('p-img').files;
        const imgs = [];
        for(let f of files) { imgs.push(await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); })); }
        db.products.push({ id: Date.now(), name: document.getElementById('p-name').value, desc: document.getElementById('p-desc').value, price: document.getElementById('p-price').value, cat: document.getElementById('p-cat').value, imgs: imgs });
        save(); renderShop(); updateUI(); alert("Producto publicado");
    }

    function deleteProduct(id) {
        if(confirm("¿Eliminar?")) { db.products = db.products.filter(p => p.id !== id); save(); renderShop(); updateUI(); }
    }

    function renderAdminList() {
        document.getElementById('admin-list').innerHTML = db.products.map(p => `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:0.7rem"><span>${p.name}</span><span onclick="deleteProduct(${p.id})" style="color:red; cursor:pointer">ELIMINAR</span></div>`).join('');
    }

    function renderShop(filter = "VER TODO") {
        const prods = (filter === "VER TODO") ? db.products : db.products.filter(p => p.cat === filter);
        document.getElementById('shop-grid').innerHTML = prods.map(p => `
            <div class="card" onclick="openModal(${p.id})">
                <div class="card-img-wrapper"><img src="${p.imgs[0]}"></div>
                <span class="card-cat">${p.cat}</span>
                <h3 class="card-name">${p.name}</h3>
                <p style="font-size:0.75rem; opacity:0.6">$${p.price}</p>
            </div>`).join('');
    }

    function openModal(id) {
        const p = db.products.find(x => x.id === id);
        document.getElementById('modal-content').innerHTML = `
            <div class="modal-imgs">${p.imgs.map(i => `<img src="${i}">`).join('')}</div>
            <div class="modal-info">
                <span class="card-cat">${p.cat}</span>
                <h1 style="font-family:var(--font-serif); font-size:2.5rem; margin:15px 0">${p.name}</h1>
                <p style="opacity:0.6; line-height:1.8; margin-bottom:30px; font-size:0.9rem">${p.desc}</p>
                <p style="font-size:1.3rem; margin-bottom:30px">$${p.price}</p>
                <button class="btn-black" onclick="addToCart(${p.id}); closeModal()">AÑADIR A LA BOLSA</button>
            </div>`;
        document.getElementById('modal-detalle').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal-detalle').style.display = 'none'; }

    function addToCart(id) {
        cart.push(db.products.find(x => x.id === id));
        updateCart(); toggleCart();
    }

    function updateCart() {
        let t = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => { t += parseFloat(i.price); return `<div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:10px"><span>${i.name}</span><span>$${i.price}</span></div>`; }).join('');
        document.getElementById('cart-total').innerText = "TOTAL: $" + t;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        const n = document.getElementById('c-name').value;
        const ph = document.getElementById('c-phone').value;
        if(!n || !ph || !cart.length) return alert("Faltan datos de contacto");
        
        const ship = document.getElementById('c-ship').value;
        let shipData = "";
        if(ship === "Correo") {
            shipData = `Dirección: ${document.getElementById('c-address').value}, ${document.getElementById('c-city').value} (CP: ${document.getElementById('c-zip').value})`;
        }

        const order = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            customer: n,
            phone: ph,
            items: cart.map(i => i.name).join(', '),
            ship: ship,
            shipData: shipData,
            total: document.getElementById('cart-total').innerText
        };

        db.orders.push(order);
        save();
        renderOrders();
        
        const text = `INERCIA PEDIDO%0ACliente: ${n}%0ATel: ${ph}%0AProductos: ${order.items}%0AEnvío: ${ship} ${shipData}%0A${order.total}`;
        window.open(`https://wa.me{db.wa}?text=${text}`);
        cart = []; updateCart(); toggleCart();
    }

    function renderOrders() {
        document.getElementById('total-orders-count').innerText = db.orders.length;
        document.getElementById('admin-orders-list').innerHTML = db.orders.map(o => `
            <div class="order-card">
                <strong>${o.date} - ${o.customer} (${o.phone})</strong><br>
                Items: ${o.items}<br>
                Envío: ${o.ship} ${o.shipData}<br>
                Total: ${o.total}
            </div>`).reverse().join('');
    }
</script>
</body>
</html>
