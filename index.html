<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; transition: 0.3s; }
        header { padding: 40px; text-align: center; border-bottom: 1px solid #eee; letter-spacing: 5px; font-size: 1.5rem; }
        
        /* Banner Home */
        .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 80vh; align-items: center; padding: 50px 8%; gap: 40px; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 5rem; margin: 0; text-transform: uppercase; }
        .hero-img { width: 100%; max-height: 70vh; object-fit: cover; }

        /* Grid de Productos */
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; padding: 50px 8%; }
        .product-card { border: 1px solid #eee; padding: 15px; position: relative; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: red; color: white; padding: 5px 10px; font-size: 10px; }
        .stock { font-size: 11px; color: #888; }

        /* Información de Pago/Envío */
        .info-footer { background: #f9f9f9; padding: 40px 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 1px solid #eee; }

        /* Panel Admin - Scrollable */
        #admin-panel { 
            display: none; position: fixed; top: 0; right: 0; width: 400px; height: 100vh; 
            background: white; z-index: 10000; box-shadow: -5px 0 20px rgba(0,0,0,0.1); 
            padding: 25px; overflow-y: auto; font-size: 13px;
        }
        input, textarea, select { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ccc; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-save { background: black; color: white; border: none; padding: 15px; width: 100%; margin-top: 20px; cursor: pointer; }
        #secret-trigger { position: fixed; bottom: 10px; right: 10px; width: 20px; height: 20px; cursor: pointer; opacity: 0.05; z-index: 9999; }
    </style>
</head>
<body>

<div id="top-info" style="background:black; color:white; text-align:center; padding:8px; font-size:11px; letter-spacing:1px;">ENVÍOS A TODO EL PAÍS</div>
<header>INERCIA</header>

<section class="hero">
    <div class="hero-text">
        <h1 id="h-title">MODA EN MOVIMIENTO</h1>
        <p id="h-desc">Colección Editorial 2026</p>
    </div>
    <img src="https://placeholder.com" id="h-img" class="hero-img">
</section>

<section class="catalog" id="product-list">
    <!-- Los productos aparecerán aquí -->
</section>

<section class="info-footer">
    <div>
        <h3>MÉTODOS DE ENVÍO</h3>
        <p id="txt-envio">Detalles de envío...</p>
    </div>
    <div>
        <h3>MÉTODOS DE PAGO</h3>
        <p id="txt-pago">Detalles de pago...</p>
    </div>
</section>

<div id="secret-trigger" onclick="openAdmin()">🔒</div>

<!-- PANEL DE CONTROL AVANZADO -->
<div id="admin-panel">
    <h2 style="font-family:'Playfair Display'">Panel Inercia v2.0</h2>
    
    <hr>
    <h4>TEXTOS DEL HOME & BANNER</h4>
    <label>Título Home:</label><input type="text" id="in-h-title">
    <label>Descripción Home:</label><input type="text" id="in-h-desc">
    <label>Subir Banner Home (Foto):</label><input type="file" id="in-h-img" accept="image/*">

    <hr>
    <h4>AGREGAR PRODUCTO</h4>
    <label>Foto del Producto:</label><input type="file" id="p-img" accept="image/*">
    <label>Nombre:</label><input type="text" id="p-name">
    <label>Precio ($):</label><input type="number" id="p-price">
    <label>Descuento (%):</label><input type="number" id="p-disc" placeholder="0">
    <label>Stock:</label><input type="number" id="p-stock">
    <label>Descripción:</label><textarea id="p-desc"></textarea>
    <button class="btn-add" onclick="addProduct()">+ Agregar a la Lista</button>

    <hr>
    <h4>PAGO Y ENVÍO</h4>
    <label>Info Envío:</label><textarea id="in-envio"></textarea>
    <label>Info Pago:</label><textarea id="in-pago"></textarea>

    <button class="btn-save" onclick="saveAll()">APLICAR CAMBIOS</button>
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; background:none; border:none; color:red; cursor:pointer; margin-top:10px;">Cerrar</button>
</div>

<script>
    function openAdmin() {
        if(prompt("Código:") === "0110") document.getElementById('admin-panel').style.display = 'block';
    }

    // Función para manejar fotos locales
    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const stock = document.getElementById('p-stock').value;
        const disc = document.getElementById('p-disc').value;
        const file = document.getElementById('p-img').files[0];
        
        let imgUrl = "https://placeholder.com";
        if(file) imgUrl = await getBase64(file);

        const html = `
            <div class="product-card">
                ${disc > 0 ? `<div class="badge">-${disc}%</div>` : ''}
                <img src="${imgUrl}">
                <h4>${name}</h4>
                <p><strong>$${price}</strong></p>
                <p class="stock">Stock: ${stock} unidades</p>
            </div>
        `;
        document.getElementById('product-list').innerHTML += html;
        alert("Producto añadido a la vista previa.");
    }

    async function saveAll() {
        // Actualizar textos Home
        if(document.getElementById('in-h-title').value) document.getElementById('h-title').innerText = document.getElementById('in-h-title').value;
        if(document.getElementById('in-h-desc').value) document.getElementById('h-desc').innerText = document.getElementById('in-h-desc').value;
        
        // Actualizar Banner
        const bannerFile = document.getElementById('in-h-img').files[0];
        if(bannerFile) document.getElementById('h-img').src = await getBase64(bannerFile);

        // Actualizar Envío/Pago
        if(document.getElementById('in-envio').value) document.getElementById('txt-envio').innerText = document.getElementById('in-envio').value;
        if(document.getElementById('in-pago').value) document.getElementById('txt-pago').innerText = document.getElementById('in-pago').value;

        alert("¡Todo actualizado! Copia el código fuente si deseas guardar permanentemente en GitHub.");
        document.getElementById('admin-panel').style.display = 'none';
    }
</script>
</body>
</html>
