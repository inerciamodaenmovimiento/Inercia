<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Encabezado Estilo Revista */
        header { padding: 40px; text-align: center; border-bottom: 1px solid #eee; }
        .brand { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: -1px; }

        /* Sección Hero (La portada) */
        .hero { display: grid; grid-template-columns: 1fr 1fr; height: 80vh; align-items: center; padding: 0 5%; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 5rem; line-height: 1; margin: 0; }
        .hero-img { height: 100%; object-fit: cover; width: 80%; justify-self: end; }

        /* Lookbook Grid */
        .lookbook { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; padding: 100px 5%; }
        .item { position: relative; }
        .item.tall { margin-top: -50px; } /* Asimetría */
        .item img { width: 100%; filter: grayscale(20%); transition: 0.5s; }
        .item img:hover { filter: grayscale(0%); }
    </style>
</head>
<body>
    <header><div class="brand">INERCIA</div></header>
    
    <section class="hero">
        <div class="hero-text">
            <h1>Colección<br>Otoño — 2026</h1>
            <p>Moda en constante movimiento.</p>
        </div>
        <img src="tu-imagen-principal.jpg" class="hero-img" alt="Inercia Look">
    </section>

    <section class="lookbook">
        <div class="item">
            <img src="foto1.jpg">
            <p>20% SALE</p>
        </div>
        <div class="item tall">
            <img src="foto2.jpg">
            <p>NUEVA TEMPORADA</p>
        </div>
        <div class="item">
            <img src="foto3.jpg">
            <p>ACCESORIOS</p>
        </div>
    </section>
</body>
</html><!-- Candado invisible en la esquina -->
<div id="secret-admin-trigger" onclick="checkCode()" style="position:fixed; bottom:10px; right:10px; width:20px; height:20px; cursor:pointer; opacity:0.1; z-index:9999;">🔒</div>

<!-- Panel de Administración Oculto -->
<div id="admin-panel" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:40px; border:1px solid #000; z-index:10000; box-shadow: 0 0 50px rgba(0,0,0,0.5); font-family: sans-serif; width: 80%; max-width: 500px;">
    <h2 style="font-family:'Playfair Display', serif;">Panel Inercia</h2>
    <label>Título de la Colección:</label><br>
    <input type="text" id="new-title" style="width:100%; margin-bottom:20px;"><br>
    
    <label>Link de Imagen Principal:</label><br>
    <input type="text" id="new-img" style="width:100%; margin-bottom:20px;"><br>
    
    <button onclick="updatePreview()" style="background:black; color:white; padding:10px 20px; border:none; cursor:pointer;">Aplicar Cambios</button>
    <button onclick="closeAdmin()" style="background:none; border:none; color:red; cursor:pointer; margin-left:10px;">Cerrar</button>
    
    <p style="font-size:10px; margin-top:20px; color:#666;">Nota: Para que los cambios sean permanentes, copia el código final y súbelo a GitHub.</p>
</div>
<script>
function checkCode() {
    let pass = prompt("Acceso Inercia - Ingrese Código:");
    if (pass === "0110") {
        document.getElementById('admin-panel').style.display = 'block';
    } else {
        alert("Código incorrecto.");
    }
}

function closeAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
}

function updatePreview() {
    // Cambia el título en tiempo real para que veas cómo queda
    let title = document.getElementById('new-title').value;
    let img = document.getElementById('new-img').value;
    
    if(title) document.querySelector('h1').innerText = title;
    if(img) document.querySelector('.hero-img').src = img;
    
    alert("¡Vista previa actualizada! Ahora copia este texto y pégalo en tu index.html de GitHub.");
    closeAdmin();
}
</script>
