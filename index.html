<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://tailwindcss.com"></script>
    <!-- React y Babel para que el código funcione en el navegador -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; }
        .hero-text { font-style: italic; letter-spacing: -0.05em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [config, setConfig] = useState({
                brand: "INERCIA",
                slogan: "Moda en Movimiento",
                hero: "ESTÉTICA FLUIDA",
                accent: "#000000"
            });

            // Componente de Icono Simple
            const Icon = ({ name }) => {
                useEffect(() => { lucide.createIcons(); }, []);
                return <i data-lucide={name} style={{width: '20px', height: '20px'}}></i>;
            };

            return (
                <div className="min-h-screen bg-[#FDFDFD] text-black">
                    {/* NAV */}
                    <nav className="fixed w-full z-50 flex justify-between items-center px-10 py-8 mix-blend-difference text-white">
                        <div className="text-xl font-light tracking-[0.3em]">{config.brand}</div>
                        <div className="flex items-center gap-8">
                            <button onClick={() => setIsAdminOpen(!isAdminOpen)} className="opacity-70 hover:opacity-100">
                                <Icon name="settings" />
                            </button>
                            <Icon name="shopping-bag" />
                        </div>
                    </nav>

                    {/* HERO (Inspiración Eunoia) */}
                    <section className="h-screen flex flex-col justify-center items-center text-center">
                        <p className="text-[10px] tracking-[0.6em] uppercase mb-4 opacity-50">{config.slogan}</p>
                        <h1 className="text-7xl md:text-[12vw] font-light leading-none hero-text uppercase mb-12">
                            {config.hero}
                        </h1>
                        <button className="border border-black px-10 py-4 text-[10px] uppercase tracking-widest hover:bg-black hover:text-white transition-all duration-500">
                            Ver Colección
                        </button>
                    </section>

                    {/* PRODUCTOS ASIMÉTRICOS */}
                    <div className="max-w-6xl mx-auto px-10 pb-40 grid grid-cols-1 md:grid-cols-2 gap-20">
                        <div className="space-y-6">
                            <div className="aspect-[3/4] bg-gray-200 overflow-hidden">
                                <img src="https://unsplash.com" className="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-1000" />
                            </div>
                            <div className="flex justify-between text-[11px] uppercase tracking-widest">
                                <span>Top Elemental</span>
                                <span>$85.00</span>
                            </div>
                        </div>
                        <div className="space-y-6 md:mt-32">
                            <div className="aspect-[3/4] bg-gray-200 overflow-hidden">
                                <img src="https://unsplash.com" className="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-1000" />
                            </div>
                            <div className="flex justify-between text-[11px] uppercase tracking-widest">
                                <span>Pantalón Inercia</span>
                                <span>$140.00</span>
                            </div>
                        </div>
                    </div>

                    {/* PANEL DE CONTROL (ADMIN) */}
                    {isAdminOpen && (
                        <div className="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-[100] p-10 flex flex-col border-l border-gray-100 animate-in slide-in-from-right">
                            <div className="flex justify-between items-center mb-12">
                                <h2 className="text-[10px] font-bold uppercase tracking-[0.2em]">Configuración</h2>
                                <button onClick={() => setIsAdminOpen(false)}><Icon name="x" /></button>
                            </div>
                            
                            <div className="space-y-8">
                                <div>
                                    <label className="text-[9px] uppercase opacity-50 block mb-2">Nombre de Marca</label>
                                    <input className="w-full border-b border-black py-2 outline-none text-sm" value={config.brand} onChange={(e) => setConfig({...config, brand: e.target.value})} />
                                </div>
                                <div>
                                    <label className="text-[9px] uppercase opacity-50 block mb-2">Slogan</label>
                                    <input className="w-full border-b border-black py-2 outline-none text-sm" value={config.slogan} onChange={(e) => setConfig({...config, slogan: e.target.value})} />
                                </div>
                                <div>
                                    <label className="text-[9px] uppercase opacity-50 block mb-2">Texto Principal</label>
                                    <input className="w-full border-b border-black py-2 outline-none text-sm" value={config.hero} onChange={(e) => setConfig({...config, hero: e.target.value})} />
                                </div>
                            </div>
                            
                            <div className="mt-auto">
                                <p className="text-[8px] uppercase leading-relaxed opacity-40">
                                    Esta interfaz permite editar la estética de la tienda en tiempo real. 
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
