<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --black: #000; --grey: #f2f2f2; --border: #eeeeee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--black); -webkit-font-smoothing: antialiased; }
        
        header { display: flex; justify-content: space-between; padding: 25px 5%; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: white; z-index: 10; }
        .logo { letter-spacing: 8px; font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .nav-icons svg { width: 20px; height: 20px; cursor: pointer; margin-left: 15px; }

        main { max-width: 1200px; margin: 50px auto; padding: 0 5%; }
        .hero-title { font-size: 32px; font-weight: 200; margin-bottom: 40px; letter-spacing: -1px; }

        /* Grid de Productos Alpine Style */
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .product-card { background: white; padding: 20px; border-bottom: 1px solid var(--border); transition: 0.3s; }
        .img-container { background: var(--grey); aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .info { display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .price { font-weight: 600; }
        .variants { font-size: 9px; color: #888; margin-top: 5px; }

        @media (max-width: 768px) { .product-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <header>
        <svg viewBox="0 0 24 24" style="width:24px"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        <div class="logo">INERCIA</div>
        <div class="nav-icons">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M17 6h-2V5c0-1.65-1.35-3-3-3S9 3.35 9 5v1H7c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6-1c0-.55.45-1 1-1s1 .45 1 1v1h-2V5zm6 15H7V8h2v2h2V8h2v2h2V8h2v12z"/></svg>
        </div>
    </header>

    <main>
        <h1 class="hero-title">New Arrivals</h1>
        <div id="shop-grid" class="product-grid">
            <!-- Los productos de Firebase aparecerán aquí -->
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, onSnapshot } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cargar productos en tiempo real
        onSnapshot(collection(db, "productos"), (snapshot) => {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';
            snapshot.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="img-container"><img src="${p.imagen}"></div>
                        <div class="info">
                            <span>${p.nombre}</span>
                            <span class="price">${p.precio} AED</span>
                        </div>
                        <div class="variants">Tallas: ${p.tallas.join(', ')}</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
