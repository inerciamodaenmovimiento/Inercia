<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-pink': '#FF007F',
                        'electric-purple': '#7A00FF',
                        'acid-green': '#BAFF39',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Outfit', sans-serif; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .vibrant-mesh {
            background-color: #050505;
            background-image: radial-gradient(at 0% 0%, hsla(329,100%,45%,0.15) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(78,100%,61%,0.15) 0, transparent 50%);
        }
        .cart-sidebar { transform: translateX(100%); transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1); }
        .cart-open .cart-sidebar { transform: translateX(0); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="vibrant-mesh min-h-screen">

    <!-- NAVEGACIÓN -->
    <nav class="fixed top-0 w-full z-50 glass h-20 flex items-center px-6 md:px-12 justify-between">
        <div class="cursor-pointer" onclick="showView('home')">
            <h1 class="font-serif text-4xl italic text-neon-pink leading-none">Inercia</h1>
            <p class="text-[8px] uppercase tracking-[0.5em] text-acid-green font-bold">Moda en Movimiento</p>
        </div>
        <button onclick="toggleCart()" class="relative bg-acid-green p-2 rounded-full hover:scale-110 transition">
            <i data-lucide="shopping-bag" class="w-5 h-5 text-black"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-neon-pink text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
        </button>
    </nav>

    <!-- CARRITO -->
    <div id="cart-panel" class="cart-sidebar fixed right-0 top-0 h-full w-full md:w-[400px] bg-zinc-950 z-[60] p-8 border-l border-neon-pink/30 flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-serif text-3xl italic text-white">Tu Selección</h2>
            <button onclick="toggleCart()"><i data-lucide="x" class="text-acid-green"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4">
            <!-- Items -->
        </div>
        <div class="pt-6 border-t border-white/10">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Total:</span>
                <span id="cart-total" class="text-acid-green">$0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-neon-pink text-white py-4 rounded-full font-black uppercase tracking-widest hover:brightness-125 transition">Finalizar Compra</button>
        </div>
    </div>

    <!-- MAIN -->
    <main class="pt-20">
        <!-- VISTA TIENDA -->
        <section id="view-home" class="view">
            <!-- Hero Banner -->
            <div class="relative h-[60vh] flex items-center justify-center text-center px-6">
                <div class="absolute inset-0 overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black"></div>
                    <img src="https://unsplash.com" class="w-full h-full object-cover opacity-30 grayscale">
                </div>
                <div class="z-10">
                    <h2 class="text-7xl md:text-9xl font-black italic mb-4 text-white">INERCIA</h2>
                    <p class="text-acid-green tracking-[1em] text-xs uppercase font-bold">Concepto Artístico</p>
                </div>
            </div>

            <!-- Grilla -->
            <div class="max-w-7xl mx-auto px-6 py-20">
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                    <!-- Se llena con render() -->
                </div>
            </div>
        </section>

        <!-- VISTA STUDIO (ADMIN) -->
        <section id="view-admin" class="view hidden min-h-screen p-8 md:p-20">
            <div class="max-w-4xl mx-auto glass p-10 rounded-[2rem]">
                <h2 class="font-serif text-5xl italic text-acid-green mb-10">Studio Config</h2>
                <div class="grid md:grid-cols-2 gap-10">
                    <div class="space-y-4">
                        <input type="text" id="adm-name" placeholder="Nombre" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-neon-pink">
                        <input type="number" id="adm-price" placeholder="Precio" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                        <input type="file" id="adm-img" class="w-full text-xs text-white/40">
                        <button onclick="saveProduct()" class="w-full bg-acid-green text-black py-4 rounded-xl font-bold uppercase">Publicar</button>
                    </div>
                    <div id="adm-list" class="space-y-3 max-h-[400px] overflow-y-auto">
                        <!-- Lista -->
                    </div>
                </div>
                <button onclick="showView('home')" class="mt-10 text-white/30 hover:text-white text-xs uppercase font-bold tracking-widest">← Volver a la tienda</button>
            </div>
        </section>
    </main>

    <!-- ACCESO OCULTO AL STUDIO -->
    <div class="fixed bottom-6 right-6 z-50">
        <button onclick="accessStudio()" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition group">
            <i data-lucide="shield-check" class="w-4 h-4 text-white/10 group-hover:text-acid-green"></i>
        </button>
    </div>

    <script>
        // PRODUCTOS DE EJEMPLO PARA QUE NO SE VEA VACÍA
        const demoProducts = [
            { id: 1, name: "Vestido Neón", price: "4500", cat: "Noche", img: "https://unsplash.com" },
            { id: 2, name: "Top Galaxia", price: "2800", cat: "Urbano", img: "https://unsplash.com" }
        ];

        let db = JSON.parse(localStorage.getItem('inercia_final')) || demoProducts;
        let cart = [];

        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');
        }

        function accessStudio() {
            if(prompt("Código de Seguridad:") === "0110") showView('admin');
        }

        function toggleCart() { document.body.classList.toggle('cart-open'); }

        function saveProduct() {
            const name = document.getElementById('adm-name').value;
            const price = document.getElementById('adm-price').value;
            const file = document.getElementById('adm-img').files[0];
            if(!name || !price || !file) return alert("Completa los campos");

            const reader = new FileReader();
            reader.onload = (e) => {
                db.push({ id: Date.now(), name, price, img: e.target.result });
                localStorage.setItem('inercia_final', JSON.stringify(db));
                render();
            };
            reader.readAsDataURL(file);
        }

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = db.map(p => `
                <div class="group relative">
                    <div class="aspect-[3/4] overflow-hidden rounded-3xl border border-white/10 bg-zinc-900">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <button onclick="addToCart(${p.id})" class="bg-acid-green text-black px-6 py-3 rounded-full font-black text-xs uppercase tracking-widest translate-y-4 group-hover:translate-y-0 transition">Comprar</button>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-between items-start">
                        <div>
                            <h3 class="font-serif text-2xl italic text-white">${p.name}</h3>
                            <p class="text-neon-pink font-bold">$${p.price}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('adm-list').innerHTML = db.map(p => `
                <div class="flex items-center justify-between p-3 glass rounded-xl">
                    <span class="text-sm font-bold">${p.name}</span>
                    <button onclick="deleteProd(${p.id})" class="text-red-500"><i data-lucide="trash"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addToCart(id) {
            cart.push(db.find(p => p.id === id));
            updateCart();
            if(!document.body.classList.contains('cart-open')) toggleCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map((item, idx) => `
                <div class="flex gap-4 p-4 glass rounded-2xl">
                    <img src="${item.img}" class="w-16 h-20 object-cover rounded-lg">
                    <div class="flex-1">
                        <p class="font-bold text-sm">${item.name}</p>
                        <p class="text-acid-green font-bold">$${item.price}</p>
                        <button onclick="cart.splice(${idx},1); updateCart()" class="text-[10px] text-white/30 uppercase mt-2">Quitar</button>
                    </div>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + Number(i.price), 0);
            document.getElementById('cart-total').innerText = `$${total}`;
        }

        function deleteProd(id) {
            db = db.filter(p => p.id !== id);
            localStorage.setItem('inercia_final', JSON.stringify(db));
            render();
        }

        function checkout() {
            const msg = `Inercia, quiero comprar: ${cart.map(i => i.name).join(', ')}. Total: $${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me{encodeURIComponent(msg)}`);
        }

        lucide.createIcons();
        render();
    </script>
</body>
</html>
