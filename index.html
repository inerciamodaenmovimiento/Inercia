<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INERCIA - Tienda Oficial</title>
  <script src="https://tailwindcss.com"></script>
  <script src="https://jsdelivr.net"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            beige: { 50:'#faf8f5', 100:'#f5f0e8', 200:'#ebe3d5', 300:'#d9ccb8', 400:'#c4b094', 500:'#b09a78' },
            ink: { 900:'#1a1a1a', 800:'#2d2d2d', 700:'#404040' }
          },
          fontFamily: {
            display: ['Cormorant Garamond','serif'],
            body: ['Outfit','sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
    .font-display { font-family: 'Cormorant Garamond', serif; }
    .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    @keyframes fadeIn { 
        from { opacity: 0; transform: translateY(15px); } 
        to { opacity: 1; transform: translateY(0); } 
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .banner-slide { opacity: 0; transition: opacity 1s ease-in-out; position: absolute; inset: 0; }
    .banner-slide.active { opacity: 1; z-index: 10; }
  </style>
</head>
<body class="bg-beige-50 text-ink-900 h-full">

  <div id="app" class="min-h-screen flex flex-col">
    
    <!-- NAVEGACIÓN -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-beige-200">
      <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex flex-col cursor-pointer" onclick="showView('home')">
          <h1 id="brand-name-nav" class="font-display text-2xl font-bold tracking-tighter uppercase leading-none text-ink-900">INERCIA</h1>
          <span id="brand-slogan-nav" class="text-[7px] tracking-[0.3em] uppercase font-bold text-beige-400">Moda en movimiento</span>
        </div>
        <div class="flex items-center gap-6">
          <button onclick="toggleCart()" class="relative p-2">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-ink-900 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="flex-grow">
      
      <!-- VISTA HOME -->
      <section id="view-home" class="view">
        <div id="hero-carousel" class="relative w-full h-[70vh] overflow-hidden bg-beige-100">
            <div id="banner-container" class="h-full w-full"></div>
            <div class="absolute bottom-10 right-10 z-20 flex gap-4">
                <button onclick="prevSlide()" class="p-3 border border-white/50 rounded-full text-white hover:bg-white hover:text-ink-900 transition backdrop-blur-sm"><i data-lucide="arrow-left" class="w-4 h-4"></i></button>
                <button onclick="nextSlide()" class="p-3 border border-white/50 rounded-full text-white hover:bg-white hover:text-ink-900 transition backdrop-blur-sm"><i data-lucide="arrow-right" class="w-4 h-4"></i></button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 py-20">
          <div id="cat-filters" class="flex gap-4 mb-16 overflow-x-auto no-scrollbar pb-4 justify-start md:justify-center"></div>
          <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-6 gap-y-12"></div>
        </div>
      </section>

      <!-- VISTA ADMINISTRADOR -->
      <section id="view-admin" class="view hidden bg-white min-h-screen">
        <div class="max-w-6xl mx-auto px-4 py-16">
            <div class="flex justify-between items-end mb-12 border-b border-beige-200 pb-8">
                <div>
                    <h2 class="font-display text-6xl tracking-tighter uppercase">Estudio</h2>
                </div>
                <button onclick="logoutAdmin()" class="text-[10px] uppercase font-bold text-red-400">Cerrar Sesión</button>
            </div>

            <!-- TAB PRODUCTOS -->
            <div id="admin-products" class="admin-content grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="bg-beige-50 p-8 rounded-3xl border border-beige-200 h-fit space-y-5">
                    <h3 class="font-display text-2xl">Crear Prenda</h3>
                    <input type="text" id="p-name" placeholder="Nombre" class="w-full bg-white border border-beige-200 p-4 rounded-xl text-sm outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="p-price" placeholder="Precio" class="w-full bg-white border border-beige-200 p-4 rounded-xl text-sm outline-none">
                        <input type="number" id="p-stock" placeholder="Stock" class="w-full bg-white border border-beige-200 p-4 rounded-xl text-sm outline-none">
                    </div>
                    <!-- INPUT DE FOTO AGREGADO -->
                    <div class="space-y-1">
                        <label class="text-[10px] uppercase font-bold text-beige-400 px-1">Foto de la prenda</label>
                        <input type="file" id="p-image" accept="image/*" class="w-full bg-white border border-beige-200 p-3 rounded-xl text-xs outline-none file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-beige-100 file:text-ink-900">
                    </div>
                    <!-- BOTÓN CON FUNCIÓN DE GUARDADO -->
                    <button onclick="guardarProducto()" class="w-full bg-ink-900 text-white py-4 rounded-2xl text-[10px] uppercase font-bold tracking-[0.2em] hover:bg-ink-800 transition-all shadow-xl">
                        Publicar Producto
                    </button>
                </div>
                <div class="lg:col-span-2">
                    <div id="admin-products-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Lógica para procesar y guardar producto con imagen
    async function guardarProducto() {
        const nombre = document.getElementById('p-name').value;
        const precio = document.getElementById('p-price').value;
        const stock = document.getElementById('p-stock').value;
        const imagenInput = document.getElementById('p-image');

        if (!nombre || !precio || imagenInput.files.length === 0) {
            alert("Por favor completa nombre, precio y selecciona una imagen.");
            return;
        }

        const archivo = imagenInput.files[0];
        const reader = new FileReader();

        reader.onloadend = function() {
            const base64Image = reader.result;

            const nuevoProducto = {
                id: Date.now(),
                name: nombre,
                price: parseFloat(precio),
                stock: parseInt(stock),
                image: base64Image
            };

            let productos = JSON.parse(localStorage.getItem('inercia_inventory') || '[]');
            productos.push(nuevoProducto);
            localStorage.setItem('inercia_inventory', JSON.stringify(productos));

            alert("Producto guardado correctamente");
            location.reload();
        };

        reader.readAsDataURL(archivo);
    }

    // Inicializar Lucide Icons
    lucide.createIcons();

    function showView(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
    }
  </script>
</body>
</html>
