<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://tailwindcss.com"></script>
    <!-- FontAwesome para los iconos -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        .cart-open { transform: translateX(0); }
    </style>
</head>
<body class="bg-white text-gray-900">

    <!-- NAVEGACIÓN -->
    <header class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-[0.2em] serif uppercase">Inercia</div>
            <ul class="hidden md:flex space-x-8 text-[10px] uppercase tracking-widest font-bold">
                <li><a href="#" class="hover:text-gray-500">Inicio</a></li>
                <li><a href="#productos" class="hover:text-gray-500">Colección</a></li>
                <li><a href="#admin" class="text-red-500 hover:text-red-800">Administrador</a></li>
            </ul>
            <div class="flex items-center space-x-5">
                <button onclick="toggleCart()" class="relative">
                    <i class="fa-solid fa-bag-shopping text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- HERO SECTION (BANNER) -->
    <section id="home-banner" class="relative h-[90vh] flex items-center justify-center bg-gray-900 text-white">
        <img id="banner-img" src="https://unsplash.com" 
             class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-10 text-center">
            <h1 class="text-6xl md:text-8xl serif mb-2">Inercia</h1>
            <p class="text-sm tracking-[0.5em] uppercase opacity-80 mb-10">Moda en Movimiento</p>
            <a href="#productos" class="border border-white px-10 py-4 text-[10px] uppercase tracking-[0.2em] hover:bg-white hover:text-black transition duration-300">Ver Catálogo</a>
        </div>
    </section>

    <!-- SECCIÓN DE PRODUCTOS -->
    <section id="productos" class="container mx-auto px-6 py-20">
        <div class="flex justify-between items-end mb-16">
            <div>
                <h2 class="text-4xl serif mb-2">Nuevos Ingresos</h2>
                <div class="h-1 w-20 bg-black"></div>
            </div>
        </div>
        
        <div id="grid-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            <!-- Los productos se cargan aquí mediante JavaScript -->
        </div>
    </section>

    <!-- PANEL ADMINISTRADOR (Funcional) -->
    <section id="admin" class="bg-gray-50 py-20 border-t border-gray-200">
        <div class="container mx-auto px-6 max-w-3xl">
            <div class="text-center mb-12">
                <h2 class="text-3xl serif mb-2">Panel de Control</h2>
                <p class="text-xs uppercase tracking-widest text-gray-400">Gestiona tu tienda Inercia</p>
            </div>
            
            <div class="bg-white p-10 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-bold uppercase mb-6 border-b pb-2">Subir Nuevo Producto</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Nombre</label>
                        <input id="admin-nombre" type="text" placeholder="Ej: Blusa Seda" class="w-full border-b py-2 focus:border-black outline-none transition">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Precio ($)</label>
                            <input id="admin-precio" type="number" class="w-full border-b py-2 focus:border-black outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Stock</label>
                            <input id="admin-stock" type="number" class="w-full border-b py-2 focus:border-black outline-none transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Imagen (URL)</label>
                        <input id="admin-img" type="text" placeholder="Pega el link de la foto aquí" class="w-full border-b py-2 focus:border-black outline-none transition text-sm">
                    </div>
                    <button onclick="agregarProductoDesdeAdmin()" class="w-full bg-black text-white py-4 text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition">Publicar en la Web</button>
                </div>

                <!-- Modificación de Banners -->
                <div class="mt-12 pt-8 border-t border-dashed">
                    <h3 class="text-sm font-bold uppercase mb-6">Modificar Banner Principal</h3>
                    <div class="flex gap-4">
                        <input id="admin-banner-url" type="text" placeholder="URL de nueva imagen de fondo" class="flex-grow border-b py-2 focus:border-black outline-none transition text-sm">
                        <button onclick="cambiarBanner()" class="bg-gray-200 px-6 py-2 text-[10px] uppercase font-bold hover:bg-black hover:text-white transition">Actualizar</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- CARRITO LATERAL -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white z-[60] shadow-2xl translate-x-full transition-transform duration-500">
        <div class="p-8 flex flex-col h-full">
            <div class="flex justify-between items-center border-b pb-6 mb-6">
                <span class="serif text-2xl tracking-tighter">Mi Carrito</span>
                <button onclick="toggleCart()" class="text-3xl font-light">&times;</button>
            </div>
            
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-6">
                <!-- Items del carrito -->
                <p class="text-center text-gray-400 text-sm mt-10">Tu bolsa está vacía</p>
            </div>

            <div class="border-t pt-6 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <span class="text-xs uppercase font-bold tracking-widest">Total</span>
                    <span id="cart-total" class="text-xl serif">$0</span>
                </div>
                <button class="w-full bg-black text-white py-5 text-[10px] uppercase font-bold tracking-widest">Proceder al Pago</button>
                <button class="w-full text-gray-400 text-[10px] uppercase underline hover:text-red-500 transition">Botón de Arrepentimiento</button>
            </div>
        </div>
    </div>

    <!-- CONTACTO -->
    <div class="fixed bottom-8 right-8 flex flex-col space-y-4 z-50">
        <a href="#" class="w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition"><i class="fa-brands fa-whatsapp text-3xl"></i></a>
        <a href="#" class="w-14 h-14 bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition"><i class="fa-brands fa-instagram text-3xl"></i></a>
    </div>

    <script>
        // DATOS INICIALES (Simulando una base de datos)
        let productos = [
            { id: 1, nombre: 'Blusa Larga Brown', precio: 12500, img: 'https://unsplash.com' },
            { id: 2, nombre: 'Abrigo Grey Check', precio: 22900, img: 'https://unsplash.com' }
        ];
        let carrito = [];

        // MOSTRAR PRODUCTOS
        function renderProductos() {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = '';
            productos.forEach(p => {
                grid.innerHTML += `
                    <div class="group relative">
                        <div class="aspect-[3/4] overflow-hidden bg-gray-100 mb-4 relative">
                            <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                            <button onclick="agregarAlCarrito(${p.id})" class="absolute bottom-0 w-full bg-black text-white py-4 text-[10px] uppercase font-bold opacity-0 group-hover:opacity-100 transition-all">Agregar al carrito</button>
                            <button onclick="eliminarProducto(${p.id})" class="absolute top-2 right-2 bg-white/80 w-8 h-8 rounded-full text-red-500 opacity-0 group-hover:opacity-100 transition shadow-sm"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                        <h3 class="text-sm font-medium tracking-tight">${p.nombre}</h3>
                        <p class="text-gray-500 text-xs mt-1">$${p.precio.toLocaleString()}</p>
                    </div>
                `;
            });
        }

        // GESTIÓN DEL CARRITO
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            carrito.push(producto);
            actualizarCarritoUI();
            if(!document.getElementById('cart-sidebar').classList.contains('cart-open')) toggleCart();
        }

        function actualizarCarritoUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            if (carrito.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 text-sm mt-10">Tu bolsa está vacía</p>';
                totalEl.innerText = '$0';
                countEl.innerText = '0';
                return;
            }

            container.innerHTML = carrito.map((item, index) => `
                <div class="flex items-center justify-between border-b pb-4">
                    <div class="flex items-center space-x-4">
                        <img src="${item.img}" class="w-16 h-20 object-cover">
                        <div>
                            <h4 class="text-xs font-bold uppercase">${item.nombre}</h4>
                            <p class="text-xs text-gray-500">$${item.precio.toLocaleString()}</p>
                        </div>
                    </div>
                    <button onclick="quitarDelCarrito(${index})" class="text-gray-400 hover:text-black">&times;</button>
                </div>
            `).join('');

            const total = carrito.reduce((acc, item) => acc + item.precio, 0);
            totalEl.innerText = '$' + total.toLocaleString();
            countEl.innerText = carrito.length;
        }

        function quitarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarCarritoUI();
        }

        // FUNCIONES ADMIN
        function agregarProductoDesdeAdmin() {
            const nombre = document.getElementById('admin-nombre').value;
            const precio = parseInt(document.getElementById('admin-precio').value);
            const img = document.getElementById('admin-img').value;

            if(!nombre || !precio || !img) return alert("Completa todos los campos");

            const nuevo = { id: Date.now(), nombre, precio, img };
            productos.push(nuevo);
            renderProductos();
            alert("¡Producto añadido a Inercia!");
        }

        function eliminarProducto(id) {
            productos = productos.filter(p => p.id !== id);
            renderProductos();
        }

        function cambiarBanner() {
            const url = document.getElementById('admin-banner-url').value;
            if(url) document.getElementById('banner-img').src = url;
        }

        // Inicializar
        renderProductos();
    </script>
</body>
</html>
