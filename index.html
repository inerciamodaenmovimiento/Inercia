<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .italic { font-style: italic; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 60px; border-bottom: 1px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .brand-box h1 { font-size: 32px; font-weight: 900; letter-spacing: -2px; line-height: 0.8; text-transform: uppercase; }
        
        /* FILTRO DE CATEGORÍAS */
        #cat-filter { display: flex; justify-content: center; gap: 30px; padding: 30px; border-bottom: 1px solid #eee; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .filter-item { cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .filter-item:hover, .filter-item.active { opacity: 1; border-bottom: 1px solid black; }

        /* TIENDA */
        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 50px; padding: 60px; }
        .product-card { margin-bottom: 40px; }
        
        /* CARRUSEL DE PRODUCTO */
        .carousel { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #f4f4f4; margin-bottom: 20px; }
        .carousel-inner { display: flex; transition: 0.5s ease-in-out; height: 100%; }
        .carousel-inner img { min-width: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .product-card:hover img { filter: grayscale(0%); }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; padding: 10px; cursor: pointer; font-size: 18px; z-index: 5; }
        .next { right: 0; } .prev { left: 0; }

        .product-info { display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; font-weight: 900; }
        .product-desc { font-size: 11px; opacity: 0.5; margin-top: 5px; line-height: 1.4; }

        /* ADMIN */
        #myGestion-Inercia { position: fixed; top: 0; left: -100%; width: 100%; height: 100vh; background: #fff; z-index: 10000; transition: 0.5s; overflow-y: auto; padding: 60px; }
        .admin-grid { display: grid; grid-template-columns: 400px 1fr; gap: 60px; max-width: 1400px; margin: 0 auto; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 10px 0; background: transparent; outline: none; }
        .file-box { border: 2px dashed #000; padding: 30px; text-align: center; font-size: 10px; cursor: pointer; font-weight: bold; }
        #hidden-trigger { position: fixed; bottom: 0; right: 0; width: 60px; height: 60px; background: transparent; z-index: 99999; }
    </style>
</head>
<body>

    <nav>
        <div class="brand-box"><span>Edición Limitada</span><h1>Inercia</h1></div>
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px;">CESTA (0)</div>
    </nav>

    <!-- FILTRO DINÁMICO -->
    <div id="cat-filter">
        <span class="filter-item active" onclick="filtrar('Todas')">Todas</span>
        <span class="filter-item" onclick="filtrar('Tops')">Tops</span>
        <span class="filter-item" onclick="filtrar('Pantalones')">Pantalones</span>
        <span class="filter-item" onclick="filtrar('Vestidos')">Vestidos</span>
        <span class="filter-item" onclick="filtrar('Accesorios')">Accesorios</span>
    </div>

    <div id="shop-grid"></div>

    <div id="hidden-trigger" onclick="acceder()"></div>

    <!-- PANEL myGESTIÓN -->
    <div id="myGestion-Inercia">
        <div style="display:flex; justify-content:space-between; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px;">
            <h2 style="font-weight:900; font-size: 22px;">myGESTIÓN | INVENTARIO AVANZADO</h2>
            <button onclick="document.getElementById('myGestion-Inercia').style.left='-100%'" style="font-size: 10px; font-weight:900; color:red; cursor:pointer; background:none; border:none;">SALIR</button>
        </div>
        <div class="admin-grid">
            <div style="background:#f8f8f8; padding:40px;">
                <div class="input-group"><label>Categoría</label>
                    <select id="p-cat">
                        <option value="Tops">Tops</option>
                        <option value="Pantalones">Pantalones</option>
                        <option value="Vestidos">Vestidos</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                <div class="input-group"><label>Nombre</label><input type="text" id="p-name"></div>
                <div class="input-group"><label>Precio ($)</label><input type="number" id="p-price"></div>
                <div class="input-group"><label>Descripción</label><textarea id="p-desc" rows="2"></textarea></div>
                <div class="input-group">
                    <label>Fotos (Puedes elegir varias)</label>
                    <div class="file-box" onclick="document.getElementById('p-file').click()">SELECCIONAR IMÁGENES</div>
                    <input type="file" id="p-file" style="display:none" accept="image/*" multiple>
                    <div id="status-img" style="font-size:9px; margin-top:10px; font-weight:bold; color:green;"></div>
                </div>
                <button id="publish-btn" style="width:100%; background:#000; color:#fff; padding:20px; font-weight:900; font-size:10px; border:none; cursor:pointer;">PUBLICAR PRODUCTO</button>
            </div>
            <div>
                <h3 style="font-size:10px; font-weight:900; margin-bottom:20px; opacity:0.4;">PRODUCTOS EN NUBE</h3>
                <div id="admin-list"></div>
            </div>
        </div>
    </div>

    <script>
        function acceder() {
            const pass = prompt("Código myGESTIÓN:");
            if(pass === "0110") document.getElementById('myGestion-Inercia').style.left = "0";
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue, update, remove } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504",
            databaseURL: "https://firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let listaImagenes = [];
        let currentFilter = "Todas";

        // Carga múltiple
        document.getElementById('p-file').onchange = (e) => {
            listaImagenes = [];
            const files = e.target.files;
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    listaImagenes.push(ev.target.result);
                    document.getElementById('status-img').innerText = `${listaImagenes.length} fotos listas`;
                };
                reader.readAsDataURL(file);
            }
        };

        window.vender = (id, stock) => { if(stock > 0) update(ref(db, 'productos/'+id), {stock: stock-1}); };
        window.borrar = (id) => { if(confirm("¿Eliminar?")) remove(ref(db, 'productos/'+id)); };
        window.filtrar = (cat) => {
            currentFilter = cat;
            document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');
            renderizar();
        };

        document.getElementById('publish-btn').onclick = () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = prompt("Stock inicial:", "5");
            if(!name || !price || listaImagenes.length === 0) return alert("Falta info o fotos");

            const id = Date.now();
            set(ref(db, 'productos/'+id), {
                id, name, price, cat: document.getElementById('p-cat').value,
                desc: document.getElementById('p-desc').value,
                img: listaImagenes, stock: parseInt(stock) || 0
            }).then(() => {
                alert("Producto creado exitosamente");
                listaImagenes = [];
                document.getElementById('status-img').innerText = "";
            });
        };

        // Renderizado Dinámico con Carrusel
        let dataGlobal = {};
        onValue(ref(db, 'productos/'), (snap) => {
            dataGlobal = snap.val() || {};
            renderizar();
        });

        function renderizar() {
            const grid = document.getElementById('shop-grid');
            const list = document.getElementById('admin-list');
            grid.innerHTML = ""; list.innerHTML = "";
            
            Object.keys(dataGlobal).forEach(key => {
                const p = dataGlobal[key];
                if(currentFilter !== "Todas" && p.cat !== currentFilter) return;

                const out = p.stock <= 0;
                const imgs = Array.isArray(p.img) ? p.img : [p.img];

                grid.innerHTML += `
                    <div class="product-card" style="opacity:${out?0.5:1}">
                        <div class="carousel" id="car-${key}">
                            <div class="carousel-inner" id="inner-${key}">
                                ${imgs.map(i => `<img src="${i}">`).join('')}
                            </div>
                            ${imgs.length > 1 ? `
                                <button class="carousel-btn prev" onclick="move('${key}', -1)">&#10094;</button>
                                <button class="carousel-btn next" onclick="move('${key}', 1)">&#10095;</button>
                            ` : ''}
                        </div>
                        <div class="product-info"><span>${p.name}</span><span class="serif italic">$${p.price}</span></div>
                        <p class="product-desc">${p.desc}</p>
                        <p style="font-size:9px; margin-top:5px; opacity:0.3;">STOCK: ${p.stock}</p>
                        <button onclick="vender('${key}', ${p.stock})" ${out?'disabled':''} style="width:100%; margin-top:15px; padding:15px; font-weight:900; cursor:pointer; background:${out?'#EEE':'#000'}; color:${out?'#AAA':'#FFF'}; border:none;">${out?'AGOTADO':'AÑADIR A CESTA'}</button>
                    </div>`;
                
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:11px;">
                    <span>${p.name} (${p.cat})</span><button onclick="borrar('${key}')" style="color:red; border:none; background:none; cursor:pointer;">X</button>
                </div>`;
            });
        }

        window.move = (id, dir) => {
            const inner = document.getElementById('inner-'+id);
            const width = inner.offsetWidth;
            inner.scrollBy({left: width * dir, behavior: 'smooth'});
        };
    </script>
</body>
</html>
