<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICKY | Tienda Online</title>
    <link rel="stylesheet" href="style.css">
    <!-- Tipografía Elegante -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="menu-icon">☰</div>
        <div class="logo">VICKY</div>
        <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
    </header>

    <main>
        <section class="hero">
            <h1>DRESS HERE AND BE IN STYLE</h1>
            <div class="hero-image">
                <img src="https://unsplash.com" alt="New Collection">
                <div class="hero-label">NEW COLLECTION</div>
            </div>
        </section>

        <section class="products" id="catalog">
            <h2>NEW COLLECTION</h2>
            <div class="grid">
                <!-- Producto 1 -->
                <div class="product-card">
                    <img src="https://unsplash.com" alt="Chaqueta">
                    <h3>Chaqueta Minimalista</h3>
                    <p>$85.00</p>
                    <button onclick="addToCart('Chaqueta Minimalista', 85)">Añadir al Carrito</button>
                </div>
                <!-- Producto 2 -->
                <div class="product-card">
                    <img src="https://unsplash.com" alt="Vestido">
                    <h3>Vestido Elegance</h3>
                    <p>$120.00</p>
                    <button onclick="addToCart('Vestido Elegance', 120)">Añadir al Carrito</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Botón Flotante de Finalizar Compra -->
    <div id="checkout-bar" class="checkout-bar" style="display:none;">
        <p>Total en carrito: $<span id="total-price">0</span></p>
        <button onclick="sendWhatsApp()">Finalizar Pedido por WhatsApp</button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total-price').innerText = total;
            document.getElementById('checkout-bar').style.display = 'flex';
        }

        function sendWhatsApp() {
            let message = "Hola VICKY, quiero realizar el siguiente pedido:%0A";
            cart.forEach(item => {
                message += `- ${item.name} ($${item.price})%0A`;
            });
            message += `%0ATotal: $${total}`;
            // REEMPLAZA EL NÚMERO ABAJO CON EL TUYO (Incluye código de país sin el +)
            window.open(`https://wa.me{message}`, '_blank');
        }
    </script>
</body>
</html>
