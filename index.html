<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background-color: var(--blanco); color: var(--azul); overflow-x: hidden; }

        /* Navegación */
        nav { padding: 30px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .cart-icon { cursor: pointer; font-weight: bold; border-bottom: 1px solid var(--azul); }

        /* Hero */
        .hero { height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .brand-name { font-size: 5rem; font-weight: 700; }
        .tagline { font-style: italic; letter-spacing: 5px; opacity: 0.7; }

        /* Productos */
        .productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 50px; }
        .card { border: 1px solid #eee; padding: 15px; text-align: center; transition: 0.3s; }
        .card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; filter: grayscale(100%); transition: 0.5s; }
        .card img:hover { filter: grayscale(0%); }
        .btn-add { background: var(--azul); color: white; border: none; padding: 12px; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; font-size: 0.7rem; }

        /* Carrito Lateral */
        #carrito-sidebar { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: 0.4s; padding: 30px; }
        #carrito-sidebar.active { right: 0; }
        .close-cart { cursor: pointer; float: right; font-size: 1.5rem; }

        /* Contactos Inferiores */
        footer { padding: 60px; text-align: center; border-top: 1px solid #eee; margin-top: 50px; }
        .footer-links a { color: var(--azul); text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; }

        /* PANEL ADMIN */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gris); z-index: 2000; overflow-y: auto; padding: 40px; color: #333; }
        .admin-card { background: white; padding: 25px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; font-family: sans-serif; }
        .pedido-item { background: #fff8e1; padding: 15px; border-left: 5px solid #ffa000; margin-bottom: 10px; font-family: sans-serif; font-size: 0.85rem; }

        /* Botón Secreto Admin */
        #secret-trigger { position: fixed; bottom: 10px; right: 10px; width: 25px; height: 25px; background: rgba(0,0,0,0.02); cursor: pointer; z-index: 3000; border-radius: 50%; }
    </style>
</head>
<body>

    <nav>
        <div style="letter-spacing: 3px; font-weight: bold;">INERCIA</div>
        <div class="cart-icon" onclick="toggleCart()">CARRITO (<span id="cart-count">0</span>)</div>
    </nav>

    <header class="hero">
        <h1 class="brand-name">Inercia</h1>
        <p class="tagline">Moda en movimiento</p>
    </header>

    <section class="productos">
        <div class="card">
            <img src="https://unsplash.com" alt="Prenda">
            <h3>Remera Artística Vol. 1</h3>
            <p>$15.000</p>
            <button class="btn-add" onclick="agregarAlCarrito('Remera Artística Vol. 1', 15000)">Agregar al Carrito</button>
        </div>
    </section>

    <div id="carrito-sidebar">
        <span class="close-cart" onclick="toggleCart()">×</span>
        <h2 style="margin-bottom: 20px;">Tu Selección</h2>
        <div id="cart-items"></div>
        <hr style="margin: 20px 0;">
        <div id="checkout-form" style="display:none;">
            <input type="text" id="cliente-nombre" placeholder="Tu Nombre Completo">
            <select id="metodo-pago">
                <option value="Transferencia">Transferencia Bancaria</option>
                <option value="Efectivo">Efectivo (Showroom)</option>
            </select>
            <button class="btn-add" onclick="procesarPedido()">Confirmar Pedido</button>
        </div>
        <button id="btn-pre-check" class="btn-add" onclick="mostrarFormulario()">Finalizar Compra</button>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">INSTAGRAM</a>
            <a href="#">WHATSAPP</a>
        </div>
        <p style="margin-top: 40px; font-size: 0.7rem; opacity: 0.4;">INERCIA © 2026</p>
    </footer>

    <div id="secret-trigger" onclick="abrirAdmin()"></div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>Panel de Control Inercia</h2>
            <button onclick="cerrarAdmin()" style="padding:10px; cursor:pointer;">Cerrar Panel</button>
        </div>

        <div class="admin-card">
            <h3>📸 Subir Nuevo Producto</h3>
            <input type="file" id="prod-img" accept="image/*">
            <input type="text" placeholder="Nombre de la prenda">
            <input type="number" placeholder="Precio">
            <button class="btn-add" style="background: #2e7d32;">Publicar Producto</button>
        </div>

        <div class="admin-card">
            <h3>📦 Control de Pedidos Detallado</h3>
            <div id="pedidos-lista">
                <p style="color: #999;">No hay pedidos recientes.</p>
            </div>
        </div>

        <div class="admin-card">
            <h3>⚙️ Configuración General</h3>
            <input type="text" id="conf-ig" placeholder="Link de Instagram">
            <input type="text" id="conf-wa" placeholder="Número de WhatsApp">
            <textarea placeholder="Métodos de envío disponibles..."></textarea>
            <button class="btn-add">Actualizar Contactos</button>
        </div>
    </div>

    <script>
        let carrito = [];
        let pedidos = [];

        function toggleCart() { document.getElementById('carrito-sidebar').classList.toggle('active'); }

        function agregarAlCarrito(nombre, precio) {
            carrito.push({nombre, precio});
            document.getElementById('cart-count').innerText = carrito.length;
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = carrito.map(i => `<p style="margin-bottom:10px;">${i.nombre} - <b>$${i.precio}</b></p>`).join('');
        }

        function mostrarFormulario() {
            if(carrito.length === 0) return alert("El carrito está vacío");
            document.getElementById('checkout-form').style.display = 'block';
            document.getElementById('btn-pre-check').style.display = 'none';
        }

        function procesarPedido() {
            const nombre = document.getElementById('cliente-nombre').value;
            const pago = document.getElementById('metodo-pago').value;
            
            if(!nombre) return alert("Ingresa tu nombre");

            const nuevoPedido = {
                id: Date.now(),
                cliente: nombre,
                productos: carrito.map(i => i.nombre).join(", "),
                total: carrito.reduce((a, b) => a + b.precio, 0),
                pago: pago,
                fecha: new Date().toLocaleString()
            };

            pedidos.push(nuevoPedido);
            actualizarListaPedidosAdmin();
            
            // Notificación solo para el Admin (simulada)
            console.log("¡Nueva Venta Detectada!");
            alert("¡Pedido realizado con éxito! El administrador ha sido notificado.");
            
            // Limpiar
            carrito = [];
            document.getElementById('cart-count').innerText = "0";
            renderCart();
            toggleCart();
        }

        function actualizarListaPedidosAdmin() {
            const lista = document.getElementById('pedidos-lista');
            lista.innerHTML = pedidos.map(p => `
                <div class="pedido-item">
                    <b>PEDIDO #${p.id}</b> - ${p.fecha}<br>
                    <b>Cliente:</b> ${p.cliente}<br>
                    <b>Compra:</b> ${p.productos}<br>
                    <b>Total:</b> $${p.total}<br>
                    <b>Pago:</b> ${p.pago}
                </div>
            `).join('');
        }

        function abrirAdmin() {
            if(prompt("Seguridad Inercia. Código:") === "0110") {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        function cerrarAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    </script>
</body>
</html>
