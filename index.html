<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop Sézane Style</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; color: #1a1a1a; overflow-x: hidden; }
        .serif { font-family: 'Crimson Text', serif; }
        .admin-on [contenteditable="true"] { outline: 1px dashed #ccc; background: #fafafa; }
        .cart-dot { animation: scale 0.3s ease; }
        @keyframes scale { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-white">

    <!-- BARRA ADMIN -->
    <div id="admin-bar" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 rounded-full hidden z-50 flex items-center gap-8 shadow-2xl border border-gray-800">
        <div class="flex flex-col">
            <span class="text-[9px] uppercase tracking-widest text-gray-400">Panel de Control</span>
            <span class="text-xs font-bold">EDICIÓN EN VIVO</span>
        </div>
        <button onclick="saveAllToStorage()" class="bg-white text-black px-6 py-2 rounded-full text-[10px] font-bold hover:bg-gray-200 transition uppercase">Guardar Cambios</button>
        <button onclick="toggleAdmin()" class="text-red-500 text-[10px] font-bold uppercase">Salir</button>
    </div>

    <!-- HEADER -->
    <header class="py-10 border-b border-gray-100">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="text-[10px] tracking-tighter hidden md:block">FR | EN</div>
            <h1 class="serif text-5xl tracking-[0.2em] uppercase admin-txt" id="site-logo">SÉZANE</h1>
            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest">
                <span>Cuenta</span>
                <div class="relative cursor-pointer" onclick="toggleCart()">
                    Cesta (<span id="cart-count">0</span>)
                </div>
            </div>
        </div>
        <nav class="mt-8 flex justify-center gap-10 text-[11px] font-medium tracking-[0.2em] uppercase">
            <span class="admin-txt">E-Shop</span><span class="admin-txt">Lookbook</span><span class="admin-txt">Journal</span><span class="admin-txt">A Propos</span>
        </nav>
    </header>

    <!-- PRODUCTO PRINCIPAL -->
    <main class="container mx-auto px-6 py-16 max-w-6xl">
        <div class="flex flex-col lg:flex-row gap-20">
            <!-- Galería -->
            <div class="w-full lg:w-3/5 grid grid-cols-12 gap-4">
                <div class="col-span-12">
                    <img id="main-img" src="https://unsplash.com" 
                         class="w-full h-auto cursor-pointer admin-img" onclick="triggerImgUpload('main-img')">
                </div>
                <div class="col-span-3">
                    <img id="thumb-1" src="https://unsplash.com" 
                         class="w-full cursor-pointer admin-img" onclick="triggerImgUpload('thumb-1')">
                </div>
            </div>

            <!-- Datos Compra -->
            <div class="w-full lg:w-2/5">
                <div class="border-b border-black pb-8 mb-8">
                    <h2 class="serif text-4xl mb-4 admin-txt uppercase tracking-wide" id="p-name">Essentiels - Hunter</h2>
                    <p class="text-2xl font-light">€ <span class="admin-txt" id="p-price">180</span></p>
                </div>

                <p class="text-sm text-gray-700 italic leading-loose mb-10 admin-txt" id="p-desc">
                    "Ustedes los amaron tanto estos meses que debían integrar los Esenciales... femeninos y confortables."
                </p>

                <!-- Tallas Funcionales -->
                <div class="mb-10">
                    <label class="text-[10px] font-bold uppercase tracking-widest block mb-4">Seleccionar Talla</label>
                    <div class="flex gap-3" id="size-selector">
                        <button onclick="selectSize(this)" class="size-btn border w-12 h-12 text-xs flex items-center justify-center hover:border-black transition">36</button>
                        <button onclick="selectSize(this)" class="size-btn border w-12 h-12 text-xs flex items-center justify-center hover:border-black transition">37</button>
                        <button onclick="selectSize(this)" class="size-btn border w-12 h-12 text-xs flex items-center justify-center hover:border-black transition">38</button>
                    </div>
                </div>

                <button onclick="addToCart()" class="w-full bg-black text-white py-5 text-[11px] font-bold uppercase tracking-[0.3em] hover:opacity-90 transition">
                    Añadir a la Cesta
                </button>
            </div>
        </div>
    </main>

    <!-- INPUT OCULTO PARA FOTOS -->
    <input type="file" id="file-input" class="hidden" accept="image/*">

    <script>
        let isAdmin = false;
        let buffer = "";
        let selectedSize = null;
        let cartItems = 0;
        let targetImgId = null;

        // --- LÓGICA DE COMPRA ---
        function selectSize(btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('border-black', 'font-bold'));
            btn.classList.add('border-black', 'font-bold');
            selectedSize = btn.innerText;
        }

        function addToCart() {
            if(!selectedSize) {
                alert("Por favor, selecciona una talla.");
                return;
            }
            cartItems++;
            const countEl = document.getElementById('cart-count');
            countEl.innerText = cartItems;
            countEl.classList.add('cart-dot');
            setTimeout(() => countEl.classList.remove('cart-dot'), 300);
            alert(`¡Añadido! ${document.getElementById('p-name').innerText} (Talla ${selectedSize}) en la cesta.`);
        }

        // --- LÓGICA ADMIN (CÓDIGO 0110) ---
        window.addEventListener('keydown', (e) => {
            buffer += e.key;
            if (buffer.length > 4) buffer = buffer.substring(1);
            if (buffer === "0110") toggleAdmin();
        });

        function toggleAdmin() {
            isAdmin = !isAdmin;
            document.body.classList.toggle('admin-on', isAdmin);
            document.getElementById('admin-bar').classList.toggle('hidden', !isAdmin);
            document.querySelectorAll('.admin-txt').forEach(el => el.contentEditable = isAdmin);
            if(isAdmin) console.log("Modo Administrador: Inercia de edición habilitada.");
        }

        function triggerImgUpload(id) {
            if(!isAdmin) return;
            targetImgId = id;
            document.getElementById('file-input').click();
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => document.getElementById(targetImgId).src = event.target.result;
                reader.readAsDataURL(file);
            }
        });

        // --- PERSISTENCIA (Para que el cliente vea los cambios después de refrescar) ---
        function saveAllToStorage() {
            const pageData = {
                logo: document.getElementById('site-logo').innerText,
                name: document.getElementById('p-name').innerText,
                price: document.getElementById('p-price').innerText,
                desc: document.getElementById('p-desc').innerText,
                mainImg: document.getElementById('main-img').src
            };
            localStorage.setItem('sezane_data', JSON.stringify(pageData));
            alert("✅ Cambios guardados en el navegador. Recarga la página y verás que persisten.");
            toggleAdmin();
        }

        // Cargar datos guardados al iniciar
        window.onload = () => {
            const saved = localStorage.getItem('sezane_data');
            if(saved) {
                const data = JSON.parse(saved);
                document.getElementById('site-logo').innerText = data.logo;
                document.getElementById('p-name').innerText = data.name;
                document.getElementById('p-price').innerText = data.price;
                document.getElementById('p-desc').innerText = data.desc;
                document.getElementById('main-img').src = data.mainImg;
            }
        };
    </script>
</body>
</html>
