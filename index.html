<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --azul: #000831; --blanco: #ffffff; --gris: #f4f4f4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        body { background: var(--blanco); color: var(--azul); overflow-x: hidden; }

        /* NAVEGACIÓN */
        nav { padding: 20px 30px; display: flex; justify-content: space-between; position: fixed; width: 100%; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        
        /* BANNER */
        #banner-container { width: 100%; height: 400px; overflow: hidden; position: relative; margin-top: 65px; background: #eee; }
        #banner-slider { display: flex; transition: 0.8s ease-in-out; height: 100%; }
        #banner-slider img { width: 100%; flex-shrink: 0; object-fit: cover; }

        .hero { padding: 40px 20px; text-align: center; }
        .brand-name { font-size: 4rem; letter-spacing: -2px; }
        
        /* TIENDA */
        .productos-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px; }
        .card { border: 1px solid #f0f0f0; padding: 15px; transition: 0.3s; }
        .card img { width: 100%; height: 350px; object-fit: cover; margin-bottom: 15px; }
        .card-cat { font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }
        .btn-buy { background: var(--azul); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px; margin-top: 10px; }

        /* CARRITO PANEL */
        #cart-panel { position: fixed; right: -100%; top: 0; width: 350px; height: 100%; background: white; z-index: 2000; transition: 0.4s; padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto; }
        #cart-panel.active { right: 0; }
        .input-cart { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; }

        /* ADMIN PANEL */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gris); z-index: 3000; overflow-y: auto; padding: 40px; }
        .admin-box { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 30px; height: 30px; cursor: pointer; z-index: 4000; }
        footer { padding: 40px; text-align: center; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight:bold; letter-spacing:2px">INERCIA</div>
    <div style="cursor:pointer; font-weight:bold" onclick="toggleCart()">CARRITO (<span id="cart-count">0</span>)</div>
</nav>

<div id="banner-container">
    <div id="banner-slider">
        <!-- Los banners aparecerán aquí -->
    </div>
</div>

<header class="hero">
    <h1 class="brand-name">Inercia</h1>
    <p style="font-style:italic; opacity:0.6; letter-spacing:3px">Moda en movimiento</p>
</header>

<section class="productos-container" id="shop-grid"></section>

<!-- CARRITO -->
<div id="cart-panel">
    <h2 onclick="toggleCart()" style="cursor:pointer; margin-bottom:20px">← CERRAR</h2>
    <div id="cart-items"></div>
    <div id="cart-total" style="font-weight:bold; margin: 20px 0; font-size: 1.2rem;">Total: $0</div>
    
    <div id="checkout-area">
        <input type="text" id="c-name" class="input-cart" placeholder="Tu Nombre">
        <label>Envío:</label>
        <select id="c-ship" class="input-cart"></select>
        <label>Pago:</label>
        <select id="c-pay" class="input-cart">
            <option value="Efectivo">Efectivo / Acordar</option>
            <option value="Transferencia">Transferencia Bancaria</option>
        </select>
        <button class="btn-buy" onclick="confirmOrder()">CONFIRMAR PEDIDO</button>
    </div>
</div>

<footer>
    <a href="#" id="link-ig" style="margin-right:20px">INSTAGRAM</a>
    <a href="#" id="link-wa">WHATSAPP</a>
</footer>

<div id="secret-trigger" onclick="accessAdmin()"></div>

<!-- ADMIN -->
<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px">
        <h1>Panel Inercia</h1>
        <button onclick="closeAdmin()" style="background:red; color:white; border:none; padding:10px">SALIR</button>
    </div>

    <div class="admin-box">
        <h3>🖼️ Banners (Carrusel)</h3>
        <input type="file" id="b-img" accept="image/*">
        <button onclick="uploadBanner()">Subir Banner</button>
        <button onclick="clearBanners()" style="color:red; margin-left:10px">Borrar Banners</button>
    </div>

    <div class="admin-box">
        <h3>👕 Nuevo Producto</h3>
        <input type="file" id="p-img" accept="image/*">
        <input type="text" id="p-name" placeholder="Nombre" class="input-cart">
        <input type="number" id="p-price" placeholder="Precio" class="input-cart">
        <select id="p-cat-select" class="input-cart"></select>
        <button class="btn-buy" onclick="uploadProduct()">PUBLICAR</button>
    </div>

    <div class="admin-box">
        <h3>⚙️ Configuración</h3>
        <input type="text" id="conf-cats" placeholder="Categorías (ej: Tops, Jeans)" class="input-cart">
        <input type="text" id="conf-ships" placeholder="Envíos (ej: Correo, Moto)" class="input-cart">
        <button class="btn-buy" onclick="saveConfig()">GUARDAR CAMBIOS</button>
    </div>

    <div class="admin-box">
        <h3>📦 Pedidos Recibidos</h3>
        <div id="admin-orders-list"></div>
    </div>
</div>

<script>
    // BASE DE DATOS LOCAL
    let db = JSON.parse(localStorage.getItem('inercia_db')) || { 
        products: [], orders: [], cats: ["General"], ships: ["Retiro"], banners: [] 
    };
    let cart = [];

    // INICIO
    window.onload = () => {
        renderShop();
        renderBanners();
        updateUI();
    };

    function save() { localStorage.setItem('inercia_db', JSON.stringify(db)); }

    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }
    function accessAdmin() { if(prompt("Código:") === "0110") document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

    // GESTIÓN DE CONFIG
    function saveConfig() {
        db.cats = document.getElementById('conf-cats').value.split(',').map(s => s.trim());
        db.ships = document.getElementById('conf-ships').value.split(',').map(s => s.trim());
        save();
        updateUI();
        alert("Guardado");
    }

    function updateUI() {
        document.getElementById('p-cat-select').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('c-ship').innerHTML = db.ships.map(s => `<option value="${s}">${s}</option>`).join('');
        document.getElementById('conf-cats').value = db.cats.join(', ');
        document.getElementById('conf-ships').value = db.ships.join(', ');
    }

    // PRODUCTOS
    function uploadProduct() {
        const file = document.getElementById('p-img').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            db.products.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                cat: document.getElementById('p-cat-select').value,
                img: reader.result
            });
            save(); renderShop(); alert("Producto subido");
        };
        if(file) reader.readAsDataURL(file);
    }

    function renderShop() {
        document.getElementById('shop-grid').innerHTML = db.products.map(p => `
            <div class="card">
                <img src="${p.img}">
                <span class="card-cat">${p.cat}</span>
                <h4>${p.name}</h4>
                <p><strong>$${p.price}</strong></p>
                <button class="btn-buy" onclick="addToCart(${p.id})">COMPRAR</button>
            </div>
        `).join('');
    }

    // BANNERS
    function uploadBanner() {
        const file = document.getElementById('b-img').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            db.banners.push(reader.result);
            save(); renderBanners();
        };
        if(file) reader.readAsDataURL(file);
    }

    function clearBanners() { db.banners = []; save(); renderBanners(); }

    function renderBanners() {
        const slider = document.getElementById('banner-slider');
        slider.innerHTML = db.banners.map(img => `<img src="${img}">`).join('');
        if(db.banners.length > 1) {
            let i = 0;
            setInterval(() => {
                i = (i + 1) % db.banners.length;
                slider.style.transform = `translateX(-${i * 100}%)`;
            }, 4000);
        }
    }

    // CARRITO
    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        cart.push({...p, cartId: Date.now() + Math.random()});
        renderCart();
        toggleCart();
    }

    function removeFromCart(cid) {
        cart = cart.filter(x => x.cartId !== cid);
        renderCart();
    }

    function renderCart() {
        let total = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => {
            total += parseFloat(i.price);
            return `<div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span>${i.name}</span>
                <span>$${i.price} <button onclick="removeFromCart(${i.cartId})" style="color:red; border:none; background:none; cursor:pointer">X</button></span>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = "Total: $" + total;
        document.getElementById('cart-count').innerText = cart.length;
    }

    function confirmOrder() {
        if(!cart.length) return;
        db.orders.push({
            id: Date.now(),
            customer: document.getElementById('c-name').value,
            items: cart.map(i => i.name),
            total: document.getElementById('cart-total').innerText
        });
        save();
        cart = [];
        renderCart();
        toggleCart();
        alert("¡Pedido enviado!");
    }
</script>
</body>
</html>
