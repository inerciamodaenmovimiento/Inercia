<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Motion Fashion</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --accent: #f2f2f2;
            --muted: #444;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Estética DAZE: Grano sutil de fondo */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://vercel.app');
            opacity: 0.04; pointer-events: none; z-index: 9999;
        }

        /* Navbar Editorial */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2.5rem 3%; position: fixed; width: 100%; z-index: 100;
        }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; letter-spacing: 5px; }
        .nav-links { display: flex; gap: 40px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative;
        }
        .hero h1 {
            font-size: 18vw; font-weight: 900; line-height: 0.8;
            letter-spacing: -0.05em; text-align: center; margin-bottom: 2rem;
        }
        .hero-sub { font-size: 12px; letter-spacing: 8px; text-transform: uppercase; color: var(--muted); }

        /* Grid de Productos Estilo Behance */
        .container { padding: 0 3%; margin-bottom: 100px; }
        .catalog {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px;
        }
        .product-card {
            grid-column: span 4; margin-bottom: 60px; position: relative;
            cursor: pointer; transition: var(--transition);
        }
        /* Variación de tamaño para romper la monotonía (estilo conceptual) */
        .product-card:nth-child(3n+2) { grid-column: span 8; }

        .img-container {
            width: 100%; height: 80vh; overflow: hidden; background: #1a1a1a;
            margin-bottom: 15px;
        }
        .product-card img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(1); transition: var(--transition);
        }
        .product-card:hover img { transform: scale(1.05); filter: grayscale(0); }

        .product-meta { display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .product-meta span { color: var(--muted); }

        /* Panel Admin Oculto */
        #admin-panel {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100vh;
            background: #fff; color: #000; z-index: 1000; padding: 60px 40px;
            transition: var(--transition); box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }
        #admin-panel.active { right: 0; }
        #admin-panel h2 { font-family: 'Syncopate'; font-size: 1rem; margin-bottom: 40px; }
        
        input {
            width: 100%; padding: 15px 0; border: none; border-bottom: 1px solid #ddd;
            margin-bottom: 20px; font-family: inherit; font-size: 14px; outline: none;
        }
        .btn-add {
            background: #000; color: #fff; border: none; padding: 20px; width: 100%;
            margin-top: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            font-size: 10px; font-weight: 900;
        }

        @media (max-width: 768px) {
            .product-card, .product-card:nth-child(3n+2) { grid-column: span 12; }
            .hero h1 { font-size: 25vw; }
            #admin-panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">INERCIA</div>
        <div class="nav-links">
            <span>Shop</span>
            <span>Archive</span>
            <span>About</span>
        </div>
    </nav>

    <section class="hero">
        <p class="hero-sub">Experimental Concept</p>
        <h1>INERCIA</h1>
        <p class="hero-sub">Motion in Motion</p>
    </section>

    <div class="container">
        <section class="catalog" id="catalog">
            <!-- Los productos se inyectan aquí -->
        </section>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <h2>ADMIN CONTROL</h2>
        <input type="text" id="name" placeholder="PRODUCT NAME">
        <input type="text" id="price" placeholder="PRICE (USD)">
        <input type="text" id="image" placeholder="IMAGE URL (Unsplash)">
        <button class="btn-add" onclick="addNewProduct()">PUSH TO CATALOG</button>
        <p style="font-size: 10px; color: #999; margin-top: 40px;">Type 0110 again to close</p>
    </div>

    <script>
        // Sistema de Entrada Secreta
        let keys = "";
        window.addEventListener('keydown', (e) => {
            keys += e.key;
            if (keys.length > 4) keys = keys.slice(1);
            if (keys === "0110") {
                document.getElementById('admin-panel').classList.toggle('active');
                keys = "";
            }
        });

        // Datos Iniciales (Persistencia en LocalStorage)
        let products = JSON.parse(localStorage.getItem('inercia_items')) || [
            { name: "Aero Shell 01", price: "240.00", img: "https://unsplash.com" },
            { name: "Kinetic Trousers", price: "185.00", img: "https://unsplash.com" },
            { name: "Vortex Hoodie", price: "120.00", img: "https://unsplash.com" }
        ];

        function render() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = products.map((p, index) => `
                <article class="product-card" style="transition-delay: ${index * 0.1}s">
                    <div class="img-container">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="product-meta">
                        <p>${p.name}</p>
                        <span>$${p.price}</span>
                    </div>
                </article>
            `).join('');
        }

        function addNewProduct() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const img = document.getElementById('image').value;

            if(name && price && img) {
                products.unshift({ name, price, img });
                localStorage.setItem('inercia_items', JSON.stringify(products));
                render();
                // Limpiar y cerrar
                document.getElementById('name').value = "";
                document.getElementById('price').value = "";
                document.getElementById('image').value = "";
                document.getElementById('admin-panel').classList.remove('active');
            }
        }

        render();
    </script>
</body>
</html>
