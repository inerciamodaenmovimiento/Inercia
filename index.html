<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Minimalist Shop</title>
    <!-- Fuente Inter: perfecta para este estilo técnico y limpio -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8f8f8;
            --bg-card: #f2f2f2;
            --text-main: #000000;
            --text-secondary: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 40px;
        }

        /* HEADER AL ESTILO ALPINE */
        header {
            text-align: center;
            margin-bottom: 80px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 500;
        }

        /* CUADRÍCULA DE PRODUCTOS */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas exactas */
            gap: 2px; /* Espacio mínimo entre productos */
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background-color: #fff; /* Fondo blanco para la tarjeta */
            padding: 40px 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* CONTENEDOR DE IMAGEN (EL CUADRADO GRIS) */
        .image-container {
            background-color: var(--bg-card); /* El fondo gris suave de la imagen */
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            padding: 30px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Sombras suaves para que el producto "flote" */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* INFORMACIÓN DEL PRODUCTO */
        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 10px;
        }

        .product-name {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
            text-align: left;
        }

        .product-price {
            font-size: 12px;
            font-weight: 500;
        }

        .brand-tag {
            display: block;
            font-size: 9px;
            color: var(--text-secondary);
            text-align: left;
            margin-top: 4px;
            padding-left: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: 1fr; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>INERCIA / ACCESSORIES</header>

    <div class="product-grid">
        <!-- Producto 1 -->
        <div class="product-card">
            <div class="image-container">
                <img src="https://unsplash.com" alt="Botas">
            </div>
            <div class="product-info">
                <span class="product-name">Leather Boots</span>
                <span class="product-price">5.200 €</span>
            </div>
            <span class="brand-tag">Valentino</span>
        </div>

        <!-- Producto 2 -->
        <div class="product-card">
            <div class="image-container">
                <img src="https://unsplash.com" alt="Vestido">
            </div>
            <div class="product-info">
                <span class="product-name">Crepe Dress</span>
                <span class="product-price">7.210 €</span>
            </div>
            <span class="brand-tag">Valentino</span>
        </div>

        <!-- Producto 3 -->
        <div class="product-card">
            <div class="image-container">
                <img src="https://unsplash.com" alt="Bolso">
            </div>
            <div class="product-info">
                <span class="product-name">Leather Bag</span>
                <span class="product-price">2.400 €</span>
            </div>
            <span class="brand-tag">Valentino</span>
        </div>
        
        <!-- Repite este bloque para más productos -->
    </div>

</body>
</html>
