<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INERCIA - Piezas Únicas</title>
  <script src="https://tailwindcss.com"></script>
  <script src="https://jsdelivr.net"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            crema: '#FDFCF8',
            carbon: '#121212',
            acento: '#2A3B4C'
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            display: ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #FDFCF8; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }
    .art-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
    .hero-text { font-size: clamp(3rem, 10vw, 8rem); line-height: 0.8; letter-spacing: -0.05em; }
    /* Efecto de revelado artístico para las fotos */
    .img-reveal { clip-path: inset(100% 0 0 0); animation: reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards; }
    @keyframes reveal { to { clip-path: inset(0 0 0 0); } }
    .product-card:nth-child(even) { margin-top: 4rem; } /* Grilla asimétrica */
  </style>
</head>
<body class="text-carbon">

  <!-- NAVEGACIÓN EDITORIAL -->
  <nav class="fixed w-full z-50 mix-blend-difference text-crema p-8 flex justify-between items-start">
    <div class="cursor-pointer group" onclick="showView('home')">
      <h1 class="font-display text-4xl leading-none italic">Inercia</h1>
      <p class="text-[10px] tracking-[0.4em] uppercase opacity-60 group-hover:opacity-100 transition-opacity">Moda en movimiento</p>
    </div>
    <div class="flex flex-col items-end gap-4">
        <button onclick="showView('admin')" class="text-[10px] uppercase tracking-widest border-b border-crema/30 pb-1 hover:border-crema transition-all">Acceso Estudio</button>
        <button onclick="toggleCart()" class="relative">
            <i data-lucide="shopping-bag" class="w-6 h-6 stroke-1"></i>
            <span id="cart-count" class="absolute -bottom-1 -right-1 text-[9px] font-bold">0</span>
        </button>
    </div>
  </nav>

  <main>
    <!-- VISTA HOME: ESTILO GALERÍA DE ARTE -->
    <section id="view-home" class="view min-h-screen">
      <!-- Hero Section Asimétrico -->
      <section class="relative h-screen flex items-center px-8 md:px-20">
        <div class="z-10">
            <h2 class="hero-text font-display italic text-carbon mb-4">Piezas<br><span class="ml-20">Únicas.</span></h2>
            <p class="max-w-xs text-xl italic opacity-70">Curaduría de movimiento y textil diseñada para perdurar.</p>
        </div>
        <div class="absolute right-0 top-0 w-1/2 h-full bg-stone-200 -z-10 overflow-hidden">
            <img src="https://unsplash.com" class="w-full h-full object-cover grayscale brightness-90 hover:scale-105 transition-transform duration-1000">
        </div>
      </section>

      <!-- Grilla de Productos Asimétrica -->
      <div class="max-w-7xl mx-auto px-8 py-32">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16">
            <!-- Los productos se cargarán aquí -->
        </div>
      </div>
    </section>

    <!-- VISTA ADMINISTRADOR (Mantiene tu funcionalidad intacta) -->
    <section id="view-admin" class="view hidden bg-white min-h-screen p-12">
        <div class="max-w-4xl mx-auto pt-20">
            <div class="flex justify-between items-baseline mb-20 border-b border-stone-200 pb-10">
                <h2 class="font-display text-7xl italic">Estudio</h2>
                <button onclick="showView('home')" class="text-xs uppercase tracking-widest opacity-50 hover:opacity-100 transition">Regresar</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
                <!-- FORMULARIO QUE YA DESARROLLAMOS -->
                <div class="space-y-6">
                    <h3 class="text-2xl italic mb-8">Nueva Curaduría</h3>
                    <input type="text" id="p-name" placeholder="Nombre de la pieza" class="w-full bg-transparent border-b border-stone-300 p-4 focus:border-carbon outline-none transition-colors italic text-xl">
                    <div class="grid grid-cols-2 gap-8">
                        <input type="number" id="p-price" placeholder="Precio ($)" class="w-full bg-transparent border-b border-stone-300 p-4 outline-none">
                        <input type="number" id="p-stock" placeholder="Stock" class="w-full bg-transparent border-b border-stone-300 p-4 outline-none">
                    </div>
                    <div class="pt-4">
                        <label class="text-[10px] uppercase tracking-widest block mb-4">Cargar Imagen Artística</label>
                        <input type="file" id="p-image" accept="image/*" class="text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-carbon file:text-crema cursor-pointer">
                    </div>
                    <button onclick="guardarProducto()" class="w-full bg-carbon text-crema py-6 mt-10 hover:bg-stone-800 transition-all font-display text-xl italic tracking-widest">
                        Registrar Pieza
                    </button>
                </div>

                <div id="admin-products-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-4">
                    <!-- Lista de control -->
                </div>
            </div>
        </div>
    </section>
  </main>

  <script>
    // --- TU LÓGICA DE FUNCIONALIDAD (SIN CAMBIOS) ---
    async function guardarProducto() {
        const nombre = document.getElementById('p-name').value;
        const precio = document.getElementById('p-price').value;
        const stock = document.getElementById('p-stock').value;
        const imagenInput = document.getElementById('p-image');

        if (!nombre || !precio || imagenInput.files.length === 0) {
            alert("Información incompleta para la pieza.");
            return;
        }

        const reader = new FileReader();
        reader.onloadend = function() {
            const nuevoProducto = {
                id: Date.now(),
                name: nombre,
                price: precio,
                stock: stock,
                image: reader.result
            };

            let productos = JSON.parse(localStorage.getItem('inercia_db') || '[]');
            productos.push(nuevoProducto);
            localStorage.setItem('inercia_db', JSON.stringify(productos));
            
            alert("Pieza añadida a la colección.");
            location.reload();
        };
        reader.readAsDataURL(imagenInput.files[0]);
    }

    function renderHome() {
        const grid = document.getElementById('product-grid');
        const productos = JSON.parse(localStorage.getItem('inercia_db') || '[]');
        
        grid.innerHTML = productos.map(p => `
            <div class="product-card group cursor-pointer overflow-hidden">
                <div class="aspect-[3/4] bg-stone-100 mb-6 overflow-hidden relative">
                    <img src="${p.image}" class="w-full h-full object-cover img-reveal group-hover:scale-105 transition-transform duration-700">
                </div>
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-2xl italic font-display">${p.name}</h3>
                        <p class="text-xs uppercase tracking-widest opacity-50">Edición Limitada</p>
                    </div>
                    <span class="text-xl font-light">$${p.price}</span>
                </div>
            </div>
        `).join('');
    }

    function showView(view) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        if(view === 'home') renderHome();
    }

    // Inicialización
    lucide.createIcons();
    renderHome();
  </script>
</body>
</html>
