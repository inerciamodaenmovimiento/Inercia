<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .product-image { transition: transform 0.5s ease; }
        .product-image:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-white text-gray-900">

    <!-- Navegación Estilo Minimalista -->
    <nav class="flex justify-between items-center p-6 border-b border-gray-100">
        <div class="text-2xl font-bold tracking-widest uppercase">INERCIA</div>
        <ul class="hidden md:flex space-x-8 text-xs uppercase tracking-widest">
            <li><a href="#" class="hover:underline">Colección</a></li>
            <li><a href="#" class="hover:underline">Mujer</a></li>
            <li><a href="#" class="hover:underline">Hombre</a></li>
            <li><a href="#" class="hover:underline">Editorial</a></li>
        </ul>
        <div class="flex space-x-4">
            <span class="cursor-pointer">🔍</span>
            <span class="cursor-pointer">👜 (0)</span>
        </div>
    </nav>

    <!-- Sección de Producto Principal -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 p-10">
        
        <!-- Galería de Imagen (Izquierda) -->
        <div class="overflow-hidden bg-gray-50">
            <img src="https://unsplash.com" 
                 alt="Falda Inercia" class="product-image w-full h-full object-cover">
        </div>

        <!-- Detalles de Producto (Derecha) -->
        <div class="flex flex-col justify-center space-y-6 md:pl-10">
            <div>
                <h1 class="text-sm text-gray-500 uppercase tracking-tighter">Nueva Temporada</h1>
                <h2 class="text-3xl font-light mt-2 uppercase tracking-wide">Falda Midi de Satén</h2>
                <p class="text-xl mt-4">$12.500</p>
            </div>

            <p class="text-gray-600 text-sm leading-relaxed">
                Falda de tiro alto confeccionada en tejido satinado. Cierre lateral con cremallera oculta en costura. Un diseño fluido que captura el concepto de **Moda en Movimiento**.
            </p>

            <!-- Selector de Tallas -->
            <div>
                <label class="text-xs uppercase tracking-widest block mb-2">Talla</label>
                <div class="flex space-x-2">
                    <button class="border border-black px-4 py-2 text-xs hover:bg-black hover:text-white transition">S</button>
                    <button class="border border-black px-4 py-2 text-xs hover:bg-black hover:text-white transition">M</button>
                    <button class="border border-black px-4 py-2 text-xs hover:bg-black hover:text-white transition">L</button>
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="flex flex-col space-y-3 pt-4">
                <button onclick="comprarWhatsApp()" class="bg-black text-white py-4 text-xs uppercase tracking-widest hover:opacity-90 transition">
                    Añadir al Carrito
                </button>
                <button class="border border-gray-300 py-4 text-xs uppercase tracking-widest hover:bg-gray-50 transition">
                    Lista de Deseos ♡
                </button>
            </div>
        </div>
    </main>

    <script>
        function comprarWhatsApp() {
            const mensaje = "Hola Inercia! Me interesa la Falda Midi de Satén en talle M.";
            const numero = "5491122334455"; // Reemplaza con tu número real
            window.open(`https://wa.me{numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }
    </script>

</body>
</html>
