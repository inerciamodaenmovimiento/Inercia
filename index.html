<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inercia — Concept Store</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --bg: #ffffff; --txt: #000000; --accent: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--txt); overflow-x: hidden; }

        /* TIENDA */
        #shop-view { display: block; }
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 700; letter-spacing: -1px; text-transform: lowercase; }
        .cart-trigger { cursor: pointer; font-size: 18px; position: relative; }
        .cart-dot { position: absolute; top: -8px; right: -8px; background: #000; color: #fff; font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .categories-nav { padding: 20px 5%; display: flex; gap: 20px; overflow-x: auto; background: #fff; border-bottom: 1px solid #eee; }
        .cat-filter { padding: 8px 15px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; border: none; white-space: nowrap; }
        .cat-filter.active { background: #000; color: #fff; }

        .catalog { padding: 60px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .product { text-align: left; margin-bottom: 40px; }
        .p-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #eee; margin-bottom: 15px; }
        .btn-buy { width: 100%; padding: 15px; background: #000; color: #fff; border: none; font-size: 11px; text-transform: uppercase; cursor: pointer; }

        /* PANEL ADMIN */
        #admin-view { display: none; background: #f4f4f4; min-height: 100vh; color: #333; }
        .admin-nav { background: #fff; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .admin-container { display: grid; grid-template-columns: 250px 1fr; min-height: calc(100vh - 80px); }
        .admin-sidebar { background: #fff; border-right: 1px solid #ddd; padding: 40px 20px; }
        .admin-menu-btn { width: 100%; padding: 15px; text-align: left; background: none; border: none; cursor: pointer; font-weight: 600; border-radius: 8px; margin-bottom: 10px; }
        .admin-menu-btn.active { background: #000; color: #fff; }
        .admin-content { padding: 60px; max-width: 1000px; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .card { background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 30px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; color: #666; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-save { background: #000; color: #fff; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 10px; }
        
        .sales-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        .sales-table th, .sales-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }

        /* CARRITO */
        #cart-modal { position: fixed; right: -100%; top: 0; width: 450px; height: 100vh; background: #fff; z-index: 2000; padding: 40px; transition: 0.5s; box-shadow: -10px 0 50px rgba(0,0,0,0.1); overflow-y: auto; }
        #cart-modal.open { right: 0; }
        .cart-close { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- VISTA TIENDA -->
    <div id="shop-view">
        <nav>
            <div class="logo">inercia</div>
            <div class="cart-trigger" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping"></i>
                <div class="cart-dot" id="cart-count">0</div>
            </div>
        </nav>
        <div class="categories-nav" id="shop-cats"></div>
        <section class="catalog"><div class="grid" id="main-grid"></div></section>
    </div>

    <!-- PANEL ADMIN -->
    <div id="admin-view">
        <div class="admin-nav">
            <h2>Gestión inercia</h2>
            <button class="btn-save" onclick="closeAdmin()" style="background:#ff4b4b;">Salir</button>
        </div>
        <div class="admin-container">
            <div class="admin-sidebar">
                <button class="admin-menu-btn active" onclick="switchSection('prod')">Productos</button>
                <button class="admin-menu-btn" onclick="switchSection('bank')">Datos Bancarios</button>
                <button class="admin-menu-btn" onclick="switchSection('log')">Logística</button>
                <button class="admin-menu-btn" onclick="switchSection('sales')">Ventas</button>
            </div>
            <div class="admin-content">
                <!-- PRODUCTOS -->
                <div id="sec-prod" class="admin-section active">
                    <h3>Cargar Producto</h3><br>
                    <div class="card">
                        <div class="field"><label>Nombre</label><input type="text" id="p-name"></div>
                        <div class="field"><label>Precio</label><input type="number" id="p-price"></div>
                        <div class="field"><label>Categoría</label><input type="text" id="p-cat" placeholder="Ej: Invierno"></div>
                        <div class="field"><label>Foto</label><input type="file" id="p-img-file"></div>
                        <button class="btn-save" onclick="addNewProduct()">Publicar</button>
                    </div>
                    <div id="admin-p-list"></div>
                </div>
                <!-- DATOS BANCARIOS -->
                <div id="sec-bank" class="admin-section">
                    <h3>Cuenta para Transferencias</h3><br>
                    <div class="card">
                        <div class="field"><label>Banco</label><input type="text" id="adm-bank"></div>
                        <div class="field"><label>CBU/CVU</label><input type="text" id="adm-cbu"></div>
                        <div class="field"><label>Alias</label><input type="text" id="adm-alias"></div>
                        <button class="btn-save" onclick="saveSettings()">Guardar</button>
                    </div>
                </div>
                <!-- LOGÍSTICA -->
                <div id="sec-log" class="admin-section">
                    <h3>Contacto y Envío</h3><br>
                    <div class="card">
                        <div class="field"><label>WhatsApp (549...)</label><input type="text" id="adm-wsp"></div>
                        <div class="field"><label>Método de Envío Predeterminado</label><input type="text" id="adm-ship"></div>
                        <button class="btn-save" onclick="saveSettings()">Guardar</button>
                    </div>
                </div>
                <!-- VENTAS -->
                <div id="sec-sales" class="admin-section">
                    <h3>Registro de Pedidos</h3><br>
                    <table class="sales-table">
                        <thead><tr><th>Cliente</th><th>Dirección</th><th>Pago</th><th>Total</th></tr></thead>
                        <tbody id="sales-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- CARRITO -->
    <div id="cart-modal">
        <span class="cart-close" onclick="toggleCart()">&times;</span>
        <h2 style="margin-bottom:30px;">Pedido</h2>
        <div id="cart-items"></div>
        <div id="cart-total" style="font-size:20px; font-weight:700; margin:20px 0;">Total: $0</div>
        <div style="border-top:1px solid #eee; padding-top:20px;">
            <div class="field"><input type="text" id="cust-name" placeholder="Nombre"></div>
            <div class="field"><input type="text" id="cust-dir" placeholder="Dirección"></div>
            <div class="field"><select id="cust-pay"><option value="Transferencia">Transferencia</option><option value="Efectivo">Efectivo</option></select></div>
            <button class="btn-buy" onclick="checkout()">Finalizar</button>
        </div>
    </div>

    <script>
        let settings = JSON.parse(localStorage.getItem('in_set')) || { wsp:"", ship:"", bank:"", cbu:"", alias:"" };
        let products = JSON.parse(localStorage.getItem('in_prod')) || [];
        let sales = JSON.parse(localStorage.getItem('in_sales')) || [];
        let cart = [];
        let currentFilter = "Todos";

        // Admin Trigger 0110
        let keys = "";
        window.onkeydown = (e) => {
            keys += e.key;
            if(keys.includes("0110")) { 
                document.getElementById('shop-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                keys = ""; loadAdmin();
            }
        }

        function closeAdmin() { document.getElementById('admin-view').style.display = 'none'; document.getElementById('shop-view').style.display = 'block'; }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('open'); }
        function switchSection(sec) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.admin-menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-' + sec).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function addNewProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const cat = document.getElementById('p-cat').value || "General";
            const file = document.getElementById('p-img-file').files[0];
            if(name && price && file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    products.push({ name, price: parseInt(price), cat, img: reader.result });
                    render();
                };
            }
        }

        function saveSettings() {
            settings.bank = document.getElementById('adm-bank').value;
            settings.cbu = document.getElementById('adm-cbu').value;
            settings.alias = document.getElementById('adm-alias').value;
            settings.wsp = document.getElementById('adm-wsp').value;
            settings.ship = document.getElementById('adm-ship').value;
            localStorage.setItem('in_set', JSON.stringify(settings));
            alert("Guardado");
        }

        function render() {
            localStorage.setItem('in_prod', JSON.stringify(products));
            localStorage.setItem('in_sales', JSON.stringify(sales));
            
            // Filtros
            const catNav = document.getElementById('shop-cats');
            const cats = ["Todos", ...new Set(products.map(p => p.cat))];
            catNav.innerHTML = cats.map(c => `<button class="cat-filter ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');

            // Grill
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            products.filter(p => currentFilter === "Todos" || p.cat === currentFilter).forEach((p, i) => {
                grid.innerHTML += `<div class="product"><img src="${p.img}" class="p-img"><h3>${p.name}</h3><p>$${p.price}</p><button class="btn-buy" onclick="addToCart(${i})">Agregar</button></div>`;
            });

            // Admin Sales
            const salesList = document.getElementById('sales-list');
            salesList.innerHTML = sales.map(s => `<tr><td>${s.name}</td><td>${s.dir}</td><td>${s.pay}</td><td>$${s.total}</td></tr>`).join('');
        }

        function setFilter(c) { currentFilter = c; render(); }
        function addToCart(i) { cart.push(products[i]); updateCart(); }
        function updateCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => { total += item.price; return `<p>${item.name} - $${item.price}</p>`; }).join('');
            document.getElementById('cart-total').innerText = "Total: $" + total;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkout() {
            const name = document.getElementById('cust-name').value;
            const dir = document.getElementById('cust-dir').value;
            const pay = document.getElementById('cust-pay').value;
            const total = cart.reduce((a,b) => a + b.price, 0);
            if(!name || !dir) return;

            sales.push({ name, dir, pay, total });
            let msg = `*PEDIDO INERCIA*%0ACliente: ${name}%0ADir: ${dir}%0APago: ${pay}%0AEnvío: ${settings.ship}%0ATotal: $${total}`;
            if(pay === "Transferencia") msg += `%0ABanco: ${settings.bank}%0ACBU: ${settings.cbu}%0AAlias: ${settings.alias}`;
            
            render();
            window.open(`https://wa.me{settings.wsp}?text=${msg}`);
            cart = []; updateCart(); toggleCart();
        }

        function loadAdmin() {
            document.getElementById('adm-bank').value = settings.bank;
            document.getElementById('adm-cbu').value = settings.cbu;
            document.getElementById('adm-alias').value = settings.alias;
            document.getElementById('adm-wsp').value = settings.wsp;
            document.getElementById('adm-ship').value = settings.ship;
            render();
        }

        render();
    </script>
</body>
</html>
