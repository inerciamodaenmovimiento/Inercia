<style>
#admin-screen { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; font-family: sans-serif; }
.admin-nav { background: #000; color: #fff; padding: 20px; display: flex; gap: 20px; font-size: 12px; letter-spacing: 1px; }
.admin-nav span { cursor: pointer; opacity: 0.6; }
.admin-nav span.active { opacity: 1; text-decoration: underline; }
.admin-tab { display: none; padding: 40px; }
.admin-tab.active { display: block; }
.admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.admin-table th, .admin-table td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
.admin-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
</style>
<div id="admin-screen">
    <div class="admin-nav">
        <span onclick="tab(0)" class="t-btn active">PEDIDOS</span>
        <span onclick="tab(1)" class="t-btn">PRODUCTOS</span>
        <span onclick="tab(2)" class="t-btn">PAGOS/ENVÍOS</span>
        <span onclick="tab(3)" class="t-btn">HISTORIAL</span>
        <span onclick="document.getElementById('admin-screen').style.display='none'" style="margin-left:auto;color:red">CERRAR</span>
    </div>
    <div id="tab0" class="admin-tab active">
        <h3>Checklist de Pedidos</h3>
        <table class="admin-table">
            <thead><tr><th>ID</th><th>Comprador</th><th>Pago</th><th>Envío</th><th>Total</th></tr></thead>
            <tbody id="list-orders"></tbody>
        </table>
    </div>
    <div id="tab1" class="admin-tab">
        <h3>Gestión de Secciones</h3>
        <input id="new-n" class="admin-input" placeholder="Nombre del producto">
        <input id="new-p" class="admin-input" type="number" placeholder="Precio">
        <input id="new-i" class="admin-input" placeholder="URL Imagen">
        <button onclick="addP()" class="btn-black">Publicar Producto</button>
    </div>
    <div id="tab2" class="admin-tab">
        <h3>Configuración de Métodos</h3>
        <label>Métodos de Pago:</label><input id="set-pay" class="admin-input" value="Transferencia, Efectivo">
        <label>Métodos de Envío:</label><input id="set-ship" class="admin-input" value="Correo Argentino, Retiro">
    </div>
    <div id="tab3" class="admin-tab">
        <h3>Historial de Pedidos</h3>
        <table class="admin-table">
            <thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th></tr></thead>
            <tbody id="list-hist"></tbody>
        </table>
    </div>
</div>
<script>
let ordersData = JSON.parse(localStorage.getItem('in_orders')) || [];
function tab(i) {
    document.querySelectorAll('.admin-tab').forEach((t, idx) => t.classList.toggle('active', i === idx));
    document.querySelectorAll('.t-btn').forEach((b, idx) => b.classList.toggle('active', i === idx));
}
window.addEventListener('keydown', e => {
    code += e.key;
    if(code.includes("0110")) { document.getElementById('admin-screen').style.display='block'; renderAdmin(); code=""; }
    if(code.length > 10) code = "";
});
function addP() {
    let n = document.getElementById('new-n').value, p = parseInt(document.getElementById('new-p').value), i = document.getElementById('new-i').value;
    if(n && p) {
        products.push({id: Date.now(), name: n, price: p, img: i});
        localStorage.setItem('in_prods', JSON.stringify(products));
        init(); tab(0);
    }
}
function renderAdmin() {
    document.getElementById('list-orders').innerHTML = ordersData.map(o => `<tr><td>${o.id}</td><td>${o.c}</td><td>${o.m}</td><td>${o.e}</td><td>${o.t}</td></tr>`).join('');
    document.getElementById('list-hist').innerHTML = ordersData.map(o => `<tr><td>${o.d}</td><td>${o.c}</td><td>${o.t}</td></tr>`).join('');
}
document.querySelector('.btn-black').addEventListener('click', () => {
    if(bag.length > 0) {
        let c = prompt("Nombre Comprador:"), m = prompt("Método Pago:"), e = prompt("Método Envío:");
        let order = { id: '#'+Date.now().toString().slice(-4), c, m, e, t: document.getElementById('cart-total').innerText, d: new Date().toLocaleDateString() };
        ordersData.push(order);
        localStorage.setItem('in_orders', JSON.stringify(ordersData));
        bag = []; updateCart(); toggleCart(); renderAdmin();
    }
});
</script>
