<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Edición Online</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; }
        .serif { font-family: 'Playfair Display', serif; }
        .mag-border { border: 0.5px solid rgba(0,0,0,0.1); }
        #admin { transform: translateX(100%); transition: 0.5s ease; }
        #admin.active { transform: translateX(0); }
    </style>
</head>
<body>

    <!-- NAV EDITORIAL -->
    <nav class="flex justify-between items-center p-8 md:px-16 border-b border-black">
        <div class="leading-none">
            <p id="txt-coll" class="text-[9px] tracking-[0.5em] uppercase opacity-40 mb-1">Colección 2026</p>
            <h1 id="txt-brand" class="text-3xl font-black tracking-tighter uppercase">INERCIA</h1>
        </div>
        <div class="flex gap-10 text-[10px] uppercase font-bold tracking-widest">
            <button onclick="document.getElementById('admin').classList.add('active')" class="hover:opacity-40">Ajustes</button>
            <span class="cursor-pointer">Cesta (0)</span>
        </div>
    </nav>

    <!-- PORTADA TIPO REVISTA -->
    <main class="grid grid-cols-1 md:grid-cols-12 min-h-screen">
        <div class="md:col-span-7 p-8 md:p-16 flex flex-col justify-center">
            <h2 id="txt-hero" class="serif italic text-6xl md:text-[12vw] leading-[0.85] uppercase mb-10">Moda en Movimiento</h2>
            <div class="grid grid-cols-2 gap-10 items-start">
                <p class="text-xs leading-relaxed opacity-60">Una visión contemporánea sobre el textil y la anatomía humana. Cada pieza es un estudio de la inercia física.</p>
                <button class="bg-black text-white text-[9px] py-4 px-8 uppercase tracking-widest self-start">Ver Catálogo</button>
            </div>
        </div>
        <div class="md:col-span-5 bg-gray-50 flex items-center justify-center p-8 md:p-16">
            <div class="w-full aspect-[3/4] overflow-hidden mag-border shadow-2xl">
                <img src="https://unsplash.com" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-[2s]">
            </div>
        </div>
    </main>

    <!-- PANEL ADMINISTRADOR -->
    <div id="admin" class="fixed inset-y-0 right-0 w-80 bg-white shadow-2xl z-50 p-10 border-l border-black">
        <div class="flex justify-between mb-20">
            <span class="text-[10px] font-black uppercase tracking-widest">Editor Visual</span>
            <button onclick="document.getElementById('admin').classList.remove('active')" class="text-2xl">&times;</button>
        </div>
        <div class="space-y-10">
            <div>
                <label class="text-[9px] uppercase font-bold opacity-30 block mb-2">Marca</label>
                <input oninput="document.getElementById('txt-brand').innerText = this.value.toUpperCase()" type="text" value="INERCIA" class="w-full border-b border-black py-2 outline-none">
            </div>
            <div>
                <label class="text-[9px] uppercase font-bold opacity-30 block mb-2">Título Portada</label>
                <textarea oninput="document.getElementById('txt-hero').innerText = this.value" class="w-full border-b border-black py-2 outline-none serif italic text-xl">Moda en Movimiento</textarea>
            </div>
            <div>
                <label class="text-[9px] uppercase font-bold opacity-30 block mb-2">Colección</label>
                <input oninput="document.getElementById('txt-coll').innerText = this.value.toUpperCase()" type="text" value="Colección 2026" class="w-full border-b border-black py-2 outline-none">
            </div>
        </div>
    </div>

</body>
</html>
