<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #f4f3f0; --text: #1a1a1a; --line: rgba(0,0,0,0.08); --accent: #8b7355; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- ESTÉTICA CORAL (BEHANCE) --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 8%; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 32px; letter-spacing: 8px; font-weight: 700; cursor: pointer; }
        .nav-link { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; border-bottom: 1px solid transparent; transition: 0.3s; }
        .nav-link:hover { border-bottom: 1px solid #000; }

        /* Grid Editorial */
        .catalog-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 100px; padding: 120px 15%; }
        .product-card { cursor: pointer; text-align: center; position: relative; }
        .product-card img { width: 100%; height: 650px; object-fit: cover; filter: grayscale(1); transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .product-card:hover img { filter: grayscale(0); transform: scale(1.02); }
        .p-info { margin-top: 30px; }
        .p-name { font-family: 'Playfair Display', serif; font-size: 18px; text-transform: uppercase; letter-spacing: 3px; }
        .p-price { font-size: 12px; margin-top: 10px; color: #888; }

        /* --- MODAL DE PRODUCTO (GUÍA AL CLIENTE) --- */
        #product-modal { display: none; position: fixed; inset: 0; background: rgba(244,243,240,0.98); z-index: 2000; align-items: center; justify-content: center; padding: 40px; }
        .modal-content { display: grid; grid-template-columns: 1fr 1fr; max-width: 1100px; background: #fff; box-shadow: 0 50px 100px rgba(0,0,0,0.05); }
        .m-details { padding: 80px; display: flex; flex-direction: column; justify-content: center; }
        .m-title { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; line-height: 1; }
        .size-selector { display: flex; gap: 15px; margin: 30px 0; }
        .size-btn { border: 1px solid #eee; padding: 10px 15px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .size-btn.active { background: #000; color: #fff; border-color: #000; }
        .btn-add { background: #000; color: #fff; border: none; padding: 20px; width: 100%; cursor: pointer; letter-spacing: 4px; font-size: 11px; text-transform: uppercase; margin-top: 20px; }

        /* --- CARRITO ESTRUCTURADO --- */
        #cart-panel { position: fixed; top: 0; right: -100%; width: 450px; height: 100vh; background: #fff; z-index: 3000; box-shadow: -20px 0 60px rgba(0,0,0,0.1); transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1); padding: 60px; overflow-y: auto; }
        .cart-item { display: flex; gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; font-size: 12px; }
        .cart-item img { width: 70px; height: 90px; object-fit: cover; }
        .checkout-summary { margin-top: 40px; border-top: 2px solid #000; padding-top: 30px; font-size: 12px; }

        /* --- ADMIN PRO (0110) --- */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 500px; height: 100vh; background: #fff; z-index: 4000; border-right: 1px solid #000; padding: 40px; overflow-y: auto; }
        .admin-nav { display: flex; gap: 20px; border-bottom: 1px solid #eee; margin-bottom: 30px; }
        .admin-nav span { cursor: pointer; font-size: 10px; padding-bottom: 10px; opacity: 0.5; text-transform: uppercase; }
        .admin-nav span.active { opacity: 1; border-bottom: 2px solid #000; }
        .admin-tab { display: none; }
        .admin-tab.active { display: block; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; font-family: 'Montserrat'; background: #fafafa; font-size: 12px; }
        .btn-black { background: #000; color: #fff; border: none; padding: 18px; width: 100%; cursor: pointer; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

        #secret-door { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; cursor: pointer; opacity: 0; z-index: 5000; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-link" onclick="location.href='#catalog'">Collection</div>
        <div class="logo" onclick="window.scrollTo(0,0)">INERCIA</div>
        <div class="nav-link" onclick="toggleCart(true)">Cart (<span id="cart-count">0</span>)</div>
    </nav>

    <div class="catalog-container" id="catalog">
        <!-- Los productos aparecerán aquí -->
    </div>

    <!-- MODAL DETALLE PRODUCTO -->
    <div id="product-modal">
        <div class="modal-content">
            <img id="m-img" style="width:100%; height:750px; object-fit:cover;">
            <div class="m-details">
                <span onclick="closeModal()" style="align-self:flex-end; cursor:pointer; margin-bottom:40px;">&times; Close</span>
                <h2 id="m-title" class="m-title">Producto</h2>
                <div id="m-price" style="margin-top:20px; font-size:20px; color:#888; font-weight:300;">$0</div>
                
                <label style="font-size:10px; margin-top:40px; display:block; letter-spacing:2px;">SELECT SIZE</label>
                <div class="size-selector" id="m-sizes">
                    <!-- Talles dinámicos -->
                </div>

                <p id="m-desc" style="font-size:13px; line-height:2.2; color:#666; margin:40px 0;"></p>
                <button class="btn-add" onclick="addToCart()">Add to Bag</button>
            </div>
        </div>
    </div>

    <!-- PANEL CARRITO -->
    <div id="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:60px;">
            <h2 style="font-family:'Playfair Display'; font-size:2.5rem; margin:0;">Shopping Bag</h2>
            <span onclick="toggleCart(false)" style="cursor:pointer; font-size:20px;">&times;</span>
        </div>
        <div id="cart-list">Your bag is empty.</div>
        
        <div class="checkout-summary">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span>Subtotal</span> <span id="cart-total">$0</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:30px; color:#888;">
                <span>Shipping</span> <span id="ship-info">To be calculated</span>
            </div>
            <label style="font-size:9px; letter-spacing:1px;">PAYMENT METHODS:</label>
            <p id="pay-info" style="font-size:11px; margin-top:10px; color:#888;">Configure in Admin</p>
            <button class="btn-black" style="margin-top:30px;" onclick="checkout()">Complete Order</button>
        </div>
    </div>

    <!-- PANEL ADMIN (0110) -->
    <div id="secret-door" onclick="login()"></div>
    <div id="admin-panel">
        <h2 style="font-family:'Playfair Display'; font-size:2.2rem; margin-bottom:10px;">Inercia Admin</h2>
        <div class="admin-nav">
            <span class="active" onclick="switchTab(0)">Inventory</span>
            <span onclick="switchTab(1)">Orders</span>
            <span onclick="switchTab(2)">Store Settings</span>
        </div>

        <!-- Tab 0: Inventario -->
        <div class="admin-tab active">
            <label>Image:</label><input type="file" id="p-file" accept="image/*">
            <label>Name:</label><input type="text" id="p-name">
            <label>Price:</label><input type="number" id="p-price">
            <label>Sizes (Separated by comma):</label><input type="text" id="p-sizes" placeholder="S, M, L, XL">
            <label>Description:</label><textarea id="p-desc" rows="4"></textarea>
            <button class="btn-black" onclick="publish()">Publish Product</button>
            <h4 style="margin-top:40px; font-size:10px; letter-spacing:2px;">ACTIVE PRODUCTS (BAJA)</h4>
            <div id="admin-checklist" style="margin-top:20px;"></div>
        </div>

        <!-- Tab 1: Pedidos -->
        <div class="admin-tab">
            <div id="admin-orders" style="background:#f9f9f9; padding:20px; font-size:11px;">No orders recorded.</div>
        </div>

        <!-- Tab 2: Configuración -->
        <div class="admin-tab">
            <label>Shipping Information:</label><input type="text" id="conf-ship" oninput="document.getElementById('ship-info').innerText=this.value">
            <label>Payment Methods:</label><textarea id="conf-pay" oninput="document.getElementById('pay-info').innerText=this.value"></textarea>
            <button class="btn-black" onclick="alert('Configuración guardada en vista previa')">Update Texts</button>
        </div>

        <button class="btn-black" onclick="exportHTML()" style="background:#8b7355; margin-top:40px;">Export index.html</button>
    </div>

    <script>
        let cart = [];
        let curProd = null;
        let selectedSize = null;

        function login() { if(prompt("Access Code:") === "0110") document.getElementById('admin-panel').style.display = 'block'; }
        
        function switchTab(n) {
            document.querySelectorAll('.admin-nav span').forEach((s, i) => s.className = i === n ? 'active' : '');
            document.querySelectorAll('.admin-tab').forEach((t, i) => t.className = i === n ? 'admin-tab active' : 'admin-tab');
        }

        async function publish() {
            const f = document.getElementById('p-file').files;
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const s = document.getElementById('p-sizes').value;
            const d = document.getElementById('p-desc').value;

            if(!f || !n) return alert("Data missing");

            const reader = new FileReader();
            reader.onload = function(e) {
                const id = "p" + Date.now();
                const img = e.target.result;
                const html = `
                    <div class="product-card" id="${id}" onclick="openModal('${n}', ${p}, '${img}', '${d}', '${s}')">
                        <img src="${img}">
                        <div class="p-info"><div class="p-name">${n}</div><div class="p-price">$${p}</div></div>
                    </div>`;
                document.getElementById('catalog').insertAdjacentHTML('beforeend', html);
                
                // Checklist Admin
                const check = `<div id="check-${id}" style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;"><span>${n}</span> <span onclick="baja('${id}')" style="color:red; cursor:pointer;">[BAJA]</span></div>`;
                document.getElementById('admin-checklist').insertAdjacentHTML('beforeend', check);
            };
            reader.readAsDataURL(f[0]);
        }

        function baja(id) {
            document.getElementById(id).remove();
            document.getElementById('check-' + id).remove();
        }

        function openModal(n, p, i, d, s) {
            if(document.getElementById('admin-panel').style.display === 'block') return;
            curProd = { n, p, i, d, s };
            selectedSize = null;
            document.getElementById('m-title').innerText = n;
            document.getElementById('m-price').innerText = "$" + p;
            document.getElementById('m-img').src = i;
            document.getElementById('m-desc').innerText = d;
            
            const sizesDiv = document.getElementById('m-sizes');
            sizesDiv.innerHTML = "";
            s.split(',').forEach(size => {
                const btn = document.createElement('div');
                btn.className = 'size-btn';
                btn.innerText = size.trim();
                btn.onclick = function() {
                    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedSize = this.innerText;
                };
                sizesDiv.appendChild(btn);
            });
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
        function toggleCart(s) { document.getElementById('cart-panel').style.right = s ? '0' : '-100%'; }

        function addToCart() {
            if(!selectedSize) return alert("Please select a size");
            cart.push({ ...curProd, size: selectedSize });
            updateCartUI();
            closeModal();
            toggleCart(true);
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = "";
            let total = 0;
            cart.forEach((item, i) => {
                total += parseInt(item.p);
                list.innerHTML += `<div class="cart-item"><img src="${item.i}"><div><b>${item.n}</b><br>Size: ${item.size}<br>$${item.p}<br><span onclick="removeCart(${i})" style="color:red; font-size:10px; cursor:pointer;">Remove</span></div></div>`;
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = "$" + total;
        }

        function removeCart(i) { cart.splice(i, 1); updateCartUI(); }

        function checkout() {
            if(cart.length === 0) return;
            const orders = document.getElementById('admin-orders');
            if(orders.innerText === "No orders recorded.") orders.innerHTML = "";
            const id = Date.now();
            const detail = cart.map(x => `${x.n} (${x.size})`).join(', ');
            orders.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px; margin-bottom:10px;"><b>Order #${id}</b><br>${detail}<br>Total: $${document.getElementById('cart-total').innerText}</div>`;
            alert("Order completed. Check Admin History.");
            cart = []; updateCartUI(); toggleCart(false);
        }

        function exportHTML() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }
    </script>
</body>
</html>
