<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INERCIA | Edición Editorial</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* --- ESTÉTICA ZAAN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #000; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        header { padding: 60px 40px; text-align: center; border-bottom: 1px solid #eee; }
        .mag-title { font-size: 80px; font-weight: 900; letter-spacing: -3px; text-transform: uppercase; line-height: 0.8; }
        .mag-sub { font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-top: 15px; opacity: 0.5; }
        nav { display: flex; justify-content: center; gap: 40px; padding: 25px; border-bottom: 1px solid #eee; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .nav-item { cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; border-bottom: 1px solid black; }
        #shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 80px; padding: 80px 40px; max-width: 1400px; margin: 0 auto; }
        .product-card { position: relative; margin-bottom: 40px; }
        .img-container { width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #f9f9f9; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.8s ease; }
        .product-card:hover img { filter: grayscale(0%); }
        .p-cat { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #888; margin-top: 25px; display: block; }
        .p-title { font-size: 32px; font-weight: 900; text-transform: uppercase; margin: 10px 0; }
        .p-desc { font-size: 14px; opacity: 0.6; line-height: 1.6; margin-bottom: 25px; }
        .p-footer { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid #eee; padding-top: 20px; }
        .buy-btn { background: #000; color: #fff; padding: 15px 30px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; }

        /* --- PANEL myGESTIÓN --- */
        #myGestion { position: fixed; top: 0; left: -100%; width: 100%; height: 100vh; background: #fff; z-index: 10000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); overflow-y: auto; padding: 60px; }
        .admin-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 40px; }
        .tab-btn { font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; opacity: 0.3; margin-right: 30px; padding-bottom: 10px; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid black; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 9px; font-weight: 900; text-transform: uppercase; opacity: 0.4; margin-bottom: 8px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; border: 1px solid #eee; padding: 12px; }
        .order-card { padding: 20px; border: 1px solid #eee; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* --- ACTIVADOR CORREGIDO (ESQUINA INFERIOR DERECHA) --- */
        #access-trigger { 
            position: fixed; 
            bottom: 0; 
            right: 0; 
            width: 120px; 
            height: 120px; 
            background: rgba(0,0,0,0.02); /* Casi invisible */
            border: 1px solid rgba(0,0,0,0.05); /* Borre esta linea si ya no la necesita */
            z-index: 99999; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <header>
        <h1 class="mag-title serif">INERCIA.</h1>
        <p class="mag-sub">Moda en Movimiento — Tienda Editorial</p>
    </header>

    <nav>
        <span class="nav-item active" onclick="filtrar('Todas')">Ver Todo</span>
        <span class="nav-item" onclick="filtrar('Tops')">Tops</span>
        <span class="nav-item" onclick="filtrar('Pantalones')">Pantalones</span>
        <span class="nav-item" onclick="filtrar('Vestidos')">Vestidos</span>
    </nav>

    <div id="shop-grid"></div>

    <!-- EL BOTÓN ESTÁ JUSTO AQUÍ, EN EL RINCÓN DE ABAJO A LA DERECHA -->
    <div id="access-trigger" onclick="abrirAdmin()"></div>

    <div id="myGestion">
        <div class="admin-header">
            <h2 class="serif" style="font-size: 28px;">myGESTIÓN.</h2>
            <button onclick="document.getElementById('myGestion').style.left='-100%'" style="color:red; font-weight:900; background:none; border:none; cursor:pointer;">SALIR</button>
        </div>
        <div style="margin-bottom: 40px;">
            <span class="tab-btn active" id="t-inv" onclick="tab('inv')">Inventario</span>
            <span class="tab-btn" id="t-ped" onclick="tab('ped')">Pedidos y Logística</span>
        </div>

        <div id="sec-inv" style="display: grid; grid-template-columns: 400px 1fr; gap: 60px;">
            <div style="background:#fafafa; padding:30px;">
                <div class="input-group"><label>Categoría</label><select id="p-cat"><option value="Tops">Tops</option><option value="Pantalones">Pantalones</option><option value="Vestidos">Vestidos</option></select></div>
                <div class="input-group"><label>Nombre</label><input type="text" id="p-name"></div>
                <div class="input-group"><label>Precio</label><input type="number" id="p-price"></div>
                <div class="input-group"><label>Descripción</label><textarea id="p-desc" rows="3"></textarea></div>
                <div class="input-group"><label>Imagen</label><input type="file" id="p-file" accept="image/*"></div>
                <button id="btn-pub" style="width:100%; background:#000; color:#fff; padding:15px; font-weight:900; border:none; cursor:pointer;">PUBLICAR</button>
            </div>
            <div id="admin-inv-list"></div>
        </div>
        <div id="sec-ped" style="display:none;"><div id="admin-ord-list"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, onValue, update, remove } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCTBgG4RK7yMEsg2lynJA6E_xKGSmamIv4",
            authDomain: "://firebaseapp.com",
            projectId: "incerciamoda",
            storageBucket: "incerciamoda.firebasestorage.app",
            messagingSenderId: "335158123341",
            appId: "1:335158123341:web:2722e74538e808321a7504",
            databaseURL: "https://firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let tempImg = "";
        let filter = "Todas";

        // ACCESO
        window.abrirAdmin = () => { if(prompt("Acceso:") === "0110") document.getElementById('myGestion').style.left = '0'; };

        // TABS
        window.tab = (n) => {
            document.getElementById('sec-inv').style.display = n === 'inv' ? 'grid' : 'none';
            document.getElementById('sec-ped').style.display = n === 'ped' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-' + n).classList.add('active');
        };

        // IMAGEN
        document.getElementById('p-file').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => { tempImg = ev.target.result; };
            r.readAsDataURL(e.target.files[0]);
        };

        // ACCIONES
        document.getElementById('btn-pub').onclick = () => {
            const id = Date.now();
            set(ref(db, 'productos/' + id), {
                id, name: document.getElementById('p-name').value, price: document.getElementById('p-price').value,
                cat: document.getElementById('p-cat').value, desc: document.getElementById('p-desc').value,
                img: tempImg, stock: 10
            }).then(() => alert("Sincronizado"));
        };

        window.comprar = (id, name, price, stock) => {
            if(stock <= 0) return;
            const oid = "ORD-" + Math.floor(Math.random()*9999);
            update(ref(db, 'productos/' + id), { stock: stock - 1 });
            set(ref(db, 'pedidos/' + oid), { id: oid, prod: name, price, status: "Pendiente" }).then(() => alert("Pedido realizado."));
        };

        window.filtrar = (c) => { filter = c; render(); };

        // RENDER
        onValue(ref(db, '/'), (snap) => {
            const data = snap.val() || {};
            const grid = document.getElementById('shop-grid');
            const invL = document.getElementById('admin-inv-list');
            const ordL = document.getElementById('admin-ord-list');
            grid.innerHTML = ""; invL.innerHTML = ""; ordL.innerHTML = "";

            if(data.productos) {
                Object.keys(data.productos).forEach(k => {
                    const p = data.productos[k];
                    if(filter !== "Todas" && p.cat !== filter) return;
                    grid.innerHTML += `<div class="product-card">
                        <div class="img-container"><img src="${p.img}"></div>
                        <span class="p-cat">${p.cat}</span><h3 class="p-title serif">${p.name}</h3>
                        <div class="p-footer"><span style="font-size:20px;">$${p.price}</span>
                        <button class="buy-btn" onclick="comprar('${k}','${p.name}',${p.price},${p.stock})" ${p.stock<=0?'disabled':''}>${p.stock<=0?'AGOTADO':'AÑADIR'}</button></div>
                    </div>`;
                    invL.innerHTML += `<div class="order-card"><span>${p.name} (Stock: ${p.stock})</span><button onclick="remove(ref(db, 'productos/${k}'))" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>`;
                });
            }
            if(data.pedidos) {
                Object.keys(data.pedidos).forEach(k => {
                    const o = data.pedidos[k];
                    ordL.innerHTML += `<div class="order-card"><span>${o.id} - ${o.prod}</span><span style="font-weight:900;">${o.status}</span></div>`;
                });
            }
        });
    </script>
</body>
</html>
