<!-- Reemplaza tu sección .project-grid con este contenedor vacío -->
<main class="project-grid" id="gallery-container">
    <!-- El Admin inyectará las fotos aquí -->
</main>

<script>
    // Conexión con tu "Admin" (data.json)
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('gallery-container');
            
            data.editorial_images.forEach(img => {
                const html = `
                    <div class="image-box ${img.class}">
                        <img src="${img.url}" alt="${img.title}">
                        <span style="position:absolute; bottom:20px; left:20px; font-size:10px;">
                            FIGURE ${img.id} — ${img.title}
                        </span>
                    </div>
                `;
                container.innerHTML += html;
            });
        })
        .catch(err => console.error("Error cargando el Admin:", err));
</script>
