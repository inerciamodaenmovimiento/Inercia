<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Raleway', sans-serif; color: #1a1a1a; line-height: 1.6; background: #fff; }
        header { padding: 30px 0; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 15px; }
        nav ul { display: flex; justify-content: center; gap: 30px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; list-style: none; }
        nav a { text-decoration: none; color: #666; transition: 0.3s; }
        nav a:hover { color: #000; }
        
        .hero { height: 70vh; background: url('https://unsplash.com') center/cover; margin-bottom: 60px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .product-card { text-align: center; margin-bottom: 40px; }
        .product-img { width: 100%; height: 400px; background: #f4f4f4; object-fit: cover; margin-bottom: 15px; }
        .product-card h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .price { color: #888; font-weight: 600; }

        .banner-collection { background: #1a1a1a; color: #fff; padding: 100px 0; text-align: center; margin: 60px 0; }
        .banner-collection h2 { font-family: 'Playfair Display', serif; font-size: 3.5rem; letter-spacing: 10px; margin-bottom: 20px; }
        .btn { border: 1px solid #fff; padding: 12px 35px; color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; transition: 0.4s; }
        .btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Inercia</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">New Arrival</a></li>
                <li><a href="#">Prendas</a></li>
                <li><a href="#" style="color: #c5a059;">Sale</a></li>
            </ul>
        </nav>
    </header>

    <div class="hero"></div>

    <section class="container">
        <h2 class="section-title">New Arrivals</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://unsplash.com" class="product-img">
                <h3>Blusa Essential</h3>
                <p class="price">$45.000</p>
            </div>
            <div class="product-card">
                <img src="https://unsplash.com" class="product-img">
                <h3>Tapado Inercia</h3>
                <p class="price">$120.000</p>
            </div>
            <div class="product-card">
                <img src="https://unsplash.com" class="product-img">
                <h3>Conjunto White</h3>
                <p class="price">$85.000</p>
            </div>
        </div>
    </section>

    <div class="banner-collection">
        <h2>COLLECTION</h2>
        <a href="#" class="btn">VER MÁS</a>
    </div>

    <!-- ACCESO OCULTO 0110 -->
    <script>
        let input = "";
        document.addEventListener("keydown", (e) => {
            if (!isNaN(e.key)) {
                input += e.key;
                if (input.length > 4) input = input.substring(input.length - 4);
                if (input === "0110") window.location.href = "admin.html";
            }
        });
    </script>
</body>
</html>
