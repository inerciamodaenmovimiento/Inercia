<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">INERCIA</div>
            <button id="cart-btn">Carrito (<span id="cart-count">0</span>)</button>
        </nav>
    </header>

    <main class="container product-page">
        <!-- Punto 1: Imagen Dinámica -->
        <section class="product-gallery">
            <img src="https://unsplash.com" alt="Producto" id="main-img">
        </section>

        <section class="product-details">
            <p class="brand">NUEVA COLECCIÓN</p>
            <h1>Falda Ruffle Inercia</h1>
            <p class="price">$196.000</p>

            <div class="options">
                <!-- Gestión de Variantes -->
                <div class="option-group">
                    <label>Color</label>
                    <div class="color-selectors">
                        <button class="color-dot active" data-color="Rosa" data-img="https://unsplash.com" style="background: #d4a3a3;"></button>
                        <button class="color-dot" data-color="Negro" data-img="https://unsplash.com" style="background: #1a1a1a;"></button>
                    </div>
                </div>

                <div class="option-group">
                    <label>Talla</label>
                    <select id="size-select">
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                    </select>
                </div>
            </div>

            <!-- Punto 2: Control de Stock -->
            <div class="stock-info" id="stock-status">En stock</div>
            <button id="add-to-cart" class="btn-primary">AÑADIR AL CARRITO</button>
        </section>
    </main>

    <!-- Modal del Carrito -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Tu Carrito</h2>
            <div id="cart-items"></div>
            <hr>
            <div class="cart-total">Total: <span id="cart-total-price">$0</span></div>
            <button class="btn-primary">FINALIZAR COMPRA</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
