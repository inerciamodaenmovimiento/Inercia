<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INERCIA | Moda en Movimiento</title>
  
  <!-- CDNs Corregidos -->
  <script src="https://tailwindcss.com"></script>
  <script src="https://unpkg.com"></script>
  <link href="https://googleapis.com" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cafe': '#3d2b1f',
            'crema': '#fdfbf7',
            'arena': '#e8e2d9'
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #fdfbf7; color: #1a1a1a; font-family: 'Outfit', sans-serif; }
    .font-serif { font-family: 'Cormorant Garamond', serif; }
    .cart-sidebar { transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .cart-open .cart-sidebar { transform: translateX(0); }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-crema">

  <!-- NAVEGACIÓN -->
  <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-arena h-24 flex items-center px-8 justify-between">
    <div class="cursor-pointer" onclick="showView('home')">
      <h1 class="font-serif text-4xl italic text-cafe leading-none tracking-tighter">Inercia</h1>
      <p class="text-[8px] uppercase tracking-[0.6em] text-stone-400 font-bold">Moda en movimiento</p>
    </div>
    
    <button onclick="toggleCart()" class="relative p-3 bg-cafe rounded-full shadow-xl hover:scale-110 transition">
      <i data-lucide="shopping-bag" class="w-6 h-6 text-white"></i>
      <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
    </button>
  </nav>

  <!-- CARRITO -->
  <div id="cart-panel" class="cart-sidebar fixed right-0 top-0 h-full w-full md:w-96 bg-white z-50 shadow-2xl p-8 border-l border-arena flex flex-col">
    <div class="flex justify-between items-center mb-10">
      <h2 class="font-serif text-3xl italic">Tu Selección</h2>
      <button onclick="toggleCart()"><i data-lucide="x" class="w-8 h-8"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto space-y-6"></div>
    <div class="pt-8 border-t">
      <div class="flex justify-between text-2xl font-bold mb-6"><span>Total:</span><span id="cart-total">$0</span></div>
      <button onclick="checkout()" class="w-full bg-cafe text-white py-5 rounded-xl font-bold uppercase text-xs tracking-[0.2em] shadow-lg">Finalizar Pedido</button>
    </div>
  </div>

  <main class="pt-24">
    <section id="view-home">
      <!-- HERO (Inspirado en Keyn) -->
      <div class="relative h-[70vh] bg-arena flex items-center justify-center overflow-hidden">
        <img src="https://unsplash.com" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <div class="z-10 text-center px-6">
          <h2 class="font-serif text-7xl md:text-[120px] italic text-cafe leading-none mb-4 drop-shadow-sm">Inercia</h2>
          <p class="text-xs md:text-sm uppercase tracking-[1em] text-stone-600 font-semibold">La confianza empieza en la ropa</p>
        </div>
      </div>

      <!-- CATALOG -->
      <div class="max-w-7xl mx-auto px-6 py-24">
        <div class="text-center mb-20">
            <h3 class="font-serif text-6xl italic text-cafe tracking-tighter">catalog</h3>
            <div class="w-16 h-0.5 bg-arena mx-auto mt-4"></div>
        </div>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-16"></div>
      </div>

      <!-- PHILOSOPHY -->
      <div class="bg-white py-32 px-6 border-t border-arena">
        <div class="max-w-4xl mx-auto text-center">
            <h3 class="font-serif text-5xl italic mb-10 text-cafe">Our Philosophy</h3>
            <p class="text-stone-500 leading-[2] text-lg font-light italic">"Inercia no son solo piezas. Es confianza en movimiento. Ayudamos a que te encuentres contigo misma y sientas que eres capaz de todo."</p>
        </div>
      </div>
    </section>

    <!-- ADMIN -->
    <section id="view-admin" class="hidden min-h-screen p-10 bg-white">
      <div class="max-w-4xl mx-auto bg-crema p-10 rounded-[3rem] border border-arena shadow-sm">
        <h2 class="font-serif text-5xl mb-12 italic text-cafe text-center">Panel Studio</h2>
        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-6">
                <input type="text" id="adm-name" placeholder="Nombre de la prenda" class="w-full bg-white border border-arena p-5 rounded-2xl outline-none focus:border-cafe transition">
                <input type="number" id="adm-price" placeholder="Precio ($)" class="w-full bg-white border border-arena p-5 rounded-2xl outline-none focus:border-cafe transition">
                <input type="file" id="adm-img" class="w-full text-xs">
                <button onclick="saveProduct()" class="w-full bg-cafe text-white py-5 rounded-2xl font-bold uppercase tracking-widest shadow-xl">Publicar Pieza</button>
            </div>
            <div id="adm-list" class="space-y-4 max-h-[400px] overflow-y-auto"></div>
        </div>
        <div class="mt-12 text-center">
            <button onclick="showView('home')" class="text-xs font-bold uppercase tracking-widest text-stone-400 hover:text-cafe">← Salir del panel</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="py-20 text-center text-[10px] text-stone-300 uppercase tracking-[0.5em] border-t border-arena">
    © 2024 INERCIA STUDIO <button onclick="accessStudio()" class="opacity-0 cursor-default">.</button>
  </footer>

  <script>
    // CARGA DE DATOS INICIALES PARA QUE NO SE VEA VACÍO
    const demo = [
      { id: 1, name: "Rashguard Chocolate", price: "12900", img: "https://unsplash.com" },
      { id: 2, name: "Bomber Suede", price: "18900", img: "https://unsplash.com" },
      { id: 3, name: "Vestido Marfil", price: "15500", img: "https://unsplash.com" }
    ];

    let db = JSON.parse(localStorage.getItem('inercia_prod_v1')) || demo;
    let cart = [];

    function showView(v) {
      document.getElementById('view-home').classList.toggle('hidden', v !== 'home');
      document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
      window.scrollTo(0,0);
    }

    function accessStudio() {
      if(prompt("Código Studio:") === "0110") showView('admin');
    }

    function toggleCart() { document.body.classList.toggle('cart-open'); }

    function saveProduct() {
      const name = document.getElementById('adm-name').value;
      const price = document.getElementById('adm-price').value;
      const file = document.getElementById('adm-img').files;
      if(!name || !price || !file[0]) return alert("Faltan datos");

      const reader = new FileReader();
      reader.onload = (e) => {
        db.push({ id: Date.now(), name, price, img: e.target.result });
        localStorage.setItem('inercia_prod_v1', JSON.stringify(db));
        render();
      };
      reader.readAsDataURL(file[0]);
    }

    function render() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = db.map(p => `
        <div class="group">
          <div class="aspect-[3/4] bg-arena rounded-[2.5rem] overflow-hidden mb-8 relative shadow-sm">
            <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
            <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition flex items-center justify-center p-8">
                <button onclick="addToCart(${p.id})" class="w-full bg-white text-black py-4 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-2xl translate-y-4 group-hover:translate-y-0 transition">Añadir a la bolsa</button>
            </div>
          </div>
          <div class="text-center">
            <h4 class="font-serif text-3xl italic text-cafe">${p.name}</h4>
            <p class="text-xs font-bold text-stone-400 mt-2 tracking-widest">${p.price} ₽</p>
          </div>
        </div>
      `).join('');

      document.getElementById('adm-list').innerHTML = db.map(p => `
        <div class="flex justify-between items-center p-4 bg-white rounded-2xl border border-arena">
          <div class="flex items-center gap-4">
            <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg">
            <span class="text-[10px] font-bold uppercase">${p.name}</span>
          </div>
          <button onclick="deleteProd(${p.id})" class="text-red-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function addToCart(id) {
      cart.push(db.find(p => p.id === id));
      updateCart();
      toggleCart();
    }

    function updateCart() {
      document.getElementById('cart-count').innerText = cart.length;
      document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
        <div class="flex gap-4 items-center bg-crema p-4 rounded-2xl border border-arena">
            <img src="${item.img}" class="w-16 h-20 object-cover rounded-xl shadow-md">
            <div class="flex-1">
                <p class="font-serif italic text-lg text-cafe">${item.name}</p>
                <p class="text-[10px] font-bold text-stone-400">${item.price} ₽</p>
                <button onclick="cart.splice(${i},1); updateCart()" class="text-[9px] text-red-400 uppercase font-bold mt-2">Quitar</button>
            </div>
        </div>
      `).join('');
      const total = cart.reduce((s, x) => s + Number(x.price), 0);
      document.getElementById('cart-total').innerText = total.toLocaleString() + " ₽";
      lucide.createIcons();
    }

    function deleteProd(id) {
      db = db.filter(x => x.id !== id);
      localStorage.setItem('inercia_prod_v1', JSON.stringify(db));
      render();
    }

    function checkout() {
      const msg = `¡Hola Inercia! Deseo comprar: ${cart.map(x => x.name).join(', ')}. Total: ${document.getElementById('cart-total').innerText}`;
      window.open(`https://wa.me{encodeURIComponent(msg)}`);
    }

    lucide.createIcons();
    render();
  </script>
</body>
</html>
