<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; color: #333; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .product-main { display: flex; gap: 40px; margin-bottom: 50px; }
        .product-image { flex: 1; text-align: center; }
        .product-image img { max-width: 100%; }
        .product-info { flex: 1; }
        .price { font-size: 20px; margin: 10px 0; }
        button { background: #000; color: #fff; padding: 15px 30px; border: none; cursor: pointer; width: 100%; text-transform: uppercase; }
        /* Admin Access Styles */
        #admin-access { position: fixed; bottom: 10px; right: 10px; width: 5px; height: 5px; cursor: default; }
    </style>
</head>
<body>
    <header>
        <div class="logo">INERCIA</div>
    </header>

    <div class="container">
        <section class="product-main">
            <div class="product-image">
                <img src="https://clothes.com" alt="Vestido Granaig">
            </div>
            <div class="product-info">
                <h1>GRANAIG</h1>
                <p class="price">250 €</p>
                <button>Añadir al Carrito</button>
                <p style="margin-top: 20px;">Vestido de corte entallado, cuello redondo y falda metalizada con textura.</p>
            </div>
        </section>
    </div>

    <!-- Acceso oculto para Admin -->
    <div id="admin-access" onclick="requestAdmin()"></div>

    <script>
        function requestAdmin() {
            let pass = prompt("Acceso Restringido:");
            if (pass === "0110") {
                window.location.href = "admin.html";
            }
        }
    </script>
</body>
</html>
