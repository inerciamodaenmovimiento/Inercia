<div id="contenedor-productos">Cargando catálogo...</div>

<script>
// PEGA ACÁ EL LINK QUE COPIASTE DE GOOGLE (el que termina en .csv)
const LINK_GOOGLE_SHEET = 'TU_LINK_AQUÍ';

async function leerProductos() {
    const respuesta = await fetch(LINK_GOOGLE_SHEET);
    const datos = await respuesta.text();
    
    // Convertimos el CSV en una lista de productos
    const filas = datos.split('\n').slice(1); 
    const contenedor = document.getElementById('contenedor-productos');
    contenedor.innerHTML = ""; // Limpiamos el cargando

    filas.forEach(fila => {
        const columnas = fila.split(',');
        if(columnas.length >= 2) {
            const [nombre, precio, imagen, desc] = columnas;
            
            // Creamos la tarjeta del producto
            contenedor.innerHTML += `
                <div class="producto-card" style="border:1px solid #000; margin:10px; padding:10px; display:inline-block; width:200px;">
                    <img src="${imagen}" style="width:100%">
                    <h3>${nombre}</h3>
                    <p>$${precio}</p>
                    <button onclick="agregarAlCarrito('${nombre}', ${precio})">Agregar</button>
                </div>
            `;
        }
    });
}

window.onload = leerProductos;
</script>
