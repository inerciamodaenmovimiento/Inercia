<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #f5f2ed; color: #2d2926; font-family: 'Inter', sans-serif; margin: 0; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 4rem; text-transform: uppercase; letter-spacing: 2px; }
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; }
        .nav { text-align: center; padding: 40px; text-transform: uppercase; letter-spacing: 4px; }
        .btn-buy { border: 1px solid #2d2926; padding: 10px 30px; background: transparent; cursor: pointer; transition: 0.3s; }
        .btn-buy:hover { background: #2d2926; color: white; }
    </style>
</head>
<body>
    <nav class="nav">Inercia — Moda en Movimiento</nav>
    <section class="hero-grid">
        <img src="tu-foto-1.jpg" style="width:100%">
        <div style="text-align:center">
            <h1>Colección <br> Inercia</h1>
            <button class="btn-buy">Explorar</button>
        </div>
        <img src="tu-foto-2.jpg" style="width:100%">
    </section>
</body>
</html>
