<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inercia | Moda en Movimiento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <h1 class="logo">fashions/ash</h1>
            <nav class="menu-links">
                <a href="#">JEANS</a><a href="#">MEN</a><a href="#">WOMEN</a><a href="#">KIDS</a>
            </nav>
            <div class="nav-icons">
                <button id="cart-icon">🛒 <span id="cart-count">0</span></button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-text">
                <p>DAILY DEALS</p>
                <h2>CASUAL ESSENTIALS</h2>
                <button class="btn-outline">SHOP NOW</button>
            </div>
            <div class="hero-img">
                <img src="https://unsplash.com" alt="Hero">
            </div>
        </section>

        <!-- Categories & Stock Control -->
        <section class="grid-categories">
            <div class="cat-card large">
                <span class="vertical-text">LINGERIE</span>
                <img src="https://unsplash.com" alt="Lingerie">
            </div>
            <div class="cat-list">
                <div class="cat-item" data-type="TOPS">TOPS</div>
                <div class="cat-item" data-type="PANTS">PANTS</div>
                <div class="cat-item" data-type="SHOES">SHOES</div>
            </div>
        </section>

        <!-- Featured Products (Funcional) -->
        <section class="products">
            <h3>FEATURED PRODUCTS</h3>
            <div class="product-grid" id="product-container">
                <!-- Inyectado por JS -->
            </div>
        </section>
    </main>

    <!-- Modal Carrito -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Tu Selección</h2>
            <div id="cart-items-list"></div>
            <div class="cart-footer">
                <p>Total: <span id="total-price">$0</span></p>
                <button class="btn-black">FINALIZAR COMPRA</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
